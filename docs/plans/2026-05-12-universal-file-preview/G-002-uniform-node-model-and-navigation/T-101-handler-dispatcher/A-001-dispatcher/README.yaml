prompt: "Create a new Python file.\n\nTarget file (create_file — file does not exist):\n\
  \  code_analysis/commands/universal_file_preview/dispatcher.py\n\nFile-level docstring\
  \ (required):\n  \"\"\"\n  HandlerDispatcher — routes file_path to a FileHandler\
  \ by extension.\n\n  Implements C-002: one extension maps to exactly one FileHandler;\n\
  \  unknown extension produces UNKNOWN_EXTENSION error (C-014).\n  Adding a new handler\
  \ does not change the public command schema.\n\n  Author: Vasiliy Zdanovskiy\n \
  \ email: vasilyvz@gmail.com\n  \"\"\"\n\nImports:\n  from __future__ import annotations\n\
  \  import logging\n  from pathlib import Path\n  from .base_handler import FileHandler\n\
  \  from .errors import PreviewError, input_error, INPUT_ERROR_UNKNOWN_EXTENSION\n\
  \  from .handlers.python_handler import PythonFileHandler\n  from .handlers.text_handler\
  \ import TextFileHandler\n  from .handlers.json_handler import JsonFileHandler\n\
  \  from .handlers.jsonl_handler import JsonLinesFileHandler\n  from .handlers.yaml_handler\
  \ import YamlFileHandler\n\nModule-level:\n  logger = logging.getLogger(__name__)\n\
  \nClass: HandlerDispatcher\nDocstring:\n  \"\"\"\n  Routes file_path to a FileHandler\
  \ (C-003) by extension.\n\n  Dispatch key is the file extension (case-insensitive).\
  \ Each extension\n  maps to exactly one handler instance. Unknown extension produces\n\
  \  UNKNOWN_EXTENSION input error (C-014).\n\n  Attributes:\n      _registry: Mapping\
  \ of lowercase extension to FileHandler instance.\n  \"\"\"\n\nMethod: __init__(self)\
  \ -> None\n  Docstring: \"Initialise dispatcher with the default extension-to-handler\
  \ registry.\"\n  Body: build self._registry: dict[str, FileHandler] mapping\n  \
  \  {\n      '.py': PythonFileHandler(),\n      '.pyi': PythonFileHandler(),\n  \
  \    '.pyw': PythonFileHandler(),\n      '.md': TextFileHandler(),\n      '.txt':\
  \ TextFileHandler(),\n      '.rst': TextFileHandler(),\n      '.adoc': TextFileHandler(),\n\
  \      '.json': JsonFileHandler(),\n      '.jsonl': JsonLinesFileHandler(),\n  \
  \    '.ndjson': JsonLinesFileHandler(),\n      '.yaml': YamlFileHandler(),\n   \
  \   '.yml': YamlFileHandler(),\n    }\n\nMethod: dispatch(self, file_path: str)\
  \ -> FileHandler | PreviewError\n  Return type: FileHandler | PreviewError\n  Docstring:\n\
  \    \"\"\"\n    Resolve the FileHandler for the given file_path by extension.\n\
  \n    Extension matching is case-insensitive. Does not read file content.\n\n  \
  \  Args:\n        file_path: Project-relative path string.\n\n    Returns:\n   \
  \     FileHandler instance, or PreviewError(UNKNOWN_EXTENSION) when\n        the\
  \ extension has no registered handler.\n    \"\"\"\n  Body:\n    ext = Path(file_path).suffix.lower()\n\
  \    handler = self._registry.get(ext)\n    if handler is None:\n        return\
  \ input_error(\n            INPUT_ERROR_UNKNOWN_EXTENSION,\n            f\"No handler\
  \ registered for extension {ext!r} in {file_path!r}.\",\n            details={'extension':\
  \ ext, 'file_path': file_path},\n        )\n    return handler\n"
