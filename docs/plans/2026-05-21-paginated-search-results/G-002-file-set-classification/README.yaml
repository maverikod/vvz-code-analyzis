step_id: G-002
name: Indexed and dynamic file-set classification
description: "Defines how the search engine partitions the files in scope into the
  indexed file set and the dynamic file set before any result is produced. The indexed
  set is the intersection of database-known files and on-disk files that pass freshness
  validation; the dynamic set is the difference that must be processed directly from
  disk or a draft session. Freshness validation by checksum or modification metadata
  decides membership, and files that are current in the index must not be rescanned
  directly. Default dynamic scanning is limited to known supported formats. This step
  defines set membership and freshness only; it does not define tree construction,
  structural filtering, or result paging.\n"
