step_id: G-010
name: Python node visualizer
description: 'Add a NodeVisualizer component to PythonFileHandler that renders any
  node from CSTTree into a structured human-readable text preview. Four rendering
  modes: module-level overview, class structure, function/method body first-level,
  and full-text fallback for small files. Wires PreviewBudget full_text_max_lines
  into UniversalFilePreviewCommand. Adds text field to Block model.

  '
