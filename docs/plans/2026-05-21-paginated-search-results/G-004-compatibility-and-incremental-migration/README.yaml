step_id: G-004
name: Compatibility and Incremental Migration
description: "Defines the migration strategy for adding paginated session-backed behavior
  to existing working search commands without breaking current callers. ExistingSearchCommand
  represents commands whose current non-paginated behavior must remain the default.
  ExistingBehaviorInventory separates already-implemented behavior from new behavior
  introduced by this plan, preventing duplication of working search logic. IncrementalCompatibilityLayer
  routes paginated execution through SearchSession as an opt-in path without replacing
  existing command implementations. BackwardCompatibleCommandContract keeps current
  behavior stable while allowing optional paginated extensions; existing callers need
  not change. OptionalPaginationParameters are the optional request and response fields
  that enable session-backed behavior without changing default command behavior; they
  must not be required for non-paginated callers.\n"
