inputs:
- name: TreeBuilder entity API
  type: existing domain entity API (C-011)
  description: Predefined TreeBuilder.build that resolves HandlerRegistry, calls
    FormatHandler.mark, writes three-section sibling TreeFile (CHECKSUMS, MAP, TREE),
    and records content_checksum in CHECKSUMS and the returned tree reference; consumed
    by integration modules, not redefined here.
- name: TreeLifecycle entity API
  type: existing domain entity API (C-010)
  description: Predefined TreeLifecycle coordinator with checksum helpers, TreeBuilder
    reference, ChecksumSyncPolicy (C-006) four-branch decision input, and NodeIdMap
    validate_and_repair on rebuild; consumed by integration modules, not redefined here.
- name: HandlerRegistry and FormatHandler implementations
  type: MRS concepts (C-008, C-007)
  description: HandlerRegistry.default_registry with Text, Markdown, Yaml, Json, and
    PythonHandler instances from G-001 marker contract work.
- name: NodeIdMap operations
  type: domain entity definition (C-025)
  description: build and validate_and_repair integrated into unified-pipeline rebuild
    routing.
outputs:
- name: Unified pipeline integration module
  type: integration module
  description: Module(s) that wire validate→build routing by calling existing TreeLifecycle
    and TreeBuilder APIs; no TreeBuilder or TreeLifecycle class definitions are created
    or modified in this step.
- name: Parity verification suite
  type: verification artifact
  description: Parity test module comparing unified-pipeline three-section tree output
    against the legacy parity oracle on fixtures; documents covered versus unverified
    node-type parity for Python.
