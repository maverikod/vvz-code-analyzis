meta:
  title: API command parameter validation bugs (complete)
  methodology: 'Per command: full read of source + schema helper files; schema/metadata/execute/validate_params static analysis;
    runtime probe (unknown param, wrong type, invalid enum) on registered commands.'
  standard: docs/standards/PARAMS_VALIDATION.md
  rule: Optional parameters may be absent. If present they must match schema type and semantics. Unknown parameters must raise
    ValidationError.
  audit_date: '2026-05-23'
  audit_pass: complete
  total_commands: 165
systemic_findings:
- id: SYS-001
  severity: error
  location: code_analysis/commands/base_mcp_command.py:619-620
  title: Unknown params silently filtered in BaseMCPCommand.validate_params
  description: When additionalProperties is false, params dict is filtered to schema properties before validate_params_against_schema.
    Unknown keys never trigger ValidationError.
  fix: Remove pre-filter; call validate_params_against_schema on original params.
- id: SYS-002
  severity: error
  location: code_analysis/commands/base_mcp_command.py:524
  title: Default additionalProperties=True in validate_params_against_schema
  description: Schemas omitting additionalProperties allow unknown keys.
- id: SYS-003
  severity: warning
  location: mcp_proxy_adapter/commands/base.py:142-222
  title: Adapter Command.validate_params skips type/enum validation
  description: format_code, lint_code, type_check_code, health, queue_health, qa_sleep reject unknown keys but not wrong types.
- id: SYS-004
  severity: error
  location: code_analysis/commands/project_management_mcp_commands/create_project.py:22
  title: create_project missing Command/BaseMCPCommand inheritance
  description: validate_params super() raises AttributeError; no param validation path works.
- id: SYS-005
  severity: warning
  location: code_analysis/hooks_register_part1.py
  title: 31 command classes not registered in live API
  description: CST/JSON/universal legacy commands exist with get_schema but are not in register_code_analysis_commands.
  commands:
  - create_text_file
  - cst_apply_buffer
  - cst_convert_and_save
  - cst_create_file
  - cst_find_node
  - cst_get_node_at_line
  - cst_get_node_by_range
  - cst_get_node_info
  - cst_list_trees
  - cst_load_file
  - cst_modify_tree
  - cst_reload_tree
  - cst_save_tree
  - cst_unload_tree
  - get_file_lines
  - json_find_node
  - json_get_node_info
  - json_load_file
  - json_modify_tree
  - json_reload_tree
  - json_save_tree
  - list_cst_blocks
  - list_json_blocks
  - query_cst
  - read_project_text_file
  - replace_file_lines
  - universal_file_delete
  - universal_file_read
  - universal_file_replace
  - universal_file_save
  - write_project_text_lines
- id: SYS-006
  severity: error
  location: code_analysis/commands/base_mcp_command.py:500-597
  title: Shallow schema validation
  description: validate_params_against_schema ignores minimum/maximum, minItems, oneOf, anyOf, union types, array item types,
    nested object property validation.
