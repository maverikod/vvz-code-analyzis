prompt: |
  Create the file `code_analysis/tree/__init__.py`.
  Operation: create_file (the file does not exist yet).

  This file is the package initialiser for `code_analysis.tree`. It re-exports the
  public contract API from `code_analysis/tree/contracts.py` (created in the prior
  step targeting that module).

  ## MRS excerpt (relevant concepts)

  C-001 MarkerContract: three-operation contract (mark, parse, unmark) with integer
    short_id markers in TREE section only; round-trip invariant verified by checksum.

  C-002 NodeId: per-file monotonic integer short_id handle (NOT str, NOT UUID);
    external API uses (project-relative file path, short_id int).

  C-005 AddressableBlock: minimally-addressable block; marker never mid-lexeme.

  C-024 TreeNodeUuid: canonical UUID4 stored in MAP section only; not exported for
    marker embedding or external node references (type exported for internal MAP typing).

  ## File header (module docstring — exact content)

  """
  code_analysis.tree — Marked-tree unification package.

  Public API:
      MarkerContract     - Three-operation protocol (mark, parse, unmark) [C-001]
      NodeId             - Per-file integer short_id handle                 [C-002]
      TreeNodeUuid       - MAP-section canonical UUID4 identity             [C-024]
      AddressableBlock   - Per-format minimal addressable unit              [C-005]
      Format             - Enumeration of supported file formats
      UnknownNodeIdError - Raised when a short_id is not recognised         [C-002]
      validate_short_id  - Validate and coerce int to NodeId

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """

