step_id: T-004
parent_global_step: G-001
name: Optional pagination parameters
description: "Define the OptionalPaginationParameters entity as a strict extension
  of BackwardCompatibleCommandContract. Specify the optional request and response
  fields that enable paginated or session-backed behavior, including paginated flag,
  page_size, cursor, search_id, and include_search_id. HTTP page references appear
  only in optional_pagination_parameter_spec entries for command categories whose
  opt-in paging path uses HTTPResultAccess-backed page retrieval; all other categories
  omit that field. Require that every pagination field is optional, documented, and
  absent from default invocations so existing callers need no changes. Prohibit requiring
  pagination parameters for commands that today return direct payloads by default.\n"
concepts:
- C-024
- C-023
inputs:
- name: backward_compatible_command_contract
  type: contract_specification
  description: "Public contract whose defaults must remain unchanged when pagination
    fields are omitted.\n"
- name: preservation_matrix
  type: compatibility_matrix
  description: "Compatibility rules constraining which optional fields may appear
    and how they interact with preserved dimensions.\n"
outputs:
- name: optional_pagination_parameter_spec
  type: parameter_specification
  description: "Complete list of optional pagination and session-reference fields,
    their semantics, and default-when-omitted behavior.\n"
- name: contract_extension_binding
  type: extension_binding
  description: "Formal attachment of optional parameters to the backward-compatible
    contract without altering default command behavior.\n"
atomic_steps:
- A-001
status: draft
