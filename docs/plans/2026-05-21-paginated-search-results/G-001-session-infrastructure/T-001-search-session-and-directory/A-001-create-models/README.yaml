prompt: "Create the file `code_analysis/search_session/models.py`.\n\nThis file defines
  the core domain models for the search session subsystem.\n\n## MRS excerpt\n\nC-001
  SearchSession: Logical execution context for one search request that\nowns result
  pages, status, metrics, lifetime metadata, and cleanup state.\nProperties:\n  -
  Created immediately when a model or client starts a search request.\n  - Has a unique
  search_id used for HTTP access to pages and status.\n  - Owns a dedicated session
  directory for page files and service metadata.\n  - Tracks running, completed, failed,
  cancelled, timed_out, dead, expired,\n    and closed states.\n\nC-002 SearchSessionDirectory:
  Filesystem directory created for a\nSearchSession to store result page files, manifest
  data, and service\nmetadata.\nProperties:\n  - Created before search execution begins.\n\
  \  - Contains page files written by the search worker.\n  - Contains metadata that
  records last access time and session progress.\n  - Is removed by background cleanup
  when the session expires or is dead.\n\n## Implementation requirements\n\n1. Import
  `dataclasses`, `enum`, `pathlib.Path`, `uuid`, `datetime`.\n\n2. Define `SearchSessionStatus(str,
  enum.Enum)` with members:\n   `RUNNING = \"running\"`, `COMPLETED = \"completed\"\
  `, `FAILED = \"failed\"`,\n   `CANCELLED = \"cancelled\"`, `TIMED_OUT = \"timed_out\"\
  `, `DEAD = \"dead\"`,\n   `EXPIRED = \"expired\"`, `CLOSED = \"closed\"`.\n\n3.
  Define `@dataclasses.dataclass` class `SearchSessionDirectory`:\n   - Field `path:
  pathlib.Path` — absolute filesystem path of the directory.\n   - Method `exists(self)
  -> bool` — returns `self.path.exists()`.\n   - Method `ensure_created(self) -> None`
  — calls\n     `self.path.mkdir(parents=True, exist_ok=True)`.\n\n4. Define `@dataclasses.dataclass`
  class `SearchSession`:\n   - Field `search_id: str` — UUID string, unique identifier.\n\
  \   - Field `session_dir: SearchSessionDirectory` — the owned directory.\n   - Field
  `status: SearchSessionStatus` — defaults to `SearchSessionStatus.RUNNING`.\n   -
  Field `created_at: datetime.datetime` — UTC creation timestamp.\n\n5. Define factory
  function:\n   ```\n   def create_search_session(\n       session_base_dir: pathlib.Path,\n\
  \   ) -> SearchSession:\n   ```\n   - Generates `search_id = str(uuid.uuid4())`.\n\
  \   - Constructs directory path as `session_base_dir / search_id`.\n   - Creates
  `SearchSessionDirectory(path=directory_path)`.\n   - Calls `session_dir.ensure_created()`
  to allocate the directory on disk\n     before returning.\n   - Returns `SearchSession(search_id=search_id,
  session_dir=session_dir,\n     status=SearchSessionStatus.RUNNING,\n     created_at=datetime.datetime.now(datetime.timezone.utc))`.\n\
  \n## Constraints\n- No imports outside the Python standard library.\n- All public
  names must have docstrings.\n- `SearchSession` and `SearchSessionDirectory` are
  allocated atomically:\n  `create_search_session` must not return until the directory
  exists on disk.\n"
