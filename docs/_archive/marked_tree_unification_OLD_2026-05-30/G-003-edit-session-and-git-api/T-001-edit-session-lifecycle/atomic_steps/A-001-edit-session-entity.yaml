  real signature (verified on disk):\n  `(*, project_root: Path, file_path: str, force:
  bool = False)`\n  returning `tuple[TreeRepresentationRef, TreeValidityState]`.\n\
  - `TreeRepresentationRef.sidecar_path: Path` is the authoritative tree\n  location;
  capture and use it in open() -- do NOT hand-check tree_abs.is_file().\n- Do NOT
