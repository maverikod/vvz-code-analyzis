step_id: T-901
parent_global_step: G-010
name: Full-text threshold in PreviewBudget
description: >
  Add field full_text_max_lines (type: int, default 200) to PreviewBudget dataclass
  (C-023 extends C-013). Wire the field into UniversalFilePreviewCommand (C-001):
  add key "full_text_max_lines" to get_schema() as an optional integer property
  with default 200 and minimum 0; extract it in validate_params() and pass it
  through to PreviewBudget construction. When a Python file has fewer lines than
  this threshold and the threshold is greater than 0, PythonFileHandler (C-016)
  returns the entire file source as a single text block instead of structured
  rendering. A value of 0 disables the full-text fallback entirely.
concepts:
- C-023
- C-013
- C-001
