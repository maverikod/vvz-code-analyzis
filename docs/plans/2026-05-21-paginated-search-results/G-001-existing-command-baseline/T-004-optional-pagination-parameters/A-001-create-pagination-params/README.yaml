name: Create OptionalPaginationParameters as strict extension of 
  BackwardCompatibleCommandContract
operation: create_file
parent_tactical_step: T-004
priority: 1
prompt: "Create `code_analysis/compat/pagination_params.py`.\n\n## MRS excerpt\n\n\
  C-024 OptionalPaginationParameters: optional request and response fields that\n\
  enable paginated or session-backed behavior without changing default command\nbehavior.\n\
  C-023 BackwardCompatibleCommandContract: the contract whose defaults must\nremain
  unchanged when pagination fields are omitted.\n\nProperties:\n- Every pagination
  field is optional, documented, and absent from default\n  invocations so existing
  callers need no changes.\n- HTTP page references appear only for command categories
  whose opt-in\n  paging path uses HTTPResultAccess-backed page retrieval.\n- Pagination
  parameters are forbidden from being required for commands that\n  today return direct
  payloads by default.\n\n## Implementation requirements\n\n1. Import `dataclasses`,
  `typing`.\n\n2. Define `@dataclasses.dataclass(frozen=True)` class `PaginationField`:\n\
  \   - Fields: `name: str`, `description: str`,\n     `default_when_omitted: str`.\n\
  \n3. Define module-level constant:\n   ```python\n   STANDARD_PAGINATION_FIELDS:
  tuple[PaginationField, ...]\n   ```\n   with entries for:\n   - PaginationField(\"\
  paginated\", \"Enable paginated mode\", \"false\")\n   - PaginationField(\"page_size\"\
  , \"Results per page\", \"system default\")\n   - PaginationField(\"cursor\", \"\
  Pagination cursor\", \"null\")\n   - PaginationField(\"search_id\", \"Session reference
  ID\", \"null\")\n   - PaginationField(\"include_search_id\", \"Include session ID
  in response\", \"false\")\n\n4. Define `@dataclasses.dataclass(frozen=True)` class
  `OptionalPaginationParameters`:\n   - Field `fields: tuple[PaginationField, ...]
  = STANDARD_PAGINATION_FIELDS`.\n   - Method `field_names(self) -> list[str]`:\n\
  \     returns `[f.name for f in self.fields]`.\n   - Method `defaults(self) -> dict[str,
  str]`:\n     returns `{f.name: f.default_when_omitted for f in self.fields}`.\n\n\
  ## Constraints\n- Standard library only.\n- All public names have one-line docstrings.\n\
  - File under 55 lines.\n"
status: draft
