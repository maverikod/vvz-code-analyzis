  """
  ```

  ## Imports (complete list — no others)

  ```
  from __future__ import annotations

  from dataclasses import dataclass, field
  from typing import Any, Dict, Optional

  from code_analysis.tree.contracts import NodeId
  ```

  ## Class skeleton

  ```
  @dataclass
  class TreeNode:
      short_id: NodeId
      kind: str
      content: str
      attributes: Dict[str, Any] = field(default_factory=dict)
      parent_short_id: Optional[NodeId] = None

      def __post_init__(self) -> None:
          ...
  ```

  ### Field specifications

  - `short_id: NodeId` — integer per-file short_id handle (C-002). Required.
  - `kind: str` — format-specific type label (e.g. `"paragraph"`, `"FunctionDef"`).
    Required, non-empty.
  - `content: str` — source text or string value of the node without markers.
    Required (may be empty string `""`).
  - `attributes: Dict[str, Any]` — optional per-node metadata (line_no, level,
    key_path, etc.). Defaults to empty dict via `field(default_factory=dict)`.
  - `parent_short_id: Optional[NodeId]` — parent's short_id, or `None` for roots.
    Defaults to `None`.

  ### Method: __post_init__(self) -> None

  Docstring: `"""Validate short_id and kind invariants (C-002, C-009)."""`

  Algorithm:
  1. If `not isinstance(self.short_id, int)`: raise `TypeError("TreeNode.short_id must be int")`.
  2. If `self.short_id < 1`: raise `ValueError("TreeNode.short_id must be a positive integer")`.
  3. If `not self.kind`: raise `ValueError("TreeNode.kind must be a non-empty string")`.
  4. If `self.parent_short_id is not None`:
     a. If `not isinstance(self.parent_short_id, int)`: raise `TypeError("TreeNode.parent_short_id must be int or None")`.
     b. If `self.parent_short_id < 1`: raise `ValueError("TreeNode.parent_short_id must be a positive integer when set")`.
  5. Return None (implicit).

  Error handling:
  - Raise `TypeError` for wrong types on short_id or parent_short_id.
  - Raise `ValueError` for non-positive integers or empty kind.
  - Do not catch exceptions.

  Edge cases:
  - `short_id=0` → ValueError (must be >= 1).
  - `short_id=-1` → ValueError.
  - `kind=""` → ValueError.
  - `content=""` → allowed.
  - `parent_short_id=None` → allowed (root).
  - `parent_short_id=0` → ValueError.
  - `attributes` omitted at construction → defaults to `{}`.

  ## Forbidden patterns

  - Do NOT add fields named `node_id`, `uuid`, `node_uuid`, `stable_id`, or `tree_node_uuid`.
  - Do NOT use `str` for short_id or parent_short_id.
  - Do NOT use `Any` as a field type (only in `Dict[str, Any]` for attributes).
  - Do NOT use `@dataclass(frozen=True)` or other dataclass options.
  - Do NOT add methods other than `__post_init__`.
  - Do NOT modify any file other than `code_analysis/tree/tree_node.py`.
  - Do NOT import uuid or NodeIdMap in this file.
  - Do NOT use `print()` for logging.

  ## Constants and literals

  - Validation message strings exactly as listed in the algorithm above.
  - Minimum valid short_id: `1`.

