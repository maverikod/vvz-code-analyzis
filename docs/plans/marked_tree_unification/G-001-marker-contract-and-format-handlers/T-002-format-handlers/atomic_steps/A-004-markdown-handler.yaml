prompt: |
  Create `code_analysis/tree/handlers/markdown_handler.py`.

  ## Parent documents
  - GS: `docs/plans/marked_tree_unification/G-001-marker-contract-and-format-handlers/README.yaml`
  - TS: `docs/plans/marked_tree_unification/G-001-marker-contract-and-format-handlers/T-002-format-handlers/README.yaml`
  - MRS: `docs/plans/marked_tree_unification/spec.yaml`

  ## Locked syntax (MARKDOWN / {b002})
  - Marker line before block: `<!-- id:<short_id> -->` where short_id is decimal integer
  - Parser: markdown-it-py only (`from markdown_it import MarkdownIt`)
  - Addressable: heading_open, paragraph_open, fence, code_block, blockquote_open, list_item_open

  ## Module docstring
  Author Vasiliy Zdanovskiy, vasilyvz@gmail.com — Markdown FormatHandler (C-007).

  ## Imports
  - from __future__ import annotations
  - import re
  - from pathlib import Path
  - from typing import Dict, List
  - from markdown_it import MarkdownIt
  - from code_analysis.tree.format_handler import FormatHandler, ShortIdAllocator
  - from code_analysis.tree.tree_node import TreeNode

  ## Constants
  - `_MARKER_RE = re.compile(r"^<!-- id:(\d+) -->\n", re.MULTILINE)`
  - `_MD = MarkdownIt()`
  - `_TOKEN_TO_KIND = {"heading_open":"heading","paragraph_open":"paragraph","fence":"code_block","code_block":"code_block","blockquote_open":"blockquote","list_item_open":"list_item"}`

  ## Class MarkdownHandler(FormatHandler)

  ### parse_content
  1. Empty → []
  2. allocator=ShortIdAllocator(1); tokens=_MD.parse(content); lines=content.splitlines(); nodes=[]
  3. For each token where type in _TOKEN_TO_KIND:
     - sid=allocator.allocate()
     - kind from map; level=int(tok.tag[1:]) if kind=="heading" and tok.tag and tok.tag[1:].isdigit() else 0
     - start,end = tok.map or (0,1); block_content="\n".join(lines[start:end])
     - append TreeNode(short_id=sid, kind=kind, content=block_content, attributes={"level": level, "start_line": start+1, "end_line": end})

  ### mark
  1. allocator=ShortIdAllocator(1); tokens=_MD.parse(content); lines=content.splitlines(keepends=True)
  2. inserts: Dict[int,str] keyed by 0-based line index
  3. For each addressable token with tok.map: line_no=tok.map[0]; if line_no not in inserts: inserts[line_no]=f"<!-- id:{allocator.allocate()} -->\n"
  4. Build output iterating lines with optional insert prefix
  5. Return joined string

  ### unmark
  Return `_MARKER_RE.sub("", marked_text)` — must not alter other whitespace/blank lines

  ### sidecar_path
  `source_abs.parent / (source_abs.name + ".tree")`

  ## Round-trip
  `unmark(mark(src)) == src` byte-exact; use verify_checksum_round_trip in tests.

  ## Forbidden
  - NO uuid / uuid.uuid4
  - NO UUID in comment (`<!-- id:550e8400-... -->` forbidden)
  - NO markdown, mistune, commonmark, marko
  - NO P:/L: text markers
  - NO TreeNode fields `node_id` or `parent_id` — use `short_id` / `parent_short_id` only
  - NO EditSession (C-012) hide/unhide logic

  ## Validation
  ```
  black code_analysis/tree/handlers/markdown_handler.py
  flake8 code_analysis/tree/handlers/markdown_handler.py
  mypy code_analysis/tree/handlers/markdown_handler.py
  python -c "
  from pathlib import Path
  from code_analysis.tree.handlers.markdown_handler import MarkdownHandler
  h=MarkdownHandler()
  src='# Hello\n\nPara\n'
  assert h.unmark(h.mark(src))==src
  nodes=h.parse_content(Path('/tmp/x.md'), src)
  assert nodes[0].short_id==1
  "
  pytest -q
  ```
  All tests must pass.
