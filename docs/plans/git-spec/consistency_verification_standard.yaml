        is limited to adding git_* and github_* server commands. G-001 and
        its concepts (C-003..C-008, C-024, C-025) were removed from
        source_spec.md, spec.yaml, and all matrices on this date. The
        entries below are retained verbatim as historical audit trail of the
        pre-excision verification pass; they are no longer part of the
        active plan. The excised material is archived at
        docs/plans/git-spec/_archive/G-001-commit-on-write/.
    c5_concept_references_valid: {result: pass, finding_list: []}
    c6_source_ranges_relevant:
