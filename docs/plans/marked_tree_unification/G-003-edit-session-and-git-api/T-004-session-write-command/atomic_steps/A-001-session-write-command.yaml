  > Cross-TS and within-TS execution ordering is expressed ONLY via the standard depends_on field plus parallel-waves.yaml. Do not add non-standard cross-TS ordering fields. Cross-TS FILE dependencies must be satisfied by INLINING full post-prior-AS file state into the prompt (a8), NOT by referencing other steps. No atomic, tactical, or global step identifiers may appear in any prompt: prose.

  Create `code_analysis/commands/universal_file_edit/session_write_command.py`.
  Operation: create_file.

  Define `session_write` MCP command exposing EditSession (C-012) two-stage external
  copy-out per {d004} (preview) and {n7k2} (confirm). Distinct from session_git_diff
  (C-014), which diffs session git history — not live external files.

  ## Parent documents
  - Machine spec: `docs/plans/marked_tree_unification/spec.yaml` (C-012, C-003, C-004)
  - Global step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/README.yaml`
  - Tactical step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/T-004-session-write-command/README.yaml`

  ## MRS excerpt (C-012)

  - Stage 1 preview ({d004}): diffs in-session unmark-exported source + in-session tree
    vs live external source + sibling tree; no external writes; no-op when no diffs.
  - Stage 2 confirm ({n7k2}): atomically copies both artefacts externally on explicit
    confirmation only; both or neither when valid; source-only when invalid.
  - In-session artefacts finalized per {d003} post-mutation; write gates external copy-out.

  ## Inlined dependency — EditSession write methods (C-012)

  Module: `code_analysis/core/edit_session/edit_session.py`

  ```python
  def preview_external_write(self) -> dict[str, Any]:
      """Returns {"has_changes": bool, "source_diff": str, "tree_diff": str}."""

  def confirm_external_copy_out(self) -> None:
      """Atomic external copy-out; no-op when has_changes=False."""
  ```

  `preview_external_write` algorithm (inlined contract):
  1. Read in-session source and tree from session paths.
  2. Read external source_abs and tree_abs.
  3. Build unified diffs via difflib; set has_changes when either diff non-empty.
  4. Does NOT call unmark or modify external files.

  `confirm_external_copy_out` algorithm (inlined contract):
  1. Call preview_external_write(); return immediately if not has_changes.
  2. VALID: tmp-copy tree then source to external paths (both or neither rollback).
  3. INVALID: copy in-session source only; external tree unchanged.

  Session resolution:
  ```python
  from code_analysis.core.edit_session.edit_session import get_active_session
  ```
  Raises KeyError when session_id absent.

  ## Imports (exact)

