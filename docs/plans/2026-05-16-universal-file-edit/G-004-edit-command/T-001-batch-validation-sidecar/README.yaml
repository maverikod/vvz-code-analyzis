step_id: T-001
parent_global_step: G-004
name: Implement BatchValidation for sidecar group
description: Implement BatchValidation (C-008) that operates on sidecar group
  batches only. Given a list of EditOperations (C-007), check every pair of
  node_ids: if any node in the batch is an ancestor of another node in the same
  batch, reject the entire batch atomically by returning NESTED_BATCH_FORBIDDEN.
  No operation is applied on violation. For tree-temp and text groups this
  validation is not called. Implement as validate_sidecar_batch(ops, tree_id)
  returning None on success or raising NESTED_BATCH_FORBIDDEN.
concepts:
- C-008
- C-007
inputs:
- name: operations
  type: list of EditOperation
  description: Batch of edit operations submitted by the caller.
- name: tree_id
  type: str
  description: In-memory CST tree UUID used to resolve ancestor relationships.
outputs:
- name: validation_result
  type: None or error
  description: None when batch is valid; NESTED_BATCH_FORBIDDEN error when
    an ancestor-descendant pair is found.
atomic_steps: []
status: draft