step_id: T-006
parent_global_step: G-001
name: Dead Session Detection and Background Cleaner
description: "Creates the DeadSessionDetection (C-010) rule set that decides whether
  a SearchSession is dead or orphaned. Rules: (1) if main_pid from ServerProcessIdentity
  (C-008) no longer exists in the OS process table, the session is dead; (2) if process_start_time
  does not match the current process with that PID, the session is dead because the
  PID was reused; (3) if heartbeat_at from SessionHeartbeat (C-009) is older than
  the hard timeout constant, the session is timed_out or orphaned. Creates the BackgroundSessionCleaner
  (C-011) as a periodic maintenance process that applies DeadSessionDetection and
  removes SearchSessionDirectory trees for sessions that are expired, closed, completed
  beyond TTL, failed beyond TTL, cancelled beyond TTL, timed out, or dead. The cleaner
  must not delete a session whose process identity and heartbeat indicate it is live
  and running.\n"
concepts:
- C-010
- C-011
inputs:
- name: session_directory
  type: SearchSessionDirectory (C-002)
  description: Directory being evaluated for cleanup eligibility.
- name: manifest
  type: SearchSessionManifest (C-003)
  description: Manifest read to obtain status, heartbeat_at, last_access_at, and
    ServerProcessIdentity fields.
- name: ttl_policy
  type: SessionTTLPolicy (C-007)
  description: TTL policy used to determine expiration from last_access_at.
outputs:
- name: cleanup_decision
  type: boolean
  description: True when the session directory must be removed; false when the 
    session is live and must not be touched.
atomic_steps:
- A-001
status: draft
