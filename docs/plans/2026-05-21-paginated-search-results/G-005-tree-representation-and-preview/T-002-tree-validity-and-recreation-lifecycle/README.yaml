step_id: T-002
parent_global_step: G-005
name: Tree validity and recreation lifecycle
description: "Modify the TreeRepresentation (C-015) lifecycle so structural processing
  never\noperates on missing or stale trees. Before any structural analysis begins,
  evaluate\nwhether the tree artifact for the target file exists and whether it is
  valid for\nthe current file content. Define validity as agreement between the tree
  artifact\nand the live file using checksum-based verification following the same
  principle\nas CST sidecar validation. When the tree artifact is absent or fails
  validity\nchecks, recreate TreeRepresentation from the current file content and
  persist the\nnew tree artifact before structural processing continues. Treat recreation
  as a\nmandatory gate: no structural consumer may proceed with an invalid or missing\n\
  tree. Record validity outcome as part of the TreeRepresentation readiness state\n\
  consumed by downstream structural pathways.\n"
concepts:
- C-015
inputs:
- name: target_file_identity
  type: project file reference
  description: Identity of the supported file whose TreeRepresentation readiness
    must be established before structural processing.
- name: existing_tree_artifact_state
  type: optional persisted tree artifact
  description: Previously stored tree sidecar or equivalent artifact associated 
    with the target file, when present.
- name: current_file_content_fingerprint
  type: checksum or equivalent freshness metadata
  description: Live content fingerprint used to decide whether the persisted 
    tree artifact still matches the file on disk.
outputs:
- name: validated_tree_representation
  type: ready TreeRepresentation
  description: TreeRepresentation (C-015) confirmed valid for the current file 
    content and available for structural consumers.
- name: recreation_event_record
  type: lifecycle outcome
  description: Explicit record when TreeRepresentation was recreated because the
    prior artifact was missing or failed validity checks.
atomic_steps:
- A-001
status: draft
