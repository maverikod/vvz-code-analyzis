step_id: T-001
parent_global_step: G-001
name: Unregister legacy editing commands
description: Modify the command registration module (hooks.py) to remove the registration
  entries for all legacy editing commands listed in RegistrationCleanup (C-013). The
  registration entries for universal_file_save, universal_file_replace, universal_file_read,
  universal_file_delete, all cst_* commands, all json_* tree commands, write_project_text_lines,
  replace_file_lines, compose_cst_module, query_cst, list_cst_blocks, and read_project_text_file
  are removed. The code files themselves are not deleted. The registration entries
  for universal_file_preview and get_file_lines are left unchanged. The registration
  entries for the four new commands (universal_file_open, universal_file_edit, universal_file_write,
  universal_file_close) will be added in a separate step after those commands are
  implemented; this T-step only removes legacy entries.
concepts:
- C-013
inputs:
- name: registration_module
  type: existing source file (hooks.py)
  description: The module that registers all MCP commands. Already exists; contains
    registration calls for all current commands.
outputs:
- name: updated_registration_module
  type: modified source file
  description: hooks.py with legacy command registrations removed. universal_file_preview
    and get_file_lines registrations unchanged.
atomic_steps: []
status: draft
