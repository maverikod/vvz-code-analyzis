name: Define EditSession dataclass and session registry
description: Define the EditSession dataclass (C-001) with fields session_id,
  file_path, abs_path, draft_path, format_group, handler_id, tree_id. Define
  the module-level _sessions dict keyed by session_id. Define helper functions
  get_session(session_id) raising SESSION_NOT_FOUND when absent, and
  register_session(session) and release_session(session_id). These are the
  only entry points for session lifecycle management.
