name: Create ProgressivePageWriter accumulating results and publishing pages 
  when full
operation: create_file
parent_tactical_step: T-004
priority: 1
prompt: "Create `code_analysis/search_session/progressive_page_writer.py`.\n\n## MRS
  excerpt\n\nC-004 SearchPageFile: bounded list of normalized search result records;\n\
  published atomically.\nC-026 AtomicPagePublication: write to temp file, rename atomically.\n\
  \n## Implementation requirements\n\n1. Import `dataclasses`, `json`, `os`, `pathlib`,
  `typing`.\n\n2. Define `@dataclasses.dataclass` class `ProgressivePageWriter`:\n\
  \   - Fields: `session_dir: pathlib.Path`, `session_id: str`,\n     `page_size:
  int = 50`,\n     `_current_records: list = dataclasses.field(default_factory=list)`,\n\
  \     `_next_page_index: int = 0`.\n   - Method `add_record(self, record: dict)
  -> typing.Optional[int]`:\n     - Appends `record` to `_current_records`.\n    \
  \ - If `len(_current_records) >= page_size`: calls `_flush()`.\n       Returns the
  published page index.\n     - Otherwise returns None.\n   - Method `flush_remaining(self)
  -> typing.Optional[int]`:\n     - If `_current_records` is non-empty: calls `_flush()`,
  returns index.\n     - Otherwise returns None.\n   - Private method `_flush(self)
  -> int`:\n     - Computes `page_index = _next_page_index`.\n     - Writes page atomically
  using `os.replace`:\n       - `final = session_dir / f\"page_{page_index:04d}.json\"\
  `.\n       - `tmp = session_dir / f\".tmp_page_{page_index:04d}.json\"`.\n     \
  \  - Writes JSON `{\"page_index\": page_index, \"session_id\": session_id,\n   \
  \      \"records\": _current_records}` to `tmp`, then `os.replace(tmp, final)`.\n\
  \     - Increments `_next_page_index`, clears `_current_records`.\n     - Returns
  `page_index`.\n\n## Constraints\n- Standard library only.\n- All public names have
  one-line docstrings.\n- File under 70 lines.\n"
status: draft
