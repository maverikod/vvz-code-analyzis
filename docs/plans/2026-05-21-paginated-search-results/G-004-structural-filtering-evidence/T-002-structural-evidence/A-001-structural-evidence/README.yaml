  Task:
  Create structural_evidence.py with module docstring (Author: Vasiliy Zdanovskiy,
  email: vasilyvz@gmail.com).

  1. class PhaseOutcome(str, Enum):
       completed = "completed"
       cancelled = "cancelled"
       timed_out = "timed_out"
       running = "running"
     Docstring: completion state of the producing search phase. running means the phase
     has not finished — partial candidates must not qualify as structural evidence.

  2. @dataclass(frozen=True) class StructuralEvidenceVerdict:
       accepted: bool
       reason_code: str
       preview_ref: Optional[PreviewReference]
     Docstring on each field.

  3. Module-level reason codes (Final[str] or str constants):
       REJECTED_PHASE_INCOMPLETE = "REJECTED_PHASE_INCOMPLETE"  (running)
       REJECTED_PHASE_CANCELLED = "REJECTED_PHASE_CANCELLED"
       REJECTED_PHASE_TIMED_OUT = "REJECTED_PHASE_TIMED_OUT"
       REJECTED_LINE_ONLY = "REJECTED_LINE_ONLY"
       REJECTED_MISSING_TREE = "REJECTED_MISSING_TREE"
       REJECTED_MISSING_PREVIEW = "REJECTED_MISSING_PREVIEW"
       ACCEPTED_STRUCTURAL = "ACCEPTED_STRUCTURAL"

  4. def qualify_structural_evidence(
         *,
         phase_outcome: PhaseOutcome,
         tree_ref: Optional[TreeRepresentationRef],
         preview_ref: Optional[PreviewReference],
         source_mode: str,
     ) -> StructuralEvidenceVerdict
     Docstring must document decision order:
     - phase_outcome == running => reject REJECTED_PHASE_INCOMPLETE (no partial evidence while running)
     - phase_outcome == cancelled => reject REJECTED_PHASE_CANCELLED
     - phase_outcome == timed_out => reject REJECTED_PHASE_TIMED_OUT
     - source_mode == "classic_line" and preview_ref is None => reject REJECTED_LINE_ONLY
     - tree_ref is None => reject REJECTED_MISSING_TREE
     - preview_ref is None => reject REJECTED_MISSING_PREVIEW
     - phase_outcome == completed with both tree_ref and preview_ref => accept ACCEPTED_STRUCTURAL
     Return StructuralEvidenceVerdict with preview_ref echoed on accept, None on reject.

  Constraints:
  - No grep execution, XPath filtering, or HTTP logic in this file.
  - Under 180 lines. All public symbols typed and documented.

verification:
