  Create `code_analysis/core/edit_session/marker_cycle.py`.
  Operation: create_file.

  Implements the EditSession (C-012) short_id marker hide/unhide cycle on the TREE
  section of a three-section TreeFile (C-003). CHECKSUMS and MAP sections are
  preserved byte-for-byte across hide/unhide; TreeNodeUuid (C-024) entries in MAP
  are not altered. Hide/unhide is NOT a FormatHandler responsibility (MRS C-007).

  ## Parent documents
  - Machine spec: `docs/plans/marked_tree_unification/spec.yaml` (C-012, C-001, C-007, C-025, C-003)
  - Global step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/README.yaml`
  - Tactical step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/T-001-edit-session-lifecycle/README.yaml`

  ## MRS excerpt

  C-012 EditSession — when tree is valid, before each mutation hide short_id markers
  in the TREE section into format-native comments (or equivalent inline marker form),
  apply mutation on denuded representation, restore short_id markers to canonical
  positions; CHECKSUMS and MAP preserved; UUID4 in MAP not altered by hide/unhide.

  C-001 MarkerContract: FormatHandler.unmark(marked) reproduces plain source;
  FormatHandler.mark(content) embeds integer short_id markers in TREE body only.

  C-025 NodeIdMap: build refreshes short_id↔UUID map; validate_and_repair preserves
  UUID4 for unchanged nodes per {a007}.

  Locked marker syntax (integer short_id only, NO UUID in TREE):
  - TEXT: `<short_id>:` line prefix (HRS {b001})
  - Markdown: `<!-- id:<short_id> -->` before block (HRS {b002})
  - YAML: `___id___: <int>` first key (HRS {b003})
  - JSON: `{"___id___": <int>, "v": ...}` wrappers (HRS {b004})
  - Python: metadata `___id___` key or trailing `# ___id___:<short_id>` (HRS {b005})

