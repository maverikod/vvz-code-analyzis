step_id: T-002
parent_global_step: G-004
name: Fresh indexed file set assembly
description: "Creates the IndexedFileSet by intersecting supplied database-known and
  disk-present inventories within search scope and retaining only files classified
  fresh by FreshnessValidation. Excludes stale, changed, missing, draft-only, and
  unavailable-index files from the indexed path. Ensures files whose indexed state
  is current are not rescanned directly during search execution.\n"
concepts:
- C-012
- C-014
inputs:
- name: search_scope
  type: bounded project file scope
  description: Project and path constraints that bound which files participate 
    in source selection.
- name: database_known_file_records
  type: indexed file inventory
  description: Supplied inventory of files known to the database or index for 
    the scoped project.
- name: disk_present_file_inventory
  type: file path list
  description: Supplied inventory of files present on disk within search scope.
- name: per_file_freshness_verdict
  type: freshness classification map
  description: FreshnessValidation output that identifies fresh indexed 
    candidates.
outputs:
- name: indexed_file_set
  type: IndexedFileSet
  description: Fresh intersection of database-known and disk-present files 
    eligible for database-backed search without direct rescan.
- name: disk_present_file_inventory
  type: file path list
  description: Normalized pass-through of the supplied disk-present inventory 
    for complementary dynamic set derivation.
atomic_steps:
- A-001
status: draft
