meta:
  plan_name: universal_file_preview
  source_spec: source_spec.md
  status: draft
concepts:
- concept_id: C-001
  name: PreviewCommand
  definition: 'Single MCP command exposing a uniform schema for previewing a project
    file.

    '
  properties:
  - one MCP command name visible to callers
  - input schema is fixed and validates statically
  - response envelope is uniform across all file types
  - 'read-only: writes nothing to files, database, or external tree sessions'
  source_ranges:
  - start: 5
    end: 8
  - start: 12
    end: 18
  - start: 20
    end: 21
- concept_id: C-002
  name: HandlerDispatcher
  definition: 'Internal router that selects a handler for the file based on extension.

    '
  properties:
  - dispatch key is file extension
  - one extension maps to exactly one handler
  - 'handlers are pluggable: adding a handler does not change the public schema'
  source_ranges:
  - start: 24
    end: 29
- concept_id: C-003
  name: Handler
  definition: 'Component responsible for one family of files. Knows how to open the
    file, pick an engine, build the response.

    '
  properties:
  - has a static set of supported extensions
  - selects one of three engines (lines, tree, sequence) per request
  - returns response in the uniform envelope
  source_ranges:
  - start: 30
    end: 36
- concept_id: C-004
  name: LinesEngine
  definition: 'Internal engine for files whose addressable set is lines of text.

    '
  properties:
  - 'addressable set: lines'
  - returns 'lines' response kind
  source_ranges:
  - start: 31
    end: 32
- concept_id: C-005
  name: TreeEngine
  definition: 'Internal engine for files whose addressable set is the children of
    a node in a hierarchical structure.

    '
  properties:
  - 'addressable set: children of a focused node'
  - returns 'tree' response kind
  - the focused node is determined by NodeReference; default is file root
  source_ranges:
  - start: 33
    end: 35
- concept_id: C-006
  name: SequenceEngine
  definition: 'Internal engine for files whose addressable set is an ordered collection
    of elements.

    '
  properties:
  - 'addressable set: indexed elements'
  - returns 'sequence' response kind
  source_ranges:
  - start: 36
    end: 37
- concept_id: C-007
  name: AddressableSet
  definition: 'The ordered, indexable collection that a single preview request operates
    on. Determined by file type and by the focused node.

    '
  properties:
  - always ordered and indexable
  - exactly one per request
  - 'kind is one of: file lines, node children, sequence elements, mapping keys, document
    list'
  source_ranges:
  - start: 41
    end: 50
- concept_id: C-008
  name: Slice
  definition: 'Caller-supplied selector that designates a contiguous subset of the
    AddressableSet using Python-style zero-based half-open indexing.

    '
  properties:
  - 'syntax: start:stop with start and stop optional, negative allowed'
  - 'semantics: zero-based, half-open'
  - applies uniformly to every AddressableSet, regardless of file type
  - local to this command; does not change semantics of other commands
  source_ranges:
  - start: 52
    end: 58
  - start: 60
    end: 66
- concept_id: C-009
  name: StableIdentifier
  definition: 'Identifier of a node inside a tree-structured file. Reused from the
    project''s existing tree infrastructure; not invented by this command.

    '
  properties:
  - 'Python source: stable_id UUID from cst_load_file outline_nodes'
  - 'JSON source: node_id from list_json_blocks, or JSON pointer'
  - 'YAML source: reused from project YAML tree infra when present, otherwise JSON-pointer-style
    path'
  - identifier scheme is per-handler; format is opaque to the dispatcher
  source_ranges:
  - start: 70
    end: 82
- concept_id: C-010
  name: NodeReference
  definition: 'Optional caller-supplied parameter that focuses the preview on a specific
    node identified by a StableIdentifier.

    '
  properties:
  - optional in the request
  - default focus is the file root
  - value is a StableIdentifier in the handler's native format
  source_ranges:
  - start: 84
    end: 86
- concept_id: C-011
  name: TreeSession
  definition: 'In-memory parsed tree of a file identified by a tree_id, owned either
    by the caller (via cst_load_file or json_load_file) or transiently by this command.

    '
  properties:
  - identified by tree_id (UUID)
  - owned either externally or internally
  - this command never closes a session it did not create
  - this command never invalidates a session it did not create
  source_ranges:
  - start: 88
    end: 103
- concept_id: C-012
  name: ResponseEnvelope
  definition: 'Uniform top-level shape of every successful preview response.

    '
  properties:
  - reports kind in {tree, sequence, lines}
  - reports slice_applied
  - reports total size of addressable set
  - reports the slice content in the shape appropriate to kind
  - when relevant, reports tree_id and root NodeReference
  source_ranges:
  - start: 105
    end: 121
- concept_id: C-013
  name: PreviewBudget
  definition: 'Caps that bound the size of one response, independent of slice.

    '
  properties:
  - 'preview_lines: cap when slice is omitted'
  - 'value_preview_len: cap on a single scalar value shown inline'
  - overflow to file is delegated to the read-only batch mechanism
  source_ranges:
  - start: 123
    end: 134
- concept_id: C-014
  name: ErrorClassification
  definition: 'Distinction between input errors, file-structure errors, and handler-internal
    errors, each with a deterministic error code class.

    '
  properties:
  - 'input errors: unknown extension, malformed slice, unknown node_ref, conflicting
    parameters'
  - 'file-structure errors: parse failure with parser name and line range'
  - 'handler-internal errors: code names the handler'
  - no silent fallback between engines or handlers
  source_ranges:
  - start: 136
    end: 148
- concept_id: C-015
  name: ReadOnlyBatchIntegration
  definition: 'Inclusion of the command name in the read-only batch whitelist so the
    command is invocable inside read_only_batch.

    '
  properties:
  - 'whitelist file: code_analysis/commands/read_only_batch_whitelist.py'
  - 'whitelist constant: READ_ONLY_BATCH_WHITELIST (frozenset of strings)'
  - inclusion is a separate step performed only after command tests are green
  source_ranges:
  - start: 19
    end: 21
  - start: 167
    end: 175
- concept_id: C-016
  name: PythonHandler
  definition: 'Handler for .py, .pyi, .pyw files. Uses TreeEngine. Source of stable
    identifiers is cst_load_file.

    '
  properties:
  - 'supported extensions: .py, .pyi, .pyw'
  - 'engine: TreeEngine'
  - 'identifier source: cst_load_file outline_nodes'
  - 'root focus when node_ref absent: Module node'
  source_ranges:
  - start: 31
    end: 33
  - start: 73
    end: 76
- concept_id: C-017
  name: TextHandler
  definition: 'Handler for .md, .txt, .rst, .adoc files. Uses LinesEngine.

    '
  properties:
  - 'supported extensions: .md, .txt, .rst, .adoc'
  - 'engine: LinesEngine'
  - no NodeReference accepted (rejected as input error)
  source_ranges:
  - start: 31
    end: 32
- concept_id: C-018
  name: JsonHandler
  definition: 'Handler for .json files. Selects engine per request based on document
    root.

    '
  properties:
  - 'supported extensions: .json'
  - 'engine per root kind: object selects TreeEngine, array selects SequenceEngine'
  - 'identifier source: list_json_blocks (node_id or JSON pointer)'
  source_ranges:
  - start: 34
    end: 38
  - start: 77
    end: 80
- concept_id: C-019
  name: JsonLinesHandler
  definition: 'Handler for .jsonl, .ndjson files. Uses LinesEngine where each line
    is treated as a document boundary.

    '
  properties:
  - 'supported extensions: .jsonl, .ndjson'
  - 'engine: LinesEngine'
  - 'addressable set: document lines'
  source_ranges:
  - start: 31
    end: 32
  - start: 49
    end: 50
- concept_id: C-020
  name: YamlHandler
  definition: 'Handler for .yaml, .yml files. Selects engine per request based on
    document root or multi-document state.

    '
  properties:
  - 'supported extensions: .yaml, .yml'
  - 'engine per root kind: mapping selects TreeEngine, sequence selects SequenceEngine,
    multi-document selects LinesEngine over documents'
  - 'identifier source: reused from project YAML infra when present, else JSON-pointer-style
    path'
  source_ranges:
  - start: 34
    end: 38
  - start: 81
    end: 83
- concept_id: C-021
  name: ScopeBoundary
  definition: 'Explicit set of behaviours that the command does NOT perform, used
    as negative invariants during review.

    '
  properties:
  - no writes to files, db, or external tree sessions
  - no raw file bytes in response
  - no globs in file_path; exactly one file per call
  - XML and HTML are out of scope
  source_ranges:
  - start: 150
    end: 165
