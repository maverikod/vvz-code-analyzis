  - Must be documented in command schemas and metadata when exposed.

  Precondition: code_analysis/commands/search_session_schema.py exports merge_pagination_schema.

  Do not modify fs_ggrep_command.py (monolith over 400 lines).

  Implement:
  - def get_fs_ggrep_schema_with_pagination() -> dict[str, Any]
    Import FsGgrepCommand from code_analysis.commands.fs_ggrep_command, call cls.get_schema(),
    return merge_pagination_schema(base).
  - def document_fs_ggrep_pagination_metadata() -> dict[str, str]
    Returns parameter descriptions keyed by paginated, job_id, include_job_id, block_position;
    states paginated defaults to false and block_position selects a published block by position number.

  Constraints:
  - Under 80 lines.
  - Author header.
  - Schema-only module; execute wiring lives in search_paginated_ggrep.py (separate AS).

