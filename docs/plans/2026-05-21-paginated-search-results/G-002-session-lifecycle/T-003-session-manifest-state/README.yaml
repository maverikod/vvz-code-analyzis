step_id: T-003
parent_global_step: G-002
name: Session manifest schema and concurrent state
description: "Define the SearchSessionManifest machine-readable state record stored
  inside the session directory. Specify manifest fields for created_at, last_access_at,
  heartbeat_at, status, phase, request parameters, progress metrics, page readiness
  metadata for HTTP readers, and embedded ServerProcessIdentity. Require safe concurrent
  updates while search workers, HTTP readers, and background maintenance may access
  the manifest simultaneously. Initialize the manifest when the session directory
  is provisioned by recording request context, initial status and phase, created_at,
  last_access_at, heartbeat_at, and the owning server process identity with main_pid,
  process_start_time, and optional host and instance_id. Require the search execution
  path to refresh heartbeat_at periodically while the session is running. Evaluation
  of stale heartbeat for dead or orphan session classification is governed by DeadSessionDetection
  (C-010) per machine specification; this tactical step defines heartbeat_at storage
  and periodic refresh only. Store progress metrics derived from the running search
  context, including produced result count, written page count, scanned file count,
  warning count, and error count.\n"
concepts:
- C-001
- C-003
- C-006
- C-008
- C-009
inputs:
- name: search_session
  type: SearchSession
  description: Owning session whose durable state is persisted in the manifest.
- name: session_directory
  type: SearchSessionDirectory
  description: Directory that contains the manifest state file and related 
    session artifacts.
- name: search_request_context
  type: SearchRequestContext
  description: Request parameters and context copied into the manifest at 
    session creation.
- name: server_process_identity
  type: ServerProcessIdentity
  description: Main server process identity captured at session creation for 
    manifest storage and ownership validation.
outputs:
- name: session_manifest
  type: SearchSessionManifest
  description: Initialized and updatable manifest record with lifecycle 
    timestamps, status, phase, metrics, page readiness metadata, heartbeat 
    state, and stored process identity.
atomic_steps:
- A-001
status: draft
