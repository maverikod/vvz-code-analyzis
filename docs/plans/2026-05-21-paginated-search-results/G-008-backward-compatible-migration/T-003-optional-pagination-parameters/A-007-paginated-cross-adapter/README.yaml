prompt: |
  Operation: create_file
  Target: code_analysis/commands/search_paginated_cross.py

  MRS (C-019 GrepSearchMode): structural mode default; classic line grep must not count as cross evidence.
  MRS (C-001 SearchSession): merged evidence stored as normalized findings in session buffer.
  MRS (C-004 SearchResultBlock): paginated merged evidence appears in immutable blocks.
  MRS (C-029 BlockAssembler): assembles and publishes blocks atomically.

  Import typing: Any, Callable, Optional from typing.

  Shared types (import only; do not reimplement):
  - SearchSession, SearchSessionState from code_analysis.core.search_session.session
  - SearchSessionDirectoryLayout from code_analysis.core.search_session.directory
  - SearchSessionManifest, write_manifest_atomic, capture_server_process_identity, DEFAULT_METRICS
    from code_analysis.core.search_session.manifest
  - initialize_service_metadata from code_analysis.core.search_session.service_metadata
  - RawFindingBuffer from code_analysis.core.search_session.raw_finding_buffer
  - BlockAssembler from code_analysis.core.search_session.block_assembler
  - append_block_entry, mark_index_finished, COMPLETENESS_FINISHED from code_analysis.core.search_session.result_index
  - update_manifest_atomic from code_analysis.core.search_session.manifest
  - atomic_write_json from code_analysis.core.search_session.atomic_publication
  - load_session_ttl_policy from code_analysis.core.search_session.policy
  - ProjectCrossSearchCommand from code_analysis.commands.project_cross_search_command
  Import StructuralEvidence helpers from code_analysis.core.search_session.structural_evidence when
  normalizing grep-backed evidence rows.

  Implement:
  - def normalize_cross_finding(raw: dict[str, Any], *, index: int) -> dict[str, Any]
    Maps merged cross-search row to finding with result_id f"cross-{index:06d}", source="cross",
    file_path, confidence, evidence object, score fields; drops or flags line-only grep rows when
    require_structural_grep is true in params (do not append line-only grep as structural evidence).

  - async def run_paginated_cross(
        *,
        command: ProjectCrossSearchCommand,
        params: dict[str, Any],
        session: SearchSession,
        layout: SearchSessionDirectoryLayout,
        raw_config: dict[str, Any],
        block_assembler_factory: Callable[..., BlockAssembler],
    ) -> Optional[int]
    Calls legacy project_cross_search execute, normalizes merged results list or evidence map into buffer,
    runs assembler to completion for inline completion path, returns first block position or None.

  Constraints:
  - Under 250 lines.
  - Author header.
  - Full implementation required; no NotImplementedError.

verification:
