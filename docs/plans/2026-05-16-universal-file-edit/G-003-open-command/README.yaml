step_id: G-003
name: Open command
description: Implement OpenCommand that starts an editing session. It cleans
  stale artefacts, resolves the FormatGroup via the handler registry,
  creates the DraftFile, creates an initial BackupPair when the file has no
  backup history, registers the EditSession, and returns the session_id with
  available operations. All ExistingInfrastructure components are reused
  without modification.
