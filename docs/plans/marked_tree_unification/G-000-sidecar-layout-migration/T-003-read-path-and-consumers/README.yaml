inputs:
- name: sibling_tree_path
  type: tree-file path resolver
  description: The existing sibling-path function (created in G-002), used by
    the dispatcher, the readers, and every remaining consumer to locate tree
    files.
- name: tree_representation.py
  type: legacy dispatcher and readers
  description: The format-dispatch resolver and reader functions in
    tree_representation.py whose legacy-layout logic must be removed.
- name: validate_or_recreate_tree_file
  type: tree-validity wrapper
  description: The tree-validity wrapper whose reference object must carry the
    sibling path after the cutover.
outputs:
- name: sibling_dispatch_and_consumers
  type: read and consumption behavior
  description: The dispatcher and readers resolve only the sibling path for all
    formats; TreeRepresentationRef carries the sibling path; all remaining
    consumers (tree_builder, tree_saver, stable_tree, grep_block_resolver,
    universal_file_edit open/close/invalid_write_support/sidecar_cst_apply) observe
    the sibling path. Three-section TreeFile semantics remain owned by G-002
    TreeBuilder, TreeLifecycle, and NodeIdMap.
- name: sibling_aligned_tests
  type: test alignment and cutover verification
  description: Tests and scripts assert the sibling location with no legacy
    assertions; a project scan confirms zero .cst/, .trees/, or .tree_sidecar
    artifacts remain.
