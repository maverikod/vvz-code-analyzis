  - Do NOT define NodeId as str or use string marker tokens
  - Do NOT call uuid.uuid4() or embed UUIDs in mark/parse/unmark logic
  - Do NOT reference P:/L: prefixes, {l*}, or {m*} marker syntax
  - Do NOT import or implement NodeIdMap operations in this file
  - Do NOT import code_analysis.tree.tree_node at runtime
  - Do NOT make FormatHandler subclass MarkerContract
  - Do NOT add methods or classes beyond those listed
  - Do NOT use bare except
  - Do NOT use Any on public API except TreeNode.attributes dict values
  - Do NOT add cross-step references or depends_on prose in code comments
  - Estimated post-implementation line count MUST be <= 400 (expected ~220 lines)

