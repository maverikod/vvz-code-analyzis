prompt: "Create the file `code_analysis/search_session/status.py`.\n\n## MRS excerpt\n\
  \nC-020 SearchStatus: SearchSession state and phase model exposed to clients\nwhile
  search generation proceeds or terminates.\nProperties:\n  - Exposes running, completed,
  failed, cancelled, timed_out, and dead states.\n  - Exposes current phase: indexed_search,
  dynamic_file_discovery,\n    tree_validation, tree_reconstruction, xpath_filtering,
  page_writing, completion.\n  - Distinguishes page-not-ready from whole-search failure.\n\
  \n## Implementation requirements\n\nImports: `enum`.\n\n1. Define `class SearchPhase(str,
  enum.Enum)` with members:\n   `INDEXED_SEARCH = \"indexed_search\"`,\n   `DYNAMIC_FILE_DISCOVERY
  = \"dynamic_file_discovery\"`,\n   `TREE_VALIDATION = \"tree_validation\"`,\n  \
  \ `TREE_RECONSTRUCTION = \"tree_reconstruction\"`,\n   `XPATH_FILTERING = \"xpath_filtering\"\
  `,\n   `PAGE_WRITING = \"page_writing\"`,\n   `COMPLETION = \"completion\"`.\n\n\
  2. The `SearchSessionStatus` enum lives in `models.py`. Do NOT redefine it here.\n\
  \   Import it:\n   `from code_analysis.search_session.models import SearchSessionStatus`\n\
  \   and re-export it:\n   `__all__ = [\"SearchPhase\", \"SearchSessionStatus\",
  \"is_terminal_status\",\n    \"is_page_not_ready_failure\"]`\n\n3. Define `def is_terminal_status(status:
  SearchSessionStatus) -> bool`:\n   - Returns True if `status` is one of:\n     `COMPLETED`,
  `FAILED`, `CANCELLED`, `TIMED_OUT`, `DEAD`, `EXPIRED`, `CLOSED`.\n   - Returns False
  for `RUNNING`.\n\n4. Define `def is_page_not_ready_failure(status: SearchSessionStatus)
  -> bool`:\n   - Returns False always. Page-not-ready is not a whole-search failure.\n\
  \   - Docstring must explicitly state: \"A page-not-ready response is not a\n  \
  \   failure of the whole search. This function always returns False and exists\n\
  \     to make the invariant explicit and testable.\"\n\n## Constraints\n- No third-party
  imports.\n- All public names must have docstrings.\n"
verification:
  type: import
  target: code_analysis/search_session/status.py
  expected: Module imports without error. `SearchPhase.PAGE_WRITING` exists. 
    `is_terminal_status(SearchSessionStatus.COMPLETED)` returns True. 
    `is_page_not_ready_failure` returns False.
