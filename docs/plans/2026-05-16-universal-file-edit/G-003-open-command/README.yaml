step_id: G-003
name: universal_file_open command
description: The open command starts an editing session for one file. It cleans stale
  artefacts from any previous session, resolves the format group, creates the appropriate
  draft file, creates an initial backup when the file has no backup history, registers
  the EditSession, and returns the session identifier together with the operations
  available for the format group.
