step_id: G-001
name: Search Session Infrastructure
description: "Establishes the server-side persistence and lifecycle model for one
  search execution. Defines SearchSession as the logical owner of a dedicated SearchSessionDirectory
  that stores immutable SearchPageFiles and a SearchSessionManifest. Specifies HTTPResultAccess
  as the mechanism by which clients read published pages and trigger LastAccessTimestamp
  refresh. Defines SessionTTLPolicy and its code constant, configuration generator
  emission, and validator constraints. Defines ServerProcessIdentity, SessionHeartbeat,
  DeadSessionDetection, and BackgroundSessionCleaner as the liveness and cleanup subsystem.
  Defines SearchStatus with its full state and phase model. Defines AtomicPagePublication
  as the protocol guaranteeing clients never observe partially written pages.\n"
