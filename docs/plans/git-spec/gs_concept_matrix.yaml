verification:
  total_concepts_in_spec: 21
  total_concepts_covered: 21
  concepts_with_multiple_owners: 0
  disjoint_union_equals_all_concepts: true
  total_relations_in_spec: 2
  total_relations_realized: 2
  notes: >
    Every concept is owned by exactly one global step (disjoint partition,
    matching invariant I1 check a). Both relations in spec.yaml are internal
    to a single global step (C-014->C-017 both owned by G-004; C-018->C-020
    both owned by G-005), so each relation is realized entirely within one
    G-step and needs no cross-G declaration (invariant I1 check b). No
    concept currently requires a second owning G-step; the list-typed
    covered_by_gs field is kept list-shaped per the task contract in case a
    future cascade legitimately adds a second owner. G-001-commit-on-write
    (concepts C-003..C-008, C-024, C-025) was excised from plan scope by
    explicit user decision on 2026-07-03 (commit-on-write is out of scope;
    this plan covers git_* and github_* server commands only); the excised
    global step and its concepts are archived at
    docs/plans/git-spec/_archive/G-001-commit-on-write/ and are no longer
    present in this matrix. Totals above (21 concepts, 5 global steps:
    G-002..G-006) reflect the post-excision plan.
