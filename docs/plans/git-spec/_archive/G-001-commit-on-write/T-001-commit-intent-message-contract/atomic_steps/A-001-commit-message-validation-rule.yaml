  Exact docstring (Google-style, matching the file's existing docstring
  style with Args: and Returns: sections):

  ```
  Validate the commit message contract for a write that may produce a commit.

  Implements the commit-intent message validation rule: when commit_on_write is
  True, commit_message must be a string and non-empty after stripping leading and
  trailing whitespace, or the write is rejected before any content is persisted.
  When commit_on_write is False, no message is required and the function always
  returns None (valid). This function validates only the intent-set direction:
  a message required and non-empty when the flag is set. It does not validate
  or reject a message supplied without commit-intent; that check is out of scope
  for this function.

  Args:
      commit_on_write: Explicit per-write commit-intent flag. True means the
          write is requesting a commit after the content is persisted.
      commit_message: Caller-supplied commit message, or None if none was
          supplied.

  Returns:
      None if the message is valid (or commit_on_write is False, in which case
      no message is required). An error message string describing the validation
      failure if commit_on_write is True and commit_message is not a string, or
      is a string that is empty after stripping whitespace.
  ```

  Exact body logic, in this exact order:
  1. If `commit_on_write` is falsy (False): return `None` immediately (valid;
     no message required when intent is not set).
  2. Else if `commit_message` is not an instance of `str` (covers `None` and
     any non-string value): return the exact string
     `"commit_message is required and must be a string when commit-intent is set"`.
  3. Else if `commit_message.strip()` is empty (the string contains only
     whitespace or is the empty string): return the exact string
     `"commit_message must be non-empty (after stripping whitespace) when commit-intent is set"`.
  4. Else (commit_on_write is True and commit_message is a non-empty-after-strip
     string): return `None`.

  Full exact function text to append (reproduce verbatim, including blank
  lines inside the docstring):

  ```python
  def validate_commit_intent_message(
      commit_on_write: bool,
      commit_message: Optional[str],
  ) -> Optional[str]:
      """
      Validate the commit message contract for a write that may produce a commit.

      Implements the commit-intent message validation rule: when commit_on_write is
      True, commit_message must be a string and non-empty after stripping leading and
      trailing whitespace, or the write is rejected before any content is persisted.
      When commit_on_write is False, no message is required and the function always
      returns None (valid). This function validates only the intent-set direction:
      a message required and non-empty when the flag is set. It does not validate
      or reject a message supplied without commit-intent; that check is out of scope
      for this function.

      Args:
          commit_on_write: Explicit per-write commit-intent flag. True means the
              write is requesting a commit after the content is persisted.
          commit_message: Caller-supplied commit message, or None if none was
              supplied.

      Returns:
          None if the message is valid (or commit_on_write is False, in which case
          no message is required). An error message string describing the validation
          failure if commit_on_write is True and commit_message is not a string, or
          is a string that is empty after stripping whitespace.
      """
      if not commit_on_write:
          return None
      if not isinstance(commit_message, str):
          return "commit_message is required and must be a string when commit-intent is set"
      if not commit_message.strip():
          return "commit_message must be non-empty (after stripping whitespace) when commit-intent is set"
      return None
  ```

