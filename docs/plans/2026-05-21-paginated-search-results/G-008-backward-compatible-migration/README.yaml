step_id: G-008
name: Backward-compatible incremental migration
description: "Defines how the new paginated, session-backed behavior is introduced
  as an extension of existing working search commands rather than a replacement. Current
  command behavior remains the default for existing callers; paginated job-backed
  behavior is opt-in through optional parameters or compatible bridge commands. Migration
  preserves current validation, schemas, queue behavior, timeouts, direct payloads,
  structural results, and preview references, and an inventory marks each behavior
  as existing or new to avoid duplicating working search logic. Canonical client contract
  (plan README.md G-008 contract decision): job_id + block_position + index_url —
  not README opaque cursor. This step defines the compatibility and migration contract
  only; it does not define the internal mechanics of sessions, blocks, or filtering.\n"
