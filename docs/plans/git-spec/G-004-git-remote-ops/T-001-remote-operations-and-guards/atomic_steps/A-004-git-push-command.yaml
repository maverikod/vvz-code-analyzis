  """git_push MCP command (C-014, C-016): publish local commits to a remote branch.

  Guarded: a push to a branch listed in configured protected_branches is
  rejected with GIT_PROTECTED_BRANCH unless protected_override is true; a
  force push is rejected with GIT_FORCE_PUSH_DISABLED unless both
  configuration allows it (allow_force_push) and force is explicitly
  requested. A dry-run push performs no remote write. Requires remote
  operations to be enabled in configuration (code_analysis.git.remote_enabled);
  when absent, fails fast with GIT_REMOTE_NOT_CONFIGURED.

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """
  ```

