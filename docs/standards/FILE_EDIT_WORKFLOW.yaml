forbidden:
  direct_filesystem: PROHIBITED. Never use bash_tool, write, or str_replace on
    project files. Viewing goes through universal_file_preview; content edits go
    through the ai-editor-server.
  removed_editing_commands: PROHIBITED. universal_file_open / universal_file_search /
    universal_file_edit / universal_file_write / universal_file_close are NOT
    registered on code-analysis-server (owner decision, 2026-07). Calling them
    returns command-not-found. Do not fall back to legacy cst_* or plain-text
    commands either.
lifecycle:
  1_view: universal_file_preview(project_id, file_path, node_ref=optional) —
    read-only structured navigation on code-analysis-server
  2_edit: content editing is performed on the ai-editor-server (see that
    server's own manuals); it drives code-analysis whole-file lifecycle
    (locks, transfer, upload) underneath
  3_quality: format_code / lint_code / type_check_code on code-analysis-server
    after edits are committed
meta:
  author: Vasiliy Zdanovskiy
  canonical_docs: docs/commands/file_editing/README.md
  description: File viewing and editing routing. Read before modifying any
    project file.
  email: vasilyvz@gmail.com
  locale: en
  title: File Edit Workflow
  version: '2.0'
post_edit_sequence:
  applies_to: Python files only
  steps:
  - lint_code
  - format_code
  - type_check_code
  - update_indexes
trigger: Before modifying any project file.
