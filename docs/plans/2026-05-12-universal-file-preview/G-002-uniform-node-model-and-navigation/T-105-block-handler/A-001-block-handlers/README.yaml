  \ docstring (required):\n  \"\"\"\n  BlockHandler (C-008) — five rendering rules,\
  \ one per NodeKind (C-004).\n\n  Chosen by the block's own NodeKind, not the parent's\
  \ kind.\n  A BlockHandler never includes the block's own children's content.\n \
  \ Set is closed under this plan: five rules only.\n\n  Author: Vasiliy Zdanovskiy\n\
  \  email: vasilyvz@gmail.com\n  \"\"\"\n\nImports:\n  from __future__ import annotations\n\
  \  from typing import Any\n  from .models import Node, NodeKind\n\nPublic function:\
  \ render_block(node: Node, value_preview_len: int) -> dict[str, Any]\nDocstring:\n\
  \  \"\"\"\n  Render a Node using the BlockHandler rule for its own NodeKind (C-008).\n\
  \n  Args:\n      node: The block node to render.\n      value_preview_len: Max length\
  \ for any inline scalar value or name\n                         (from PreviewBudget\
  \ C-013).\n\n  Returns:\n      Compact summary dict. Keys depend on NodeKind:\n\
  \        scalar    -> {value: str (truncated)}\n        lines     -> {line_count:\
  \ int, first_line: str (truncated)}\n        sequence  -> {element_count: int, element_kinds:\
  \ list[str]}\n        mapping   -> {key_count: int, key_names: list[str] (each truncated)}\n\
  \        tree_node -> {type: str, name: str|None, attributes: dict,\n          \
  \            child_count: int}\n  \"\"\"\nBody: dispatch to private helpers by node.node_kind:\n\
  \nPrivate function: _render_scalar(node: Node, vpl: int) -> dict[str, Any]\nDocstring:\
  \ \"Rule 1: truncated value. No children content.\"\nBody: value = (node.attributes.get('value')\
