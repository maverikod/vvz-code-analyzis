  Note the added `"commit_on_write"` property sits between `"commit_message"`
  and `"diff_context_lines"` in the `"properties"` dict, exactly as shown
  above. Every other key, value, ordering, and string in this dict is copied
  verbatim from the pre-existing schema.

  #### Function 2

  Exact signature:

  ```python
  def validate_save_payload_content(content: Optional[str]) -> Optional[ErrorResult]:
  ```

  Parameter typing: `content: Optional[str]` — the caller-supplied file content,
  or `None` when absent.

  Return typing: `Optional[ErrorResult]` — `None` when the payload is valid;
  otherwise an `ErrorResult` describing the validation failure.

  Docstring (first statement in the function body, triple double-quotes):
  `"""Return validate save payload."""`

  Function body — exact logic, no deviation:

  ```python
      if content is None:
          return ErrorResult(
              message="content is required",
              code="VALIDATION_ERROR",
              details={"field": "content"},
          )
      if not isinstance(content, str):
          return ErrorResult(
              message="content must be a string",
              code="VALIDATION_ERROR",
              details={"field": "content"},
          )
      return None
  ```

  ## Constraints (all mandatory, no exceptions)

  - The file contains only: the module docstring, the three import statements
