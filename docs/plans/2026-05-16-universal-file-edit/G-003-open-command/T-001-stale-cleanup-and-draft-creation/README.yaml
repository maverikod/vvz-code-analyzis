step_id: T-001
parent_global_step: G-003
name: Implement stale artefact cleanup and draft creation
description: Implement the first four steps of OpenCommand (C-005). Delete
  <file>.write if present. Delete <file>.draft if present; do NOT delete
  <file>.cst_sidecar for Python files. Resolve FormatGroup (C-002) from
  file extension via resolve_format_group. Create the DraftFile (C-003)
  according to format group: for sidecar call cst_load_file then
  write_sidecar_atomic; for tree-temp call load_file_to_tree then serialise
  to <file>.draft; for text copy <file> to <file>.draft byte-for-byte.
  On UNKNOWN_FORMAT or PARSE_ERROR return the corresponding error code
  from ErrorCodes (C-014).
concepts:
- C-005
- C-002
- C-003
- C-012
inputs:
- name: project_id
  type: str
  description: Project UUID for path resolution.
- name: file_path
  type: str
  description: Project-relative path to the file to open.
outputs:
- name: format_group
  type: FormatGroup
  description: Resolved format group for the file.
- name: draft_written
  type: bool
  description: True when DraftFile has been written successfully.
atomic_steps: []
status: draft