  Task:
  Create file code_analysis/commands/universal_file_edit/session.py
  with the following exact content:

  ```python
  """
  EditSession entity and module-level session registry.

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """
  from __future__ import annotations

  import uuid
  from dataclasses import dataclass
  from pathlib import Path
  from typing import Optional

  from code_analysis.commands.universal_file_edit.format_group import FormatDescriptor

  _sessions: dict[str, EditSession] = {}


  @dataclass
  class EditSession:
      """In-memory record for one active file-editing session.

      Attributes:
          session_id: UUID string identifying the session.
          file_path: Project-relative path to the original file.
          abs_path: Absolute path to the original file.
          draft_path: Absolute path to the draft file.
          lockfile_path: Absolute path to the write lockfile.
          format_group: One of sidecar, tree-temp, or text.
          handler_id: Handler id from the file handler registry.
          tree_id: In-memory tree UUID for tree-temp group; None otherwise.
      """

      session_id: str
      file_path: str
      abs_path: Path
      draft_path: Path
      lockfile_path: Path
      format_group: str
      handler_id: str
      tree_id: Optional[str]


  def create_session(abs_path: Path, descriptor: FormatDescriptor,
                     file_path: str, tree_id: Optional[str] = None) -> EditSession:
      """Create and register a new EditSession.

      Args:
          abs_path: Absolute path to the original file.
          descriptor: Resolved FormatDescriptor for the file.
          file_path: Project-relative path to the original file.
          tree_id: In-memory tree UUID for tree-temp group; None for other groups.

      Returns:
          Newly created and registered EditSession.
      """
      session_id = str(uuid.uuid4())
      session = EditSession(
          session_id=session_id,
          file_path=file_path,
          abs_path=abs_path,
          draft_path=descriptor.draft_path,
          lockfile_path=descriptor.lockfile_path,
          format_group=descriptor.format_group,
          handler_id=descriptor.handler_id,
          tree_id=tree_id,
      )
      _sessions[session_id] = session
      return session


  def get_session(session_id: str) -> EditSession:
      """Return the EditSession for session_id, or raise SESSION_NOT_FOUND.

      Args:
          session_id: UUID string of the session to look up.

      Returns:
          The registered EditSession.

      Raises:
          ValueError: with message SESSION_NOT_FOUND when session_id is unknown.
      """
      session = _sessions.get(session_id)
      if session is None:
          raise ValueError("SESSION_NOT_FOUND")
      return session


  def release_session(session_id: str) -> None:
      """Remove a session from the registry; silent if session_id is unknown.

      Args:
          session_id: UUID string of the session to remove.
      """
      _sessions.pop(session_id, None)
  ```

