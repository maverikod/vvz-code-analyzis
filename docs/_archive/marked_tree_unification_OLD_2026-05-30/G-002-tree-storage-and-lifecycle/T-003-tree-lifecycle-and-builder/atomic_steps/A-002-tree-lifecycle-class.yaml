prompt: |
  Create the file `code_analysis/core/tree_lifecycle/lifecycle.py`.
  Operation: create_file.

  This file does NOT exist yet. Create it from scratch.

  ## Purpose

  Define the TreeLifecycle entity (C-010) as the single entry point for tree
  validity and creation (HRS {c006}). TreeLifecycle owns ChecksumSyncPolicy
  (C-006) and TreeBuilder (C-011) as class-level references. Implementation
  delegates to existing checksum.py helpers for the decision/rebuild logic;
  T-004 wires rebuild branches to TreeBuilder.build (unified path). This step
  creates thin static-method wrappers only — no duplicate validation logic.

  **Decision A1:** TreeLifecycle does NOT call recreate_tree_from_content or
  TreeFormatKind directly. Rebuild dispatch goes through TreeBuilder.build once
  T-004 is applied; until then from_content may still call validate_or_recreate_from_content
  in checksum.py (T-004 modifies that function).

  ## Cross-TS prerequisite

  G-002 T-002 A-001 must be applied first. Post-T-002/A-001 checksum.py exports:
  ChecksumSyncPolicy, validate_or_recreate_from_content, validate_or_recreate_tree_file.

  ## Parallel-safe dependency

  A-001 creates TreeBuilder in builder.py (different file). Import TreeBuilder
  from builder.py; if A-001 not yet applied, wait until builder.py exists.

  ## MRS excerpt

  C-010 TreeLifecycle: single entry point; owns validity decision and build dispatch
  via HandlerRegistry/FormatHandler on canonical path (C-011 uses C-008, C-007).

  C-006 ChecksumSyncPolicy: four-branch SHA-256 decision; owned by TreeLifecycle.

  C-011 TreeBuilder: unified-pipeline writer; owned by TreeLifecycle.

  ## HRS {c006}

  validate_or_recreate_tree_file(project_root, file_path, force=False) is the
  path-based wrapper; delegates to content-based core.

  ## Imports (exact list)

  ```python
  from __future__ import annotations

  from pathlib import Path

  from code_analysis.core.search_session.tree_representation import (
      TreeRepresentationRef,
      TreeValidityState,
  )
  from code_analysis.core.tree_lifecycle.builder import TreeBuilder
  from code_analysis.core.tree_lifecycle.checksum import (
      ChecksumSyncPolicy,
      validate_or_recreate_from_content,
      validate_or_recreate_tree_file,
  )
  ```

  ## Class skeleton

  ```python
  class TreeLifecycle:
      """TreeLifecycle (C-010): single entry point for tree validity and creation."""

      policy: type[ChecksumSyncPolicy] = ChecksumSyncPolicy
      builder: type[TreeBuilder] = TreeBuilder

      @staticmethod
      def from_content(
          *,
          content: str,
          source_abs: Path,
          sidecar_path: Path,
          file_path: str,
          sidecar_digest: str | None,
          root_stable_id: str | None,
          force: bool = False,
      ) -> tuple[TreeRepresentationRef, TreeValidityState]:
          """Content-based entry; delegates to validate_or_recreate_from_content."""
          return validate_or_recreate_from_content(
              content=content,
              source_abs=source_abs,
              sidecar_path=sidecar_path,
              file_path=file_path,
              sidecar_digest=sidecar_digest,
              root_stable_id=root_stable_id,
              force=force,
          )

      @staticmethod
      def from_path(
          *,
          project_root: Path,
          file_path: str,
          force: bool = False,
      ) -> tuple[TreeRepresentationRef, TreeValidityState]:
          """Path-based entry; delegates to validate_or_recreate_tree_file."""
          return validate_or_recreate_tree_file(
              project_root=project_root,
              file_path=file_path,
              force=force,
          )
  ```

  Note: After T-004 A-001, validate_or_recreate_from_content rebuild branches
  call TreeBuilder.build internally. This class does not change when T-004 lands.

  ## Forbidden approaches

  - Do NOT import TreeFormatKind or recreate_tree_from_content here.
  - Do NOT duplicate ChecksumSyncPolicy or rebuild logic.
  - Do NOT modify checksum.py or builder.py in this step.

