  MRS excerpt (C-029 BlockAssembler):
  - Parallel thread draining RawFindingBuffer under buffer lock ({g9xv}).
  - Acquires lock on entry; exits if live owner holds it; reclaims stale lock when owner PID dead.
  - Loops under lock: forms result block when buffered volume reaches maximum block size or search completed.
  - Atomically publishes each block, appends index entry, updates manifest, deletes assembled findings.
  - Releases lock and exits when volume below limit and search not completed.
  - On completed status with empty buffer: sets index completeness marker to search finished; deletes buffer via delete_buffer.
  - Never deletes session directory; final assembler run by main thread after status completed drains trailing findings.

