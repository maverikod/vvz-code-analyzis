step_id: G-011
name: PythonFileHandler refactor
description: 'Refactor PythonFileHandler and its helpers after G-010 visualizer is
  in place. Goals: (1) remove dead code paths left from pre-visualizer era (_cst_statements_to_nodes,
  _cst_node_to_node, _classify_cst_node, _find_by_stable_id); (2) rewrite
  _metadata_children_to_nodes to correctly enumerate module-level children using
  outline_nodes depth=1 from metadata_map; (3) rewrite open_root to call render_module
  and return structured text block; (4) add text field to Block model and wire it
  through BlockHandler and ResponseEnvelope serialization; (5) smoke-test the full
  round-trip with a real Python file via PreviewCommand.

  '
