              classified = classify_github_auth_error(status) if status is not None else None
              return ErrorResult(
                  message=f"GitHub issue_comment failed for {owner}/{repo}#{issue_number}",
                  code=classified or error_code,
                  details={"owner": owner, "repo": repo, "issue_number": issue_number, "status": status},
              )
          return SuccessResult(data={"comment": data})
