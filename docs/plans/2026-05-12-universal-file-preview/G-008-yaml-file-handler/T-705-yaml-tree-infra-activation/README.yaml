description: |
  Target layout: introduce package `code_analysis/core/yaml_tree/` as the canonical
  YAML tree layer for previews and MCP helpers. Core surface (names are targets for
  the implementation, not commitments until code lands): `YamlTree` session type;
  `build_yaml_tree_from_data` to construct trees from parsed data; `load_file_to_tree`
  / `get_tree` to obtain or reuse a parsed tree for a path; `resolve_yaml_node` to
  locate a node from a session plus reference.

  Stable identifiers: reuse `stable_node_id_for_pointer` so RFC 6901 JSON Pointer
  paths over the loaded YAML document produce the same opaque ids as sibling JSON
  infrastructure — pointer strings and opaque ids remain interchangeable once the tree
  is built.

  Optional MCP: add `list_yaml_blocks` mirroring `list_json_blocks` (node_id plus
  pointer metadata for `.yaml`/`.yml`) so callers can enumerate ids before drilling
  with `universal_file_preview` (see T-706).

  Relationship to shipped behavior: until this package registers real sessions,
  T-703 JSON Pointer resolution remains the production path for drill-down. T-707
  documents how preview should behave once infra and optional listing are wired.
