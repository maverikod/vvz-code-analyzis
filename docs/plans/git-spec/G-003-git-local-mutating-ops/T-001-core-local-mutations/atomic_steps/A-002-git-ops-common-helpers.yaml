    same docstrings, same body logic.
  - `confine_relative_path` keeps EXACTLY this signature —
    `confine_relative_path(root_dir: str, rel_path: str) -> tuple[str | None, dict | None]`
    — because git_ops/staging.py and git_ops/restore_op.py already quote it
    verbatim and unpack its return value positionally; do not rename it, its
    parameters, or change its return-type shape.
  - `confine_relative_path`'s body MUST delegate to
    `code_analysis.core.project_git.path_confinement.confine_project_git_path`
    for the actual path-escape/absolute/traversal decision; it must NOT
    reimplement any of that logic (no `os.path.abspath`, no manual
    `rstrip`/`startswith` prefix check, no local traversal check). The only
    work this function does is: wrap root_dir in a Path, call the canonical
    function, and translate its (Optional[Path], Optional[ErrorResult])
    result into this module's (Optional[str], Optional[dict]) outcome
    convention (str(resolved_path) on success; {"success": False, "code":
