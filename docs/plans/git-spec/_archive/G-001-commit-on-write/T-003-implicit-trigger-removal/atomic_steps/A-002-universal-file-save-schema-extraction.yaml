prompt: |
  Create the new file `code_analysis/commands/universal_file_save_schema.py`.
  Operation: create_file. This file does not exist yet; write it from scratch.
  Do not assume any pre-existing content.

  ## Purpose

  This is a mechanical extraction module. Two variants of the `universal_file_save`
  MCP command exist in this codebase and both currently duplicate, byte-for-byte,
  the same input-schema-building code and the same content-payload-validation code.
  This module becomes the single source of truth for both pieces of logic so
  neither command variant duplicates or drifts from the other. This module also
  adds one new schema property, `commit_on_write`, needed to carry an explicit
  per-write commit-intent flag (MRS concept C-024 below): because both command
  variants declare `"additionalProperties": False` in their schema, any new
  parameter accepted by the command's `execute` method must also appear as a
  schema property, otherwise a caller supplying it would be schema-rejected
  before `execute` ever runs.

  This module does not itself implement any rejection logic, wiring, or call
  site — it only provides the schema dict and the payload validator as
  reusable, importable functions. It does not import or reference any pre-write
  guard function.

  ## MRS excerpt (only the concept relevant to this file)

  concept_id: C-024
  name: ImplicitTriggerRemoval
  definition: The breaking migration that removes the prior message-only commit
    trigger so a message without intent is now rejected.
  properties:
    removed: message_only_implies_commit
    after_change: message_without_intent_rejected
    breaking: true
    old_caller: fails_loudly
  source_labels: ['{c5d6}']
  source_spec text (label {c5d6}): "Introducing the explicit commit-intent flag
  removes a prior implicit behaviour in which supplying a commit message alone
  triggered a commit. After the change, a message without the flag is rejected
  rather than silently committing, so any existing caller that relied on the
  implicit behaviour fails loudly and must adopt the explicit flag."

  Relevance to this file: the new `commit_on_write` schema property this file
  adds is the explicit commit-intent flag referenced by C-024. Its schema
  description must explain, in the caller-facing schema text, that supplying
  `commit_message` without `commit_on_write` is rejected with the code
  `COMMIT_MESSAGE_WITHOUT_INTENT`, and that the previously implicit
  message-only commit trigger has been removed.

  ## Required file content — exact structure, three parts in this order

  ### 1. Module docstring

  The file starts with a module-level docstring (triple double-quotes). Its
  text must state, in your own well-formed prose:
  - This module is a mechanical extraction shared by both `universal_file_save`
    command variants located at
    `code_analysis/commands/universal_file_save_command.py` and
    `code_analysis/commands/universal_file_save_command/save_command.py`.
  - It provides the input schema builder and the content payload validator as
    a single source of truth so neither variant duplicates or drifts from the
    other.

  End the docstring with exactly these two lines, each on its own line, as the
  final lines of the docstring, matching this repository's module docstring
  convention:

  ```
  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  ```

  ### 2. Imports

  Exactly these three import statements, in this exact order, each on its own
  line (blank line separating each, matching this repository's import style):

  ```python
  from typing import Any, Dict, Optional

  from mcp_proxy_adapter.commands.result import ErrorResult

  from .registration import REGISTRY_SCHEMA_DISCOVERY_SHORT
  ```

  No other imports are used or needed anywhere in this file.

  ### 3. Two module-level functions, in this exact order

  #### Function 1

  Exact signature:

  ```python
  def get_universal_file_save_schema() -> Dict[str, Any]:
  ```

  Docstring (first statement in the function body, triple double-quotes):
  `"""Return the universal_file_save command input schema."""`

  Function body: `return` the following dict literal exactly as written below
  (this is the JSON-Schema-style input schema for the `universal_file_save`
  MCP command; every key, value, and string must match character-for-character,
  including the ellipsis character `…` and the em dash `—` in the `file_path`
  property description):

  ```python
      return {
          "type": "object",
          "title": "universal_file_save",
          "description": (
              "Registry-first save for text, json, yaml, and python handlers. "
              "Required: project_id, file_path, content (string). "
              "Optional: dry_run, diff, backup (default true), create_parent_dirs "
              "(default true, mkdir -p for all handlers), commit_message, "
              "diff_context_lines; validate_syntax_only and tree_id apply only to Python. "
              "Creates missing files and parent directories when allowed; same overwrite "
              "pipelines apply once the file exists. "
              + REGISTRY_SCHEMA_DISCOVERY_SHORT
          ),
          "properties": {
              "project_id": {
                  "type": "string",
                  "description": "Project UUID (from create_project or list_projects).",
              },
              "file_path": {
                  "type": "string",
                  "description": (
                      "Single path relative to project root (literal; globs/wildcards not supported). "
                      "May name a file that does not exist yet: all handlers support create with "
                      "create_parent_dirs (mkdir -p). Routing: text (.md, .txt, …), .json, "
                      ".yaml/.yml, .py/.pyi/.pyw — see list_handler_mappings()."
                  ),
              },
              "content": {
                  "type": "string",
                  "description": (
                      "Full file body: plain text for .md/.txt/.rst/.adoc; JSON or YAML text "
                      "for .json / .yaml/.yml; Python source for .py/.pyi/.pyw."
                  ),
              },
              "dry_run": {
                  "type": "boolean",
                  "default": False,
                  "description": "If true, no write, backup, or DB/index side effects.",
              },
              "diff": {
                  "type": "boolean",
                  "default": False,
                  "description": "If true, include unified diff in the response when supported.",
              },
              "backup": {
                  "type": "boolean",
                  "default": True,
                  "description": "If true (default), create backups where the handler does so.",
              },
              "create_parent_dirs": {
                  "type": "boolean",
                  "default": True,
                  "description": (
                      "When true (default), create missing parent directories for file_path "
                      "(like mkdir -p) before writing. When false, fail with "
