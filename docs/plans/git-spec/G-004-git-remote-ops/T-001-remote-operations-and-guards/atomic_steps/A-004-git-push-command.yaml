  ```python
  class GitPushCommand(BaseMCPCommand):
      """MCP command publishing local commits to a remote branch (C-014, C-016).

      Guarded: rejects a push to a protected branch unless an explicit
      override is supplied, rejects a force push unless configuration
      permits it and force is explicitly requested, and performs no
      remote write for a dry-run push.
      """

      name = "git_push"

      version = "1.0.0"

      descr = "Publish local commits to a remote branch, guarded by protected-branch and force-push policy."

      category = "git"

      author = "Vasiliy Zdanovskiy"

      email = "vasilyvz@gmail.com"

      use_queue = True

      @staticmethod
      def get_name() -> str:
          """Return the MCP command name.

          Returns:
              MCP command name string.
          """
          return "git_push"

      @classmethod
      def get_schema(cls) -> Dict[str, Any]:
          """Return the JSON schema for command parameters.

          Returns:
              JSON schema dict describing project_id, branch, remote,
              force, protected_override, and dry_run.
          """
          return {
              "type": "object",
              "properties": {
                  "project_id": {"type": "string"},
                  "branch": {"type": "string"},
                  "remote": {"type": "string"},
                  "force": {"type": "boolean"},
                  "protected_override": {"type": "boolean"},
                  "dry_run": {"type": "boolean"},
              },
              "required": ["project_id", "branch"],
              "additionalProperties": False,
          }

      @classmethod
      def metadata(cls: Type["GitPushCommand"]) -> Dict[str, Any]:
          """Return extended AI/docs metadata for git_push.

          Returns:
              Metadata dict with description, parameters, and examples.
          """
          return {
              "name": "git_push",
              "description": (
                  "Publish local commits to a remote branch. Rejects "
                  "protected-branch pushes without protected_override and "
                  "force pushes unless configuration allows force and "
                  "force is explicitly requested. dry_run performs no "
                  "remote write."
              ),
              "parameters": {
                  "project_id": {"type": "string", "required": True},
                  "branch": {"type": "string", "required": True},
                  "remote": {"type": "string", "required": False},
                  "force": {"type": "boolean", "required": False},
                  "protected_override": {"type": "boolean", "required": False},
                  "dry_run": {"type": "boolean", "required": False},
              },
              "examples": [{"command": {"project_id": "<uuid>", "branch": "feature-x", "remote": "origin"}}],
          }

      async def execute(  # type: ignore[override]
          self,
          project_id: str,
          branch: str,
          remote: str = "origin",
          force: bool = False,
          protected_override: bool = False,
          dry_run: bool = False,
          **kwargs: Any,
      ) -> SuccessResult | ErrorResult:
          """Execute the git_push command.

          Args:
              project_id: Project UUID whose repository root is resolved
                  via ``BaseMCPCommand._resolve_project_root``.
              branch: Target branch name to push.
              remote: Name of the configured git remote to push to.
                  Defaults to ``"origin"``.
              force: When True, request a force push (``git push --force``).
                  Rejected unless configuration's ``allow_force_push`` is
                  true.
              protected_override: When True, explicitly overrides the
                  protected-branch rejection for ``branch``.
              dry_run: When True, run ``git push --dry-run`` and perform no
                  remote write.
              **kwargs: Unused; accepted for adapter compatibility.

          Returns:
              SuccessResult with the push outcome, or ErrorResult naming a
              distinct outcome code (GIT_NOT_AVAILABLE, GIT_NOT_A_REPO,
              GIT_REMOTE_NOT_CONFIGURED, GIT_PROTECTED_BRANCH,
              GIT_FORCE_PUSH_DISABLED, GIT_AUTH_FAILED, GIT_REMOTE_TIMEOUT,
              or GIT_PUSH_FAILED).
          """
          _ = kwargs
          root = self._resolve_project_root(project_id)
          if not is_git_available():
              return git_remote_error_result(
                  GIT_NOT_AVAILABLE, "git executable is not available", {}
              )
          if not is_git_repository(root):
              return git_remote_error_result(
                  GIT_NOT_A_REPO,
                  f"{root} is not a git repository",
                  {"root": str(root)},
              )
          config_data = self._get_raw_config()
          git_config = load_git_remote_config(config_data)
          if not git_config["remote_enabled"]:
              return git_remote_error_result(
                  GIT_REMOTE_NOT_CONFIGURED,
                  "Remote git operations are not enabled in configuration",
                  {},
              )
          guard = evaluate_push_guards(
              branch,
              protected_branches=git_config["protected_branches"],
              protected_override=protected_override,
              force=force,
              allow_force_push_config=git_config["allow_force_push"],
          )
          if guard is not None:
              guard_code, guard_message = guard
              return git_remote_error_result(
                  guard_code, guard_message, {"remote": remote, "branch": branch}
              )
          env, auth_error = build_full_subprocess_env(git_config)
          if auth_error is not None:
              return git_remote_error_result(
                  GIT_AUTH_FAILED,
                  str(
                      auth_error.get(
                          "message", "SSH authentication is not configured correctly"
                      )
                  ),
                  {},
              )
          args = ["git", "push"]
          if dry_run:
              args.append("--dry-run")
          if force:
              args.append("--force")
          args += [remote, branch]
          returncode, stdout, stderr, timed_out = run_git_subprocess(
              args,
              cwd=root,
              env=env,
              timeout_seconds=git_config["remote_timeout_seconds"],
          )
          if timed_out:
              return git_remote_error_result(
                  GIT_REMOTE_TIMEOUT,
                  f"git push exceeded timeout of {git_config['remote_timeout_seconds']} seconds",
                  {"remote": remote, "branch": branch},
              )
          if returncode != 0:
              auth_code = classify_ssh_auth_stderr(stderr)
              if auth_code == GIT_AUTH_FAILED:
                  return git_remote_error_result(
                      GIT_AUTH_FAILED,
                      "SSH authentication failed during git push",
                      {"remote": remote, "branch": branch},
                  )
              return git_remote_error_result(
                  "GIT_PUSH_FAILED",
                  f"git push failed with exit code {returncode}",
                  {"remote": remote, "branch": branch, "stderr": stderr.strip()},
              )
          payload: Dict[str, Any] = {
              "success": True,
              "remote": remote,
              "branch": branch,
              "refs": [branch],
              "force": force,
              "dry_run": dry_run,
              "outcome": "OK",
              "output": stdout.strip(),
          }
          return SuccessResult(data=cast(Dict[str, Any], payload))
  ```

  ## Constraints (all explicit)

  1. Use the class body and `execute` body exactly as given above; do not
     add, remove, or rename methods or fields; do not add a `main` block,
     CLI, or tests.
  2. Do not create, modify, or read any file other than
     `code_analysis/commands/git_push_command.py`.
  3. Every non-outcome constant used (`GIT_NOT_A_REPO`, `GIT_NOT_AVAILABLE`,
     `GIT_REMOTE_NOT_CONFIGURED`, `GIT_REMOTE_TIMEOUT`, `GIT_AUTH_FAILED`)
     must come from the imports shown above, not be redefined locally;
     `GIT_PROTECTED_BRANCH` and `GIT_FORCE_PUSH_DISABLED` are never
     imported directly in this file — they arrive only inside the tuple
     returned by `evaluate_push_guards` and must not be hardcoded anywhere
     else.
  4. The guard check (`evaluate_push_guards`) must run before the SSH
     environment is built and before any subprocess is started, so a
     rejected push never contacts the remote.
  5. The literal string `"GIT_PUSH_FAILED"` is the one exception: it is a
     push-specific fallback outcome code not defined in
     `git_remote_ops.py`; use it as a bare string literal exactly as shown.
  6. All typing annotations shown must be preserved exactly (parameter
     types and return types).
