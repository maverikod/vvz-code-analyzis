  ## Purpose

  Implement `PythonHandler` — the real FormatHandler (C-007) for `.py` files.
  **Decision A2 (locked):** NOT a NotImplementedError stub. G1-13 deferral is
  **resolved-in-plan**; Python CST ownership stays in marked_tree_unification.

  ### parse_content — thin wrapper over cst_tree

  Delegate to `create_tree_from_code` from `code_analysis/core/cst_tree/tree_builder.py`:

  ```python
  def create_tree_from_code(
      file_path: str,
      source_code: str,
      node_types: Optional[List[str]] = None,
      max_depth: Optional[int] = None,
      include_children: bool = True,
      *,
      persist_sidecar: bool = False,
      register_in_memory: bool = True,
  ) -> CSTTree:
  ```

  Call with `persist_sidecar=False` (forbidden: `.cst/` JSON sidecar path).

  ### metadata_map → List[TreeNode] adapter

  `CSTTree.metadata_map: Dict[str, TreeNodeMetadata]` keyed by internal `node_id`.

  For each metadata entry passing granularity filter, emit:

  ```python
  TreeNode(
      node_id=meta.stable_id,  # UUID — NOT internal node_id
      kind=get_node_kind(node) or metadata.node_type string,
      content=<source slice for block>,
      attributes={
          "start_line": meta.start_line,
          "end_line": meta.end_line,
          "node_type": meta.node_type,
          "internal_node_id": meta.node_id,  # diagnostic only
      },
      parent_id=<parent stable_id if known else None>,
  )
  ```

  **stable_id ↔ node_id mapping rule:** `TreeNode.node_id` always equals
  `TreeNodeMetadata.stable_id`. Never expose unstable internal `node_id` as
  TreeNode.node_id.

  ### Granularity filter (C-005 / HRS {b005})

  Emit TreeNode only for addressable blocks:
    - FunctionDef, AsyncFunctionDef, ClassDef (metadata-dict marker path)
    - Decorator
    - SimpleStatementLine, Expr, AnnAssign, Assign, AugAssign (trailing-comment path)
  Exclude:
    - Module root as leaf unless spec requires
    - Shebang lines (not addressable)
    - Nodes with no source position

  **Node-type coverage:**
    - **Covered:** FunctionDef, AsyncFunctionDef, ClassDef, Decorator,
      SimpleStatementLine, Expr, AnnAssign, Assign, AugAssign
    - **Unverified (skip or include without marker guarantee — document in module docstring):**
      Import, If, For, While, Try, With

  ### mark / unmark — NEW code (HRS {b005} hybrid contract)

  Marker metadata key: `___id___` (exact string, three underscores each side).

  **mark(content: str) -> str:**
    1. Parse with LibCST (may reuse cst_tree internals).
    2. For each addressable block, assign stable UUID (reuse stable_id logic from
       cst_tree where possible).
    3. Named constructs with metadata dict: set `metadata["___id___"] = uuid`.
    4. Other blocks: append ` # ___id___:<uuid>` on last physical line of block.
    5. Shebang: leave unchanged, no marker.
    6. Multiline docstring: marker on closing `"""` line after quotes.
    7. Return marked source string (for TreeFile `.py.tree` only).

  **unmark(marked_text: str) -> str:**
    1. Remove all `___id___` entries from metadata dicts.
    2. Strip trailing ` # ___id___:<uuid>` comments.
    3. Reproduce original source byte-for-byte (C-001 invariant).

  ### sidecar_path

  ```python
  def sidecar_path(self, source_abs: Path) -> Path:
      return source_abs.parent / (source_abs.name + ".tree")
  ```

  Same sibling convention as G-002 T-001; NOT `.cst/<stem>.tree`.

