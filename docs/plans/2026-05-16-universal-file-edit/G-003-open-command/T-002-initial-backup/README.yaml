step_id: T-002
parent_global_step: G-003
name: Create initial backup when file has no history
description: After draft is created, call BackupManager.list_versions(file_path)
  from ExistingInfrastructure (C-012). If the result is an empty list,
  call BackupManager.create_backup(file_path) to create the initial BackupPair
  (C-011). If the list is non-empty, skip backup creation. This step has no
  effect on the draft or lockfile.
concepts:
- C-011
- C-012
inputs:
- name: abs_path
  type: Path
  description: Absolute path to the file being opened.
outputs:
- name: initial_backup_created
  type: bool
  description: True when an initial backup was created; False when history
    already existed.
atomic_steps: []
status: draft