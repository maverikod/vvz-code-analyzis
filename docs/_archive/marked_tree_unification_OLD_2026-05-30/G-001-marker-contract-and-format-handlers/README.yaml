step_id: G-001
name: Marker Contract and Format Handlers
description: 'Establishes the MarkerContract as the three-operation interface (mark,
  parse, unmark) that every FormatHandler must implement. Defines NodeId as the format-specific
  identifier embedded natively in the TreeFile that names exactly one AddressableBlock.
  Establishes the minimally-addressable granularity rule: a marker must never split
  a lexeme, never be inserted inside a literal or token, and never mark a fragment
  smaller than the minimally-addressable block for the format. Establishes the universal
  all-nodes marker rule ({b000}): every addressable node in every format receives
  a marker without exception — metadata slot where the format provides one, otherwise
  a format-native comment at the END of the block. Defines the FormatHandler
  for each supported format — text, markdown, YAML, JSON, and Python — specifying
  the format-native marker syntax and the unmark invertibility invariant (unmark reproduces
  original source bytes, verified by SHA-256 checksum). Hide/unhide of markers during
  session mutation is EditSession responsibility, not FormatHandler. The Python FormatHandler uses
  a hybrid marking scheme: for CST nodes that already carry a metadata dict in the
  existing codebase, the node id is written into that metadata dict under a reserved
  key; for all other CST node types, a trailing comment is used. Establishes the HandlerRegistry
  as the central component that resolves a SourceFile to its FormatHandler by file
  extension. Defines TreeNode as the in-memory unit produced by parsing a marked TreeFile,
  carrying its NodeId, type, attributes, and content.'
