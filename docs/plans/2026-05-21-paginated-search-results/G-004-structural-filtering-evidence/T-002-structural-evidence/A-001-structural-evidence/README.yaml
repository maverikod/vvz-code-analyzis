  Operation: create_file
  Target: code_analysis/core/search_session/structural_evidence.py

  MRS excerpt (C-018 StructuralEvidence):
  - Search evidence valid only when backed by a validated TreeRepresentation and a
    preview-compatible result node or block.
  - Required when grep participates in project cross-search as structural evidence.
  - Line-only grep is not structural evidence unless converted into validated
    preview-compatible nodes.
  - Timed-out dynamic or structural phases must not contribute invalid partial
    structural evidence.

  Parent GS (G-004): structural filtering and evidence qualification; only validated
  tree-backed, preview-compatible results count as cross-search evidence.

  Parent TS (T-002): qualification rules only — no XPath engine, no grep execution.

  Required imports:
  ```python
  from __future__ import annotations

  from dataclasses import dataclass
  from enum import Enum
  from typing import Optional

  from code_analysis.core.search_session.preview_reference import PreviewReference
  from code_analysis.core.search_session.tree_representation import TreeRepresentationRef
  ```

