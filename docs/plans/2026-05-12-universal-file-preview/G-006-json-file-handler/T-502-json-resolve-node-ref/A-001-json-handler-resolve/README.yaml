prompt: "Modify an existing Python file.\n\nTarget file (modify_file):\n  code_analysis/commands/universal_file_preview/handlers/json_handler.py\n\
  \nCurrent content after A-001 (T-501) has been applied:\n  The file contains JsonFileHandler\
  \ with resolve_node_ref treating any\n  string that does not start with '/' as None\
  \ (invalid). This misses\n  node_id strings produced by list_json_blocks (opaque\
  \ UUIDs).\n\nChange to make:\n  Replace the body of resolve_node_ref to also accept\
  \ opaque node_id\n  strings by attempting a BFS scan of the document for a matching\n\
  \  list_json_blocks-style id. Specifically:\n\n  Replace the existing body with:\n\
  \n    doc = getattr(self, '_doc', None)\n    if doc is None:\n        return input_error(INPUT_ERROR_UNKNOWN_NODE_REF,\n\
  \                           'open_root must be called before resolve_node_ref.')\n\
  \    # Try JSON Pointer first (empty string is valid root pointer)\n    if node_ref\
  \ == '' or node_ref.startswith('/'):\n        result = _resolve_json_pointer(doc,\
  \ node_ref)\n        if result is None:\n            return input_error(\n     \
  \           INPUT_ERROR_UNKNOWN_NODE_REF,\n                f'JSON Pointer {node_ref!r}\
  \ does not exist in document.',\n                details={'node_ref': node_ref},\n\
  \            )\n        value, pointer = result\n        return _json_value_to_node(value,\
  \ pointer)\n    # Opaque node_id: not supported in this implementation (no list_json_blocks\
  \ index).\n    # Return UNKNOWN_NODE_REF with a clear message.\n    return input_error(\n\
  \        INPUT_ERROR_UNKNOWN_NODE_REF,\n        f'Opaque node_id {node_ref!r} is\
  \ not a JSON Pointer. '\n        'Pass a JSON Pointer (e.g. \\'\\'/foo/bar\\') to\
  \ address nodes.',\n        details={'node_ref': node_ref},\n    )\n\n  No other\
  \ changes to the file.\n"
