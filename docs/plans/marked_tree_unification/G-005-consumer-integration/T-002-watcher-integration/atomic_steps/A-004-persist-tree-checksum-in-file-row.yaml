  - When `tree_checksum is None`, behaviour is identical to before (no UPDATE).
  - Use `database.execute` with parameterized SQL exactly as shown; do NOT use string formatting for the value, and do NOT add ALTER TABLE or any schema DDL.
  - Do NOT modify `add_file`, `_mark_file_needs_chunking`'s existing body, `collect_file_disk_metadata`, or any other file.
  - Keep all other behaviour (resolve, is_file guard, add_file insert path, needs_chunking) unchanged.
  - All docstrings and comments in English (ARTIFACT_LOCALE=en, CR-010).
