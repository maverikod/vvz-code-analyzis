step_id: T-002
parent_global_step: G-007
name: Dead and orphaned session detection rules
description: "Create the DeadSessionDetection rule set that evaluates ServerProcessIdentity
  and SessionHeartbeat manifest values to classify running or residual sessions as
  dead, timed out, or orphaned. Treat a missing main_pid as dead. Treat a process_start_time
  mismatch against the recorded ServerProcessIdentity as dead because PID reuse is
  possible. Treat a running session whose heartbeat_at is older than the hard timeout
  as timed out or orphaned even when last_access_at was recently refreshed. Specify
  that the same rule set is applied during status reads and during background maintenance
  before directory removal is permitted.\n"
concepts:
- C-008
- C-009
- C-010
inputs:
- name: ServerProcessIdentity manifest values
  type: process identity record
  description: "main_pid, process_start_time, and optional host and instance_id stored
    for the owning server process in session metadata.\n"
- name: SessionHeartbeat manifest values
  type: heartbeat record
  description: "heartbeat_at timestamp stored for a running search session in session
    metadata.\n"
- name: hard timeout threshold
  type: duration policy
  description: "Maximum allowed age of heartbeat_at for a running session before the
    session is classified as timed out or orphaned.\n"
- name: current server process identity snapshot
  type: process identity record
  description: "Live main process identity used to compare against stored ServerProcessIdentity
    during evaluation.\n"
outputs:
- name: DeadSessionDetection rule set
  type: detection rule set
  description: "Ordered rules mapping manifest process identity and heartbeat state
    to dead, timed out, or orphaned outcomes.\n"
- name: dead session outcome criteria
  type: classification criteria
  description: "Conditions under which a session is classified as dead, including
    missing main_pid and process_start_time mismatch.\n"
- name: timed out or orphaned outcome criteria
  type: classification criteria
  description: "Conditions under which a running session is classified as timed out
    or orphaned based on stale heartbeat_at beyond the hard timeout.\n"
- name: detection application contexts
  type: application scope
  description: "Contexts where DeadSessionDetection must be evaluated before cleanup
    or status reporting proceeds, covering status reads and background maintenance.\n"
atomic_steps:
- A-001
status: draft
