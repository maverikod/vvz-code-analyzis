  ## MRS excerpt

  C-001 MarkerContract: mark, parse, unmark; round-trip `unmark(mark(source)) == source` verified by SHA-256.
  C-002 NodeId: per-file monotonic decimal integer short_id embedded in TREE section only; never UUID.
  C-007 FormatHandler implements C-001 in parallel (does NOT subclass MarkerContract).
    Four operations: parse_content, mark, unmark, sidecar_path.
    Uses integer short_id marker syntax only; uses NodeIdMap (C-025) for server-internal short_id↔UUID resolution.
  C-024 TreeNodeUuid: UUID4 in MAP section only — handlers never embed UUIDs in markers.
  C-025 NodeIdMap.resolve: bidirectional short_id↔UUID lookup within one tree file context.

  ## Operation mapping (parallel contracts, NOT inheritance)

  | MarkerContract (C-001) | FormatHandler (C-007) | Input | Output |
  |---|---|---|---|
  | mark(content) | mark(content) | unmarked SourceFile (C-004) | marked TREE body (C-003) |
  | parse(marked_text) | parse_content(file_path, content) | unmarked SourceFile body | List[TreeNode] (C-009) |
  | unmark(marked_text) | unmark(marked_text) | marked TREE body | unmarked SourceFile body |

  FormatHandler adds sidecar_path (sibling `<name>.tree`).

  ## EditSession boundary (C-012 vs C-007) — mandatory

  Marker hide/unhide immediately before and after session mutation is **EditSession
  (C-012) responsibility**, NOT FormatHandler (C-007). FormatHandler exposes exactly
  four operations: `parse_content`, `mark`, `unmark`, `sidecar_path`. Handlers do NOT
  implement session-scoped hide/unhide toggles; callers (EditSession lifecycle) invoke
  `mark`/`unmark` around mutations at the session layer.

