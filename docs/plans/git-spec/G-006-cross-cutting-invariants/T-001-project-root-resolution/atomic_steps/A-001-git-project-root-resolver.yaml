  ## MRS excerpt (verbatim, concept C-026 — the only concept this step touches)

      concept_id: C-026
      name: ProjectRootResolution
      definition: The resolution rule deriving the repository root from the watched-directory
        id and project id, refusing on empty or ambiguous results.
      properties:
        identified_by:
        - watch_dir_id
        - project_id
        resolved_relative_to: watched_directory
        root_is: project_folder_under_watch_dir_absolute_path
        never_free_absolute_from_caller: true
        absolute_path: legacy_form_only
        ambiguous_or_empty: refuse_no_guess
        same_root_governs:
        - git_ops
        - commit_on_write
      source_labels:
      - '{j3k4}'
      - '{w3x4}'

  Source-spec paragraphs the concept is bound to (verbatim):

  {j3k4} The repository root is never taken as a free absolute path from the
  caller. It is always resolved relative to a watched directory: the caller
  identifies the project by the pair (watched-directory id, project id), and
  the root is derived as the project's folder under that watched directory's
  absolute path. A bare absolute root path is accepted only as a legacy
  form. When resolution yields an empty or ambiguous root, the operation
  refuses rather than acting on a guessed location. The same resolved root
  governs both git operations and any commit produced on write.

  {w3x4} Every git operation resolves the project's repository root before
  acting, confirms the root is a git repository, and reports a distinct
  clear outcome when git is unavailable or the root is not a repository.
  Paths exchanged with git operations are project-relative.
