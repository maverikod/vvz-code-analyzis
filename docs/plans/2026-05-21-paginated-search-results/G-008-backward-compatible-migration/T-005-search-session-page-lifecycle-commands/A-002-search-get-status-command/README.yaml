prompt: |
  Operation: create_file
  Target: code_analysis/commands/search_get_status_command.py

  MRS (C-003 SearchSessionManifest): stores status, phase, metrics, warnings, errors.
  MRS (C-020 SearchStatus): running, completed, failed, cancelled, timed_out, dead; phase enum;
  distinguishes block-not-ready from whole-search failure.
  MRS (C-001 SearchSession): identified by job_id parameter.

  Implement class SearchGetStatusCommand(BaseMCPCommand):
  - name = "search_get_status"
  - get_schema() required: job_id (string)
  - execute():
      Load manifest for job_id session directory; if missing return SESSION_NOT_FOUND.
      Build SearchStatusSnapshot via snapshot_from_manifest from code_analysis.core.search_session.status.
      Return SuccessResult with job_id, status, phase, block_not_ready flag, progress object from manifest metrics,
      summary object (request params subset, produced_results, written_blocks), warnings, errors.
      Do not include result row payloads or block JSON bodies (distinct from search_get_page and HTTP block reads).
      Refresh last_access_at in service metadata on successful read.
  - metadata() documenting MCP-specific status read distinct from HTTP GET status route.

  Constraints:
  - Under 220 lines.
  - Author header.

