step_id: T-002
parent_global_step: G-002
name: Define EditSession entity and registry
description: Create the EditSession (C-001) dataclass and the module-level session
  registry. EditSession stores session_id, file paths, format_group, handler_id, and
  optional in-memory tree reference. The registry exposes create, get, and release
  operations used by all four commands. No session state is persisted across process
  restarts.
concepts:
- C-001
- C-002
inputs:
- name: format_descriptor
  type: FormatGroup descriptor
  description: Descriptor produced by T-001 resolution.
- name: session_id
  type: UUID string
  description: Newly generated UUID for the session.
outputs:
- name: session_registry
  type: module-level dict and registry API
  description: Registry with create(session_id, descriptor) -> EditSession, get(session_id)
    -> EditSession | None, release(session_id) -> None.
atomic_steps: []
status: draft
