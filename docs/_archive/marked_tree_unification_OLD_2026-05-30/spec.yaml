plan_name: marked_tree_unification
project_uuid: 8772a086-688d-4198-a0c4-f03817cc0e6c
concepts:
- concept_id: C-001
  name: MarkerContract
  definition: The three-operation contract (mark, parse, unmark) that defines 
    how a tree is built from and reduced back to source content.
  properties:
  - operation mark(content) embeds node-id markers natively into content
  - operation parse(marked_text) builds the node tree from markers
  - operation unmark(marked_text) reproduces original source bytes exactly
  - round-trip invariant unmark(mark(source)) equals source, verified by 
    checksum
  - markers live only in tree files, never in the source file
  - every addressable node in every format receives a marker without exception;
    where the format provides a metadata field or equivalent structured slot the
    node id lives in that metadata, otherwise the marker appears as a format-native
    comment at the END of the block (never mid-lexeme, per AddressableBlock
    granularity)
  source_labels:
  - '{a001}'
  - '{a002}'
  - '{a003}'
  - '{b000}'
- concept_id: C-002
  name: NodeId
  definition: The format-specific identifier that names exactly one addressable 
    block; it is both the marker embedded in the tree and the reference passed 
    in queries and previews.
  properties:
  - the marker string is the identifier, not a pointer to one stored elsewhere
  - one node id names exactly one addressable block
  - format-specific encoding (CST UUID, sidecar stable id, marker comment id)
  - used to address preview navigation, edits, diffs, and query results
  - an unrecognised node id yields an input error, never silent ignore
  source_labels:
  - '{a001}'
  - '{i002}'
  - '{f002}'
- concept_id: C-003
  name: TreeFile
  definition: The on-disk artifact holding source content with node-id markers 
    embedded natively per format.
  properties:
  - contains source content plus markers
  - stored as a sibling file placed directly next to the source file it 
    describes
  - on-disk format is natively-marked content, not a separate JSON payload
  source_labels:
  - '{a002}'
  - '{c001}'
- concept_id: C-004
  name: SourceFile
  definition: The original, unmarked file that the tree describes; the source of
    truth outside any edit session.
  properties:
  - never modified by the tree system, remains clean
  - source of truth when no session is active
  - its byte content is what unmark must reproduce exactly
  source_labels:
  - '{a002}'
  - '{a005}'
- concept_id: C-005
  name: AddressableBlock
  definition: The minimally-addressable logical unit a marker may name; 
    drilldown stops here and below it is plain text.
  properties:
  - granularity is the leaf addressable block, never smaller
  - a marker never splits a lexeme or sits inside a literal or token
  - per-format definition of the minimal block (line, md block, yaml block, json
    element, py logical statement)
  source_labels:
  - '{a004}'
- concept_id: C-006
  name: ChecksumSyncPolicy
  definition: The single mechanism that decides tree-vs-source truth by SHA-256
    checksum comparison; the checksum comparison is the synchronization trigger.
    Pure checksum helpers (compute_content_checksum, is_tree_valid) belong to
    TreeLifecycle (C-010) per HRS {c004}, not to this policy entity.
  properties:
  - 'invariant: inside an active session the tree is truth, outside the source file
    is truth'
  - owns the four-branch decision only; wraps resolve_sha_sync_policy from
    code_analysis/commands/universal_file_edit/sha_sync_policy.py
  - does not own compute_content_checksum or is_tree_valid (TreeLifecycle /
    tree-validity module scope per HRS {c004})
  - SHA-256 checksum of source content is the synchronization trigger
  - 'four-branch decision: no tree present, checksum match, mismatch outside session,
    mismatch inside active session'
  - on mismatch outside a session the tree is rebuilt from source
  - applies uniformly to all formats
  source_labels:
  - '{a005}'
  - '{a006}'
  - '{c002}'
  - '{c003}'
- concept_id: C-007
  name: FormatHandler
  definition: A per-format component implementing the marker contract and the 
    tree-edit operations for one file format.
  properties:
  - implements the four-operation handler contract (parse_content, mark, unmark,
    sidecar_path) for one file format
  - implements the six tree-edit operations for its format
  - uses only its own format marker syntax, never another format's syntax
  - the common contract is the only coupling between handlers
  - 'one handler per format: text, markdown, yaml, json, python'
  - operation parse_content(file_path, content) builds the node tree from source
    content
  - operation sidecar_path(source_abs) returns the sibling tree-file path for 
    the source file
  - every addressable node receives a marker without exception — metadata slot
    where the format provides one, otherwise a format-native comment at the END
    of the block
  - hide/unhide of markers during mutation is NOT a FormatHandler responsibility;
    the session mutation cycle (hide before edit, restore after) belongs to
    EditSession
  source_labels:
  - '{b000}'
  - '{b001}'
  - '{b002}'
  - '{b003}'
  - '{b004}'
  - '{b005}'
  - '{h001}'
- concept_id: C-008
  name: HandlerRegistry
  definition: The central registry that resolves a file to its FormatHandler by 
    file extension.
  properties:
  - keyed by file extension
  - owns the set of registered handlers
  source_labels:
  - '{b000}'
- concept_id: C-009
  name: TreeNode
  definition: An in-memory node produced by parsing a marked tree, carrying its 
    node id, type, attributes, and content.
  properties:
  - produced by a FormatHandler from source content
  - carries node id, type label, attributes, and text or value
  - the ordered set of TreeNodes produced by parsing forms the tree structure
  source_labels:
  - '{b000}'
- concept_id: C-010
  name: TreeLifecycle
  definition: The single owner and coordinator of tree validity and tree 
    creation that every consumer routes through.
  properties:
  - 'single entry point: no ad-hoc per-call-site validation or creation exists outside
    it'
  - owns the validity decision and the build dispatch
  - canonical build dispatch is TreeBuilder.build which resolves FormatHandler via
    HandlerRegistry.default_registry().resolve(source_abs); does not use
    TreeFormatKind or recreate_tree_from_content as the primary build path
  - TreeBuilder.build writes marked content to FormatHandler.sidecar_path(source_abs)
    and records content_checksum in the tree file AND exposes it in the returned
    tree reference for subsequent validity checks
  - legacy recreate_tree_from_content plus TreeFormatKind remain as an untouched
    parity oracle alongside the unified pipeline until G-000 cutover
  - provides a path-based wrapper for consumers that work with file paths rather
    than content
  source_labels:
  - '{c004}'
  - '{c005}'
  - '{c006}'
- concept_id: C-011
  name: TreeBuilder
  definition: The component that dispatches to the appropriate FormatHandler to 
    build and write a tree file from source content.
  properties:
  - exposes TreeBuilder.build(*, content, source_abs, file_path, content_checksum)
    as the canonical unified-pipeline entry point
  - resolves FormatHandler via HandlerRegistry.default_registry().resolve(source_abs),
    produces natively-marked tree content via FormatHandler.mark(content), writes
    to FormatHandler.sidecar_path(source_abs), and records content_checksum in
    the tree file AND in the returned tree reference
  - does not dispatch via TreeFormatKind enum or recreate_tree_from_content;
    those legacy symbols are parity-oracle only until G-000 cutover
  - 'the single place that writes unified-pipeline tree files: no other component
    writes them directly on the canonical path'
  source_labels:
  - '{c005}'
- concept_id: C-012
  name: EditSession
  definition: A bounded editing context represented by a session directory next 
    to the source file, inside which the tree is the source of truth.
  properties:
  - session directory placed next to the source file, with a unique name derived
    from the source file name
  - open copies source in, validates or builds the tree, inits git, creates 
    initial commit
  - content-supply rule on open (FINAL-2 per {d002}): caller-supplied content is
    accepted ONLY when the target file is non-existent or its source/tree is
    broken/corrupted; supplying content when a valid file exists is an ERROR;
    when accepted, write provided source into the session code file FIRST, then
    follow the standard open protocol (build tree, write tree, record checksums,
    create initial git commit)
  - during the session the tree is truth; before each mutation, node metadata
    carrying markers is hidden into format-native comments (or equivalent inline
    marker form), the mutation is applied to the temporarily denuded representation,
    then markers and metadata are fully restored to canonical positions (metadata
    slot where available, format-native comment at END of block otherwise)
  - per-mutation post-steps without exception: write updated tree to disk inside
    the session directory; export in-session source copy by stripping markers via
    unmark into session TEMP artefacts; record SHA-256 checksums for both tree
    file and exported source; create a git commit capturing both artefacts
  - one tree modification equals one git commit, no exceptions
  - write (commit) command copies both artefacts out to external co-located positions
    atomically after the in-session commit
  - close deletes the session directory entirely without validation, checksum, or
    consistency checks; session git history is ephemeral
  source_labels:
  - '{d001}'
  - '{d002}'
  - '{d003}'
  - '{d004}'
  - '{d005}'
- concept_id: C-013
  name: SessionRepo
  definition: The version-control repository living inside the session directory
    that records one commit per tree edit.
  properties:
  - backed by a git library declared as a project dependency
  - exists only while the session is open
  - history is accessible for inspection, with commit identity and timestamp per
    edit
  - one commit per tree mutation, full per-edit history preserved
  - each commit captures both the tree file and the exported in-session source
    copy per the per-mutation invariant
  - destroyed with the session directory on close
  source_labels:
  - '{d002}'
  - '{d003}'
  - '{d006}'
- concept_id: C-014
  name: SessionGitApi
  definition: The set of session-scoped MCP commands exposing the session 
    version-control repository for history inspection, comparison, content 
    retrieval, status check, and rollback.
  properties:
  - every command requires an active session identifier and refuses to run 
    without a valid session context
  - log command returns commit history (hash, message, timestamp)
  - diff command supports tree mode (commit vs commit) and source mode (tree
    revision rev_a versus the most recent per-mutation unmark-exported in-session
    source copy; the live project file on disk is not an input to source mode)
  - show command returns tree content at a given revision
  - status command returns uncommitted changes versus the most recent commit
  - revert command rolls the tree back to a revision by creating a new revert 
    commit
  source_labels:
  - '{e001}'
  - '{e002}'
  - '{e003}'
  - '{e004}'
  - '{e005}'
  - '{e006}'
- concept_id: C-015
  name: EditOperation
  definition: The uniform set of six tree-edit operations addressed by node id, 
    available for all formats.
  properties:
  - six operations - insert, delete, replace, move, edit-attributes, 
    edit-content
  - every target identified by node id, never by line number or byte offset
  - insert places a new block relative to a node id and assigns a fresh node id
  - delete removes a block and its subtree, preserving format validity
  - replace substitutes content while preserving the node id
  - move relocates a block atomically, preserving the node id
  - edit-attributes changes node metadata without changing content or position
  - edit-content changes leaf-block text only, rejecting non-leaf targets
  source_labels:
  - '{h001}'
  - '{h002}'
  - '{h003}'
  - '{h004}'
  - '{h005}'
  - '{h006}'
  - '{h007}'
- concept_id: C-016
  name: PreviewNavigation
  definition: The three-phase procedure (enumerate, select, render) that 
    produces a structured preview of a tree node for any format.
  properties:
  - phase 1 enumerate resolves the focus node and lists its ordered child blocks
  - phase 2 select applies a selector to choose a subset of blocks
  - phase 3 render produces node id, type label, attribute summary, and text 
    excerpt per block
  - identical for all formats and for in-session and out-of-session access
  - when session_id is supplied, navigation operates on the in-session tree or
    draft held by the active EditSession (in-memory CST for Python, in-session
    draft artefacts for JSON/YAML/text) rather than only last committed on-disk
    artefacts — the mechanism for previewing unsaved edits before write
  - JSON and YAML sidecar stable id resolves via walk-up to nearest object or 
    array ancestor
  - Python preview yields CST type labels, line ranges, attribute summaries, and
    accepts a previously loaded tree reference; IndentedBlock wrapper nodes are
    transparent in enumeration — direct statement children appear in place of
    the block container
  - in annotated and full-text rendering modes, every node-id marker prefix is
    placed at the start of the physical source line as [<node_id>] followed by
    original line content; lines without an associated node id use blank padding
    of fixed width to preserve column alignment
  - before rendering Python source text, legacy identity comments are stripped
    from the logical source used for display (# cst-node-ids begin/end block and
    whole-line # @node-id comments); preview output shows node ids from sidecar
    metadata prefixes, not preserved inline comment markers
  source_labels:
  - '{f001}'
  - '{f002}'
  - '{i001}'
  - '{i002}'
  - '{i003}'
  - '{i004}'
  - '{i006}'
  - '{i007}'
  - '{i008}'
- concept_id: C-017
  name: PreviewSelector
  definition: The selector expression applied during preview that chooses a 
    subset of the focus node blocks.
  properties:
  - a slice string start to end (zero-based, exclusive end) caps the block count
  - a list of node ids cherry-picks specific blocks
  - per-format full_text_max_lines threshold controls inline versus drilldown
    rendering (Python, JSON, YAML, Markdown, plain text); default 200 source
    lines per format; setting zero disables full inline rendering (drilldown only)
  - inline full-text rendering (annotated mode with node-id line prefixes) is used
    when the node line span is strictly less than that format's
    full_text_max_lines; when span equals or exceeds the threshold, or threshold
    is zero, preview falls back to collapsed structural drilldown
  - thresholds are measured in source lines for every format, not bytes
  - for JSON, content is normalized to printable pretty-printed form BEFORE line
    counting and inline rendering so the line-based threshold is meaningful
  - max_chars paginates the serialized preview envelope only; it does not control
    the inline-versus-drilldown decision
  source_labels:
  - '{i005}'
- concept_id: C-018
  name: TreeQuery
  definition: Structural search over the marked tree of a file, in preview and 
    edit-session modes, returning node ids of matching nodes.
  properties:
  - operates on tree structure, not full-text or database
  - returns node ids directly usable in navigation and edit operations
  - simple mode filters by node type, name, qualified name, line range (Python 
    only)
  - unique-match enforcement demands exactly one result or returns a structured 
    error with candidates
  - source-inclusion option returns the source text of the matched node (Python 
    only)
  - in a session runs against the in-memory draft, outside against the validated
    on-disk tree
  source_labels:
  - '{j001}'
  - '{j002}'
  - '{j004}'
  - '{j005}'
  - '{j006}'
- concept_id: C-019
  name: CstQuerySelector
  definition: The XPath-compatible selector string used by the tree query in 
    XPath mode.
  properties:
  - double-slash for recursive descendant traversal across any depth
  - at-attribute access in filter predicates such as name equals foo
  - numeric operators ge, le, gt, lt on start_line, end_line, children_count
  - not pseudo-class for negation of a nested selector
  - primary format-agnostic query mode
  source_labels:
  - '{j002}'
  - '{j003}'
- concept_id: C-020
  name: GrepConsumer
  definition: The grep subsystem that binds disk-scan matches to node ids 
    through the tree lifecycle.
  properties:
  - routes all tree-validity checks through TreeLifecycle
  - rebuilds the tree on checksum mismatch before binding a match
  - a rebuild failure yields an ineligible lower-relevance match, not a 
    structural finding
  - the mtime of a search result produced by this subsystem is the mtime of the 
    source code file the matched node lives in, not the mtime of any 
    intermediate search buffer; supplied by the cross-finding normalisation 
    component via file-system stat of the source file under the project root
  source_labels:
  - '{g001}'
  - '{g004}'
- concept_id: C-021
  name: Watcher
  definition: The file watcher that ensures a valid tree and persists the source
    checksum before inserting or updating a database file row.
  properties:
  - calls the TreeLifecycle path wrapper before a file-row insert or update
  - persists the computed source checksum in the database alongside the file row
  - the schema extension is applied idempotently and requires no explicit 
    migration
  source_labels:
  - '{g002}'
- concept_id: C-022
  name: Indexer
  definition: The indexer that decides reindexing by comparing the current 
    source checksum against the stored tree checksum.
  properties:
  - replaces the mtime-based skip guard with a checksum-based guard
  - equal checksum skips reindex, differing checksum triggers reindex
  - reindexing is content-driven, not mtime-driven
  source_labels:
  - '{g003}'
- concept_id: C-023
  name: SidecarLayoutMigration
  definition: The final cutover step that redirects the remaining legacy 
    tree-path call sites (not reached by consumer integration) onto the existing
    sibling_tree_path function and removes the three legacy layouts (.cst/ 
    subdirectory, .trees/ mirror directory, .tree_sidecar adjacent file). It 
    does not create sibling_tree_path; that function already exists from the 
    storage work. Executed last, after the new system is built and verified end 
    to end.
  properties:
  - runs last; depends on the new system being built and verified
  - 'replaces three independent legacy path resolvers (not delegates of one another)
    with sibling_tree_path: sidecar_path_for_py (.cst/) in cst_tree/tree_sidecar.py,
    the standalone resolve_trees_sidecar_path module (.trees/) in core/tree_temp/sidecar_paths.py
    which is removed whole, and the inline .tree_sidecar branch of the format-dispatch
    sidecar_path_for in tree_representation.py'
  - redirects write_sidecar_atomic to write at the sibling path
  - removes the legacy pending-sidecar mechanism entirely 
    (pending_sidecar_path_for_py, resolve_sidecar_write_path, 
    promote_pending_sidecar_to_final, _cleanup_empty_pending_dir, the _pending 
    subdirectory, and the is_file branch in write_sidecar_atomic); it is 
    deleted, not migrated, because the edit-session lifecycle removes the 
    pre-session no-source state
  - redirects the reader functions in tree_representation.py to resolve the 
    sibling path
  - 'redirects the direct legacy-path consumers onto sibling_tree_path: tree_builder,
    tree_saver, stable_tree, grep_block_resolver (.cst/), and tree_temp_write_commit,
    tree_temp_open_support (.trees/), so JSON and YAML tree files become siblings
    like every other format'
  - ensures TreeRepresentationRef carries the sibling path after 
    validate_or_recreate_tree_file
  - replaces legacy path assertions in tests with sibling path assertions
  - 'hard cutover: no backward-compatibility shim'
  source_labels:
  - '{c001}'
  - '{k001}'
  - '{k002}'
  - '{k003}'
  - '{k004}'
