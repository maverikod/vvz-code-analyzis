step_id: T-001
parent_global_step: G-007
name: Session TTL policy and inactivity expiration
description: "Create the SessionTTLPolicy configuration entity and bind it to LastAccessTimestamp
  for inactivity-based session directory expiration. Define the default TTL code constant,
  require the configuration generator to emit the search response TTL setting, and
  require the configuration validator to reject missing, invalid, non-integer, zero,
  negative, and out-of-range values according to declared minimum and maximum bounds.
  Define inactivity expiration criteria: a SearchSessionDirectory becomes eligible
  for TTL-based cleanup when the elapsed time since last_access_at exceeds the configured
  TTL threshold. Require last_access_at to remain semantically separate from heartbeat_at;
  expiration decisions use last_access_at only, never heartbeat_at.\n"
concepts:
- C-006
- C-007
inputs:
- name: last_access_at values in session metadata
  type: timestamp
  description: "Per-session last access timestamps maintained in session metadata
    and refreshed on every successful page, status, or manifest read.\n"
- name: configuration generator pipeline
  type: configuration contract
  description: "Existing configuration generation flow that emits server settings
    from code defaults and declared schema.\n"
- name: configuration validator pipeline
  type: configuration contract
  description: "Existing configuration validation flow that rejects invalid server
    settings before runtime use.\n"
outputs:
- name: SessionTTLPolicy default constant
  type: configuration default
  description: "Code-level default TTL value for search response directory retention
    after last access.\n"
- name: SessionTTLPolicy generated setting
  type: configuration field
  description: "Search response TTL setting emitted by the configuration generator
    for runtime and validator consumption.\n"
- name: SessionTTLPolicy validation rules
  type: validation rule set
  description: "Rejection rules for missing, invalid, non-integer, zero, negative,
    and out-of-range TTL values according to declared bounds.\n"
- name: inactivity expiration criteria
  type: expiration rule set
  description: "Rule binding LastAccessTimestamp to SessionTTLPolicy that marks a
    session directory expired when inactive longer than the configured TTL threshold.\n"
atomic_steps:
- A-001
status: draft
