    Live running session with fresh heartbeat retained.
    should_delete_session returns True with reason dead, orphaned, or timed_out for matching verdicts.
    cleanup_interval_seconds stays within 60–300 seconds.
    register_search_session_cleanup attaches startup task without raising when app supports on_event.
