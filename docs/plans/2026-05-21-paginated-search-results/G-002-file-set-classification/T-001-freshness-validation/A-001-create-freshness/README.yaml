prompt: "Create the file `code_analysis/search_session/freshness.py`.\n\n## MRS excerpt\n\
  \nC-014 FreshnessValidation: Validation step that decides whether an indexed\nfile
  representation still matches current file content.\nProperties:\n  - Uses checksums
  and/or modification metadata.\n  - Moves stale indexed files into DynamicFileSet.\n\
  \  - Follows the same principle as tree sidecar validation.\n\n## Implementation
  requirements\n\nImports: `enum`, `hashlib`, `pathlib`, `typing`.\n\n1. Define `class
  FreshnessResult(str, enum.Enum)` with members:\n   `FRESH = \"fresh\"`, `STALE =
  \"stale\"`, `ABSENT = \"absent\"`.\n\n2. Define `def compute_file_checksum(file_path:
  pathlib.Path) -> str`:\n   - Reads the file in binary mode in 65536-byte chunks.\n\
  \   - Returns the hex digest of the SHA-256 hash of the full content.\n   - Raises
  `FileNotFoundError` if the file does not exist.\n\n3. Define `def check_freshness(\n\
  \       file_path: pathlib.Path,\n       indexed_checksum: typing.Optional[str],\n\
  \   ) -> FreshnessResult`:\n   - If `indexed_checksum` is None, returns `FreshnessResult.ABSENT`.\n\
  \   - Computes `current = compute_file_checksum(file_path)`.\n   - If `current ==
  indexed_checksum`, returns `FreshnessResult.FRESH`.\n   - Otherwise returns `FreshnessResult.STALE`.\n\
  \   - If `file_path` does not exist on disk, returns `FreshnessResult.STALE`\n \
  \    (the indexed record is stale relative to an absent file).\n\n## Constraints\n\
  - No third-party imports.\n- All public names must have docstrings.\n"
verification:
