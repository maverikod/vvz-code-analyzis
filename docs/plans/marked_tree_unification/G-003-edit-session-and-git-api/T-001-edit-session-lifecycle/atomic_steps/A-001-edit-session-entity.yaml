  ## Inlined dependency — TreeBuilder.build (C-011)

  Module: `code_analysis/core/tree_lifecycle/builder.py`

  ```python
  class TreeBuilder:
      @staticmethod
      def build(
          *,
          content: str,
          source_abs: Path,
          file_path: str,
          content_checksum: str,
          registry: Optional[HandlerRegistry] = None,
      ) -> TreeRepresentationRef:
          ...
  ```

  Algorithm (canonical unified three-section build path):
  1. `reg = registry if registry is not None else HandlerRegistry.default_registry()`.
  2. `handler = reg.resolve(source_abs)`.
  3. `marked_text = handler.mark(content)`  # TREE body only; integer short_id markers.
  4. `nodes = handler.parse_content(source_abs, content)`.
  5. Build `discovered_nodes` from nodes for NodeIdMap (C-025).
  6. `sidecar_path = handler.sidecar_path(source_abs)`  # sibling `.tree`.
  7. Load prior MAP from existing sidecar when present (preserve TreeNodeUuid entries
     and next_free per {a007}; C-024).
  8. `NodeIdMap.build(...)` then optional `validate_and_repair` when prior MAP exists.
  9. `serialize_tree_file(sections)` → atomic write to `sidecar_path` via `.tmp` + `os.replace`.
  10. Return `TreeRepresentationRef(file_path=..., sidecar_path=..., content_checksum=..., root_stable_id=str(first_short_id)|None)`.

  Return value fields: `file_path: str`, `sidecar_path: Path`, `content_checksum: str`,
  `root_stable_id: str | None` (first node short_id as string, not UUID).

  Raises: `HandlerNotFoundError`, `ValueError` (empty nodes), `OSError`, NodeIdMap errors —
  propagate unchanged.

  Usage in `_try_revalidate()` per {h009}/{n002}:
  ```python
  ref = TreeBuilder.build(
      content=source_text,
      source_abs=self.source_abs,
      file_path=self.file_path,
      content_checksum=self.source_checksum,
  )
  shutil.copy2(ref.sidecar_path, self.session_tree_path)
  ```
  TreeBuilder rebuild restores short_id markers in TREE via NodeIdMap.build (C-025)
  while preserving TreeNodeUuid (C-024) and next_free from existing MAP when sidecar
  existed.

