step_id: T-001
parent_global_step: G-001
name: MarkerContract and NodeId Definition
description: "Define the MarkerContract entity (C-001) as the three-operation interface
  mark(content), parse(marked_text), unmark(marked_text) that every FormatHandler
  must implement. Establish the round-trip invariant: unmark(mark(source)) equals
  source, verified by SHA-256 checksum. Establish the universal all-nodes short_id
  marker invariant: every addressable node in every format receives an integer
  short_id marker without exception; where the format provides a metadata field or
  equivalent structured slot the short_id lives in that metadata, otherwise the marker
  appears as a format-native comment at the END of the block (never mid-lexeme, per
  AddressableBlock granularity). Define NodeId (C-002) as the per-file monotonic integer
  short_id handle embedded in the TREE section that names exactly one AddressableBlock
  (C-005); the marker token is the in-content handle, not canonical identity. Canonical
  node identity is TreeNodeUuid (C-024): UUID4 stored only in the MAP section of the
  three-section TreeFile (C-003) — CHECKSUMS first, MAP second, TREE third — never
  embedded in marked content and never returned at the external API boundary. NodeIdMap
  (C-025) owns short_id↔UUID4 resolution within one tree file. External consumers address
  nodes by (project-relative file path, short_id integer) only ({n003}). Establish the
  minimally-addressable granularity rule for AddressableBlock (C-005): a marker must
  never split a lexeme, never be inserted inside a literal or token, and the per-format
  minimal block is defined (line for text, md block for markdown, yaml block for YAML,
  json element for JSON, py logical statement for Python). Establish that markers live
  only in TreeFiles (C-003), never in SourceFiles (C-004). An unrecognised short_id
  for that file yields an input error, never a silent ignore.\n"
concepts:
