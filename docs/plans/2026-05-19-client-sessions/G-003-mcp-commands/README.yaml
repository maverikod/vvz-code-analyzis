description: 'Expose the session lifecycle and file-lock operations as MCP commands.
  Six commands: session_create, session_delete, session_list, session_open_file, session_close_file,
  session_list_file_locks. All commands implement SessionTouchRule where required.
  SecurityPolicy is enforced at the command boundary — every command checks the policy
  before executing. SessionListVisibilityPolicy governs session_id visibility in session_list
  output and determines whether session_id is required or optional.'
