  \ and that\n    threshold is positive, returns the raw file source instead of the\n\
  \    structured overview (C-023 full-text fallback).\n\n    Args:\n        tree:\
  \ CSTTree loaded for the file.\n        budget: PreviewBudget with full_text_max_lines\
  \ cap.\n\n    Returns:\n        Structured text string suitable for AI consumption.\n\
  \    \"\"\"\n    # ... (implementation from previous step)\n\n## What to add\n\n\
  Append a new public function render_node at the end of the file.\nDo not modify\
  \ render_module or any other existing code.\n\n### render_node(tree: Any, stable_id:\
  \ str) -> str\n\nDocstring: Render a single CST node identified by its stable_id\
  \ (C-022).\nArgs: tree: CSTTree loaded for the file. stable_id: Stable UUID of the\
  \ target node.\nReturns: Structured text for the node, or empty string if not found.\n\
  \nLogic:\n\nStep 1 — Locate the node metadata by stable_id:\n  meta = next(\n  \
  \    (m for m in tree.metadata_map.values() if m.stable_id == stable_id),\n    \
  \  None\n  )\n  if meta is None:\n      return ''\n\n  node_id = next(\n      (nid\
  \ for nid, m in tree.metadata_map.items() if m.stable_id == stable_id),\n      None\n\
  \  )\n\nStep 2 — Render by kind/type:\n\n  Helper _fmt_range (same logic as in render_module\
  \ — duplicate locally or\n  extract to a private module-level helper if it was already\
  \ extracted):\n    'L{start}-{end}' if start != end and end not None, else 'L{start}'.\n\
  \n  - kind == 'function' or kind == 'method' or type in ('FunctionDef','AsyncFunctionDef'):\n\
  \      Header: '[{stable_id}] {_fmt_range(meta)}  {meta.signature or 'def ' + (meta.name\
  \ or '?') + ':'}'\n      If meta.docstring: append '    ' + first line of docstring.\n\
  \      First-level body: collect depth==(meta.depth+1) children where\n      parent_id\
  \ == node_id, sorted by start_line.\n      For each child:\n        if child.kind\
  \ in ('function','method','class') or child.type in\n        ('FunctionDef','AsyncFunctionDef','ClassDef','If','For','While',\n\
  \        'Try','With','Match'):\n          # compound stmt: show first line + stable_id\
  \ + range + '...'\n          append '    [{child.stable_id}] {_fmt_range(child)}\
  \  {child.signature or child.type}  ...'\n        else:\n          # simple stmt:\
  \ show as-is\n          append '    [{child.stable_id}] {_fmt_range(child)}  {child.signature\
  \ or child.type}'\n\n  - kind == 'class' or type == 'ClassDef':\n      Header: '[{stable_id}]\
  \ {_fmt_range(meta)}  class {meta.name or '?'}:'\n      If meta.docstring: append\
  \ '    ' + first line of docstring.\n      Methods: collect depth==(meta.depth+1)\
  \ children where parent_id==node_id\n      and kind in ('function','method'), sorted\
  \ by start_line.\n      For each method:\n          sig = method.signature or ('def\
