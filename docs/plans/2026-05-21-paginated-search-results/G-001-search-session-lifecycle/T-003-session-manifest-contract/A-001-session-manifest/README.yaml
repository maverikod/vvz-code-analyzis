  \   ```python\n   INITIAL_MANIFEST_PHASE: str = \"starting\"\n   ```\n\n3. @dataclass
  ManifestConcurrencyPolicy:\n     Document concurrency rules as frozen dataclass
  fields (all bool, all True):\n     - single_writer_under_update_lock: concurrent
  updates serialize on manifest.json.lock\n     - atomic_create_via_tmp_replace: initial
  write uses tmp + os.replace without lock\n     - readers_may_read_without_lock:
  read_manifest opens JSON directly\n   Module docstring section MANIFEST_CONCURRENCY_POLICY
