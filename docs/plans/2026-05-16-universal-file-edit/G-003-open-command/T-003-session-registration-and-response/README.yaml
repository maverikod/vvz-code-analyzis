step_id: T-003
parent_global_step: G-003
name: Register EditSession and return session_id with available operations
description: Construct an EditSession (C-001) with a new UUID session_id,
  file_path, abs_path, draft_path, format_group, handler_id, and tree_id
  (tree_id is the in-memory tree UUID for tree-temp group, None otherwise).
  Call register_session to store it in _sessions. Return session_id and the
  list of available operations for the format group. Also register the
  universal_file_open MCP command in hooks.py so the command is callable.
concepts:
- C-005
- C-001
inputs:
- name: format_group
  type: FormatGroup
  description: Resolved format group from T-001.
- name: file_path
  type: str
  description: Project-relative file path.
- name: abs_path
  type: Path
  description: Absolute path to the file.
- name: draft_path
  type: Path
  description: Absolute path to the draft file.
- name: handler_id
  type: str
  description: Handler identifier from registry (python, json, yaml, text).
- name: tree_id
  type: str or None
  description: In-memory tree UUID for tree-temp group; None for others.
outputs:
- name: session_id
  type: str
  description: UUID identifying the new EditSession.
- name: available_operations
  type: list of str
  description: Operations available for the format group (insert, delete, replace).
atomic_steps: []
status: draft