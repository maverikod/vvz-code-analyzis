    - `resolve_github_auth(config_data: Optional[Dict[str, Any]] = None) -> Tuple[Optional[Dict[str, str]], Optional[str]]` returns (headers, None) on success where headers = {"Authorization": "Bearer <token>", "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28"}, or (None, "GITHUB_NOT_CONFIGURED") when unconfigured.
    - `classify_github_auth_error(status_code: int) -> Optional[str]` returns "GITHUB_AUTH_FAILED" for 401, "GITHUB_INSUFFICIENT_SCOPE" for 403, None otherwise.
  - The file `code_analysis/commands/github_http.py` already exists (prior step); do not create/modify it, only import as shown. It exposes `github_api_request(method, path, headers, *, query=None, json_body=None, timeout_seconds=30) -> Tuple[Optional[Any], Optional[int], Optional[str]]` and `github_timeout_seconds_from_config(config_data: Dict[str, Any]) -> int`.
