  ## open() — FINAL-2 {d002}

  Signature:
  ```python
  @classmethod
  def open(
      cls,
      *,
      source_abs: Path,
      project_root: Path,
      file_path: str,
      content: Optional[str] = None,
  ) -> EditSession:
  ```

  Algorithm:
  1. If `content is not None` and `source_abs.is_file()`:
     - Call `validate_or_recreate_tree_file(project_root=..., file_path=...)`.
     - If returned `TreeValidityState` indicates a valid tree for existing file,
       raise `EditSessionError(CONTENT_NOT_ALLOWED_FOR_VALID_FILE,
       "content parameter not allowed when source and tree are valid")`.
  2. `session_id = str(uuid.uuid4())`; `session_dir = source_abs.parent / f"{source_abs.name}-{session_id}"`;
     `mkdir(exist_ok=False)`.
  3. `session_source_path = session_dir / source_abs.name`.
  4. If `content is not None`: write `content` to `session_source_path` (UTF-8) FIRST.
     Else if `source_abs.is_file()`: `shutil.copy2(source_abs, session_source_path)`.
     Else: raise `EditSessionError("SOURCE_MISSING")` when neither content nor source exists.
  5. Read `session_source_path.read_text(encoding="utf-8")` → `source_text`;
     `source_checksum = compute_content_checksum(source_text)`.
  6. Tree path: `ref, validity_state = validate_or_recreate_tree_file(...)`.
     `tree_abs = ref.sidecar_path`. Copy tree into session when sidecar exists:
     `session_tree_path = session_dir / tree_abs.name`; if `tree_abs.is_file()`:
     `shutil.copy2(tree_abs, session_tree_path)`.
  7. Classify `tree_validity`:
     - Try `HandlerRegistry.default_registry().resolve(source_abs).parse_content(file_path, source_text)`.
     - On parse failure → `SessionTreeValidity.INVALID`.
     - On success: if session tree exists and `is_tree_valid(source_checksum, ref.content_checksum)`
       → VALID else INVALID.
  8. `session_repo_path = session_dir` (SessionRepo.init is wired in a later modify step).
  9. Return `cls(..., is_open=True, tree_validity=..., source_checksum=..., tree_checksum=...)`.

  Do NOT register in `_active_sessions` here; a later modify step on this file adds the registry.

  ## apply_valid_tree_mutation(mutation_fn)

  ```python
  def apply_valid_tree_mutation(
      self,
      mutation_fn: Callable[[str], str],
  ) -> None:
  ```

  Requires `tree_validity == VALID` and `is_open`; else `RuntimeError`.
  1. Read full three-section tree: `marked = session_tree_path.read_text(encoding="utf-8")`.
  2. `denuded, state = denude_marked_tree(source_abs=self.source_abs, marked_tree=marked)`
     — denuded is TREE-body plain text; state holds CHECKSUMS + MAP unchanged (C-024:
     TreeNodeUuid entries in MAP are not altered by hide/unhide).
  3. `denuded_after = mutation_fn(denuded)`.
  4. `restored = restore_marked_tree(source_abs=self.source_abs, denuded_after_mutation=denuded_after, state=state)`.
  5. Write full three-section `restored` to `session_tree_path`.
  6. Call `_post_mutation_full()`.

  ## apply_plaintext_mutation(new_source_text)

  Requires `tree_validity == INVALID`. Writes `new_source_text` to `session_source_path`;
  updates `source_checksum`; calls `_post_mutation_degraded()`; then `_try_revalidate()`.

  ## _post_mutation_full() — {d003} valid

