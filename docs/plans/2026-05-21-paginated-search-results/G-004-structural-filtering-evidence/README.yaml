step_id: G-004
name: Structural filtering and evidence
description: "Defines XPath-like structural filtering over the validated tree representation
  and the rules that make a result count as structural evidence. The filter is a single
  universal engine applied uniformly across indexed, in-memory, dynamic, and draft
  sources, sharing structure model, node identifiers, and selector semantics with
  the indexer, and excludes vectorization from the tree path. fs_grep exposes a classic
  line mode and a preview-compatible structural mode; only validated, preview-compatible
  structural results count as cross-search evidence. This step defines filtering and
  evidence qualification only; it does not define the tree representation itself,
  result paging, or status reporting.\n"
