prompt: "Create a new Python file.\n\nTarget file (create_file — file does not exist):\n\
  \  code_analysis/commands/universal_file_preview/response.py\n\nFile-level docstring\
  \ (required):\n  \"\"\"\n  Response envelope assembly for universal_file_preview.\n\
  \n  Builds the uniform top-level ResponseEnvelope (C-012) returned by\n  UniversalFilePreviewCommand\
  \ on every successful request.\n\n  Author: Vasiliy Zdanovskiy\n  email: vasilyvz@gmail.com\n\
  \  \"\"\"\n\nImports:\n  from __future__ import annotations\n  from typing import\
  \ Any\n  from .models import Node, Block, NavigationResult\n\nFunction: build_envelope(\n\
  \    navigation_result: NavigationResult,\n    raw_selector: str | list | None,\n\
  \    session_origin: str | None,\n  ) -> dict[str, Any]\nDocstring:\n  \"\"\"\n\
  \  Build the ResponseEnvelope from a NavigationResult.\n\n  The envelope shape is\
  \ constant regardless of NodeKind and selector form.\n  Fields:\n    focus: {node_kind,\
  \ node_ref, type, name, attributes}\n    selector_applied: normalised selector or\
  \ null\n    total_blocks: int (count of all blocks in focus block set)\n    blocks:\
  \ list of rendered block dicts\n    tree_id: str or absent (only when session_origin\
  \ == 'command_created')\n\n  Args:\n      navigation_result: Output of the navigation\
  \ procedure.\n      raw_selector: Original selector value from the caller (for echo-back).\n\
  \      session_origin: 'caller_owned', 'command_created', or None.\n\n  Returns:\n\
  \      Dict conforming to ResponseEnvelope (C-012).\n  \"\"\"\nBody:\n  1. Build\
  \ focus dict from navigation_result.focus_node:\n     {\"node_kind\": focus.node_kind.value,\n\
  \      \"node_ref\": focus.node_ref,\n      \"type\": focus.type_label or None,\n\
  \      \"name\": focus.name or None,\n      \"attributes\": focus.attributes or\
  \ {}}\n  2. Normalise selector (convert raw_selector to str or list form for echo,\n\
  \     set to None if raw_selector is None).\n  3. Build blocks list: for each Block\
  \ in navigation_result.selected_blocks,\n     append {\"node_kind\": b.node_kind.value,\
  \ \"node_ref\": b.node_ref,\n             \"summary\": b.summary}.\n  4. Assemble\
  \ envelope dict; add tree_id only when session_origin == 'command_created'\n   \
  \  and navigation_result.tree_id is not None.\n  5. Return envelope dict.\n"
