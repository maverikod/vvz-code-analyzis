  \ with open_root and resolve_node_ref\n  implementing T-703 (JSON-pointer-style\
  \ fallback). T-702 requires\n  detecting and using project YAML tree infrastructure\
  \ when present.\n\nChange to make:\n  Add a private method _try_infra_resolve to\
  \ YamlFileHandler that\n  attempts T-702 resolution (project YAML tree infra) and\
  \ falls back\n  to T-703 (JSON-pointer path) when the infrastructure is absent.\n\
  \  Then update resolve_node_ref to call _try_infra_resolve first.\n\n  Insert after\
  \ the class docstring and before open_root:\n\n    def _try_infra_resolve(\n   \
  \     self,\n        node_ref: str,\n        session: Any | None,\n    ) -> Node\
  \ | PreviewError | None:\n        \"\"\"\n        Attempt resolution via project\
  \ YAML tree infrastructure (T-702).\n\n        Returns a Node or PreviewError when\
  \ the infrastructure is present\n        and handles this identifier. Returns None\
  \ when the infrastructure\n        is absent, signalling the caller to use the JSON-pointer\
  \ fallback.\n\n        Args:\n            node_ref: StableIdentifier in infrastructure-native\
  \ format.\n            session: TreeSession with YAML infrastructure active, or\
  \ None.\n\n        Returns:\n            Node, PreviewError, or None (infra absent).\n\
  \        \"\"\"\n        # Infrastructure detection: attempt import of project YAML\
  \ tree module.\n        try:\n            from code_analysis.core.yaml_tree import\
  \ resolve_yaml_node  # noqa\n            if session is None:\n                return\
