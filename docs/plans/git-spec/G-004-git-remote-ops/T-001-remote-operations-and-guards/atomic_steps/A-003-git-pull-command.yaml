  Module docstring (first content in the file):
  ```python
  """git_pull MCP command (C-014, C-015): integrate a remote branch into the current branch.

  Defaults to a fast-forward-only merge (git pull --ff-only). When rebase is
  requested, uses git pull --rebase instead and never combines it with
  --ff-only. A pull that cannot complete cleanly aborts back to a clean
  working tree and reports GIT_CONFLICT rather than leaving a partial
  merge or rebase in progress. Requires remote operations to be enabled in
  configuration (code_analysis.git.remote_enabled); when absent, fails fast
  with GIT_REMOTE_NOT_CONFIGURED.

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """
  ```

