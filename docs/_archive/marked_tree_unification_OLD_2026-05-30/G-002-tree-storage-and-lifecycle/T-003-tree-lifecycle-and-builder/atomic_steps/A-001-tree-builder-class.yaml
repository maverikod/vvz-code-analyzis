  ## Purpose

  Define the TreeBuilder entity (C-011) as the **canonical unified-pipeline writer**
  of TreeFiles (C-003). TreeBuilder.build resolves FormatHandler via
  `HandlerRegistry.default_registry().resolve(source_abs)`, calls
  `handler.mark(content)` to produce natively-marked TreeFile text, and writes
  that text atomically to `handler.sidecar_path(source_abs)`.

  **Decision A1 (locked):** This is the canonical G-002 build path. TreeBuilder
  must **NOT** call `recreate_tree_from_content`, `TreeFormatKind`, or
  `classify_tree_format`. Those legacy symbols in `checksum.py` remain untouched
  as a parity oracle (strategy: new alongside old).

  ## Cross-TS prerequisites (must be applied before this step)

  1. G-001 T-003 A-003 — `default_registry()` in `code_analysis/tree/handler_registry.py`
  2. G-001 T-002 A-001 through A-007 — all FormatHandler implementations including
     PythonHandler (real cst_tree wrapper, not NotImplementedError stub)
  3. G-002 T-001 A-001 — `sibling_tree_path` in `code_analysis/tree/sibling_convention.py`
     (handlers' sidecar_path must agree with sibling convention)

  ## MRS excerpt

  C-011 TreeBuilder:
    - dispatches via HandlerRegistry.resolve → FormatHandler.mark
    - single place that writes unified-pipeline tree files
    - writes sibling TreeFile at FormatHandler.sidecar_path; records content_checksum
      in returned reference

  C-008 HandlerRegistry: keyed by extension; sole resolution path.

  C-007 FormatHandler contract (from `code_analysis/tree/format_handler.py`):

  ```python
  class FormatHandler(ABC):
      def parse_content(self, file_path: Path, content: str) -> List[TreeNode]: ...
      def mark(self, content: str) -> str: ...
      def unmark(self, marked_text: str) -> str: ...
      def sidecar_path(self, source_abs: Path) -> Path: ...
      def node_id_for(self, raw: str) -> NodeId: ...
  ```

  C-003 TreeFile: sibling `<stem>.<ext>.tree`; natively-marked content (not JSON sidecar).

  ## FormatHandler signatures (exact — embed for a4 self-sufficiency)

  | Method | Signature | Input state | Output |
  |--------|-----------|-------------|--------|
  | parse_content | `(file_path: Path, content: str) -> List[TreeNode]` | **unmarked** source | ordered node list |
  | mark | `(content: str) -> str` | unmarked source | marked TreeFile body |
  | unmark | `(marked_text: str) -> str` | marked TreeFile body | unmarked source bytes |
  | sidecar_path | `(source_abs: Path) -> Path` | absolute source path | sibling `.tree` path |

  Registry bootstrap (G-001 A-003):

  ```python
  def default_registry() -> HandlerRegistry:
      registry = HandlerRegistry()
      registry.register(".txt", TextHandler())
      registry.register(".rst", TextHandler())
      registry.register(".md", MarkdownHandler())
      registry.register(".yaml", YamlHandler())
      registry.register(".yml", YamlHandler())
      registry.register(".json", JsonHandler())
      registry.register(".py", PythonHandler())
      return registry
  ```

  ## PythonHandler adapter nuance (G-001 A-007 — consumed, not implemented here)

  - `parse_content`: thin wrapper over `create_tree_from_code` from
    `code_analysis/core/cst_tree/tree_builder.py`
  - Maps `CSTTree.metadata_map` (keyed by internal `node_id`) → `List[TreeNode]`
  - **Identity mapping:** `TreeNode.node_id` = `TreeNodeMetadata.stable_id` (UUID);
    internal CST `node_id` is NOT exposed on TreeNode
  - **Granularity filter:** emit TreeNode only for addressable blocks per C-005 /
    HRS {b005}: FunctionDef, AsyncFunctionDef, ClassDef, decorated statements
    (metadata-dict path), SimpleStatementLine/Expr/AnnAssign/Assign/AugAssign
    (trailing-comment path); exclude shebang lines; one block = one logical CST
    statement/expression
  - **Covered node types (from cst_tree):** FunctionDef, AsyncFunctionDef, ClassDef,
    SimpleStatementLine, Expr, AnnAssign, Assign, AugAssign, Decorator
  - **Unverified / indexed but marker path TBD in parity tests:** Import, If, For,
    While, Try, With (indexed in metadata_map but compound-block marker semantics
    not parity-guaranteed until fixtures pass)
  - `mark`/`unmark`: implement HRS {b005} hybrid contract — metadata key `___id___`
    in CST metadata dict OR trailing `# ___id___:<uuid>`; markers written only into
    `.py.tree` sidecar; SourceFile `.py` stays clean
  - **Forbidden:** `.cst/<stem>.tree` JSON sidecar path from legacy cst_tree;
    do NOT call `persist_sidecar=True` on create_tree_from_code in unified path

  ## Marker contract {b005} (Python — reference for TreeBuilder consumers)

  - Named constructs with metadata dict: write `___id___` key with UUID
  - Other statements: append `# ___id___:<uuid>` on last physical line of block
  - Shebang: not addressable, no marker
  - Multiline docstring: marker on closing `"""` line after quotes

