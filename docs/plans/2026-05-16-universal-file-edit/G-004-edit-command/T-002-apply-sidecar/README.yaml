step_id: T-002
parent_global_step: G-004
name: Apply EditOperations to sidecar group draft
description: Apply a validated batch of EditOperations (C-007) to a sidecar
  group session. For each operation in received order: translate the operation
  into the CST op format and call run_ops_mode from python_handler.py
  (ExistingInfrastructure C-012); after each successful operation call
  write_sidecar_atomic(tree, file_path) from tree_sidecar.py to persist the
  updated DraftFile (C-003). The original file is not touched at any point.
  Return the updated top-level node list from the tree.
concepts:
- C-006
- C-007
- C-012
inputs:
- name: session
  type: EditSession
  description: Active sidecar group session with loaded CSTTree.
- name: validated_batch
  type: list of EditOperation
  description: Batch confirmed valid by BatchValidation.
outputs:
- name: updated_node_list
  type: list of node descriptors
  description: Top-level CST nodes after all operations applied.
atomic_steps: []
status: draft