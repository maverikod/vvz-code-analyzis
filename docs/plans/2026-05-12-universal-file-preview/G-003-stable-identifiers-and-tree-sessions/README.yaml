step_id: G-003
name: Stable identifiers and tree sessions
description: 'The command reuses identifiers produced by the project''s existing tree
  infrastructure rather than inventing its own scheme. The identifier format is per-FileHandler
  and opaque to the dispatcher. NodeReference is the optional caller-supplied parameter
  that focuses the preview on a specific Node by its StableIdentifier; when omitted,
  the focus is the file root. TreeSession is the in-memory parsed tree the command
  may read from when the caller provides a tree_id, or open transiently when the caller
  does not; the command never closes or invalidates a session it did not create.

  '
