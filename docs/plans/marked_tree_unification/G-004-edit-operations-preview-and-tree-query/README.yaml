step_id: G-004
name: Edit Operations, Preview, and Tree Query
description: Defines the six uniform EditOperations (insert, delete, replace, move,
  edit-attributes, edit-content) addressed by short_id integer at the API boundary,
  available for all formats. C-007 implements the six edit operations. Preview and
  query resolve short_id to TreeNodeUuid via NodeIdMap internally; UUID4 never appears
  at the API boundary ({n003}). Defines PreviewNavigation as the three-phase procedure
  (enumerate focus node children, apply PreviewSelector, render selected blocks) —
  identical for all formats and both in-session and out-of-session access, using
  short_id as the node reference, never line numbers. When session_id is supplied,
  navigation operates on the in-session tree or draft held by EditSession rather
  than only last committed on-disk artefacts. Python preview treats IndentedBlock
  as transparent in enumeration; annotated and full-text modes place short_id
  prefixes at the start of each physical line ({i007}); legacy Python identity
  comments are stripped before render ({i008}). Defines PreviewSelector with
  per-format full_text_max_lines thresholds (default 200 source lines, zero
  disables inline rendering), inline-versus-drilldown based on node line span
  versus format threshold measured in source lines not bytes, JSON pretty-print
  normalization before line counting, and max_chars paginating the envelope only.
  Defines TreeQuery as structural search over the marked tree of a file returning
  short_ids of matching nodes, supporting simple attribute-filter mode and XPath
  mode via CstQuerySelector; covers require_one uniqueness enforcement, include_code
  result enrichment, and in-session query against the draft tree. Establishes that
  the preview command builds a valid marked tree via TreeLifecycle before returning
  navigation results if the tree is absent or invalid.
