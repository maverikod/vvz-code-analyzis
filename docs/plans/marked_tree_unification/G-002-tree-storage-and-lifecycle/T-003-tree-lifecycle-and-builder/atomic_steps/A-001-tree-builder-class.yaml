  ## Locked model (mandatory)
  - Canonical build: HandlerRegistry.default_registry().resolve → FormatHandler.mark →
    NodeIdMap.build → serialize three-section TreeFile (CHECKSUMS → MAP → TREE).
  - CHECKSUMS records `source_sha256` = content_checksum.
  - MAP via NodeIdMap.build with UUID4 (C-024) entries and next_free ({a007}).
  - TREE = marked text only; integer short_id markers; NO UUID in TREE section.
  - On rebuild when prior `.tree` exists: copy next_free from prior MAP; preserve UUIDs
    by content_fingerprint; then validate_and_repair.
  - Do NOT call recreate_tree_from_content or TreeFormatKind.
  - FormatHandler.sidecar_path must return sibling `.tree` path.

