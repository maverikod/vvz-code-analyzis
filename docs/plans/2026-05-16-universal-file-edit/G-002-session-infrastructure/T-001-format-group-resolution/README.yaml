step_id: T-001
parent_global_step: G-002
name: Define FormatGroup resolution
description: Create the FormatGroup (C-002) resolution entity. Given a file path,
  it determines the format group (sidecar, tree-temp, or text), the draft file path,
  and the set of operations available for that group. The resolution is based on the
  file extension and uses the existing handler registry. The entity exposes a resolve
  operation that returns a structured descriptor consumed by all four commands.
concepts:
- C-002
- C-003
- C-012
inputs:
- name: file_path
  type: project-relative path string
  description: Path to the file being opened for editing.
outputs:
- name: format_descriptor
  type: FormatGroup descriptor
  description: Descriptor containing format_group, handler_id, draft_path, and available_operations
    for the given file.
atomic_steps: []
status: draft
