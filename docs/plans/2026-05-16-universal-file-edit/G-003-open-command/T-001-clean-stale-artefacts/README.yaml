step_id: T-001
parent_global_step: G-003
name: Clean stale artefacts on open
description: 'On entry to OpenCommand (C-005), remove stale artefacts left by any
  previous session: delete the WriteLockfile (C-004) if present, and delete the DraftFile
  (C-003) if present. For the sidecar format group the sidecar file is not deleted
  — it persists between sessions to preserve stable identifiers.'
concepts:
- C-003
- C-004
- C-005
inputs:
- name: file_path
  type: project-relative path string
  description: Path to the file being opened.
- name: format_group
  type: FormatGroup descriptor
  description: Resolved format group for the file.
outputs:
- name: clean_state
  type: boolean
  description: True when stale artefacts have been removed and the file is ready for
    draft creation.
atomic_steps: []
status: draft
