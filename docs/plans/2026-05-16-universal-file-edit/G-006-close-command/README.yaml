description: 'Implement the universal_file_close MCP command. Behaviour by format
  group: sidecar - verify_sidecar_against_source; mismatch rebuilds sidecar without
  backup; sidecar not deleted. tree-temp - sha256 compare draft vs original; mismatch
  rebuilds draft; draft deleted on match; remove_tree frees in-memory tree. text -
  delete draft unconditionally. Lockfile deleted in all cases. Session released. Returns
  draft_rebuilt flag when rebuild occurred.'
