step_id: T-001
parent_global_step: G-006
name: Close sidecar group session
description: Implement CloseCommand (C-010) for sidecar group sessions. Call
  verify_sidecar_against_source(file_path) from ExistingInfrastructure (C-012).
  If checksums match: leave <file>.cst_sidecar as-is; delete <file>.write if
  present. If checksums do not match: rebuild sidecar by calling cst_load_file
  then write_sidecar_atomic; no backup; delete <file>.write; set
  draft_rebuilt=True in response. The DraftFile (C-003) sidecar is never
  deleted. Call release_session(session_id) to remove the EditSession (C-001)
  from the registry.
concepts:
- C-010
- C-001
- C-012
inputs:
- name: session
  type: EditSession
  description: Active sidecar group session to close.
outputs:
- name: draft_rebuilt
  type: bool
  description: True when sidecar was rebuilt from source; False when in sync.
atomic_steps: []
status: draft