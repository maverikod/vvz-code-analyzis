prompt: "Create `code_analysis/compat/compat_contract.py`.\n\n## MRS excerpt\n\nC-023
  BackwardCompatibleCommandContract: the public contract stating that\ncurrent behavior
  remains the default for all existing callers.\nC-021 ExistingSearchCommand: existing
  command whose contract is formalized.\n\nThe contract binds ExistingCommandBehaviorBaseline
  so that later optional\npagination fields cannot silently redefine defaults. It
  maps each contract\ndimension to an allowed change type: documentation-only, optional
  extension,\nor forbidden breaking change.\n\n## Implementation requirements\n\n\
  1. Import `dataclasses`, `enum`.\n\n2. Define `ChangeType(str, enum.Enum)` with
  members:\n   DOCUMENTATION_ONLY = \"documentation_only\",\n   OPTIONAL_EXTENSION
  = \"optional_extension\",\n   FORBIDDEN_BREAKING = \"forbidden_breaking\".\n\n3.
  Define `@dataclasses.dataclass(frozen=True)` class `PreservationRule`:\n   - Fields:
  `dimension: str`, `allowed_change: ChangeType`.\n\n4. Define module-level constant:\n\
  \   ```python\n   DEFAULT_PRESERVATION_MATRIX: tuple[PreservationRule, ...]\n  \
  \ ```\n   with rules for dimensions: validation, schema, queue, timeout, payload,\n\
  \   structural_results, preview_refs — all mapped to FORBIDDEN_BREAKING.\n\n5. Define
  `@dataclasses.dataclass(frozen=True)` class `BackwardCompatibleCommandContract`:\n\
  \   - Fields: `command_name: str`,\n     `preservation_matrix: tuple[PreservationRule,
  ...] = DEFAULT_PRESERVATION_MATRIX`.\n   - Method `forbidden_dimensions(self) ->
  list[str]`:\n     returns dimension names where allowed_change is FORBIDDEN_BREAKING.\n\
  \n## Constraints\n- Standard library only.\n- All public names have one-line docstrings.\n\
  - File under 60 lines.\n"
