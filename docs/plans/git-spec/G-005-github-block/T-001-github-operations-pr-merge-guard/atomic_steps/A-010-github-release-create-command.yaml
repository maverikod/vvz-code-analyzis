  class GithubReleaseCreateCommand(BaseMCPCommand):
      """Create a release in a repository."""

      name = "github_release_create"
      version = "1.0.0"
      descr = "Create a release in owner/repo via the GitHub REST API."
      category = "github"
      author = "Vasiliy Zdanovskiy"
      email = "vasilyvz@gmail.com"
      use_queue = False

      @classmethod
      def get_schema(cls) -> Dict[str, Any]:
          """Return the command input schema."""
          return {
              "type": "object",
              "properties": {
                  "owner": {"type": "string", "description": "Repository owner login."},
                  "repo": {"type": "string", "description": "Repository name."},
                  "tag_name": {"type": "string", "description": "Git tag the release is created from or creates."},
                  "name": {"type": "string", "description": "Release title."},
                  "body": {"type": "string", "description": "Release notes body."},
                  "draft": {"type": "boolean", "default": False, "description": "Create as an unpublished draft release."},
                  "prerelease": {"type": "boolean", "default": False, "description": "Mark the release as a prerelease."},
              },
              "required": ["owner", "repo", "tag_name"],
              "additionalProperties": False,
          }

      async def execute(
          self,
          owner: str,
          repo: str,
          tag_name: str,
          name: Optional[str] = None,
          body: Optional[str] = None,
          draft: bool = False,
          prerelease: bool = False,
          **kwargs: Any,
      ) -> SuccessResult | ErrorResult:
          """Create a release from tag_name."""
          config_data = BaseMCPCommand._get_raw_config()
          headers, auth_error = resolve_github_auth(config_data)
          if auth_error is not None:
              return ErrorResult(
                  message="GitHub authentication is not configured",
                  code=auth_error,
                  details={"owner": owner, "repo": repo},
              )
          assert headers is not None
          request_body: Dict[str, Any] = {
              "tag_name": tag_name,
              "draft": bool(draft),
              "prerelease": bool(prerelease),
