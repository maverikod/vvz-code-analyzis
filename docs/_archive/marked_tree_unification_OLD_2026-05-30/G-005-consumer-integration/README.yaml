description: 'Integrates TreeLifecycle into the three existing consumers. GrepConsumer
  routes all tree-validity checks through TreeLifecycle; on checksum mismatch it rebuilds
  the TreeFile before binding a disk-scan match to a NodeId; a rebuild failure yields
  an ineligible Finding rather than a structural error. Watcher calls the TreeLifecycle
  path wrapper before inserting or updating a file record, and persists the computed
  source checksum in the database alongside the file row via an idempotent schema
  extension that requires no migration. Indexer replaces its modification-time-based
  skip guard with a checksum-based guard: if the current source checksum matches the
  stored value the file is not reindexed; if they differ, reindexing proceeds. Finding
  carries the modification time of the source code file the matched node lives in,
  not the modification time of any intermediate search buffer.'
