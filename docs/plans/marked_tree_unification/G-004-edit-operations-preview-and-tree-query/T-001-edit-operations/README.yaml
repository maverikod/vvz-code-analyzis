inputs:
- name: short_id API contract
  type: domain constraint (C-002, {n003})
  description: Integer short_id token from the tree file MAP/TREE context; sole
    external handle for edit targets in valid-tree mode.
- name: NodeIdMap entity definition
  type: domain entity definition (C-025)
  description: Resolves short_id to internal UUID and enforces next_free allocation
    per {a007}; no map mutation outside its three operations.
- name: EditSession entity definition
  type: domain entity definition (C-012)
  description: Owning context; edit operations execute inside an active EditSession
    and each produces one SessionRepo commit.
outputs:
- name: EditOperation entity definition
  type: domain entity definition
  description: Uniform six operations (insert, delete, replace, move, edit-attributes,
    edit-content) addressed by short_id integer at the API boundary; available for
    all formats; no line-number or byte-offset addressing in valid-tree mode.
- name: Per-operation invariants
  type: domain constraint definition
  description: insert assigns fresh short_id per {a007}; delete retires short_id
    without reuse; replace and move preserve short_id; edit-content rejects non-leaf
    targets.
- name: Tree-validity edit gate
  type: domain constraint definition
  description: VALID — short_id six-operation mode with full per-mutation invariant
    per {h008}. INVALID — plain-text-only edits per {h008}; re-validation per {h009}
    restores short_id mode via tree rebuild and NodeIdMap build while preserving MAP
    UUID entries and next_free.
