step_id: T-003
parent_global_step: G-004
name: Incremental Compatibility Layer
description: "Creates the IncrementalCompatibilityLayer (C-022) as the routing mechanism
  that adds paginated session-backed behavior around ExistingSearchCommand (C-021)
  implementations without replacing them. When a caller includes the paginated field
  or equivalent opt-in signal in the request, the layer routes execution through a
  SearchSession (C-001) and returns a search_id together with the first page. When
  the opt-in signal is absent, the layer passes the request through to the existing
  command implementation unchanged. The layer must preserve existing validation, schemas,
  queue behavior, timeouts, direct payloads, structural results, and preview references
  from the existing implementation. It must not duplicate working search logic.\n"
concepts:
- C-022
inputs:
- name: search_request
  type: command request with OptionalPaginationParameters (C-024)
  description: Incoming search request that may or may not include the paginated
    opt-in field.
- name: existing_command_handler
  type: ExistingSearchCommand (C-021) handler reference
  description: The currently implemented search command handler to which 
    non-paginated requests are passed through unchanged.
outputs:
- name: paginated_response
  type: first SearchPageFile (C-004) contents plus search_id
  description: When paginated mode is active, the first page of results and the 
    search_id for subsequent page requests.
- name: direct_response
  type: existing command response
  description: When paginated mode is not active, the unmodified response from 
    the existing command handler.
atomic_steps:
- A-001
status: draft
