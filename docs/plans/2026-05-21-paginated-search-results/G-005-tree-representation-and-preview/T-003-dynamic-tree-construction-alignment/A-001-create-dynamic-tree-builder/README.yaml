prompt: "Create `code_analysis/tree_representation/dynamic_tree_builder.py`.\n\n##
  MRS excerpt\n\nC-013 DynamicFileSet uses TreeRepresentation (C-015) during direct
  dynamic\nprocessing.\nBinding rules:\n- Dynamic file processing must build or refresh
  trees through the same\n  tree construction path used by the indexer.\n- Structure
  model, node identifiers, and selector semantics must remain\n  consistent regardless
  of whether the tree source is indexer memory,\n  persisted index data, or a dynamically
  created artifact.\n- Vectorization is excluded from tree creation prerequisites:
  it is a\n  separate downstream phase and must not be required to produce\n  TreeRepresentation,
  apply structural filtering, run dynamic search,\n  or generate preview material.\n\
  \n## Implementation requirements\n\n1. Import `dataclasses`, `pathlib`, `typing`.\n\
  \n2. Define `@dataclasses.dataclass` class `DynamicTreeBuilder`:\n   - Field `construction_path:
  str` — label identifying the construction\n     pathway (e.g. \"indexer_aligned\"\
  ). Must not be \"vectorization\".\n   - Field `_format_builders: dict[str, typing.Callable[[pathlib.Path],
  typing.Any]]`\n     initialized as an empty dict in `__post_init__`.\n   - Method
  `register_format(\n         self,\n         format_key: str,\n         builder:
  typing.Callable[[pathlib.Path], typing.Any],\n     ) -> None`:\n     Raises `ValueError`
  if `format_key == \"vectorization\"` with message\n     \"vectorization must not
  be a tree construction path\". Otherwise\n     stores the builder under `format_key`.\n\
  \   - Method `build(\n         self,\n         file_path: pathlib.Path,\n      \
  \   format_key: str,\n     ) -> typing.Any`:\n     Looks up the builder for `format_key`;
  raises `KeyError` if not\n     registered. Calls `builder(file_path)` and returns
  the result.\n\n3. Define module-level factory:\n   ```python\n   def make_dynamic_tree_builder()
  -> DynamicTreeBuilder:\n   ```\n   Returns `DynamicTreeBuilder(construction_path=\"\
  indexer_aligned\")`.\n\n## Constraints\n- Standard library only.\n- All public names
  have one-line docstrings.\n- File under 70 lines.\n"
