  \ first = children[0].attributes.get('value', '') if children else ''\n      return\
  \ {'line_count': len(children), 'first_line': first[:vpl]}\n\nPrivate function:\
  \ _render_sequence(node: Node, vpl: int) -> dict[str, Any]\nDocstring: \"Rule 3:\
  \ element count and coarse element-kind summary.\"\nBody: children = node.children\n\
  \      kinds = sorted({c.node_kind.value for c in children})\n      return {'element_count':\
  \ len(children), 'element_kinds': kinds}\n\nPrivate function: _render_mapping(node:\
