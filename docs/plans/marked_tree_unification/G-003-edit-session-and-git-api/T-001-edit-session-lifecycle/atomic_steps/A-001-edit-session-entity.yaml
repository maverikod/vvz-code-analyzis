  ## preview_external_write() — stage 1 {d004}

  Signature:
  ```python
  def preview_external_write(self) -> dict[str, Any]:
  ```

  Docstring one-liner: "Compute unified diffs of in-session artefacts vs live external files; no external writes."

  Return shape (exact keys):
  `{"has_changes": bool, "source_diff": str, "tree_diff": str}`

  Algorithm:
  1. If not `self.is_open`: raise `RuntimeError("EditSession is not open; cannot preview external write.")`.
  2. Read in-session source:
     `in_source = self.session_source_path.read_text(encoding="utf-8")` if
     `self.session_source_path.is_file()` else `""`.
     (Already unmark-exported per {d003} post-mutation; do NOT call unmark here.)
  3. Read in-session tree:
     `in_tree = self.session_tree_path.read_text(encoding="utf-8")` if
     `self.session_tree_path.is_file()` else `""`.
  4. Read external source:
     `ext_source = self.source_abs.read_text(encoding="utf-8")` if
     `self.source_abs.is_file()` else `""`.
  5. Read external tree:
     `ext_tree = self.tree_abs.read_text(encoding="utf-8")` if
     `self.tree_abs.is_file()` else `""`.
  6. Build `source_diff`:
     `"".join(difflib.unified_diff(
         in_source.splitlines(keepends=True),
         ext_source.splitlines(keepends=True),
         fromfile="in-session-source",
         tofile="external-source",
     ))`
  7. Build `tree_diff`:
     `"".join(difflib.unified_diff(
         in_tree.splitlines(keepends=True),
         ext_tree.splitlines(keepends=True),
         fromfile="in-session-tree",
         tofile="external-tree",
     ))`
  8. `has_changes = bool(source_diff.strip() or tree_diff.strip())`.
  9. Return `{"has_changes": has_changes, "source_diff": source_diff, "tree_diff": tree_diff}`.

  Error handling:
  - `RuntimeError` when session not open (see step 1).
  - Do NOT catch `OSError` from reads; let propagate (session corruption is fatal).

  Edge cases:
  - Missing external files → treated as empty string; diff shows full in-session content.
  - Identical in-session and external content → empty diffs, `has_changes=False` (no-op externally).
  - INVALID tree_validity: still diff both pairs; in-session tree may be stale from open.

  ## confirm_external_copy_out() — stage 2 {n7k2}

  Signature:
  ```python
  def confirm_external_copy_out(self) -> None:
  ```

  Docstring one-liner: "Atomically copy in-session artefacts to external co-located paths; both or neither when valid."

  Algorithm:
  1. If not `self.is_open`: raise `RuntimeError("EditSession is not open; cannot confirm external copy-out.")`.
  2. `preview = self.preview_external_write()`.
  3. If `not preview["has_changes"]`: return immediately (no-op per {d004}; no external writes).
  4. Branch on `self.tree_validity`:

  ### Branch VALID — dual atomic copy (both or neither)

  5a. `tmp_tree = self.tree_abs.with_suffix(self.tree_abs.suffix + ".tmp")`
  5b. `tmp_source = self.source_abs.with_suffix(self.source_abs.suffix + ".tmp")`
  5c. `backup_tree = self.tree_abs.with_suffix(self.tree_abs.suffix + ".bak")`
  5d. `try`:
        - `shutil.copy2(self.session_tree_path, tmp_tree)`
        - `shutil.copy2(self.session_source_path, tmp_source)`
        - If `self.tree_abs.exists()`: `shutil.copy2(self.tree_abs, backup_tree)`
        - `tmp_tree.replace(self.tree_abs)`  (tree first)
        - `try`: `tmp_source.replace(self.source_abs)`  (source second)
          - `except Exception`: if `backup_tree.exists()`: `shutil.copy2(backup_tree, self.tree_abs)`; re-raise
      `except Exception`:
        - `tmp_tree.unlink(missing_ok=True)`; `tmp_source.unlink(missing_ok=True)`; re-raise
      `finally`:
        - `backup_tree.unlink(missing_ok=True)`

  ### Branch INVALID — source-only external copy

  5e. When `tree_validity == INVALID`: copy ONLY in-session source to external source.
      Do NOT modify `self.tree_abs`.
      - `tmp_source = self.source_abs.with_suffix(self.source_abs.suffix + ".tmp")`
      - `shutil.copy2(self.session_source_path, tmp_source)`
      - `tmp_source.replace(self.source_abs)`
      - On any failure: `tmp_source.unlink(missing_ok=True)` then re-raise.

  Error handling:
  - `RuntimeError` when session not open.
  - Partial failure in VALID branch restores external tree from `.bak` before re-raise.
  - No SessionRepo commit in this method (in-session finalization is {d003} only).

  Edge cases:
  - `has_changes=False` → immediate return, no file operations.
  - VALID branch requires both `session_tree_path` and `session_source_path` to exist;
    if either missing when VALID, raise `RuntimeError("Session artefacts missing for external copy-out")`.
  - INVALID branch: external tree left unchanged even if tree_diff was non-empty (stale in-session tree).

  Constants/literals:
  - Tmp suffix: `".tmp"`; backup suffix: `".bak"`.
  - Unified diff labels: `"in-session-source"`, `"external-source"`, `"in-session-tree"`, `"external-tree"`.

