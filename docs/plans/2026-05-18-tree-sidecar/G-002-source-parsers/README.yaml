step_id: G-002
name: Source parsers and serializers
status: done
description: 'Implement format-specific components that convert between raw source
  bytes and the TreeNode tree. JSON parser: tolerant, accepts // and /* */ comments.
  YAML parser: ruamel.yaml round-trip, preserves # comments. Both parsers apply CommentOwnershipRule:
  inline comments become comment_inline on the node to the left; above-line comments
  become comment_before on the node immediately below. JSON and YAML serializers restore
  comments at recorded positions on write. Parsers and serializers do not touch Sidecar
  or EditSession.'
