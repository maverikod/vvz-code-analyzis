notes: >
  G-002/T-001 and G-002/T-002 both legitimately reference C-009: this is not
  an independence (t13) violation because the two steps do different work on
  different entities. T-001 defines the repository-resolution and
  availability-outcome protocol shared by the whole read-operation group
  (entity: read_repo_availability_protocol); T-002 defines the concrete
  seven-operation read set and its per-operation structured result shape
  (entity: git_read_operation_set). Neither creates or modifies the other's
  entity, satisfying the independence_criterion in
  tactical_step_creation_standard.yaml (shared concept_id reference is not
  overlap). G-001-commit-on-write and its three tactical steps (T-001, T-002,
  T-003) were excised from plan scope by explicit user decision on
  2026-07-03; archived at
  docs/plans/git-spec/_archive/G-001-commit-on-write/. Remaining
  per_gs_summary covers G-002..G-006 (5 global steps, 13 tactical steps).
