prompt: "Create `code_analysis/structural_search/structural_evidence.py`.\n\n## MRS
  excerpt\n\nC-018 StructuralEvidence: evidence that is valid only when backed by
  a\nvalidated TreeRepresentation and a preview-compatible result node or block\n\
  with PreviewReference data.\nProperties:\n- A match counts as structural evidence
  only when backed by a validated\n  TreeRepresentation (C-015) and a complete PreviewReference
  (C-017).\n- Rejection rules:\n  * Line-only grep output is not structural evidence
  unless converted\n    into validated preview-compatible nodes on a validated tree.\n\
  \  * Unstable node identifiers must not be exposed as preview-compatible.\n  * Matches
  lacking validated tree backing or complete PreviewReference\n    are rejected.\n\
  - Timeout/cancellation: when dynamic scanning, tree reconstruction,\n  XPath filtering,
  structural enrichment, or related phases time out or\n  are cancelled, partial outputs
  from those phases must NOT be admitted\n  as structural evidence. Partial structural
  bundles are invalidated.\n- StructuralEvidence governs validity and rejection; GrepSearchMode\n\
  \  supplies candidate bundles only.\n\n## Implementation requirements\n\n1. Import
  `dataclasses`, `enum`, `typing`.\n\n2. Define `RejectionReason(str, enum.Enum)`
  with members:\n   LINE_ONLY = \"line_only\",\n   UNSTABLE_NODE_ID = \"unstable_node_id\"\
  ,\n   NO_TREE_BACKING = \"no_tree_backing\",\n   INCOMPLETE_PREVIEW_REF = \"incomplete_preview_ref\"\
  ,\n   TIMED_OUT_PARTIAL = \"timed_out_partial\".\n\n3. Define `@dataclasses.dataclass(frozen=True)`
  class `EvidenceCandidate`:\n   - Fields: `node_id: str`, `file_path: str`, `kind:
  str`,\n     `text: typing.Optional[str]`,\n     `has_tree_backing: bool`,\n    \
  \ `has_preview_ref: bool`,\n     `node_id_is_stable: bool`,\n     `phase_completed:
  bool`.\n\n4. Define `@dataclasses.dataclass(frozen=True)` class `AcceptedEvidence`:\n\
  \   - Fields: `node_id: str`, `file_path: str`, `kind: str`,\n     `text: typing.Optional[str]`.\n\
  \n5. Define `@dataclasses.dataclass(frozen=True)` class `RejectedEvidence`:\n  \
  \ - Fields: `node_id: str`, `file_path: str`,\n     `reason: RejectionReason`.\n\
  \n6. Define `@dataclasses.dataclass` class `EvidenceClassificationResult`:\n   -
  Fields: `accepted: list[AcceptedEvidence]`,\n     `rejected: list[RejectedEvidence]`,\n\
  \     `invalidated_partial: list[RejectedEvidence]`.\n\n7. Define function:\n  \
  \ ```python\n   def classify_evidence(\n       candidates: list[EvidenceCandidate],\n\
  \   ) -> EvidenceClassificationResult:\n   ```\n   For each candidate:\n   - If
  not `phase_completed`: append to `invalidated_partial` with\n     reason TIMED_OUT_PARTIAL.\n\
  \   - Elif not `has_tree_backing`: reject with NO_TREE_BACKING.\n   - Elif not `node_id_is_stable`:
  reject with UNSTABLE_NODE_ID.\n   - Elif not `has_preview_ref`: reject with INCOMPLETE_PREVIEW_REF.\n\
  \   - Else: accept.\n   Returns `EvidenceClassificationResult(accepted, rejected,\n\
  \   invalidated_partial)`.\n\n## Constraints\n- Standard library only.\n- All public
  names have one-line docstrings.\n- File under 100 lines.\n"
