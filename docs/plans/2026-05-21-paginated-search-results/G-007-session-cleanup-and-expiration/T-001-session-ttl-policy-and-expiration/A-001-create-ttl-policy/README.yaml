prompt: "Create `code_analysis/search_session/ttl_policy.py`.\n\n## MRS excerpt\n\n\
  C-007 SessionTTLPolicy: configuration policy controlling how long inactive\nSearchSessionDirectory
  data is retained after LastAccessTimestamp.\nProperties:\n- Provides a default TTL
  value in seconds as a code constant.\n- The configuration generator must emit the
  TTL setting.\n- The configuration validator must reject: missing, non-integer, zero,\n\
  \  negative, and out-of-range TTL values.\n- Declared minimum and maximum bounds
  constrain valid values.\n\nC-006 LastAccessTimestamp: refreshed on every successful
  HTTP page, status,\nor manifest read. Controls inactivity-based TTL cleanup.\nExpiration
  criteria: a SearchSessionDirectory becomes eligible for TTL-based\ncleanup when
  elapsed time since last_access_at exceeds the configured TTL\nthreshold. Expiration
  decisions use last_access_at only, never heartbeat_at.\n\n## Implementation requirements\n\
  \n1. Import `dataclasses`, `datetime`.\n\n2. Define constants:\n   ```python\n \
  \  DEFAULT_TTL_SECONDS: int = 3600        # 1 hour\n   MIN_TTL_SECONDS: int = 60\
  \              # 1 minute\n   MAX_TTL_SECONDS: int = 86400           # 24 hours\n\
  \   ```\n\n3. Define exception:\n   ```python\n   class InvalidTTLError(ValueError):\n\
  \       \"\"\"Raised when TTL value fails validation.\"\"\"\n   ```\n\n4. Define
  function:\n   ```python\n   def validate_ttl(value: object) -> int:\n   ```\n  \
  \ - If `value` is not an `int` instance: raise `InvalidTTLError`\n     with message
  `\"TTL must be an integer\"`.\n   - If `value <= 0`: raise `InvalidTTLError` with\n\
  \     `\"TTL must be positive\"`.\n   - If `value < MIN_TTL_SECONDS`: raise `InvalidTTLError`
  with\n     `f\"TTL must be >= {MIN_TTL_SECONDS}\"`.\n   - If `value > MAX_TTL_SECONDS`:
  raise `InvalidTTLError` with\n     `f\"TTL must be <= {MAX_TTL_SECONDS}\"`.\n  \
  \ - Returns `value` (the validated integer).\n\n5. Define `@dataclasses.dataclass(frozen=True)`
  class `SessionTTLPolicy`:\n   - Field `ttl_seconds: int` â€” validated TTL.\n   -
  Class method `default() -> \"SessionTTLPolicy\"` returning\n     `SessionTTLPolicy(ttl_seconds=DEFAULT_TTL_SECONDS)`.\n\
  \n6. Define function:\n   ```python\n   def is_expired(\n       last_access_at:
  datetime.datetime,\n       policy: SessionTTLPolicy,\n       now: datetime.datetime,\n\
  \   ) -> bool:\n   ```\n   Returns `(now - last_access_at).total_seconds() > policy.ttl_seconds`.\n\
  \n## Constraints\n- Standard library only.\n- All public names have one-line docstrings.\n\
  - File under 80 lines.\n"
