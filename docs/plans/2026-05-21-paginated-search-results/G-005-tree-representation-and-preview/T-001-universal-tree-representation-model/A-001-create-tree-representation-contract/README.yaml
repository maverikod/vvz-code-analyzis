prompt: "Create `code_analysis/tree_representation/tree_representation.py`.\n\n##
  MRS excerpt\n\nC-015 TreeRepresentation: stable structural representation for supported\n\
  files including JSON, YAML, Python CST, Markdown, and text represented\nas paragraphs-of-lines.\n\
  Properties:\n- Every supported file must have a tree sidecar or equivalent artifact.\n\
  - Stable node identifiers assigned once, persisted, comparable across\n  repeated
  processing of unchanged content.\n- Availability required before any downstream
  structural operation in\n  indexer, database-backed search, dynamic search, or preview.\n\
  - Stable node identity is shared by indexer output, database-backed\n  structural
  data, dynamically built trees, and preview navigation.\n- Text files: represented
  as trees whose root contains paragraphs,\n  each paragraph containing lines.\n\n\
  ## Implementation requirements\n\n1. Import `dataclasses`, `enum`, `typing`.\n\n\
  2. Define `SupportedFormat(str, enum.Enum)` with members:\n   JSON = \"json\", YAML
  = \"yaml\", PYTHON_CST = \"python_cst\",\n   MARKDOWN = \"markdown\", TEXT = \"\
  text\".\n\n3. Define `NATIVE_TREE_FORMATS: frozenset[SupportedFormat]` containing\n\
  \   JSON, YAML, PYTHON_CST, MARKDOWN.\n   Define `TEXT_FORMATS: frozenset[SupportedFormat]`
  containing TEXT.\n\n4. Define `@dataclasses.dataclass(frozen=True)` class `TreeNode`:\n\
  \   - Field `node_id: str` — stable UUID string.\n   - Field `kind: str` — node
  type label (e.g. \"object\", \"array\",\n     \"paragraph\", \"line\", \"function\"\
  , etc.).\n   - Field `children: tuple[\"TreeNode\", ...]` — ordered child nodes.\n\
  \   - Field `text: typing.Optional[str] = None` — leaf text content.\n\n5. Define
  `@dataclasses.dataclass(frozen=True)` class `TreeRepresentation`:\n   - Field `file_path:
  str` — project-relative file path.\n   - Field `format: SupportedFormat`.\n   -
  Field `root_nodes: tuple[TreeNode, ...]` — top-level nodes.\n   - Field `content_checksum:
  str` — SHA-256 hex of file content at\n     tree creation time; used for validity
  checks.\n   - Method `is_valid_for(self, current_checksum: str) -> bool`:\n    \
  \ returns `self.content_checksum == current_checksum`.\n\n## Constraints\n- Standard
  library only.\n- All public names have one-line docstrings.\n- File under 80 lines.\n"
