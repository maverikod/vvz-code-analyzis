name: Full-text threshold in PreviewBudget
description: >
  Add full_text_max_lines field to PreviewBudget dataclass and wire it
  into UniversalFilePreviewCommand.get_schema() and validate_params().
  Default value 200. When a Python file has fewer lines than this threshold,
  PythonFileHandler.open_root returns the entire file as a single text block.
