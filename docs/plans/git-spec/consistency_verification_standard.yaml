    c7_executor_completeness: {result: pass, finding_list: []}
    c8_no_silent_dependency_on_siblings: {result: pass, finding_list: []}
    c9_no_redundancy_with_upper_levels: {result: pass, finding_list: []}
  - global_step: G-004
