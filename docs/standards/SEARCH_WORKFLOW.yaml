meta:
  title: Search and Analysis Workflow
  version: '1.0'
  locale: en
  author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  description: Mandatory search lifecycle. Read before any search or locate 
    operation.
trigger: Before any search, code lookup, or entity locate operation.
steps:
  1_cross_search_first:
    command: project_cross_search
    rule: Always start here. Grep is disabled by default — it is slow and blocks
      the server.
    required_params:
      grep_patterns: []
      fulltext_limit: 30
      mode: union
      auto_queue_on_inline_timeout: true
    supplements:
    - get_code_entity_info
    - find_usages
    - search_ast_nodes
    - list_code_entities
  2_grep_fallback:
    command: project_cross_search
    trigger: Only when step 1 returns no results or detail is insufficient.
    rule: Enable grep explicitly. Always use use_queue=true. Poll 
      queue_get_job_status afterward.
    required_params:
      require_structural_grep: true
      grep_scope: index_gap
      auto_queue_on_inline_timeout: true
      use_queue: true
    note: require_structural_grep=true means only enriched hits with a 
      preview-compatible node_ref count as evidence. Line-only grep hits are 
      excluded.
forbidden:
- Running grep without use_queue=true on large projects.
- Using fulltext_search or fs_grep directly without first trying 
  project_cross_search.
- Assuming file content without reading it via universal_file_preview.
- Using cst_find_node or query_cst for AI edit workflows — use universal_file_search
  inside an open edit session (Python) or universal_file_preview drill-down.
