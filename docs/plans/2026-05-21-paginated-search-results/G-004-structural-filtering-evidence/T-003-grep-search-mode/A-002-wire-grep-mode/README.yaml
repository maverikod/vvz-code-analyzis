  target: tests/unit/test_grep_mode_params.py
  expected: >
    test_grep_mode_to_fs_ggrep_params_structural maps fast_text_only=False enrich_blocks=True;
    test_grep_mode_to_fs_ggrep_params_classic_line inverts mapping;
    test_default_grep_mode_reexported is structural;
    test_apply_grep_mode_to_match_payload_returns_GrepModeApplyResult with eligibility field.
