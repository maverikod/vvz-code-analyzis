  ## Class TreeLifecycle
  ```python
  class TreeLifecycle:
      """TreeLifecycle (C-010): single entry point for tree validity and creation."""

      policy: type[ChecksumSyncPolicy] = ChecksumSyncPolicy
      builder: type[TreeBuilder] = TreeBuilder

      @staticmethod
      def from_content(...) -> tuple[TreeRepresentationRef, TreeValidityState]: ...

      @staticmethod
      def from_path(...) -> tuple[TreeRepresentationRef, TreeValidityState]: ...
  ```

  ### from_content algorithm
  1. Return `validate_or_recreate_from_content(kind=kind, content=content, source_abs=source_abs, sidecar_path=sidecar_path, file_path=file_path, sidecar_digest=sidecar_digest, root_stable_id=root_stable_id, force=force)` unchanged.

  ### from_path algorithm
  1. Return `validate_or_recreate_tree_file(project_root=project_root, file_path=file_path, force=force)` unchanged.

  ### Signatures (exact)
  - `from_content(*, kind: TreeFormatKind, content: str, source_abs: Path, sidecar_path: Path, file_path: str, sidecar_digest: str | None, root_stable_id: str | None, force: bool = False)`
  - `from_path(*, project_root: Path, file_path: str, force: bool = False)`

  ### Error handling
  - Propagate FileNotFoundError and all callee exceptions.

