step_id: T-003
parent_global_step: G-001
name: SearchSessionManifest contract
description: >
  Creates the SearchSessionManifest state contract inside the session directory.
  Defines manifest fields for created_at, last_access_at, heartbeat_at, status,
  phase, request parameters, progress metrics, block-readiness indicators,
  warnings, and errors. Records ServerProcessIdentity at session start with
  main_pid, process_start_time, and optional host and instance_id. Specifies
  safe concurrent update rules because the search worker, HTTP readers, and
  background cleaner may access the manifest concurrently.
concepts:
  - C-003
  - C-008
inputs:
  - name: search_session_directory
    type: SearchSessionDirectory
    description: Provisioned directory that will store the manifest file.
  - name: search_request_context
    type: SearchRequestContext
    description: Request parameters and context copied into the manifest at creation.
  - name: server_process_identity
    type: ServerProcessIdentity
    description: Identity of the main server process that owns the session at creation time.
outputs:
  - name: search_session_manifest
    type: SearchSessionManifest
    description: Initial manifest with request context, process identity, and baseline timestamps.
  - name: manifest_concurrency_rules
    type: ManifestConcurrencyPolicy
    description: Rules governing safe concurrent reads and writes to manifest fields.
atomic_steps:
- A-001
status: frozen