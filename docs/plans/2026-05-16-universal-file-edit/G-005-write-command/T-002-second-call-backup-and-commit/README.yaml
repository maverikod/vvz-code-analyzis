step_id: T-002
parent_global_step: G-005
name: Implement WriteCommand second call - backup pair rename and git commit
description: Implement the second-call phase of WriteCommand (C-009). Second
  call is detected when <file>.write exists and PID matches os.getpid() and
  lockfile mtime > draft mtime. Create a BackupPair (C-011) atomically:
  call BackupManager.create_backup for the original file and the draft as one
  history entry. Generate code from draft to a temp file. If generation fails,
  call BackupManager.restore_file and return WRITE_FAILED. Rename temp to
  original. Delete <file>.write. Call commit_after_write if git is enabled.
  Return success with diff. Register universal_file_write in hooks.py.
concepts:
- C-009
- C-011
- C-012
inputs:
- name: session
  type: EditSession
  description: Active session confirmed to be in second-call state.
outputs:
- name: diff
  type: str
  description: Unified diff between old original and new content.
- name: success
  type: bool
  description: True when file was written and lockfile deleted.
atomic_steps: []
status: draft