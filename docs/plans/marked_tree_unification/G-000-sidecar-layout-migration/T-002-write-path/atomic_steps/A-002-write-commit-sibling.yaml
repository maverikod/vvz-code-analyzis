prompt: "Operation: modify_file\nTarget: code_analysis/commands/universal_file_edit/tree_temp_write_commit.py\n\n## Goal\nRedirect the tree-temp commit path off the removed .trees/ resolver onto the\nsibling convention (C-003). On commit, when the session holds tree-temp roots,\npersist the sidecar as a three-section TreeFile (CHECKSUMS, MAP, TREE) at the\nsibling path <source>.tree via TreeBuilder (C-011), not under a central\n.trees/ mirror and not as legacy JSON sidecar payload.\n\n## MRS excerpt\n\n**C-023 SidecarLayoutMigration**\n- definition: The sidecar layout cutover (SidecarLayoutMigration, C-023) that redirects the remaining legacy tree-path call sites (not reached by consumer integration) onto the existing sibling_tree_path function and removes the three legacy layouts (.cst/ subdirectory, .trees/ mirror directory, .tree_sidecar adjacent file). It does not create sibling_tree_path; that function already exists from the storage work. Runs after G-001 through G-005 are built and verified end-to-end; this is the final layout cutover with no subsequent global step.\n- properties:\n  - final sidecar cutover after G-001..G-005 verification; no subsequent global step; NodeIdMap (C-025) UUID4 identity in MAP section\n  - replaces three independent legacy path resolvers with sibling_tree_path\n  - redirects write/commit paths to persist three-section TreeFiles at the sibling path\n  - hard cutover: no backward-compatibility shim\n\n**C-003 TreeFile**\n- definition: The on-disk artifact holding source content with node-id markers embedded natively per format.\n- properties:\n  - contains source content plus markers\n  - stored as a sibling file placed directly next to the source file it describes\n  - on-disk format uses CHECKSUMS, MAP, and TREE sections (owned by G-002 TreeBuilder)\n\n## TreeBuilder dependency (G-002 C-011; already implemented)\ncode_analysis/core/tree_lifecycle/builder.py provides:\n    class TreeBuilder:\n        @staticmethod\n        def build(\n            *,\n            content: str,\n            source_abs: Path,\n            file_path: str,\n            content_checksum: str,\n            registry: Optional[HandlerRegistry] = None,\n        ) -> TreeRepresentationRef\n\nTreeBuilder.build resolves the handler from source_abs, marks content, builds\nNodeIdMap sections, atomically writes the three-section sibling TreeFile at\nhandler.sidecar_path(source_abs) (which equals sibling_tree_path), and returns\nTreeRepresentationRef with sidecar_path set.\n\n## sibling_tree_path dependency (G-002; already implemented)\ncode_analysis/tree/sibling_convention.py provides:\n    def sibling_tree_path(source_abs: Path) -> Path\n\n## Required edits\n1. Imports:\n   - Remove:\n         from code_analysis.commands.base_mcp_command import BaseMCPCommand\n         from code_analysis.core.tree_temp.sidecar_payload import serialize_sidecar_to_json_text\n         from code_analysis.core.tree_temp.sidecar_paths import resolve_trees_sidecar_path\n   - Add:\n         from code_analysis.core.tree_lifecycle.builder import TreeBuilder\n         from code_analysis.tree.sibling_convention import sibling_tree_path\n\n2. In commit_tree_temp_to_disk, inside the `if session.tree_temp_roots is not None:`\n   block, replace the entire sidecar-path resolution, payload serialization,\n   tempfile write, and os.replace sequence. Currently it is:\n       project_root = Path(BaseMCPCommand._resolve_project_root(project_id)).resolve()\n       sidecar_path = resolve_trees_sidecar_path(\n           project_root,\n           Path(session.file_path),\n       )\n       sidecar_path.parent.mkdir(parents=True, exist_ok=True)\n       payload_txt = serialize_sidecar_to_json_text(\n           sha256_hex,\n           session.tree_temp_roots,\n       )\n       sc_tmp_path: str | None = None\n       try:\n           if sidecar_path.exists():\n               bm.create_backup(...)\n           with tempfile.NamedTemporaryFile(...) as sctmp:\n               sctmp.write(payload_txt)\n               ...\n           os.replace(sc_tmp_path, str(sidecar_path))\n           ...\n       except OSError: ...\n       except Exception as exc: ...\n\n   Replace with:\n       sidecar_path = sibling_tree_path(session.abs_path.resolve())\n       try:\n           if sidecar_path.exists():\n               bm.create_backup(\n                   sidecar_path,\n                   command=\"universal_file_write\",\n               )\n           TreeBuilder.build(\n               content=code,\n               source_abs=session.abs_path.resolve(),\n               file_path=session.file_path,\n               content_checksum=sha256_hex,\n           )\n       except OSError:\n           bm.restore_file(rel_str)\n           raise\n       except Exception as exc:\n           bm.restore_file(rel_str)\n           raise ValueError(\n               f\"Tree-temp sidecar serialization failed: {exc}\",\n           ) from exc\n\n   Notes:\n   - Use the already-computed `code` string (serialized source) and `sha256_hex`.\n   - TreeBuilder.build performs atomic sibling write; do not add a second tempfile\n     write for the sidecar.\n   - Do not pass session.tree_temp_roots to TreeBuilder; the handler derives nodes\n     from `content` via parse_content.\n\n3. The function keeps its signature unchanged: parameters session, project_id, bm,\n   rel_str all remain. After the edit, project_id is no longer referenced in the\n   body; that is acceptable — do NOT change the signature or callers (flake8 does\n   not flag unused function parameters).\n\n4. Keep the source-file atomic write block (tempfile for session.abs_path) unchanged.\n\n## Forbidden\n- No .trees/ path, no central mirror directory.\n- Do not use serialize_sidecar_to_json_text or legacy JSON sidecar payload format\n  for the tree file write; three-section TreeFile write is delegated to TreeBuilder\n  (C-011, G-002).\n- Do not import resolve_trees_sidecar_path or BaseMCPCommand.\n- Do not touch other files.\n\n## Full current file content (verbatim, 178 lines)\n```python\n\"\"\"\nPreview diff and commit persistence for tree-temp TreeNode edit sessions.\n\nAuthor: Vasiliy Zdanovskiy\nemail: vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport json\nimport os\nimport tempfile\nfrom pathlib import Path\nfrom typing import TYPE_CHECKING, Tuple, cast\n\nimport yaml\n\nif TYPE_CHECKING:\n    from code_analysis.commands.universal_file_edit.session import EditSession\n\nfrom code_analysis.commands.base_mcp_command import BaseMCPCommand\nfrom code_analysis.commands.universal_file_edit.format_group import FORMAT_TREE_TEMP\nfrom code_analysis.commands.universal_file_edit.tree_temp_edit_nodes import (\n    serialize_tree_temp_roots,\n)\nfrom code_analysis.core.backup_manager import BackupManager\nfrom code_analysis.core.file_handlers.diff_support import unified_diff_text\nfrom code_analysis.core.tree_temp.sidecar_payload import serialize_sidecar_to_json_text\nfrom code_analysis.core.tree_temp.sidecar_paths import resolve_trees_sidecar_path\n\n\ndef serialize_tree_temp_session_source(session: \"EditSession\") -> str:\n    \"\"\"Return canonical serialized source text for a tree-temp session (handlers json/yaml).\"\"\"\n    if session.format_group != FORMAT_TREE_TEMP:\n        raise ValueError(\n            \"serialize_tree_temp_session_source requires tree-temp format_group\",\n        )\n    if session.tree_temp_roots is not None:\n        return cast(\n            str,\n            serialize_tree_temp_roots(\n                session.handler_id,\n                session.tree_temp_roots,\n            ),\n        )\n    if session.handler_id == \"json\":\n        from code_analysis.core.json_tree.tree_builder import (\n            get_tree as get_json_tree,\n        )\n\n        jtree = get_json_tree(session.tree_id) if session.tree_id else None\n        if jtree is None:\n            return str(session.draft_path.read_text(encoding=\"utf-8\"))\n        return str(\n            json.dumps(jtree.root_data, indent=2, ensure_ascii=False) + \"\\n\",\n        )\n    from code_analysis.core.yaml_tree.tree_builder import (\n        get_tree as get_yaml_tree,\n    )\n\n    ytree = get_yaml_tree(session.tree_id) if session.tree_id else None\n    if ytree is None:\n        return str(session.draft_path.read_text(encoding=\"utf-8\"))\n    return str(\n        yaml.safe_dump(\n            ytree.root_data,\n            sort_keys=False,\n            allow_unicode=True,\n        )\n    )\n\n\ndef build_tree_temp_preview_text(*, abs_path: Path, session: \"EditSession\") -> str:\n    \"\"\"Return canonical source text for current session tree via SourceSerializer.\"\"\"\n    if session.abs_path.resolve() != abs_path.resolve():\n        raise ValueError(\"abs_path does not match session.abs_path\")\n    return serialize_tree_temp_session_source(session)\n\n\ndef commit_tree_temp_to_disk(\n    *,\n    session: \"EditSession\",\n    project_id: str,\n    bm: BackupManager,\n    rel_str: str,\n) -> Tuple[str, str]:\n    \"\"\"Write tree-temp source and optional sidecar; update session checksum and flags.\n\n    Returns:\n        Tuple of ``(new_source_sha256_hex, unified_diff_str)``.\n    Raises:\n        ValueError if serialization fails.\n        OSError on I/O failures (caller may restore from backup ``rel_str``).\n    \"\"\"\n    original_content = session.abs_path.read_text(encoding=\"utf-8\")\n    try:\n        code = serialize_tree_temp_session_source(session)\n    except ValueError:\n        raise\n    except Exception as exc:\n        raise ValueError(f\"Tree-temp source serialization failed: {exc}\") from exc\n\n    tmp_path: str | None = None\n    try:\n        with tempfile.NamedTemporaryFile(\n            mode=\"w\",\n            suffix=session.abs_path.suffix,\n            dir=str(session.abs_path.parent),\n            delete=False,\n            encoding=\"utf-8\",\n        ) as tmp:\n            tmp.write(code)\n            tmp_path = tmp.name\n        os.replace(tmp_path, str(session.abs_path))\n        tmp_path = None\n    except OSError:\n        if tmp_path:\n            Path(tmp_path).unlink(missing_ok=True)\n        bm.restore_file(rel_str)\n        raise\n\n    final_bytes = session.abs_path.read_bytes()\n    sha256_hex = hashlib.sha256(final_bytes).hexdigest()\n    session.source_sha256_at_open = sha256_hex\n    session.dirty = False\n\n    if session.tree_temp_roots is not None:\n        project_root = Path(BaseMCPCommand._resolve_project_root(project_id)).resolve()\n        sidecar_path = resolve_trees_sidecar_path(\n            project_root,\n            Path(session.file_path),\n        )\n        sidecar_path.parent.mkdir(parents=True, exist_ok=True)\n        payload_txt = serialize_sidecar_to_json_text(\n            sha256_hex,\n            session.tree_temp_roots,\n        )\n        sc_tmp_path: str | None = None\n        try:\n            if sidecar_path.exists():\n                bm.create_backup(\n                    sidecar_path,\n                    command=\"universal_file_write\",\n                )\n            with tempfile.NamedTemporaryFile(\n                mode=\"w\",\n                suffix=\".tree\",\n                dir=str(sidecar_path.parent),\n                delete=False,\n                encoding=\"utf-8\",\n            ) as sctmp:\n                sctmp.write(payload_txt)\n                sc_tmp_path = sctmp.name\n            os.replace(sc_tmp_path, str(sidecar_path))\n            sc_tmp_path = None\n        except OSError:\n            if sc_tmp_path:\n                Path(sc_tmp_path).unlink(missing_ok=True)\n            bm.restore_file(rel_str)\n            raise\n        except Exception as exc:\n            if sc_tmp_path:\n                Path(sc_tmp_path).unlink(missing_ok=True)\n            bm.restore_file(rel_str)\n            raise ValueError(\n                f\"Tree-temp sidecar serialization failed: {exc}\",\n            ) from exc\n\n    session.sidecar_write_intent = \"none\"\n\n    diff = unified_diff_text(\n        original_content,\n        code,\n        before_label=str(session.abs_path),\n        after_label=str(session.abs_path),\n    )\n    return sha256_hex, diff\n```\n"
