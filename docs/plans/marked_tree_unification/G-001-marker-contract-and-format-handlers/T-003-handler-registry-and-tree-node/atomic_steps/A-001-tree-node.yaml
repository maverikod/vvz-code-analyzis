  ## Purpose

  Define the `TreeNode` dataclass (C-009) — the in-memory unit produced by a
  FormatHandler's `parse_content` operation. The ordered list returned by
  `parse_content` forms the tree structure for one source file.

  ## LOCKED MODEL (mandatory)

  - TreeNode carries `short_id: int` (NodeId / C-002). NodeId is a type alias
    for `int` in `code_analysis/tree/contracts.py`.
  - `short_id` is NOT `str`, NOT `UUID`, NOT a string token.
  - TreeNode MUST NOT expose a `uuid`, `node_uuid`, `tree_node_uuid`, or any
    UUID4 field. Internal UUID4 (C-024) lives only in the MAP section and is
    resolved via NodeIdMap (C-025) outside TreeNode.
  - External API consumers address nodes by integer `short_id` only.

  ## MRS excerpt

  C-002 NodeId:
    - short_id is a per-file monotonic decimal integer token, not canonical identity
    - one short_id names exactly one addressable block within one tree file
    - an unrecognised short_id yields an input error, never silent ignore
    - short_id resolves to UUID4 via NodeIdMap when internal UUID lookup is required

  C-024 TreeNodeUuid:
    - UUID4 stored only in MAP section; never embedded in TreeNode or external API

  C-025 NodeIdMap:
    - bidirectional short_id↔UUID4 resolution within one tree file context

  C-007 FormatHandler:
    - parse_content(file_path, content) builds the node tree from unmarked source
    - returns ordered List[TreeNode]

  C-009 TreeNode:
    - produced by FormatHandler from source content
    - carries short_id, type label, attributes, and text or value
    - ordered set of TreeNodes forms the tree structure

  ## File header (module docstring)

  ```
