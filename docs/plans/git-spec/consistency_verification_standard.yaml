excised_scope_note:
  date: '2026-07-03'
  decision: user explicit decision
  scope_of_excision: >
    Global step G-001-commit-on-write (tactical steps T-001, T-002, T-003)
    and its 8 owned concepts (C-003 LockOpacity, C-004 CommitIntentFlag,
    C-005 CommitMessage, C-006 NoOpOnUnchanged, C-007 CommitNeverPushes,
    C-008 CommitIdentity, C-024 ImplicitTriggerRemoval, C-025
    UnifiedCommitContract) and their 9 owned source_spec.md labels (e5f6,
    g7h8, i9j0, k1l2, m3n4, o5p6, q7r8, s9t0, c5d6) were removed from
    source_spec.md, spec.yaml, gs_concept_matrix.yaml, t_concept_matrix.yaml,
    and object_matrix.yaml. Rationale: the git-spec plan's purpose is to add
    git_* and github_* server commands only; commit-on-write behaviour is out
    of scope. The pre-existing commit_after_write mechanism in production
    code is untouched by this excision. The removed G-001 directory tree is
    archived, not deleted, at docs/plans/git-spec/_archive/G-001-commit-on-write/.
  verification_impact: >
    All references to G-001, its 8 concepts, and its 9 labels within this
    record's cycle_1 and cycle_2 sections were updated in place (counts
    recomputed: 29->21 concepts, 32->23 labels, 6->5 G-steps) rather than
    deleted, per the historical-audit-trail requirement; the G-001
    per_step_results entry in cycle_2 is retained verbatim and flagged with
    excised_by_user_decision.
