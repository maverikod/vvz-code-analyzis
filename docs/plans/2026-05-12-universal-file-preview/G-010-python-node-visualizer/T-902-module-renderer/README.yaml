step_id: T-902
parent_global_step: G-010
name: Python visualizer module (render_module + render_node)
description: >
  Create python_visualizer.py with two public functions.
  render_module(tree, budget): returns structured text overview of a Python module
  — file docstring, imports (stable_id + range + type), constants, class signatures
  + docstrings + method signatures + docstrings, module-level function signatures
  + docstrings. Full-text fallback when file line count < budget.full_text_max_lines.
  render_node(tree, stable_id): returns structured text for a single CST node
  identified by its StableIdentifier (C-009). FunctionDef/AsyncFunctionDef: signature
  + docstring + first-level body (compound stmts collapsed with stable_id + range + ...).
  ClassDef: signature + docstring + method signatures + docstrings.
  Compound stmts (If/For/While/Try/With): first line + stable_id + range + ...
