name: Edit command
description: Implement EditCommand that applies a batch of EditOperations to the
  DraftFile. The original file is never touched. For the sidecar group,
  BatchValidation forbids ancestor-descendant pairs; violation rejects the
  batch atomically. Each format group has its own apply and draft-write
  strategy. Addressing is format-specific.
