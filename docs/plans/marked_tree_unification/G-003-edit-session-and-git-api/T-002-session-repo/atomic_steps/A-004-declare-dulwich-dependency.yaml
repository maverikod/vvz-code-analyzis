  Context ({d002} FINAL-2, {h008}): SessionRepo.init uses `include_tree=True`
  for FULL initial commits (source+tree) when EditSession opens in valid state,
  and `include_tree=False` for DEGRADED source-only commits when invalid.
  Caller-supplied `content` on open is only allowed when the external file is
  missing or broken; SessionRepo does not implement that gate (EditSession does).

