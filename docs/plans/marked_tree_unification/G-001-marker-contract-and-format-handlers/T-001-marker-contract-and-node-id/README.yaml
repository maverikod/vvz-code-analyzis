- name: NodeId entity definition
  type: domain entity definition
  description: "Per-file monotonic integer short_id handle naming exactly one
    AddressableBlock in the TREE section; resolves to TreeNodeUuid via NodeIdMap;
    unrecognised short_id yields input error, never silent ignore.\n"
- name: AddressableBlock entity definition
  type: domain entity definition
  description: "Per-format minimal addressable unit with granularity rules prohibiting
    lexeme splits and literal interiors; per-format block sizes defined.\n"
