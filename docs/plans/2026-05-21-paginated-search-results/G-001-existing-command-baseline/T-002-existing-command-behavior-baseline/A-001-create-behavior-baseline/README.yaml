prompt: "Create `code_analysis/compat/behavior_baseline.py`.\n\n## MRS excerpt\n\n\
  C-021 ExistingSearchCommand: existing working search command whose\nnon-paginated
  behavior must remain the default.\n\nThe ExistingCommandBehaviorBaseline documents
  the current default behavior\nand caller-dependent invariants of ExistingSearchCommand
  members. It\nenumerates the preserved dimensions: validation rules, input schemas,\n\
  queue semantics, timeout semantics, direct payload delivery, structural\nresult
  shapes, and preview-reference compatibility.\n\n## Implementation requirements\n\
  \n1. Import `dataclasses`, `typing`.\n\n2. Define `@dataclasses.dataclass(frozen=True)`
  class `BehaviorDimension`:\n   - Fields: `name: str`, `description: str`.\n\n3.
  Define module-level constant:\n   ```python\n   PRESERVED_DIMENSIONS: tuple[BehaviorDimension,
  ...]\n   ```\n   with the following entries (in order):\n   - BehaviorDimension(\"\
  validation\", \"Input validation rules unchanged\")\n   - BehaviorDimension(\"schema\"\
  , \"Input and output schemas unchanged\")\n   - BehaviorDimension(\"queue\", \"\
  Queue semantics unchanged\")\n   - BehaviorDimension(\"timeout\", \"Timeout semantics
  unchanged\")\n   - BehaviorDimension(\"payload\", \"Direct payload delivery unchanged\"\
  )\n   - BehaviorDimension(\"structural_results\", \"Structural result shapes unchanged\"\
  )\n   - BehaviorDimension(\"preview_refs\", \"Preview-reference compatibility unchanged\"\
  )\n\n4. Define `@dataclasses.dataclass` class `ExistingCommandBehaviorBaseline`:\n\
  \   - Field `command_name: str`.\n   - Field `dimensions: tuple[BehaviorDimension,
  ...] = PRESERVED_DIMENSIONS`.\n   - Method `dimension_names(self) -> list[str]`:\n\
  \     returns `[d.name for d in self.dimensions]`.\n\n## Constraints\n- Standard
  library only.\n- All public names have one-line docstrings.\n- File under 55 lines.\n"
