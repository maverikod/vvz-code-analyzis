prompt: "Create the file `code_analysis/search_session/file_sets.py`.\n\n## MRS excerpt\n\
  \nC-012 IndexedFileSet: Set of files confirmed fresh in the database index,\neligible
  for indexed search without direct disk rescan.\nProperties:\n  - Built from intersection
  of database-known files and disk files.\n  - Requires freshness validation via checksum
  or modification metadata.\n  - Excludes stale, changed, missing, draft-only, or
  unavailable-index files.\n  - Must not be rescanned directly by dynamic grep when
  current.\n\nC-013 DynamicFileSet: Set of files that must be processed directly from\n\
  disk because they are missing, stale, changed, unindexed, draft-only, or\nunavailable
  in the index.\nProperties:\n  - Derived from disk files minus the fresh IndexedFileSet.\n\
  \  - Scans only supported formats by default.\n\n## Implementation requirements\n\
  \nImports: `dataclasses`, `pathlib`, `typing`.\nAlso import:\n  `from code_analysis.search_session.freshness
  import (\n      FreshnessResult, check_freshness\n  )`\n\n1. Define `@dataclasses.dataclass`
  class `IndexedFileSet`:\n   - `files: typing.FrozenSet[pathlib.Path]`\n     (docstring:
  \"Paths of files confirmed fresh in the database index.\")\n   - Method `__contains__(self,
  path: pathlib.Path) -> bool`:\n     returns `path in self.files`.\n   - Method `__len__(self)
  -> int`: returns `len(self.files)`.\n\n2. Define `@dataclasses.dataclass` class
  `DynamicFileSet`:\n   - `files: typing.FrozenSet[pathlib.Path]`\n     (docstring:
  \"Paths of files requiring direct disk processing.\")\n   - Method `__contains__(self,
  path: pathlib.Path) -> bool`:\n     returns `path in self.files`.\n   - Method `__len__(self)
  -> int`: returns `len(self.files)`.\n\n3. Define `def build_file_sets(\n       disk_files:
  typing.List[pathlib.Path],\n       indexed_checksums: typing.Dict[pathlib.Path,
  str],\n   ) -> typing.Tuple[IndexedFileSet, DynamicFileSet]`:\n   - For each path
  in `disk_files`:\n     - Calls `check_freshness(path, indexed_checksums.get(path))`.\n\
  \     - If `FreshnessResult.FRESH`: adds to indexed set.\n     - If `FreshnessResult.STALE`
  or `FreshnessResult.ABSENT`: adds to dynamic set.\n   - Returns `(IndexedFileSet(files=frozenset(indexed)),\n\
  \     DynamicFileSet(files=frozenset(dynamic)))`.\n   - Files in `indexed_checksums`
  but not in `disk_files` are ignored.\n\n## Constraints\n- No third-party imports.\n\
  - All public names must have docstrings.\n- IndexedFileSet files must never be duplicated
  in DynamicFileSet.\n"
verification:
  type: import
  target: code_analysis/search_session/file_sets.py
  expected: Module imports without error. `IndexedFileSet`, `DynamicFileSet`, 
    and `build_file_sets` are present. `build_file_sets` returns a tuple of both
    types.
