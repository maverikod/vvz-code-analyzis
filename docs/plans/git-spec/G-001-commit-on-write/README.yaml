step_id: G-001
name: Commit-on-write behaviour
description: 'The commit-on-write capability attached to the existing project file
  write path. A write carries an explicit commit-intent flag; when set, a commit is
  produced after the content is persisted and only if the content changed, with a
  mandatory non-empty caller-supplied message. The lock reason is opaque to the server:
  the commit decision derives solely from write-call parameters, never from lock state.
  A commit produced on write never pushes. The commit author identity is taken from
  project git configuration. The prior implicit message-only commit trigger is removed,
  so a message without intent is rejected; every writer that produces a commit now
  accepts and forwards an explicit non-empty message, and the server-side default
  message generator is removed.

  '
