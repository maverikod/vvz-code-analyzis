step_id: T-003
parent_global_step: G-001
name: Backward compatible command contract
description: "Create the BackwardCompatibleCommandContract owned by ExistingSearchCommand.
  Formalize the public contract that current behavior remains the default for all
  existing callers and that migration preserves validation rules, input schemas, queue
  semantics, timeout semantics, direct payload delivery, structural result shapes,
  and preview-reference compatibility. Define a preservation matrix that maps each
  contract dimension to allowed change (documentation-only, optional extension, forbidden
  breaking change). Bind the contract to ExistingCommandBehaviorBaseline so later
  optional pagination fields cannot silently redefine defaults.\n"
concepts:
- C-023
- C-021
inputs:
- name: existing_command_behavior_baseline
  type: baseline_specification
  description: "ExistingCommandBehaviorBaseline specifying default non-paginated behavior
    and preserved dimensions for scoped ExistingSearchCommand members.\n"
- name: default_behavior_invariants
  type: invariant_set
  description: "Caller-dependent invariants that the public contract must preserve.\n"
outputs:
- name: backward_compatible_command_contract
  type: contract_specification
  description: "Public contract stating default behavior, preservation obligations,
    and forbidden breaking changes for existing callers.\n"
- name: preservation_matrix
  type: compatibility_matrix
  description: "Dimension-by-dimension map of validation, schema, queue, timeout,
    payload, structural-result, and preview-reference compatibility rules.\n"
atomic_steps:
- A-001
status: draft
