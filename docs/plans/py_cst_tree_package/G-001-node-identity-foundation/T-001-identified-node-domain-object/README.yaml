step_id: T-001
parent_global_step: G-001
name: IdentifiedNode Domain Object
description: "Define the IdentifiedNode entity (C-001) and the StableId entity (C-003)
  as the core domain objects of the identity model. IdentifiedNode is a domain object
  that mirrors one concrete source node category one-to-one (same fields, same children,
  same order), extended with a single stable_id attribute of type StableId attached
  directly to the node object. The stable_id is assigned once on first entry into
  any tree and is never reassigned for that node afterward. A duplicated node receives
  a fresh StableId while the original keeps its own. The stable_id is stored as a
  node attribute, not in rendered source text and not only in an external map. Every
  node category without exception receives a stable_id: statement-level, expression-level,
  structural, and formatting and comment categories all carry it. The IdentifiedNode
  subclassing mechanism changes only the runtime form of a node to carry identity,
  never its grammatical category, fields, or position in the grammar.\n"
concepts:
- C-001
- C-003
inputs:
- name: LibCST node category
  type: concrete LibCST node class
  description: The source category being mirrored; determines field schema and 
    grammar position.
outputs:
- name: IdentifiedNode entity
  type: domain entity definition
  description: A node entity with stable_id attribute, carrying all fields of 
    its LibCST category and the identity guarantees defined above.
- name: StableId entity
  type: domain entity definition
  description: An identity value, unique within one tree, assigned once and 
    never regenerated.
atomic_steps: []
status: draft
