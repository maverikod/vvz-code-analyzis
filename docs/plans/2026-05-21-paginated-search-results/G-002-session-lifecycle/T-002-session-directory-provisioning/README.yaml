step_id: T-002
parent_global_step: G-002
name: Session directory provisioning
description: "Create the SearchSessionDirectory filesystem container before search
  execution begins. Bind the directory to its owning SearchSession so the session
  owns a dedicated storage location for manifest data, page files, temporary page
  writes, and service metadata associated with the search_id.\n"
concepts:
- C-001
- C-002
inputs:
- name: search_session
  type: SearchSession
  description: Owning session that requires a dedicated directory before 
    execution starts.
outputs:
- name: session_directory
  type: SearchSessionDirectory
  description: Provisioned directory tree associated with the search_id and 
    ready for manifest and page storage.
atomic_steps:
- A-001
status: draft
