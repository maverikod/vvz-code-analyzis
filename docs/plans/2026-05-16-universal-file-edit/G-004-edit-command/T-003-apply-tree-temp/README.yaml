step_id: T-003
parent_global_step: G-004
name: Apply EditOperations to tree-temp group draft
description: Apply a batch of EditOperations (C-007) to a tree-temp group
  session. No ancestor-descendant validation for this group. For each operation
  in received order: apply insert/delete/replace to the in-memory tree via
  ExistingInfrastructure (C-012) json_tree or yaml_tree builder; after each
  operation serialise the tree and write <file>.draft (DraftFile C-003).
  The original file is not touched. Return the updated node list.
concepts:
- C-006
- C-007
- C-012
inputs:
- name: session
  type: EditSession
  description: Active tree-temp group session with in-memory tree.
- name: operations
  type: list of EditOperation
  description: Batch of operations with JSON-pointer addressing.
outputs:
- name: updated_node_list
  type: list of node descriptors
  description: Tree nodes after all operations applied.
atomic_steps: []
status: draft