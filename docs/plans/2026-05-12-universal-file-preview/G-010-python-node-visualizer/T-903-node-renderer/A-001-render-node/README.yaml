  ### render_node(tree: Any, stable_id: str) -> str

  Signature: def render_node(tree: Any, stable_id: str) -> str

  Docstring:
      Render a single CST node identified by its stable_id (C-022).

      Args:
          tree: CSTTree loaded for the file.
          stable_id: Stable UUID of the target node from cst_load_file (C-009).

      Returns:
          Structured text for the node, or empty string if stable_id not found.

  Logic:

  Step 1 — Locate node metadata:
    meta = next(
        (m for m in tree.metadata_map.values() if m.stable_id == stable_id),
        None,
    )
    if meta is None: return ''
    node_id = next(
        (nid for nid, m in tree.metadata_map.items() if m.stable_id == stable_id),
        None,
    )

  Step 2 — Render by kind/type. Use _fmt_range (already defined above).
    Build list[str] called lines, then return '\n'.join(lines).

  Case A — kind in ('function', 'method') or meta.type in ('FunctionDef', 'AsyncFunctionDef'):
    lines = []
    sig = meta.signature or ('def ' + (meta.name or '?') + ':')
    lines.append(f'[{stable_id}] {_fmt_range(meta)}  {sig}')
    doc = (meta.docstring or '').strip()
    if doc:
        lines.append('    ' + doc.splitlines()[0])
    if node_id and meta.depth is not None:
        _COMPOUND = frozenset(('FunctionDef', 'AsyncFunctionDef', 'ClassDef',
                               'If', 'For', 'While', 'Try', 'With', 'Match'))
        body = sorted(
            (m for m in tree.metadata_map.values()
             if m.parent_id == node_id and m.depth == meta.depth + 1),
            key=lambda m: m.start_line or 0,
        )
        for child in body:
            child_sig = child.signature or child.type
            if child.kind in ('function', 'method', 'class') or child.type in _COMPOUND:
                lines.append(f'    [{child.stable_id}] {_fmt_range(child)}  {child_sig}  ...')
            else:
                lines.append(f'    [{child.stable_id}] {_fmt_range(child)}  {child_sig}')
    return '\n'.join(lines)

  Case B — kind == 'class' or meta.type == 'ClassDef':
    lines = []
    lines.append(f'[{stable_id}] {_fmt_range(meta)}  class {meta.name or "?"}:')
    doc = (meta.docstring or '').strip()
    if doc:
        lines.append('    ' + doc.splitlines()[0])
    if node_id and meta.depth is not None:
        methods = sorted(
            (m for m in tree.metadata_map.values()
             if m.parent_id == node_id and m.kind in ('function', 'method')),
            key=lambda m: m.start_line or 0,
        )
        for meth in methods:
            sig = meth.signature or ('def ' + (meth.name or '?'))
            lines.append(f'    [{meth.stable_id}] {_fmt_range(meth)}  {sig}')
            meth_doc = (meth.docstring or '').strip()
            if meth_doc:
                lines.append('        ' + meth_doc.splitlines()[0])
    return '\n'.join(lines)

  Case C — meta.type in ('If', 'For', 'While', 'Try', 'With', 'Match'):
    lines = []
    lines.append(f'[{stable_id}] {_fmt_range(meta)}  {meta.signature or meta.type}')
    if node_id and meta.depth is not None:
        _COMPOUND = frozenset(('FunctionDef', 'AsyncFunctionDef', 'ClassDef',
                               'If', 'For', 'While', 'Try', 'With', 'Match'))
        body = sorted(
            (m for m in tree.metadata_map.values()
             if m.parent_id == node_id and m.depth == meta.depth + 1),
            key=lambda m: m.start_line or 0,
        )
        for child in body:
            child_sig = child.signature or child.type
            if child.kind in ('function', 'method', 'class') or child.type in _COMPOUND:
                lines.append(f'    [{child.stable_id}] {_fmt_range(child)}  {child_sig}  ...')
            else:
                lines.append(f'    [{child.stable_id}] {_fmt_range(child)}  {child_sig}')
    return '\n'.join(lines)

  Case D — anything else:
    return f'[{stable_id}] {_fmt_range(meta)}  {meta.signature or meta.type or meta.name or ""}'

  ## CSTTree interface (same as in T-902/A-001)

  tree.metadata_map: dict[str, NodeMetadata]
  NodeMetadata attributes:
    stable_id: str
    start_line: int | None
    end_line: int | None
    type: str
    kind: str | None  ('import', 'class', 'function', 'method', 'smallstmt')
    name: str | None
    parent_id: str | None
    depth: int | None
    signature: str | None
    docstring: str | None

