  2. `_export_source_via_unmark()` → writes unmarked export to `session_source_path`.
  3. Recompute `source_checksum` and `tree_checksum` via `compute_content_checksum`.
  (SessionRepo commit_full is added when SessionRepo is wired into EditSession.)

  ## _post_mutation_degraded() — {d003} DEGRADED

