# Mypy configuration for code_analysis.
# Author: Vasiliy Zdanovskiy
# email: vasilyvz@gmail.com

[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_ignores = True
# Ignore missing stubs for third-party and optional modules
ignore_missing_imports = True

# Strictness: check our code but allow gradual typing
disallow_untyped_defs = False
check_untyped_defs = True

# Modules with many legacy/gradual typing issues (to be fixed incrementally)
