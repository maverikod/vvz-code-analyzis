step_id: T-002
parent_global_step: G-002
name: Define EditSession entity and registry
description: 'Create a new module `code_analysis/commands/universal_file_edit/session.py`
  containing the EditSession (C-001) dataclass and the module-level session registry.
  EditSession is a new dataclass (does not exist yet) with fields: session_id (str
  UUID), file_path (str), abs_path (Path), draft_path (Path), format_group (str),
  handler_id (str), tree_id (str | None). The registry is a module-level dict `_sessions:
  dict[str, EditSession]` with three functions: `create_session(descriptor, abs_path)
  -> EditSession` which generates a UUID and stores the session; `get_session(session_id)
  -> EditSession | None`; `release_session(session_id) -> None`. Sessions are never
  persisted to disk; on server restart the registry is empty and clients must call
  universal_file_open again.'
concepts:
- C-001
- C-002
inputs:
- name: format_descriptor
  type: FormatDescriptor dataclass
  description: Descriptor produced by T-001 resolution.
- name: abs_path
  type: Path
  description: Absolute path to the original file.
outputs:
- name: session_module
  type: new source file
  description: 'session.py with EditSession dataclass and registry API: create_session,
    get_session, release_session.'
atomic_steps: []
status: draft
