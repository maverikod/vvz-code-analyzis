step_id: T-001
parent_global_step: G-001
name: Search Session and Session Directory
description: "Creates the SearchSession (C-001) entity as the logical owner of one
  search execution, assigning it a unique search_id and an initial status of running.
  Creates the SearchSessionDirectory (C-002) as a dedicated filesystem directory for
  this session, allocated before search execution begins. The directory path is derived
  from the search_id and a configured base directory. The SearchSession holds a reference
  to its SearchSessionDirectory and is created atomically with it.\n"
concepts:
- C-001
- C-002
inputs:
- name: search_id
  type: string (UUID)
  description: Unique identifier assigned to the new SearchSession.
- name: session_base_dir
  type: filesystem path
  description: Configured root directory under which all SearchSessionDirectory 
    instances are created.
outputs:
- name: search_session
  type: SearchSession (C-001)
  description: Newly created session object with search_id, initial status 
    running, and reference to the session directory.
- name: session_directory
  type: SearchSessionDirectory (C-002)
  description: Newly created, empty filesystem directory dedicated to this 
    session.
atomic_steps:
- A-001
- A-002
status: draft
