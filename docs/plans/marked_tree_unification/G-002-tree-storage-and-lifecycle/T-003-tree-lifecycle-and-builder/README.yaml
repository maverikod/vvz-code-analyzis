inputs:
- name: ChecksumSyncPolicy entity
  type: domain entity definition (C-006)
  description: ChecksumSyncPolicy class defining the four-branch tree-to-source
    alignment decision mechanism including rebuild with validate_and_repair.
- name: Sibling storage convention
  type: domain entity definition (C-003)
  description: Co-located sibling three-section TreeFile path convention for
    SourceFile/TreeFile pairs.
- name: HandlerRegistry and FormatHandler contract
  type: MRS concept definitions (C-008, C-007)
  description: HandlerRegistry.default_registry resolves FormatHandler per source
    path; FormatHandler four-operation contract (parse_content, mark, unmark,
    sidecar_path).
- name: NodeIdMap entity
  type: domain entity definition (C-025)
  description: build, validate_and_repair, and resolve operations on the MAP section
    and TREE markers within one tree file context.
outputs:
- name: TreeBuilder entity definition
  type: domain entity definition
  description: Component that dispatches to FormatHandler and writes three-section
    TreeFile as sibling (CHECKSUMS, MAP via NodeIdMap.build with next_free and UUID4
    entries, TREE); sole writer on the canonical path; copies next_free on rebuild;
    records content_checksum in CHECKSUMS and on the returned tree reference.
- name: TreeLifecycle entity definition
  type: domain entity definition
  description: Coordinator owning ChecksumSyncPolicy, TreeBuilder, validate_and_repair
    dispatch via NodeIdMap, and pure checksum helpers; all consumers route through it;
    no ad-hoc validation outside it.
- name: Package public API
  type: module re-export surface
  description: Package root re-exports TreeLifecycle, TreeBuilder, ChecksumSyncPolicy,
    and all checksum and helper functions.
