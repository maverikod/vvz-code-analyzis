step_id: G-006
name: Result index and paged HTTP access
description: "Defines the client-facing directory index of a search job and the HTTP
  access by which clients read it and the result blocks. The index lists every written
  block in order with an explicit completeness marker, is the single mutable artefact
  updated by append while blocks stay immutable, and is returned in one read by job_id.
  Clients fetch any block directly by position number, poll the index for progress
  while the search runs, and every successful read refreshes the last-access timestamp.
  This step defines the index and its HTTP retrieval only; it does not define how
  blocks are produced or how sessions expire.\n"
