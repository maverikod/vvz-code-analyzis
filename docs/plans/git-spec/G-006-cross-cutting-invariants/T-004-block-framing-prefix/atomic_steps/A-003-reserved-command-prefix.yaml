  CONTEXT (background only, do not restate it in the file). Every command in
  the new project-scoped git command block must be named under a reserved
  prefix, so that no command name or routing collision can arise against the
  pre-existing edit-session git facility. That reserved prefix is the literal
  string "git_". The pre-existing edit-session git facility already has
  exactly these five registered command names (verified by reading the
  command class `name` attributes in this code base under
  code_analysis/commands/universal_file_edit/): session_git_status,
  session_git_log, session_git_diff, session_git_show, session_git_revert.
  None of those five names starts with "git_" (they start with
  "session_git_"), so the "git_" prefix is disjoint from them by
  construction. This file fixes the prefix constant, the set of existing
  edit-session command names, and helper functions to build a prefixed name,
  to check whether a name carries the reserved prefix, and to check
  disjointness against the edit-session command names.

