description: 'Extend the existing casmgr CLI with two new subcommands providing operator-level
  visibility into sessions and file locks. Both subcommands read the DB directly via
  config path without a running server, bypass MCP, SessionTouchRule, and SecurityPolicy.
  casmgr sessions: lists all ClientSessions with session_id, comment, created_at,
  last_active_at, open_lock_count. casmgr locks: lists all SessionFileLocks globally
  as project_id, file_id, locked_at — session_id omitted.'
