description: 'Defines NodeIdMap (C-025) as a dedicated module with exactly three
  operations: build, validate_and_repair, and resolve (bidirectional short_id↔TreeNodeUuid
  within one file). TreeNodeUuid (C-024) is UUID4 stored in the MAP section only —
  never in the TREE section or external API. No universal-id generation, no native↔universal
  map, and no UUID embedded in markers. Replaces the former universal-node-id block
  and the retired identity-remap integration step; identity handling is absorbed
  across G-001 through G-006.'
