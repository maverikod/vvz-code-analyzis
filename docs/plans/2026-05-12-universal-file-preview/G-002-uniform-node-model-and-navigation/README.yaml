step_id: G-002
name: Uniform node model and three-phase navigation
description: 'The HandlerDispatcher selects a FileHandler by file extension. The FileHandler
  produces the uniform Node representation (NodeKind + ordered block set + node identifier).
  The single NavigationProcedure runs in three phases against any focus Node: enumerate
  the focus node''s Block set, apply the polymorphic Selector to that set, render
  each selected Block via the BlockHandler keyed by the block''s own NodeKind. The
  Selector accepts three forms (slice string / list of int / list of str) dispatched
  by value shape; BlockHandler is one concept with five rendering rules (closed set).
  The PreviewBudget caps response size independently of the Selector.

  '
