step_id: G-008
name: YAML file handler
description: 'YamlFileHandler is the FileHandler family for .yaml, .yml files. It
  opens a YAML file and produces a root whose NodeKind depends on the document: mapping
  for YAML mappings, sequence for YAML sequences, scalar for bare scalars. The handler
  resolves node_ref using the project YAML tree infrastructure when present, otherwise
  as JSON-pointer-style paths derived from the loaded document. It does not implement
  navigation; it only opens, produces the root Node, and resolves identifiers to Nodes.

  '
