  2. Add `tree_node_to_json_dict` to the imported names from `code_analysis.core.tree_temp.tree_node` in the same tuple format as existing imports.
  3. Immediately after the full `validate_sidecar_source_sha256_field` function body (after its `return raw.lower()` line and the blank line following that function), insert the following function verbatim:

  ```python
  def serialize_sidecar_to_json_text(source_sha256: str, root: List[TreeNode]) -> str:
      """Build valid Sidecar JSON text with source_sha256 and root (C-002)."""
      sha = validate_sidecar_source_sha256_field(source_sha256)
      for node in root:
          validate_node_constraints(node)
      payload: Dict[str, Any] = {
          "source_sha256": sha,
          "root": [tree_node_to_json_dict(n) for n in root],
      }
      return json.dumps(payload, indent=2, ensure_ascii=False) + "\n"
  ```

