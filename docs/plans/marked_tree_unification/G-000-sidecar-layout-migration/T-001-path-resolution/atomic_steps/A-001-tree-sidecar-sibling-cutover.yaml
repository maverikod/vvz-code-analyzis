prompt: "Operation: modify_file\nTarget: code_analysis/core/cst_tree/tree_sidecar.py\n\n## Goal\nCut this module over to the sibling storage convention (C-003) and delete the\nlegacy .cst/ path resolver and the entire pending-sidecar mechanism. After this\nchange the module resolves and writes exactly one path per source file: the\nsibling tree file produced by sibling_tree_path.\n\n## MRS excerpt\n\n**C-023 SidecarLayoutMigration**\n- definition: The sidecar layout cutover (SidecarLayoutMigration, C-023) that redirects the remaining legacy tree-path call sites (not reached by consumer integration) onto the existing sibling_tree_path function and removes the three legacy layouts (.cst/ subdirectory, .trees/ mirror directory, .tree_sidecar adjacent file). It does not create sibling_tree_path; that function already exists from the storage work. Runs after G-001 through G-005 are built and verified end-to-end; this is the final layout cutover with no subsequent global step.\n- properties:\n\
  \  - final sidecar cutover after G-001..G-005 verification; no subsequent global step; NodeIdMap (C-025) UUID4 identity in MAP section\n  - replaces three independent legacy path resolvers (not delegates of one another) with sibling_tree_path: sidecar_path_for_py (.cst/) in cst_tree/tree_sidecar.py, the standalone resolve_trees_sidecar_path module (.trees/) in core/tree_temp/sidecar_paths.py which is removed whole, and the inline .tree_sidecar branch of the format-dispatch sidecar_path_for in tree_representation.py\n  - redirects write_sidecar_atomic to write at the sibling path\n  - removes the legacy pending-sidecar mechanism entirely (pending_sidecar_path_for_py, resolve_sidecar_write_path, promote_pending_sidecar_to_final, _cleanup_empty_pending_dir, the _pending subdirectory, and the is_file branch in write_sidecar_atomic); it is deleted, not migrated, because the edit-session lifecycle removes the pre-session no-source state\n  - redirects the reader functions\
  \ in tree_representation.py to resolve the sibling path\n  - redirects the direct legacy-path consumers onto sibling_tree_path: tree_builder, tree_saver, stable_tree, grep_block_resolver (.cst/), and tree_temp_write_commit, tree_temp_open_support (.trees/), so JSON and YAML tree files become siblings like every other format\n  - ensures TreeRepresentationRef carries the sibling path after validate_or_recreate_tree_file\n  - replaces legacy path assertions in tests with sibling path assertions\n  - hard cutover: no backward-compatibility shim\n\n**C-003 TreeFile**\n- definition: The on-disk artifact holding source content with node-id markers embedded natively per format.\n- properties:\n  - contains source content plus markers\n  - stored as a sibling file placed directly next to the source file it describes\n  - on-disk format is natively-marked content, not a separate JSON payload\n\n## Locked on-disk model (G-002 Batch-1; Python CST sidecar in this step)\n- New unified TreeFiles (JSON/YAML/markdown/text via G-002 TreeBuilder) use three sections\n  CHECKSUMS → MAP → TREE with UUID4 only in MAP.\n- This step keeps the existing Python CST sidecar wire format (CST_TREE_V1 header + JSON body)\n  but relocates it to the sibling path only; do not embed UUID4 in TREE here.\n- No subsequent global step after this cutover; no legacy `.cst/`, `.trees/`, or `.tree_sidecar` paths.\n\n## G-002 a8 baseline — sibling_convention.py (post Batch-1; read-only)\n```python\n\"\"\"\nSibling storage convention for TreeFile (C-003) and SourceFile (C-004).\n\nCo-located placement: TreeFile path is ``<source_name>.tree`` in the same directory\nas the SourceFile. On-disk TreeFile layout uses three sections (CHECKSUMS, MAP, TREE)\nwritten by TreeBuilder; this module provides the path formula only.\n\nAuthor: Vasiliy Zdanovskiy\nemail: vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nTREE_FILE_SUFFIX: str = \".tree\"\nSOURCE_FILE_INVARIANT: str = (\n    \"The tree system must never modify a SourceFile. \"\n    \"SourceFile is the source of truth outside any active edit session.\"\n)\n\n\ndef sibling_tree_path(source_abs: Path) -> Path:\n    if not source_abs.name:\n        raise ValueError(\n            f\"source_abs must be a file path with a name, got: {source_abs!r}\"\n        )\n    return source_abs.parent / (source_abs.name + TREE_FILE_SUFFIX)\n```\n\n## Dependency (already exists from tree storage and lifecycle (sibling storage convention))\ncode_analysis/tree/sibling_convention.py\
  \ provides:\n    def sibling_tree_path(source_abs: Path) -> Path\nIt maps <dir>/<stem>.<ext> -> <dir>/<stem>.<ext>.tree (full source filename plus\n\".tree\", same directory). NOTE the naming change: the removed sidecar_path_for_py\nproduced <parent>/.cst/<stem>.tree; the replacement produces <parent>/<name>.tree\nwhere <name> is the full filename (e.g. foo.py -> foo.py.tree, NOT foo.tree).\n\n## Required edits\n1. Imports: add\n       from code_analysis.tree.sibling_convention import sibling_tree_path\n   Keep the existing imports that are still used.\n\n2. Delete the module-level constant:\n       PENDING_SIDECAR_SUBDIR = \"_pending\"\n\n3. Delete these functions entirely (they implement the .cst/ and pending layouts):\n     - sidecar_path_for_py\n     - pending_sidecar_path_for_py\n     - resolve_sidecar_write_path\n     - _cleanup_empty_pending_dir\n     - promote_pending_sidecar_to_final\n\n4. Rewrite read_sidecar_payload(py_path: Path) -> Optional[Dict[str, Any]]:\n   It must read\
  \ only the single sibling path. Replace the loop over\n   (sidecar_path_for_py, pending_sidecar_path_for_py) with a single read of\n   sibling_tree_path(py_path.resolve()); if that file is missing or unreadable\n   return None; otherwise parse via parse_sidecar_file and return the payload.\n\n5. Rewrite write_sidecar_atomic(py_path: Path, tree: CSTTree) -> Path:\n   Resolve target_path = sibling_tree_path(py_path.resolve()). Remove the\n   final_path / pending_path / target_path-by-is_file branching and remove the\n   trailing pending-cleanup block. Keep the atomic write (tempfile in\n   target_path.parent, os.replace). The parent directory is the source directory\n   and always exists; do not create .cst/ or any subdirectory. Return target_path.\n   Update the docstring to say it writes the sibling tree file.\n\n6. Leave all other functions unchanged: compute_source_sha256_hex,\n   verify_sidecar_against_source, flatten_path_to_node_id, tree_to_sidecar_payload,\n   metadata_map_from_payload,\
  \ parse_sidecar_file, render_sidecar_file,\n   persist_tree_sidecar_after_edit, persisted_node_ids_from_payload,\n   parent_map_from_payload, aliases_from_payload, sidecar_matches_built_tree.\n   (persist_tree_sidecar_after_edit calls write_sidecar_atomic and needs no change.)\n\n7. Update the module docstring: the path form is now\n   \"<dir>/<stem>.<ext>.tree next to <dir>/<stem>.<ext>\"; remove the \".cst/\" and\n   \"_pending\" references.\n\n## Forbidden\n- No backward-compatibility shim for .cst/ or pending paths.\n- Do not change the sidecar file format (header CST_TREE_V1, JSON body).\n- Do not touch other files.\n\n## Full current file content (verbatim, 306 lines)\n```python\n\"\"\"\nCST tree sidecar files: ``{dir}/.cst/{name}.tree`` next to ``{dir}/{name}.py``.\n\nPersists node identity (path -> node_id) and full metadata for fast reload when\nthe source SHA-256 matches. Replaces trailing ``# cst-node-ids`` blocks in source.\n\nAuthor: Vasiliy Zdanovskiy\nemail: vasilyvz@gmail.com\n\
  \"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport json\nimport logging\nimport os\nimport tempfile\nfrom pathlib import Path\nfrom typing import Any, Dict, Optional\n\nfrom .models import CSTTree, TreeNodeMetadata\nfrom .node_id_markers import PersistedNodeIds, build_marker_path\nfrom .node_stable_id import logical_source_from_module\n\nlogger = logging.getLogger(__name__)\n\nSIDECAR_HEADER_PREFIX = \"CST_TREE_V1 sha256=\"\nSIDECAR_FORMAT_VERSION = 1\nPENDING_SIDECAR_SUBDIR = \"_pending\"\n\ndef sidecar_path_for_py(py_path: Path) -> Path:\n    \"\"\"Return ``{parent}/.cst/{stem}.tree`` for a ``.py`` path.\"\"\"\n    p = py_path.resolve()\n    return p.parent / \".cst\" / f\"{p.stem}.tree\"\n\ndef pending_sidecar_path_for_py(py_path: Path) -> Path:\n    \"\"\"Return ``{parent}/.cst/_pending/{stem}.tree`` while ``.py`` is not on disk yet.\"\"\"\n    p = py_path.resolve()\n    return p.parent / \".cst\" / PENDING_SIDECAR_SUBDIR / f\"{p.stem}.tree\"\n\ndef resolve_sidecar_write_path(py_path:\
  \ Path) -> Path:\n    \"\"\"Final sidecar path when ``.py`` exists, otherwise pending temp path.\"\"\"\n    py_path = py_path.resolve()\n    if py_path.is_file():\n        return sidecar_path_for_py(py_path)\n    return pending_sidecar_path_for_py(py_path)\n\ndef compute_source_sha256_hex(logical_source: str) -> str:\n    \"\"\"SHA-256 hex of UTF-8 bytes of *logical* source (parsed text).\"\"\"\n    return hashlib.sha256(logical_source.encode(\"utf-8\")).hexdigest()\n\ndef verify_sidecar_against_source(logical_source: str, payload: Dict[str, Any]) -> bool:\n    \"\"\"Return True if payload ``source_sha256`` matches *logical* source.\"\"\"\n    expected = payload.get(\"source_sha256\")\n    if not isinstance(expected, str) or len(expected) != 64:\n        return False\n    return expected == compute_source_sha256_hex(logical_source)\n\ndef flatten_path_to_node_id(\n    metadata_map: Dict[str, TreeNodeMetadata],\n    root_node_id: Optional[str],\n) -> Dict[str, str]:\n    \"\"\"path_indices\
  \ string (via :func:`build_marker_path`) -> node_id.\n\n    Used after rebuilding a module to re-run\n    :func:`tree_builder._build_tree_index` with the same node_id layout.\n    \"\"\"\n    out: Dict[str, str] = {}\n\n    def walk(node_id: str, path_indices: tuple[int, ...]) -> None:\n        meta = metadata_map.get(node_id)\n        if meta is None:\n            return\n        out[build_marker_path(path_indices)] = meta.node_id\n        for index, child_id in enumerate(meta.children_ids):\n            walk(child_id, path_indices + (index,))\n\n    if root_node_id and root_node_id in metadata_map:\n        walk(root_node_id, (0,))\n    return out\n\ndef tree_to_sidecar_payload(tree: CSTTree) -> Dict[str, Any]:\n    \"\"\"Serialize tree state for a ``.tree`` sidecar file (JSON-ready dict).\"\"\"\n    logical = logical_source_from_module(tree.module)\n    sha = compute_source_sha256_hex(logical)\n    meta_blob: Dict[str, Any] = {\n        nid: m.to_dict() for nid, m in tree.metadata_map.items()\n\
  \    }\n    # parent_map may have explicit None for root children — store separately\n    parent_with_nulls: Dict[str, Optional[str]] = dict(tree.parent_map)\n    return {\n        \"format_version\": SIDECAR_FORMAT_VERSION,\n        \"source_sha256\": sha,\n        \"root_node_id\": tree.root_node_id,\n        \"path_to_node_id\": flatten_path_to_node_id(\n            tree.metadata_map, tree.root_node_id\n        ),\n        \"metadata_map\": meta_blob,\n        \"metadata_node_order\": list(tree.metadata_map.keys()),\n        \"parent_map\": parent_with_nulls,\n        \"node_id_aliases\": dict(tree.node_id_aliases),\n    }\n\ndef metadata_map_from_payload(\n    blob: Any,\n    preferred_key_order: Optional[list[str]] = None,\n) -> Dict[str, TreeNodeMetadata]:\n    \"\"\"Rebuild ``metadata_map`` from sidecar JSON.\n\n    ``preferred_key_order`` restores insertion order after JSON round-trip\n    (``sort_keys=True`` reorders object keys lexicographically).\n    \"\"\"\n    if not isinstance(blob,\
  \ dict):\n        return {}\n    parsed: Dict[str, TreeNodeMetadata] = {}\n    for nid, raw in blob.items():\n        if not isinstance(nid, str) or not isinstance(raw, dict):\n            continue\n        try:\n            parsed[nid] = TreeNodeMetadata.from_dict(raw)\n        except (KeyError, TypeError, ValueError) as e:\n            logger.debug(\"Skip bad metadata entry %s: %s\", nid, e)\n            continue\n    if (\n        preferred_key_order\n        and len(preferred_key_order) == len(parsed)\n        and all(k in parsed for k in preferred_key_order)\n    ):\n        return {k: parsed[k] for k in preferred_key_order}\n    return parsed\n\ndef parse_sidecar_file(content: str) -> Optional[Dict[str, Any]]:\n    \"\"\"\n    Parse a ``.tree`` file: first line ``CST_TREE_V1 sha256=<hex>``, rest JSON.\n    \"\"\"\n    content = content.strip(\"\\ufeff\")\n    if not content.strip():\n        return None\n    lines = content.splitlines()\n    if not lines:\n        return None\n \
  \   header = lines[0].strip()\n    if not header.startswith(SIDECAR_HEADER_PREFIX):\n        return None\n    hex_part = header[len(SIDECAR_HEADER_PREFIX) :].strip()\n    if len(hex_part) != 64:\n        return None\n    body = \"\\n\".join(lines[1:]).lstrip(\"\\n\")\n    if not body.strip():\n        return None\n    try:\n        payload = json.loads(body)\n    except json.JSONDecodeError:\n        return None\n    if not isinstance(payload, dict):\n        return None\n    # Header is authoritative for checksum (also inside JSON for verify)\n    payload[\"source_sha256\"] = hex_part\n    return payload\n\ndef read_sidecar_payload(py_path: Path) -> Optional[Dict[str, Any]]:\n    \"\"\"Read and parse sidecar for ``py_path`` (final or pending) if it exists.\"\"\"\n    py_path = py_path.resolve()\n    for path in (sidecar_path_for_py(py_path), pending_sidecar_path_for_py(py_path)):\n        if not path.is_file():\n            continue\n        try:\n            text = path.read_text(encoding=\"\
  utf-8\")\n        except OSError as e:\n            logger.debug(\"Could not read sidecar %s: %s\", path, e)\n            continue\n        payload = parse_sidecar_file(text)\n        if payload is not None:\n            return payload\n    return None\n\ndef render_sidecar_file(payload: Dict[str, Any]) -> str:\n    \"\"\"Render full sidecar file text (header + JSON body).\"\"\"\n    sha = payload.get(\"source_sha256\")\n    if not isinstance(sha, str) or len(sha) != 64:\n        raise ValueError(\"payload must include valid source_sha256\")\n    body = dict(payload)\n    # body JSON should not duplicate header hash if present\n    body_json = json.dumps(body, sort_keys=True, separators=(\",\", \":\"))\n    return f\"{SIDECAR_HEADER_PREFIX}{sha}\\n{body_json}\\n\"\n\ndef _cleanup_empty_pending_dir(pending_path: Path) -> None:\n    pending_dir = pending_path.parent\n    if pending_dir.name != PENDING_SIDECAR_SUBDIR:\n        return\n    try:\n        pending_dir.rmdir()\n    except OSError:\n\
  \        pass\n\ndef promote_pending_sidecar_to_final(py_path: Path) -> Optional[Path]:\n    \"\"\"Rename ``.cst/_pending/{stem}.tree`` to ``.cst/{stem}.tree`` when ``.py`` exists.\"\"\"\n    py_path = py_path.resolve()\n    if not py_path.is_file():\n        return None\n    pending = pending_sidecar_path_for_py(py_path)\n    final = sidecar_path_for_py(py_path)\n    if not pending.is_file():\n        return final if final.is_file() else None\n    final.parent.mkdir(parents=True, exist_ok=True)\n    if final.is_file():\n        pending.unlink(missing_ok=True)\n        _cleanup_empty_pending_dir(pending)\n        return final\n    os.replace(str(pending), str(final))\n    _cleanup_empty_pending_dir(pending)\n    return final\n\ndef persist_tree_sidecar_after_edit(tree: CSTTree) -> Path:\n    \"\"\"Rewrite CST sidecar after each mutation (final or pending path).\"\"\"\n    if not tree.file_path:\n        raise ValueError(\"CSTTree.file_path is required to persist sidecar\")\n    return\
  \ write_sidecar_atomic(Path(tree.file_path), tree)\n\ndef write_sidecar_atomic(py_path: Path, tree: CSTTree) -> Path:\n    \"\"\"Write ``.cst/<stem>.tree`` or pending temp sidecar (atomic replace).\"\"\"\n    py_path = py_path.resolve()\n    final_path = sidecar_path_for_py(py_path)\n    pending_path = pending_sidecar_path_for_py(py_path)\n    target_path = final_path if py_path.is_file() else pending_path\n    payload = tree_to_sidecar_payload(tree)\n    cst_dir = target_path.parent\n    cst_dir.mkdir(parents=True, exist_ok=True)\n    text = render_sidecar_file(payload)\n    fd, tmp_name = tempfile.mkstemp(suffix=\".tree.tmp\", dir=str(cst_dir))\n    try:\n        with os.fdopen(fd, \"w\", encoding=\"utf-8\") as fh:\n            fh.write(text)\n        os.replace(tmp_name, str(target_path))\n    except Exception:\n        try:\n            os.unlink(tmp_name)\n        except OSError:\n            pass\n        raise\n    if py_path.is_file() and pending_path.is_file() and pending_path\
  \ != target_path:\n        pending_path.unlink(missing_ok=True)\n        _cleanup_empty_pending_dir(pending_path)\n    return target_path\n\ndef persisted_node_ids_from_payload(payload: Dict[str, Any]) -> PersistedNodeIds:\n    \"\"\"Extract path -> node_id map for :func:`_build_tree_index`.\"\"\"\n    raw = payload.get(\"path_to_node_id\")\n    if not isinstance(raw, dict):\n        return {}\n    out: PersistedNodeIds = {}\n    for k, v in raw.items():\n        if isinstance(k, str) and isinstance(v, str):\n            out[k] = v\n    return out\n\ndef parent_map_from_payload(payload: Dict[str, Any]) -> Dict[str, Optional[str]]:\n    raw = payload.get(\"parent_map\")\n    if not isinstance(raw, dict):\n        return {}\n    out: Dict[str, Optional[str]] = {}\n    for k, v in raw.items():\n        if not isinstance(k, str):\n            continue\n        if v is None or (isinstance(v, str) and v):\n            out[k] = v if isinstance(v, str) or v is None else None\n        else:\n \
  \           out[k] = None\n    return out\n\ndef aliases_from_payload(payload: Dict[str, Any]) -> Dict[str, str]:\n    raw = payload.get(\"node_id_aliases\")\n    if not isinstance(raw, dict):\n        return {}\n    return {\n        str(k): str(v)\n        for k, v in raw.items()\n        if isinstance(k, str) and isinstance(v, str)\n    }\n\ndef sidecar_matches_built_tree(tree: CSTTree, payload: Dict[str, Any]) -> bool:\n    \"\"\"True if rebuilt tree has the same path->node_id layout as sidecar.\"\"\"\n    expected = payload.get(\"path_to_node_id\")\n    if not isinstance(expected, dict):\n        return False\n    got = flatten_path_to_node_id(tree.metadata_map, tree.root_node_id)\n    return got == expected\n```\n"
