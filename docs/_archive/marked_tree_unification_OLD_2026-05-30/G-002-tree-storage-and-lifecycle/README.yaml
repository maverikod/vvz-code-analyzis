description: 'Establishes the co-located sibling storage convention: a TreeFile is
  placed as a direct sibling of the SourceFile it describes. Defines the ChecksumSyncPolicy
  as the single decision mechanism governing four states of tree-to-source alignment:
  no tree present, checksum match, checksum mismatch outside a session, and checksum
  mismatch inside an active session. An existing implementation of this policy already
  exists in the codebase; this step extends and integrates it rather than replacing
  it. Establishes TreeLifecycle as the single owner of tree validity and tree creation
  — every consumer routes through it, no ad-hoc per-call-site validation exists. Establishes
  TreeBuilder as the component that resolves FormatHandler via HandlerRegistry.default_registry().resolve(source_abs)
  and writes a new TreeFile from source content using FormatHandler.mark — the canonical
  unified build path per {c005}: TreeBuilder.build(*, content, source_abs, file_path,
  content_checksum) writes to FormatHandler.sidecar_path(source_abs) and records
  content_checksum in the tree file AND the returned tree reference. The legacy
  recreate_tree_from_content plus TreeFormatKind dispatch in checksum.py remains untouched as a parity oracle (strategy: new alongside
  old); physical legacy removal stays deferred to G-000 (SidecarLayoutMigration, C-023).
  G-002 defines the canonical sibling convention, lifecycle entities, and unified-pipeline
  integration only.'
executor_brief: 'Module ownership: code_analysis/core/tree_lifecycle/ is the single
  package for tree validity and creation (HRS {c006}). Submodules: checksum.py holds
  pure checksum helpers (compute_content_checksum, is_tree_valid per HRS {c004})
  plus ChecksumSyncPolicy (C-006) and validate_or_recreate_* entry points; builder.py
  holds TreeBuilder (C-011) unified-pipeline writer; lifecycle.py holds TreeLifecycle
  (C-010). Canonical path function: sibling_tree_path in code_analysis/tree/sibling_convention.py
  (T-001). Unified build path per {c005}: TreeBuilder.build(*, content, source_abs,
  file_path, content_checksum) resolves HandlerRegistry.default_registry().resolve(source_abs),
  calls FormatHandler.mark(content), writes marked bytes to FormatHandler.sidecar_path(source_abs),
  records content_checksum in the tree file AND exposes it in the returned tree reference.
  PythonHandler (G-001 A-007) wraps create_tree_from_code from code_analysis/core/cst_tree
  for parse_content and implements {b005} hybrid mark/unmark into foo.py.tree (SourceFile
  stays clean). Legacy oracle: recreate_tree_from_content(kind=TreeFormatKind, ...) in
  checksum.py is NOT modified and NOT called by TreeBuilder.build; parity tests (T-004)
  diff unified vs legacy on real fixtures. Policy wrapper: ChecksumSyncPolicy.decide
  delegates to resolve_sha_sync_policy in code_analysis/commands/universal_file_edit/sha_sync_policy.py
  (HRS {c002}). Path wrapper: validate_or_recreate_tree_file in checksum.py (HRS {c006});
  T-004 wires validate_or_recreate_from_content to TreeBuilder.build on the canonical
  path. G-000 deferral: removal of .trees/, .cst/, and .tree_sidecar legacy layouts
  and redirection of all call sites is exclusively G-000 scope — do not perform legacy
  removal in G-002.'
