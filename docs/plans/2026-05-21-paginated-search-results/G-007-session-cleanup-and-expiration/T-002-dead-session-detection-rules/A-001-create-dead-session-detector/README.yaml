prompt: "Create `code_analysis/search_session/dead_session_detector.py`.\n\n## MRS
  excerpt\n\nC-008 ServerProcessIdentity: main_pid and process_start_time of the owning\n\
  server process, optionally extended with host and instance_id.\n\nC-009 SessionHeartbeat:
  heartbeat_at timestamp updated periodically by the\nrunning search worker inside
  the manifest.\n\nC-010 DeadSessionDetection: rule set that decides whether a SearchSession\n\
  is dead or orphaned.\nRules:\n1. If main_pid from ServerProcessIdentity no longer
  exists in the OS\n   process table: session is DEAD.\n2. If process_start_time does
  not match the current process with that PID\n   (PID reuse): session is DEAD.\n\
  3. If heartbeat_at is older than the hard timeout constant: session is\n   TIMED_OUT
  (or orphaned).\nApplication: the same rule set is applied during status reads and
  during\nbackground maintenance before directory removal is permitted.\n\n## Implementation
  requirements\n\n1. Import `dataclasses`, `enum`, `datetime`, `os`.\n\n2. Define
  constant:\n   `HEARTBEAT_HARD_TIMEOUT_SECONDS: int = 300`  # 5 minutes\n\n3. Define
  `DeadSessionOutcome(str, enum.Enum)` with members:\n   LIVE = \"live\",\n   DEAD_PID_MISSING
  = \"dead_pid_missing\",\n   DEAD_PID_REUSED = \"dead_pid_reused\",\n   TIMED_OUT
  = \"timed_out\".\n\n4. Define `@dataclasses.dataclass(frozen=True)` class `ProcessSnapshot`:\n\
  \   - Fields: `main_pid: int`, `process_start_time: float`.\n\n5. Define function:\n\
  \   ```python\n   def pid_exists(pid: int) -> bool:\n   ```\n   Uses `os.kill(pid,
  0)` inside try/except `OSError` to check existence.\n   Returns True if the process
  exists, False otherwise.\n\n6. Define function:\n   ```python\n   def classify_session(\n\
  \       stored_identity: ProcessSnapshot,\n       current_identity: ProcessSnapshot,\n\
  \       heartbeat_at: datetime.datetime,\n       now: datetime.datetime,\n     \
  \  hard_timeout_seconds: int = HEARTBEAT_HARD_TIMEOUT_SECONDS,\n   ) -> DeadSessionOutcome:\n\
  \   ```\n   - If not `pid_exists(stored_identity.main_pid)`: return DEAD_PID_MISSING.\n\
  \   - If `stored_identity.process_start_time != current_identity.process_start_time`:\n\
  \     return DEAD_PID_REUSED.\n   - If `(now - heartbeat_at).total_seconds() > hard_timeout_seconds`:\n\
  \     return TIMED_OUT.\n   - Else: return LIVE.\n\n## Constraints\n- Standard library
  only.\n- All public names have one-line docstrings.\n- File under 75 lines.\n"
