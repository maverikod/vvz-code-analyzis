# Pytest configuration for code_analysis project.
# Restricts collection to tests/ only so test_data/ and other trees are not collected.
#
# Author: Vasiliy Zdanovskiy
# email: vasilyvz@gmail.com

[pytest]
testpaths = tests
norecursedirs = .git .venv __pycache__ .mypy_cache .ruff_cache htmlcov .pytest_cache old_code backups data logs
