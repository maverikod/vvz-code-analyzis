- C-004
- C-005
- C-009
inputs:
- name: MarkerContract specification
  type: MRS concept definition (C-001)
  description: The three-operation contract (mark, parse, unmark) defined in MRS
    as C-001 that each FormatHandler must implement.
- name: AddressableBlock specification
  type: MRS concept definition (C-005)
  description: Per-format minimal addressable unit defined in MRS as C-005; 
    constrains marker placement to block boundaries only.
outputs:
- name: FormatHandler entity definition
  type: domain entity definition
  description: "The per-format component contract with the four handler-contract operations
    (parse_content, mark, unmark, sidecar_path) and the constraint that it uses only
    its own format marker syntax.\n"
- name: Five handler instance definitions
  type: domain entity definition
  description: Text, markdown, YAML, JSON, and Python handler instances with 
    their format-native marker syntax specified; Python hybrid scheme 
    documented.
