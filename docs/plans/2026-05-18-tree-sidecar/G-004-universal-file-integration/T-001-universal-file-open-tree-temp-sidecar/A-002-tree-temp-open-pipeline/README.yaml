  def open_tree_temp_with_sidecar(
      *,
      project_id: str,
      file_path: str,
      abs_path: Path,
      descriptor: FormatDescriptor,
      active_session_for_target: bool,
  ) -> Union[SuccessResult, ErrorResult]:
      """
      Run SHASyncPolicy (C-003), obtain TreeNode roots (C-001) from sidecar (C-002) or rebuild from source,
      register EditSession (C-007) via create_session extended fields, return session payload.
      One-line summary for docstring.
      """

  ## Algorithm (open_tree_temp_with_sidecar)
  1. Read `abs_path` bytes; compute `current_source_sha256` as lowercase hex SHA-256.
  2. Determine `sidecar_presence` and `persisted_source_sha256` using sidecar reader (None if missing).
  3. Call policy resolver with inputs from tactical TS: sidecar_presence, persisted checksum, current checksum,
     active_session_for_target boolean.
  4. Branch outcomes:
     - load roots from sidecar JSON when policy selects sidecar authority (sha_match or session-priority mismatch).
     - parse source bytes via SourceParser (json/yaml per descriptor.handler_id) when policy selects rebuild;
       assign stable_ids per parser rules (new UUIDs on rebuild).
     - no_sidecar: parse source; sidecar_write_intent = "create".
     - sha_mismatch_no_session: parse source; sidecar_write_intent = "replace".
     - sha_mismatch_active_session: deserialize sidecar only; sidecar_write_intent = "none".
  5. Build `create_session` call with **`tree_temp_roots=_clone_roots(...)`**, **`source_sha256_at_open=current_source_sha256`**,
     `dirty=False`, `sidecar_write_intent` as resolved, `tree_id=None` for pure TreeNode path (unless legacy registry id required).
  6. SuccessResult data keys: success True, session_id, format_group descriptor.format_group,
     acquisition_outcome (dict with branch name and load path), acknowledged_format_group tree-temp,
     available_operations from descriptor.

  ## Errors
  - Map policy failures and parse failures to stable ErrorResult codes already used by universal_file_open
    (reuse make_error from errors.py where applicable).

  ## Edge cases
  - Empty file: parser produces valid minimal tree per format.
  - Missing sidecar when policy requires load: treat as implementation bug — policy layer must prevent.

