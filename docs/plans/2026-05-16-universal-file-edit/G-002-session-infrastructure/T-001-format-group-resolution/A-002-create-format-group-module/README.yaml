  C-002 FormatGroup: Classification of a file into sidecar/tree-temp/text group.
    Properties: sidecar (Python) draft is <file>.cst_sidecar persists after close.
    tree-temp (JSON, YAML) draft is <file>.draft deleted after close.
    text (MD, txt, rst, adoc) draft is <file>.draft copy deleted after close.
    Group resolved from file extension.
  C-003 DraftFile: On-disk working copy written after every mutation.
    sidecar group: <file>.cst_sidecar. tree-temp group: <file>.draft. text group: <file>.draft.
  C-004 WriteLockfile: On-disk lockfile containing server PID.
    Path is <file>.write. Contains server process PID as text.
