  - use_queue = False (C-009 queue: false).
  - The command is read-only: it never mutates the working tree, index, or refs.
  - Only the exact git argv shown above is ever passed to run_git_read (base ["blame", "--line-porcelain"], optionally appending rev, then always appending ["--", file_path]); no additional or different git options.
  - rev is rejected with ErrorResult code "VALIDATION_ERROR" when it starts with "-".
  - file_path is required and confined via the canonical confine_project_git_path (code_analysis.core.project_git.path_confinement, owned by G-006/T-002/A-001 per the git-spec object matrix's git_path_confinement_mechanism); on rejection return the ErrorResult it produces unchanged (code "GIT_PATH_OUTSIDE_PROJECT"); the ORIGINAL project-relative string is passed to git argv, never the resolved Path.
  - Porcelain parsing: a header line is detected when its first whitespace-delimited token is exactly 40 characters, all lowercase hex digits; its 3rd space-separated token (index 2) is the final line number for that block. A line starting with "author " sets the current author (text after the "author " prefix). A line starting with a tab character is a content line: emit {"line_no": current_line_no, "hash": current_hash, "author": current_author, "content": <text after the tab>}.
  - get_schema() sets "additionalProperties": False and "required": ["project_id", "file_path"].
  - ErrorResult.code is typed as int by mcp_proxy_adapter.commands.result.ErrorResult, but this codebase uses string application codes; every string code is passed through typing.cast(Any, "<CODE>") exactly as shown.
