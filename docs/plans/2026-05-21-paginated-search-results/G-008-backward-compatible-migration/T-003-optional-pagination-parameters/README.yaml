description: "Extends ExistingSearchCommand surfaces with OptionalPaginationParameters
  as non-required\nrequest and response fields, then adds paginated execute wiring
  extension modules that\ncall legacy commands, normalize findings into the session
  raw finding buffer (C-028),\nand publish the first SearchResultBlock (C-004) without
  modifying monolith command files\nover 400 lines. Schema extension AS (A-001 through
  A-004) document optional paginated,\njob_id, include_job_id, and block_position
  fields. Execute wiring AS (A-005 through\nA-009) implement session-backed first-block
  publication per backend.\n"
