step_id: T-002
parent_global_step: G-004
name: Apply EditOperations to sidecar group draft
description: Apply a validated batch of EditOperations (C-007) to a sidecar
  group session. Retrieve the CSTTree from the in-memory store using
  `get_tree(session.tree_id)` from `core/cst_tree/tree_builder.py`
  (ExistingInfrastructure C-012). For each operation in received order:
  translate the operation into the CST op format and call `run_ops_mode`
  from `core/file_handlers/python_handler.py`; after each successful operation
  call `write_sidecar_atomic(tree, file_path)` from
  `core/cst_tree/tree_sidecar.py` to persist the updated DraftFile (C-003).
  The original file is not touched at any point.
  Return the updated top-level node list from the tree.
concepts:
- C-006
- C-007
- C-012
inputs:
- name: session
  type: EditSession
- name: validated_batch
  type: list of EditOperation
  description: Batch that has passed ancestor-descendant validation for the sidecar group.
  type: list of EditOperation
  description: Batch confirmed valid by BatchValidation (T-001).
outputs:
- name: updated_node_list
  type: list of node descriptors
  description: Top-level CST nodes after all operations applied.
atomic_steps: []
status: draft