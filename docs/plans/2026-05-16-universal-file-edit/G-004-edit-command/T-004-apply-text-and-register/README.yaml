step_id: T-004
parent_global_step: G-004
name: Apply EditOperations to text group draft and register EditCommand
description: Apply a batch of EditOperations (C-007) to a text group session.
  Sort operations by start_line descending using _sort_text_replacements_bottom_up
  from ExistingInfrastructure (C-012). Apply all operations to the in-memory
  buffer. Write the buffer to <file>.draft (DraftFile C-003) once after all
  operations. Return updated line count. Also register the universal_file_edit
  MCP command in hooks.py so the command is callable.
concepts:
- C-006
- C-007
- C-012
inputs:
- name: session
  type: EditSession
  description: Active text group session with in-memory buffer.
- name: operations
  type: list of EditOperation
  description: Batch of operations with start_line/end_line addressing.
outputs:
- name: updated_line_count
  type: int
  description: Total line count of the draft after all operations applied.
atomic_steps: []
status: draft