step_id: T-001
parent_global_step: G-006
name: XPath-like universal structural filter
description: "Create and modify the XPathLikeFilter entity as a single universal structural
  filter over validated TreeRepresentation data, not ad-hoc text. The filter evaluates
  XPath-like queries and returns only matching tree nodes.\nSource routing is unified:
  the same filter logic applies whether the tree comes from current database-backed
  structural data, indexer in-memory structures (before persistence or vectorization),
  dynamically built trees for stale or unindexed files, or draft-session content.
  The tree source may differ; the structure model, stable node identifiers, and selector
  semantics must stay aligned with the indexer and with runtime search.\nBefore filtering,
  each candidate tree must already satisfy TreeRepresentation validity per G-005 (checksum
  or equivalent freshness; recreate when missing or invalid). The filter does not
  redefine TreeRepresentation; it consumes validated trees only.\nFor every matching
  node, emit PreviewReference data per G-005 (file path, stable node identifier or
  selector, draft session identifier when applicable). Do not expose unstable node
  identifiers as preview-compatible. Do not invent a separate display model for nodes.\n\
  Cross-mode alignment requirement (source line 63): structural grep and XPath-like
  search must share the same tree model. Document and enforce that any grep path that
  participates in project cross-search as structural input must use the same structure
  model, node identifiers, and selector semantics as this filter. Text-only line search
  may remain a separate standalone mode under GrepSearchMode (C-019) but must not
  bypass this shared model when contributing structural candidates.\nIndexer parity:
  the indexer must use the same tree construction and XPath-like filtering code as
  runtime search; only the tree source differs.\n"
concepts:
- C-016
- C-015
- C-017
inputs:
- name: validated_tree
  type: TreeRepresentation
  description: "Validated structural tree for one file or draft session, from database,
    indexer memory, dynamic construction, or draft content. Must pass G-005 freshness
    and stable-identity rules before filtering.\n"
- name: xpath_like_query
  type: structural_query
  description: "XPath-like query expression evaluated against the validated tree structure,
    not raw file text.\n"
- name: tree_source_kind
  type: enumeration
  description: "Which origin supplied the tree (indexed database, indexer in-memory,
    dynamic rebuild, draft session) for tracing and consistent routing only; does
    not change filter semantics.\n"
outputs:
- name: matching_nodes
  type: tree_node_set
  description: "Tree nodes that satisfy the query over the validated representation.\n"
- name: preview_references
  type: PreviewReference_list
  description: "One preview-compatible reference per returned node, sufficient for
    PreviewReference-compatible inspection per G-005 (C-017).\n"
- name: shared_tree_model_contract
  type: alignment_specification
  description: "Documented requirement that structural grep and XPath-like filtering
    share structure model, node identifiers, and selector semantics (source line 63).\n"
atomic_steps:
- A-001
