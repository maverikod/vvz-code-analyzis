prompt: "Operation: modify_file\nTarget: code_analysis/core/search_session/tree_representation.py\n\n## Goal\nCut this module over to the sibling storage convention (C-003). This module is\nthe central TreeRepresentation dispatcher that resolves sidecar paths, classifies\nformats, validates checksum freshness, and recreates trees. It currently depends\non three legacy path resolvers replaced by sibling_tree_path:\n  - sidecar_path_for_py (from cst_tree.tree_sidecar) — no longer exported\n  - resolve_trees_sidecar_path (from tree_temp.sidecar_paths) — module absent\n  - the inline ``<source>.tree_sidecar`` adjacent path (local constant here)\n\n## Preconditions\n- tree_sidecar.py already resolves and reads/writes only via sibling_tree_path.\n- core/tree_temp/sidecar_paths.py no longer exists.\n\nThree-section TreeFile parse and write (CHECKSUMS, MAP, TREE) is owned by G-002\nTreeBuilder (C-011); this step performs path cutover only — do not implement\nparse_tree_file or a new three-section writer here.\n\nAfter this change ALL five formats (python_cst, json, yaml, markdown, text)\nresolve to one path per source file: the sibling tree file produced by\nsibling_tree_path.\n\n## MRS excerpt\n\n**C-023 SidecarLayoutMigration**\n- definition: The sidecar layout cutover\
  \ (SidecarLayoutMigration, C-023) that redirects the remaining legacy tree-path call sites (not reached by consumer integration) onto the existing sibling_tree_path function and removes the three legacy layouts (.cst/ subdirectory, .trees/ mirror directory, .tree_sidecar adjacent file). It does not create sibling_tree_path; that function already exists from the storage work. Runs after G-001 through G-005 are built and verified end-to-end; this is the final layout cutover with no subsequent global step.\n- properties:\n  - final sidecar cutover after G-001..G-005 verification; no subsequent global step; NodeIdMap (C-025) UUID4 identity in MAP section\n  - replaces three independent legacy path resolvers (not delegates of one another) with sibling_tree_path: sidecar_path_for_py (.cst/) in cst_tree/tree_sidecar.py, the standalone resolve_trees_sidecar_path module (.trees/) in core/tree_temp/sidecar_paths.py which is removed whole, and the inline .tree_sidecar branch\
  \ of the format-dispatch sidecar_path_for in tree_representation.py\n  - redirects write_sidecar_atomic to write at the sibling path\n  - removes the legacy pending-sidecar mechanism entirely (pending_sidecar_path_for_py, resolve_sidecar_write_path, promote_pending_sidecar_to_final, _cleanup_empty_pending_dir, the _pending subdirectory, and the is_file branch in write_sidecar_atomic); it is deleted, not migrated, because the edit-session lifecycle removes the pre-session no-source state\n  - redirects the reader functions in tree_representation.py to resolve the sibling path\n  - redirects the direct legacy-path consumers onto sibling_tree_path: tree_builder, tree_saver, stable_tree, grep_block_resolver (.cst/), and tree_temp_write_commit, tree_temp_open_support (.trees/), so JSON and YAML tree files become siblings like every other format\n  - ensures TreeRepresentationRef carries the sibling path after validate_or_recreate_tree_file\n  - replaces legacy path assertions in tests with\
  \ sibling path assertions\n  - hard cutover: no backward-compatibility shim\n\n**C-003 TreeFile**\n- definition: The on-disk artifact holding source content with node-id markers embedded natively per format.\n- properties:\n  - contains source content plus markers\n  - stored as a sibling file placed directly next to the source file it describes\n  - on-disk format is natively-marked content, not a separate JSON payload\n\n## Dependency (already exists from tree storage and lifecycle (sibling storage convention))\ncode_analysis/tree/sibling_convention.py provides:\n    def sibling_tree_path(source_abs: Path) -> Path\nIt maps <dir>/<stem>.<ext> -> <dir>/<stem>.<ext>.tree (full source filename plus\n\".tree\", same directory; e.g. foo.py -> foo.py.tree, data.json -> data.json.tree).\n\n## Required edits (migration-relevant ONLY; do not refactor anything else)\n1. Imports:\n   - Change the cst_tree.tree_sidecar import to bring in only read_sidecar_payload\n     (drop sidecar_path_for_py):\n\
  \         from code_analysis.core.cst_tree.tree_sidecar import read_sidecar_payload\n   - Delete the line:\n         from code_analysis.core.tree_temp.sidecar_paths import resolve_trees_sidecar_path\n   - Add:\n         from code_analysis.tree.sibling_convention import sibling_tree_path\n\n2. Delete the module-level constant:\n       _ADJACENT_SIDECAR_SUFFIX = \".tree_sidecar\"\n\n3. Rewrite sidecar_path_for(file_path: str, project_root: Path) -> Path so it\n   returns the sibling path for ALL formats (no per-kind branching):\n       source_abs = (project_root / Path(file_path)).resolve()\n       return sibling_tree_path(source_abs)\n   Update the docstring to state that all formats use the sibling convention\n   ``<source>.tree`` next to the source file. Remove the .trees/, .cst/, and\n   .tree_sidecar references from the docstring.\n\n4. In _read_cst_digest_and_root, delete the dead branch that calls the removed\n   sidecar_path_for_py. The two branches return the identical value; collapse\
  \ to\n   a single final ``return digest.lower(), root_stable_id``. Keep the function\n   signature unchanged (the sidecar_path parameter stays, even though unused --\n   flake8 does not flag unused parameters).\n\n5. In _recreate_tree_for_format, python_cst branch:\n   - Delete the local import ``from code_analysis.core.cst_tree.tree_sidecar import\n     write_sidecar_atomic``.\n   - Delete the unreachable, type-broken fallback:\n         if not sidecar_path.is_file():\n             write_sidecar_atomic(source_abs, {\"source_sha256\": content_checksum})\n     Rationale: create_tree_from_code(persist_sidecar=True) already writes the\n     sidecar via the correct create mechanism; for a broken .py source it raises\n     ParserSyntaxError before reaching this point, so the fallback is dead code,\n     and it passed a dict where write_sidecar_atomic expects a CSTTree.\n   Keep create_tree_from_code(...) and the subsequent _read_cst_digest_and_root\n   call exactly as they are.\n\n6. Update\
  \ the trailing comment in _recreate_tree_for_format from\n   ``# markdown or text -- adjacent .tree_sidecar`` to\n   ``# markdown or text -- sibling .tree``.\n\n## Forbidden\n- No backward-compatibility shim for .cst/, .trees/, or .tree_sidecar paths.\n- Path cutover only: do not implement parse_tree_file, NodeIdMap serialization,\n  or a new three-section TreeFile writer here (G-002 TreeBuilder owns write).\n- Do not remove or rename any other function; keep classify_tree_format, all\n  _read_* readers, _read_sidecar_state, validate_or_recreate_tree, and __all__.\n- Do not touch the preexisting module-level imports os, yaml, Any even though they\n  are unused; they predate this task and are out of scope (migration-only change).\n- Do not touch other files.\n\n## Full current file content (verbatim, 325 lines)\n```python\n\"\"\"\nTreeRepresentation validation lifecycle for paginated search sessions.\n\nIntegration layer over existing tree-temp and CST sidecar storage. Full tree\nparsers are delegated to indexer hooks; this module resolves sidecar paths,\nclassifies\
  \ formats, and validates checksum freshness before structural search.\n\nAuthor: Vasiliy Zdanovskiy\nemail: vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__ import annotations\n\nimport hashlib\nimport json\nimport os\nimport yaml\nfrom dataclasses import dataclass\nfrom enum import Enum\nfrom pathlib import Path\nfrom typing import Any, Optional, cast\n\nfrom code_analysis.core.cst_tree.tree_sidecar import (\n    read_sidecar_payload,\n    sidecar_path_for_py,\n)\nfrom code_analysis.core.structure_extraction.format_registry import (\n    JSON_SUFFIX,\n    MD_SUFFIXES,\n    PY_SUFFIXES,\n    TEXT_PLAIN_SUFFIXES,\n    YAML_SUFFIXES,\n    suffix_for_path,\n)\nfrom code_analysis.core.tree_temp.sidecar_paths import resolve_trees_sidecar_path\nfrom code_analysis.core.tree_temp.sidecar_payload import (\n    SidecarParseError,\n    loads_sidecar,\n)\n\n_ADJACENT_SIDECAR_SUFFIX = \".tree_sidecar\"\n\nclass TreeFormatKind(str, Enum):\n    \"\"\"Supported TreeRepresentation storage formats.\"\"\"\n\
  \n    json = \"json\"\n    yaml = \"yaml\"\n    python_cst = \"python_cst\"\n    markdown = \"markdown\"\n    text = \"text\"\nclass TreeValidityState(str, Enum):\n    \"\"\"Whether validate_or_recreate_tree returned an existing valid sidecar or rebuilt it.\"\"\"\n\n    reused = \"reused\"\n    recreated = \"recreated\"\n\n@dataclass(frozen=True)\nclass TreeRepresentationRef:\n    \"\"\"Validated on-disk tree sidecar reference for one project file.\"\"\"\n\n    file_path: str\n    sidecar_path: Path\n    content_checksum: str\n    root_stable_id: Optional[str]\n\ndef classify_tree_format(file_path: str) -> TreeFormatKind:\n    \"\"\"Map a project-relative file path to its TreeRepresentation format.\"\"\"\n    suffix = suffix_for_path(file_path)\n    if suffix == JSON_SUFFIX:\n        return TreeFormatKind.json\n    if suffix in YAML_SUFFIXES:\n        return TreeFormatKind.yaml\n    if suffix in PY_SUFFIXES:\n        return TreeFormatKind.python_cst\n    if suffix in MD_SUFFIXES:\n   \
  \     return TreeFormatKind.markdown\n    if suffix in TEXT_PLAIN_SUFFIXES:\n        return TreeFormatKind.text\n    raise ValueError(f\"unsupported tree format for path: {file_path}\")\n\ndef sidecar_path_for(file_path: str, project_root: Path) -> Path:\n    \"\"\"Return the absolute sidecar path for *file_path* under *project_root*.\n\n    JSON and YAML use ``project_root/.trees/<rel>.tree`` (tree-temp layout).\n    Python CST uses ``<parent>/.cst/<stem>.tree`` next to the source file.\n    Markdown and plain text use adjacent ``<source>.tree_sidecar`` naming when\n    no shared ``.trees/`` mirror exists for that format group.\n    \"\"\"\n    rel = Path(file_path)\n    kind = classify_tree_format(file_path)\n    source_abs = (project_root / rel).resolve()\n    if kind == TreeFormatKind.python_cst:\n        return cast(Path, sidecar_path_for_py(source_abs))\n    if kind in {TreeFormatKind.json, TreeFormatKind.yaml}:\n        return cast(Path, resolve_trees_sidecar_path(project_root.resolve(),\
  \ rel))\n    return source_abs.with_name(source_abs.name + _ADJACENT_SIDECAR_SUFFIX)\n\ndef _compute_file_sha256_hex(source_abs: Path) -> str:\n    digest = hashlib.sha256()\n    with source_abs.open(\"rb\") as handle:\n        for chunk in iter(lambda: handle.read(65536), b\"\"):\n            digest.update(chunk)\n    return digest.hexdigest()\n\ndef _read_tree_temp_root_stable_id(sidecar_path: Path) -> Optional[str]:\n    try:\n        text = sidecar_path.read_text(encoding=\"utf-8\")\n    except OSError:\n        return None\n    try:\n        doc = loads_sidecar(text)\n    except (SidecarParseError, ValueError):\n        return None\n    if not doc.root_nodes:\n        return None\n    return cast(str, doc.root_nodes[0].stable_id)\n\ndef _read_tree_temp_digest(sidecar_path: Path) -> Optional[str]:\n    try:\n        text = sidecar_path.read_text(encoding=\"utf-8\")\n    except OSError:\n        return None\n    try:\n        doc = loads_sidecar(text)\n    except (SidecarParseError,\
  \ ValueError):\n        return None\n    return cast(str, doc.source_sha256)\n\ndef _read_cst_digest_and_root(\n    source_abs: Path, sidecar_path: Path\n) -> tuple[Optional[str], Optional[str]]:\n    payload = read_sidecar_payload(source_abs)\n    if payload is None:\n        return None, None\n    digest = payload.get(\"source_sha256\")\n    if not isinstance(digest, str) or len(digest) != 64:\n        return None, None\n    root_id = payload.get(\"root_node_id\")\n    root_stable_id = root_id if isinstance(root_id, str) and root_id else None\n    if sidecar_path != sidecar_path_for_py(source_abs):\n        return digest.lower(), root_stable_id\n    return digest.lower(), root_stable_id\n\ndef _read_adjacent_sidecar_digest(sidecar_path: Path) -> Optional[str]:\n    try:\n        text = sidecar_path.read_text(encoding=\"utf-8\")\n    except OSError:\n        return None\n    try:\n        payload = json.loads(text)\n    except json.JSONDecodeError:\n        return None\n    if not isinstance(payload,\
  \ dict):\n        return None\n    digest = payload.get(\"source_sha256\")\n    if not isinstance(digest, str) or len(digest) != 64:\n        return None\n    return digest.lower()\n\ndef _read_adjacent_root_stable_id(sidecar_path: Path) -> Optional[str]:\n    try:\n        text = sidecar_path.read_text(encoding=\"utf-8\")\n    except OSError:\n        return None\n    try:\n        payload = json.loads(text)\n    except json.JSONDecodeError:\n        return None\n    if not isinstance(payload, dict):\n        return None\n    root_id = payload.get(\"root_stable_id\")\n    if isinstance(root_id, str) and root_id:\n        return root_id\n    root_nodes = payload.get(\"root\")\n    if isinstance(root_nodes, list) and root_nodes:\n        first = root_nodes[0]\n        if isinstance(first, dict):\n            stable_id = first.get(\"stable_id\")\n            if isinstance(stable_id, str) and stable_id:\n                return stable_id\n    return None\n\ndef _read_sidecar_state(\n    *,\n\
  \    kind: TreeFormatKind,\n    source_abs: Path,\n    sidecar_path: Path,\n) -> tuple[Optional[str], Optional[str]]:\n    if not sidecar_path.is_file():\n        return None, None\n    if kind == TreeFormatKind.python_cst:\n        return _read_cst_digest_and_root(source_abs, sidecar_path)\n    if kind in {TreeFormatKind.json, TreeFormatKind.yaml}:\n        digest = _read_tree_temp_digest(sidecar_path)\n        root_id = _read_tree_temp_root_stable_id(sidecar_path)\n        return digest, root_id\n    digest = _read_adjacent_sidecar_digest(sidecar_path)\n    root_id = _read_adjacent_root_stable_id(sidecar_path)\n    return digest, root_id\n\ndef _recreate_tree_for_format(\n    *,\n    kind: TreeFormatKind,\n    project_root: Path,\n    file_path: str,\n    source_abs: Path,\n    content_checksum: str,\n) -> TreeRepresentationRef:\n    \"\"\"Rebuild a missing or stale sidecar via existing indexer tree builders.\"\"\"\n    import os\n    import yaml as _yaml\n    source_text = source_abs.read_text(encoding=\"\
  utf-8\")\n    sidecar_path = sidecar_path_for(file_path, project_root)\n    if kind == TreeFormatKind.python_cst:\n        from code_analysis.core.cst_tree.tree_builder import create_tree_from_code\n        from code_analysis.core.cst_tree.tree_sidecar import write_sidecar_atomic\n        create_tree_from_code(str(source_abs), source_text, persist_sidecar=True)\n        if not sidecar_path.is_file():\n            write_sidecar_atomic(source_abs, {\"source_sha256\": content_checksum})\n        digest, root_stable_id = _read_cst_digest_and_root(source_abs, sidecar_path)\n        return TreeRepresentationRef(\n            file_path=file_path, sidecar_path=sidecar_path,\n            content_checksum=content_checksum, root_stable_id=root_stable_id,\n        )\n    if kind == TreeFormatKind.json:\n        from code_analysis.core.json_tree.tree_builder import build_tree_from_data\n        from code_analysis.core.tree_temp.sidecar_payload import serialize_sidecar_to_json_text\n        data = json.loads(source_text)\n\
  \        tree = build_tree_from_data(data, source_path=str(source_abs))\n        sidecar_text = serialize_sidecar_to_json_text(tree, source_sha256=content_checksum)\n        sidecar_path.parent.mkdir(parents=True, exist_ok=True)\n        tmp = sidecar_path.with_suffix(sidecar_path.suffix + \".tmp\")\n        tmp.write_text(sidecar_text, encoding=\"utf-8\")\n        os.replace(tmp, sidecar_path)\n        return TreeRepresentationRef(\n            file_path=file_path, sidecar_path=sidecar_path,\n            content_checksum=content_checksum, root_stable_id=_read_tree_temp_root_stable_id(sidecar_path),\n        )\n    if kind == TreeFormatKind.yaml:\n        from code_analysis.core.yaml_tree.tree_builder import build_yaml_tree_from_data\n        from code_analysis.core.tree_temp.sidecar_payload import serialize_sidecar_to_json_text\n        data = _yaml.safe_load(source_text)\n        tree = build_yaml_tree_from_data(data, source_path=str(source_abs))\n        sidecar_text = serialize_sidecar_to_json_text(tree,\
  \ source_sha256=content_checksum)\n        sidecar_path.parent.mkdir(parents=True, exist_ok=True)\n        tmp = sidecar_path.with_suffix(sidecar_path.suffix + \".tmp\")\n        tmp.write_text(sidecar_text, encoding=\"utf-8\")\n        os.replace(tmp, sidecar_path)\n        return TreeRepresentationRef(\n            file_path=file_path, sidecar_path=sidecar_path,\n            content_checksum=content_checksum, root_stable_id=_read_tree_temp_root_stable_id(sidecar_path),\n        )\n    # markdown or text — adjacent .tree_sidecar\n    from code_analysis.core.structure_extraction.extractor import extract_structure\n    extract_structure(str(source_abs), ensure_persisted_tree=True)\n    payload: dict = {\"source_sha256\": content_checksum}\n    root_stable_id = _read_adjacent_root_stable_id(sidecar_path)\n    if root_stable_id is not None:\n        payload[\"root_stable_id\"] = root_stable_id\n    tmp = sidecar_path.with_suffix(sidecar_path.suffix + \".tmp\")\n    tmp.write_text(json.dumps(payload,\
  \ indent=2), encoding=\"utf-8\")\n    os.replace(tmp, sidecar_path)\n    return TreeRepresentationRef(\n        file_path=file_path, sidecar_path=sidecar_path,\n        content_checksum=content_checksum, root_stable_id=root_stable_id,\n    )\n\ndef validate_or_recreate_tree(\n    *,\n    project_root: Path,\n    file_path: str,\n    force: bool = False,\n) -> tuple[TreeRepresentationRef, TreeValidityState]:\n    \"\"\"Validate sidecar checksum against source SHA-256 or recreate when stale.\n\n    Returns (ref, reused) when fresh; (ref, recreated) after rebuild.\n    Raises FileNotFoundError when source absent.\n    \"\"\"\n    kind = classify_tree_format(file_path)\n    root = project_root.resolve()\n    source_abs = (root / file_path).resolve()\n    if not source_abs.is_file():\n        raise FileNotFoundError(f\"source file not found: {source_abs}\")\n    content_checksum = _compute_file_sha256_hex(source_abs)\n    sidecar_path = sidecar_path_for(file_path, root)\n    if not force:\n\
  \        sidecar_digest, root_stable_id = _read_sidecar_state(\n            kind=kind, source_abs=source_abs, sidecar_path=sidecar_path,\n        )\n        if sidecar_digest is not None and sidecar_digest == content_checksum:\n            return (\n                TreeRepresentationRef(\n                    file_path=file_path, sidecar_path=sidecar_path,\n                    content_checksum=content_checksum, root_stable_id=root_stable_id,\n                ),\n                TreeValidityState.reused,\n            )\n    ref = _recreate_tree_for_format(\n        kind=kind, project_root=root, file_path=file_path,\n        source_abs=source_abs, content_checksum=content_checksum,\n    )\n    return ref, TreeValidityState.recreated\n\n__all__ = [\n    \"TreeFormatKind\",\n    \"TreeValidityState\",\n    \"TreeRepresentationRef\",\n    \"classify_tree_format\",\n    \"sidecar_path_for\",\n    \"validate_or_recreate_tree\",\n]\n```\n"
