step_id: T-002
parent_global_step: G-005
name: Commit write with backup (second call)
description: Realise the second phase of WriteCommand (C-009). Entry condition:
  the WriteLockfile (C-004) exists and its PID matches the current server PID
  and the lockfile mtime is newer than the draft mtime.
  Create a BackupPair (C-011) atomically for the original file and the draft
  using ExistingInfrastructure (C-012), forming one logical history entry.
  Generate source code from the DraftFile (C-003) to a temp file. If generation
  fails, restore the original from the backup and return WRITE_FAILED (C-014).
  On success, atomically rename the temp file to the original, delete the
  WriteLockfile (C-004), and trigger a git commit via ExistingInfrastructure
  (C-012) if git is enabled. Return success with the diff.
concepts:
- C-001
- C-002
- C-003
- C-004
- C-009
- C-011
- C-012
- C-014
inputs:
- name: session
  type: EditSession (C-001)
  description: Active session identifying file, draft path, and format group.
- name: lockfile
  type: WriteLockfile (C-004) on disk
  description: WriteLockfile with PID matching current server, confirming first call completed.
outputs:
- name: committed_file
  type: original file updated on disk
  description: Original file atomically replaced with code generated from draft.
- name: backup_pair
  type: BackupPair (C-011)
  description: Backup of original and draft created atomically before write.
- name: write_error
  type: ErrorCodes (C-014) entry
  description: WRITE_FAILED when code generation fails; original restored from backup.
atomic_steps:
- A-001
status: draft