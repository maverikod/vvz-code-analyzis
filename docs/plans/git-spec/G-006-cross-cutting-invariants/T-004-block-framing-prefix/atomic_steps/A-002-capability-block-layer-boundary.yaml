  CONTEXT (background only, do not restate it in the file). The system adds
  three independent capability blocks/members to the server: a project-scoped
  git command block, a GitHub command block, and a commit-on-write behaviour
  attached to the existing project file write path. Each of the three is
  separable: each can be configured, enabled, and can fail independently of
  the other two. The git block acts only on the filesystem working tree of a
  registered project via subprocess git invocations. The GitHub block acts
  only on the GitHub remote HTTP API. Neither of these two blocks ever
  touches the server's own internal command-to-driver-to-database chain (the
  internal routing used by the server's own commands to reach their drivers
  and database). This file fixes both facts as data: the three-member
  enumeration, and the layer boundary each of the two externally-facing
  members is confined to.

