  ## Constants

  - `MARKER_CYCLE_ERROR = "MARKER_CYCLE_ERROR"` — error code string for ValueError messages.

  ## Types

  ```python
  @dataclass(frozen=True)
  class MarkerEditState:
      """Preserved CHECKSUMS and MAP sections during hide/unhide (C-012)."""

      checksums_section: ChecksumsSection  # from node_id_map module
      map_section: MapSection
  ```

  Import `ChecksumsSection` from `code_analysis.core.tree_lifecycle.node_id_map`.

  ## Function: denude_marked_tree

  ```python
  def denude_marked_tree(
      *,
      source_abs: Path,
      marked_tree: str,
  ) -> tuple[str, MarkerEditState]:
      """Strip short_id markers from TREE section; preserve CHECKSUMS and MAP."""
  ```

  Algorithm:
  1. `sections = parse_tree_file(marked_tree)`.
  2. `handler = HandlerRegistry.default_registry().resolve(source_abs)`.
  3. `denuded = handler.unmark(sections.tree)`.
  4. `state = MarkerEditState(checksums_section=sections.checksums, map_section=sections.map)`.
  5. Return `(denuded, state)`.

  Error handling:
  - `ValueError` from `parse_tree_file` — re-raise unchanged.
  - `HandlerNotFoundError` from registry — propagate unchanged.
  - Empty TREE after unmark is valid (return `""`).

  Edge cases:
  - Tree file with only CHECKSUMS+MAP and empty TREE → denuded `""`, state preserved.
  - Invalid three-section layout → ValueError from parse_tree_file.

  ## Function: restore_marked_tree

  ```python
  def restore_marked_tree(
      *,
      source_abs: Path,
      denuded_after_mutation: str,
      state: MarkerEditState,
  ) -> str:
      """Re-embed short_id markers; preserve MAP bytes and UUID4 entries (C-012)."""
  ```

  Algorithm:
  1. `handler = HandlerRegistry.default_registry().resolve(source_abs)`.
  2. `file_path = source_abs.name`.
  3. `candidate_marked = handler.mark(denuded_after_mutation)`.
  4. `parsed_nodes = handler.parse_content(file_path, denuded_after_mutation)`.
  5. Build `discovered_nodes: list[DiscoveredNode]` from each parsed TreeNode:
     - `short_id=int(node.short_id)`, `kind=node.kind`, `content=node.content`,
       `attributes=dict(node.attributes)`, `content_fingerprint=compute_content_fingerprint(node.content)`
     - Import `compute_content_fingerprint` from `code_analysis.core.tree_lifecycle.node_id_map`.
  6. `source_sha256 = state.checksums_section.source_sha256` (field on ChecksumsSection).
  7. `built_sections, _id_map = NodeIdMap.build(
         tree_marked_text=candidate_marked,
         discovered_nodes=discovered_nodes,
         source_sha256=source_sha256,
         prior_map=state.map_section,
     )`.
  8. Force preserved MAP: `built_sections.map = state.map_section` (exact object from state;
     CHECKSUMS and MAP not regenerated by build for hide/unhide cycle).
  9. Force preserved CHECKSUMS: `built_sections.checksums = state.checksums_section`.
  10. Return `serialize_tree_file(built_sections)`.

  Error handling:
  - NodeIdMap.build ValueError — wrap as `ValueError(f"{MARKER_CYCLE_ERROR}: {exc}") from exc`.
  - Handler errors — propagate unchanged.

  Edge cases:
  - Empty denuded_after_mutation → handler.mark("") returns ""; build with empty discovered_nodes.
  - Mutation changed block count → NodeIdMap.build with prior_map assigns fresh short_ids per {a007}
    for new blocks while preserving UUID4 for unchanged fingerprints.

  ## Forbidden patterns

  - Do NOT import dulwich or EditSession.
  - Do NOT mutate MAP UUID4 entries during hide/unhide.
  - Do NOT embed UUID in TREE markers.
  - Do NOT use universal-id, {l001}-{l003}, {m001}, {m002}, G-007, NODE_ID_PREFIX_WIDTH=40.
  - Do NOT implement FormatHandler.mark/unmark (use HandlerRegistry only).
  - Do NOT create `__init__.py` in this step.

