  """
  UniversalFileWriteCommand: two-phase write with diff and lockfile.

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """
  from __future__ import annotations

  import os
  import tempfile
  from pathlib import Path
  from typing import Any, Dict, Optional

  from mcp_proxy_adapter.commands.base_command import BaseCommand

  from code_analysis.commands.universal_file_edit.errors import (
      SESSION_NOT_FOUND,
      make_error,
  )
  from code_analysis.commands.universal_file_edit.format_group import (
      FORMAT_SIDECAR,
      FORMAT_TREE_TEMP,
      read_lockfile_pid,
      write_lockfile_pid,
  )
  from code_analysis.commands.universal_file_edit.session import get_session


  class UniversalFileWriteCommand(BaseCommand):
      """MCP command implementing the two-phase write protocol.

      First call computes diff and writes lockfile.
      Second call (matching PID) commits with backup.
      """

      @staticmethod
      def get_name() -> str:
          """Return the MCP command name.

          Returns:
              MCP command name string.
          """
          return "universal_file_write"

      @staticmethod
      def get_schema() -> Dict[str, Any]:
          """Return the JSON schema for command parameters.

          Returns:
              JSON schema dict describing project_id and session_id.
          """
          return {
              "type": "object",
              "properties": {
                  "project_id": {"type": "string"},
                  "session_id": {"type": "string"},
              },
              "required": ["project_id", "session_id"],
              "additionalProperties": False,
          }

      def execute(self, params: Dict[str, Any]) -> Dict[str, Any]:
          """Execute the write command.

          Args:
              params: Dict with project_id and session_id.

          Returns:
              On first call: dict with diff string.
              On second call: dict with success and diff.
              On error: error dict.
          """
          session_id: str = params["session_id"]
          project_id: str = params["project_id"]
          try:
              session = get_session(session_id)
          except ValueError:
              return make_error(SESSION_NOT_FOUND, f"Unknown session: {session_id}")

          current_pid = os.getpid()
          lockfile_pid = read_lockfile_pid(session.abs_path)

          if lockfile_pid != current_pid:
              return self._first_call(session, current_pid, project_id)
          return self._second_call(session, project_id)

      def _generate_code(
          self, session: Any
      ) -> str:
          """Generate source code from the draft file.

          Args:
              session: Active EditSession with format_group and draft_path.

          Returns:
              Generated source code as a string.
          """
          fg = session.format_group
          if fg == FORMAT_SIDECAR:
              from code_analysis.core.cst_tree import tree_saver
              with tempfile.NamedTemporaryFile(suffix=".py", delete=False) as tmp:
                  tmp_path = tmp.name
              try:
                  tree_saver.save_tree_to_file(session.tree_id, tmp_path)
                  return Path(tmp_path).read_text()
              finally:
                  Path(tmp_path).unlink(missing_ok=True)
          if fg == FORMAT_TREE_TEMP:
              if session.handler_id == "json":
                  from code_analysis.core.json_tree import tree_builder as jtb
                  return jtb.serialize_tree(session.tree_id)
              from code_analysis.core.yaml_tree import tree_builder as ytb
              return ytb.serialize_tree(session.tree_id)
          # text group
          return session.draft_path.read_text()

      def _first_call(
          self, session: Any, current_pid: int, project_id: str
      ) -> Dict[str, Any]:
          """Handle first write call: generate code, compute diff, write lockfile.

          Args:
              session: Active EditSession.
              current_pid: Current server process PID.
              project_id: UUID of the project.

          Returns:
              Dict with diff string showing changes.
          """
          code = self._generate_code(session)
          original = session.abs_path.read_text()
          from code_analysis.core.file_handlers.diff_support import compute_diff
          diff = compute_diff(original, code)
          write_lockfile_pid(session.abs_path, current_pid)
          return {"success": True, "phase": "preview", "diff": diff}

      def _second_call(
          self, session: Any, project_id: str
      ) -> Dict[str, Any]:
          """Handle second write call: backup, commit, cleanup.

          Args:
              session: Active EditSession.
              project_id: UUID of the project.

          Returns:
              Dict with success flag (filled in T-002/A-001).
          """
          raise NotImplementedError
  ```

