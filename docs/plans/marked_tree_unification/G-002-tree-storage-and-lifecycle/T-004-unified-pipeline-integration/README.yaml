step_id: T-004
parent_global_step: G-002
name: Unified Pipeline Integration and Parity Verification
description: 'Modify only the unified pipeline integration module(s) that invoke existing
  TreeLifecycle (C-010) and TreeBuilder (C-011) APIs — this step does NOT create or
  modify TreeBuilder or TreeLifecycle class definitions. Wire validate→build routing in
  the integration layer so every validity and creation decision calls TreeLifecycle
  entry points, which dispatch to TreeBuilder.build using HandlerRegistry (C-008) to
  resolve FormatHandler (C-007) and produce TreeNode trees (C-009); ChecksumSyncPolicy
  (C-006) remains the four-branch decision input to that routing. On rebuild paths the
  integration layer ensures validate_and_repair runs after TreeBuilder.build when
  refreshing an existing tree, preserving TreeNodeUuid (C-024) per {a007}/{n002}.
  Leave recreate_tree_from_content and legacy TreeFormatKind dispatch untouched as a
  parity oracle alongside the unified pipeline. Add a parity test module that compares
  unified-pipeline output against the legacy oracle on shared real fixtures for each
  supported format, asserting the three-section tree file layout (CHECKSUMS, MAP with
  short_id↔UUID4 and next_free, TREE with short_id markers only) matches oracle
  semantics where applicable. This tactical step completes G-002 integration per decision
  A1 and strategy new-alongside-old; it does not remove legacy code or redirect G-000
  consumers.'
