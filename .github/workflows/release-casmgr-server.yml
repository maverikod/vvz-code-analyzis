name: Release casmgr-server

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver release version (matches Docker tag)
        required: true
        type: string
      deb_only:
        description: Skip Docker build/push
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ inputs.version }}"
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper python3 python3-venv python3-pip \
            texinfo openssl ca-certificates adduser rsync postgresql-client

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deb_only != true)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build release artifacts
        env:
          CASMGR_DOCKER_REGISTRY: ${{ vars.CASMGR_DOCKER_REGISTRY || 'vasilyvz' }}
          CASMGR_SKIP_BUILD_DEPS: "1"
        run: |
          set -euo pipefail
          extra=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deb_only }}" == "true" ]]; then
            extra+=(--deb-only)
          fi
          ./scripts/release_build.sh "${{ steps.ver.outputs.version }}" "${extra[@]}"

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: casmgr-server-deb
          path: ../*.deb
