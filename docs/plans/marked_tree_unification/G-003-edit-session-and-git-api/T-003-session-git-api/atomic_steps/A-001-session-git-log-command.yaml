prompt: "Create the file\n`code_analysis/commands/universal_file_edit/session_git_log_command.py`.\nOperation: create_file (the file does not exist yet).\n\n## Parent documents\n- Machine spec: `docs/plans/marked_tree_unification/spec.yaml` (C-012, C-013, C-014)\n- Global step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/README.yaml`\n- Tactical step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/T-003-session-git-api/README.yaml`\n\nDefine the `session_git_log` MCP command: one of the five SessionGitApi\n(C-014) commands exposing the SessionRepo (C-013) of an active EditSession\n(C-012). It returns the commit history of the session repository.\n\n## extends-vs-creates resolution\n\nNo session_git_* command exists in the codebase. The existing\nuniversal_file_edit commands (open/edit/write/close/search/preview) do not\ninclude any git-history command. Therefore: create_file.\n\n## MRS excerpt\n\nC-014 SessionGitApi: The set of session-scoped MCP commands exposing the\nSessionRepo for history inspection and revert.\n  - every command requires an active session identifier and refuses to run\n    without a valid session context\n  - log command returns commit history (hash, message, timestamp)\n\nC-013 SessionRepo: the dulwich git repository inside the session directory;\none commit per tree edit. Provides log() -> list[SessionCommit].\n\nC-012 EditSession: bounded editing context; resolved by session_id via the\nactive-session registry.\n\n## HRS binding paragraphs\n\n{e001}: The session git repository is exposed through MCP as a set of\nsession-scoped commands. Every command in this set requires a session_id\nparameter. A command called without an active session returns an error; it\ndoes not attempt to access the file system without a valid session context.\n\n{e002}: session_git_log(session_id) returns the commit history of the\nsession repository: commit hash, message, and timestamp for each commit.\nImplementation reads history via repo.get_walker() (dulwich); porcelain.log\nis not used because it writes to stdout and returns None. (The get_walker\ndetail lives inside SessionRepo.log; this command only calls log().)\n\n## Dependencies (verified on disk / in plan)\n\nCommand base class and error helpers, mirroring the existing\nuniversal_file_edit commands (e.g. close_command.py):\n  from mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult\n  from code_analysis.commands.base_mcp_command import BaseMCPCommand\n  from code_analysis.commands.universal_file_edit.errors import (\n      SESSION_NOT_FOUND,\n      error_result_from_make_error,\n      make_error,\n  )\nSession resolution (added to the EditSession module):\n  from code_analysis.core.edit_session.edit_session import get_active_session\n\nVerified signatures:\n  - get_active_session(session_id: str) -> EditSession; raises KeyError when\n    no active session is registered under session_id.\n  - EditSession.session_repo: SessionRepo\n  - SessionRepo.log() -> list[SessionCommit]\n  - SessionCommit is a frozen dataclass with fields: hash: str,\n    message: str, timestamp: int.\n  - make_error(code: str, message: str, details=None) -> dict\n  - error_result_from_make_error(err: dict) -> ErrorResult\n  - SESSION_NOT_FOUND is the string error code constant for an absent\n    session.\n\nCommand skeleton (mirror close_command.py): class attributes name, version,\ndescr, category, author, email, use_queue=False; a @staticmethod get_name();\na @classmethod get_schema(cls); a @classmethod metadata(cls); and an async\nexecute(self, project_id, session_id, **kwargs) returning\nSuccessResult | ErrorResult.\n\n## Required file content\n\nWrite exactly this file:\n\n```python\n# Author: Vasiliy Zdanovskiy -- vasilyvz@gmail.com\n\n\"\"\"session_git_log MCP command (C-014): SessionRepo commit history.\n\nReturns the commit history of the SessionRepo (C-013) of an active\nEditSession (C-012): commit hash, message, and timestamp per commit\n(HRS {e002}). Requires a valid session_id; refuses without an active\nsession (HRS {e001}).\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom typing import Any, Dict, Type, cast\n\nfrom mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult\n\nfrom code_analysis.commands.base_mcp_command import BaseMCPCommand\nfrom code_analysis.commands.universal_file_edit.errors import (\n    SESSION_NOT_FOUND,\n    error_result_from_make_error,\n    make_error,\n)\nfrom code_analysis.core.edit_session.edit_session import get_active_session\n\nclass SessionGitLogCommand(BaseMCPCommand):\n    \"\"\"MCP command returning the SessionRepo commit history (C-014, {e002}).\"\"\"\n\n    name = \"session_git_log\"\n\n    version = \"1.0.0\"\n\n    descr = \"Return the commit history of an active edit session's git repository.\"\n\n    category = \"file_management\"\n\n    author = \"Vasiliy Zdanovskiy\"\n\n    email = \"vasilyvz@gmail.com\"\n\n    use_queue = False\n\n    @staticmethod\n    def get_name() -> str:\n        \"\"\"Return the MCP command name.\n\n        Returns:\n            MCP command name string.\n        \"\"\"\n        return \"session_git_log\"\n\n    @classmethod\n    def get_schema(cls) -> Dict[str, Any]:\n        \"\"\"Return the JSON schema for command parameters.\n\n        Returns:\n            JSON schema dict describing project_id and session_id.\n        \"\"\"\n        return {\n            \"type\": \"object\",\n            \"properties\": {\n                \"project_id\": {\"type\": \"string\"},\n                \"session_id\": {\"type\": \"string\"},\n            },\n            \"required\": [\"project_id\", \"session_id\"],\n            \"additionalProperties\": False,\n        }\n\n    @classmethod\n    def metadata(cls: Type[\"SessionGitLogCommand\"]) -> Dict[str, Any]:\n        \"\"\"Return extended AI/docs metadata for session_git_log.\n\n        Returns:\n            Metadata dict with description, parameters, and examples.\n        \"\"\"\n        return {\n            \"name\": \"session_git_log\",\n            \"description\": (\n                \"Return the commit history (hash, message, timestamp) of the \"\n                \"SessionRepo for an active edit session. Requires session_id.\"\n            ),\n            \"parameters\": {\n                \"project_id\": {\"type\": \"string\", \"required\": True},\n                \"session_id\": {\"type\": \"string\", \"required\": True},\n            },\n            \"examples\": [\n                {\"command\": {\"project_id\": \"<uuid>\", \"session_id\": \"<uuid>\"}}\n            ],\n        }\n\n    async def execute(  # type: ignore[override]\n        self,\n        project_id: str,\n        session_id: str,\n        **kwargs: Any,\n    ) -> SuccessResult | ErrorResult:\n        \"\"\"Execute the session_git_log command.\n\n        Args:\n            project_id: Required by schema; the session registry is\n                authoritative for the repository location.\n            session_id: Active session identifier (C-012).\n            **kwargs: Unused; accepted for adapter compatibility.\n\n        Returns:\n            SuccessResult with the commit list, or ErrorResult when no\n            active session exists.\n        \"\"\"\n        _ = project_id  # registry is authoritative; project_id is schema-required\n        _ = kwargs\n        try:\n            session = get_active_session(session_id)\n        except KeyError:\n            return error_result_from_make_error(\n                make_error(SESSION_NOT_FOUND, f\"No active session: {session_id}\")\n            )\n        commits = session.session_repo.log()\n        payload: Dict[str, Any] = {\n            \"success\": True,\n            \"commits\": [\n                {\n                    \"hash\": c.hash,\n                    \"message\": c.message,\n                    \"timestamp\": c.timestamp,\n                }\n                for c in commits\n            ],\n        }\n        return SuccessResult(data=cast(Dict[str, Any], payload))\n```\n\n## Constraints\n- Create only this command file. Do NOT create or modify any other file\n  (one-file rule); in particular do NOT modify the command registry, the\n  edit_session module, or session_repo.py.\n- Subclass BaseMCPCommand and follow the exact skeleton above (matches the\n  sibling close_command.py contract: name/version/descr/category/author/\n  email/use_queue class attributes, get_name, get_schema, metadata, async\n  execute).\n- The schema requires both project_id and session_id with\n  additionalProperties False.\n- Resolve the session via get_active_session(session_id); on KeyError return\n  error_result_from_make_error(make_error(SESSION_NOT_FOUND, ...)) -- never\n  touch the file system without a valid session (HRS {e001}).\n- Read history via session.session_repo.log(); do NOT call dulwich or\n  porcelain directly here (the get_walker detail lives in SessionRepo.log).\n- Each commit is serialised to a dict with keys hash, message, timestamp.\n- Import only the names listed in the file above.\n- File header `# Author: Vasiliy Zdanovskiy -- vasilyvz@gmail.com` (CR-012).\n- All docstrings and comments in English (ARTIFACT_LOCALE=en, CR-010).\n- Estimated line count: ~130 lines (within CR-008 soft limit ~350).\n"
