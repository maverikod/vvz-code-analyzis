  ```

  ## Class SessionWriteCommand(BaseMCPCommand)

  Class attributes:
  - `name = "session_write"`
  - `version = "1.0.0"`
  - `descr = "Two-stage external copy-out for an active edit session (preview or confirm)."`
  - `category = "file_management"`
  - `author = "Vasiliy Zdanovskiy"`
  - `email = "vasilyvz@gmail.com"`
  - `use_queue = False`

  ### get_schema()

  ```python
  {
      "type": "object",
      "properties": {
          "project_id": {"type": "string", "description": "Project UUID."},
          "session_id": {"type": "string", "description": "Active edit session id."},
          "confirm": {
              "type": "boolean",
              "description": "False (default): preview diffs only. True: atomic external copy-out.",
              "default": False,
          },
      },
      "required": ["project_id", "session_id"],
      "additionalProperties": False,
  }
  ```

  ### metadata()

  Return dict with keys: name, version, description, category, author, email,
  detailed_description, parameters, return_value, usage_examples, error_cases, best_practices.

  detailed_description must state:
  - Preview (confirm=false/default) never modifies external files.
  - Confirm (confirm=true) calls confirm_external_copy_out(); both artefacts when valid.
  - Distinct from session_git_diff (session history vs live external files).
  - No SessionRepo commit in this command.

  usage_examples (parameter dicts only):
  1. `{"project_id": "<uuid>", "session_id": "<uuid>"}` — preview.
  2. `{"project_id": "<uuid>", "session_id": "<uuid>", "confirm": true}` — confirm copy-out.

  error_cases must include SESSION_NOT_FOUND with solution "Open session first".

  ### execute(project_id, session_id, confirm=False, **kwargs)

  Algorithm:
  1. `_ = project_id; _ = kwargs`.
  2. Try `session = get_active_session(session_id)`.
  3. On KeyError → `error_result_from_make_error(make_error(SESSION_NOT_FOUND, f"No active session: {session_id}"))`.
  4. If `confirm is True`:
     - Call `session.confirm_external_copy_out()`.
     - Return SuccessResult `{"success": True, "phase": "confirmed", "has_changes": True}`.
       When confirm is no-op (identical content), still return SuccessResult
       `{"success": True, "phase": "confirmed", "has_changes": False}` — detect by
       calling preview first internally: if not preview["has_changes"], set has_changes False
       before confirm (confirm returns immediately).
  5. Else (preview):
     - `preview = session.preview_external_write()`.
     - Return SuccessResult:
       ```python
       {
           "success": True,
           "phase": "preview",
           "has_changes": preview["has_changes"],
           "source_diff": preview["source_diff"],
           "tree_diff": preview["tree_diff"],
       }
       ```

  Error handling:
  - RuntimeError from EditSession (session not open) — propagate (should not occur for active registry entry).
  - OSError from confirm — return ErrorResult with code WRITE_FAILED if errors module defines it,
    else re-raise ValueError with message prefix "session_write failed:".

  Import WRITE_FAILED only if present in errors module; otherwise catch OSError and return:
  `error_result_from_make_error(make_error("WRITE_FAILED", str(exc)))`.

  Edge cases:
  - confirm=true with has_changes=false → confirm_external_copy_out returns immediately; response has_changes=false.
  - Missing external files → preview shows full in-session content as diff (EditSession contract).

  ## Forbidden patterns

  - Do NOT register command in hooks (separate step).
  - Do NOT import dulwich.
  - Do NOT read live external files directly in command (delegate to EditSession).
  - Do NOT implement session_git_diff logic.
  - Do NOT use universal-id, UUID-in-marker, G-007, {l*}, {m*}, mtime-on-finding.
  - Do NOT add write_copy_out or legacy lockfile two-phase protocol.

