meta:
  plan_name: universal_file_preview
  source_spec: source_spec.md
  status: draft
concepts:
- concept_id: C-001
  name: PreviewCommand
  definition: 'Single MCP command exposing a uniform schema for previewing a project
    file.

    '
  properties:
  - one MCP command name visible to callers
  - input schema is fixed and validates statically
  - response envelope is uniform across all file types and node kinds
  - 'read-only: writes nothing to files, database, or external tree sessions'
  source_ranges:
  - start: 5
    end: 8
  - start: 13
    end: 21
- concept_id: C-002
  name: HandlerDispatcher
  definition: 'Internal router that selects a handler for the file based on extension.

    '
  properties:
  - dispatch key is file extension
  - one extension maps to exactly one handler
  - 'handlers are pluggable: adding a handler does not change the public schema'
  source_ranges:
  - start: 25
    end: 29
- concept_id: C-003
  name: Handler
  definition: 'Component that opens one family of files and produces the uniform in-memory
    node representation. Does not implement navigation.

    '
  properties:
  - has a static set of supported extensions
  - produces a root Node when opening a file
  - resolves node_ref values in its native identifier format to a Node
  - produces children of any Node lazily on demand
  source_ranges:
  - start: 25
    end: 29
  - start: 75
    end: 92
- concept_id: C-004
  name: NodeKind
  definition: 'Classification of any node in the uniform representation. One of: scalar,
    lines, mapping, sequence, tree_node.

    '
  properties:
  - 'scalar: leaf value, no children'
  - 'lines: ordered children, each is a line of text'
  - 'mapping: ordered key-value pairs'
  - 'sequence: ordered indexed elements of arbitrary kind'
  - 'tree_node: ordered children plus named attributes (e.g. CST FunctionDef)'
  - the kind is intrinsic to the node, not to the parent or to the file type
  source_ranges:
  - start: 36
    end: 45
- concept_id: C-005
  name: Sliceability
  definition: 'Level-local predicate on a Node that reports whether the node exposes
    an ordered, indexable child set addressable by the Slice parameter.

    '
  properties:
  - answered per-node, not per-file-type
  - scalar nodes are never sliceable
  - lines, mapping, sequence, tree_node are sliceable
  - sliceability is the first question of every navigation step
  - asking for slice on a non-sliceable focus is an input error
  source_ranges:
  - start: 47
    end: 70
  - start: 95
    end: 106
- concept_id: C-006
  name: ChildPreviewRule
  definition: 'Function that turns a Node into a compact summary when that Node appears
    as a child in some other node''s slice. Depends on the child''s own NodeKind.

    '
  properties:
  - 'scalar: truncated value'
  - 'lines: count + first line truncated'
  - 'sequence: length + coarse element-kind summary'
  - 'mapping: key count + truncated key name list'
  - 'tree_node: type, name, attributes, child count'
  - never includes the child's own children content
  source_ranges:
  - start: 108
    end: 122
- concept_id: C-007
  name: NavigationStep
  definition: 'The single procedure the command executes on every request: resolve
    focus, check sliceability, apply slice, summarise each child via its ChildPreviewRule.

    '
  properties:
  - one procedure shared by all node kinds and all file types
  - operates on one focus Node per request
  - 'recursive: drilling into a child issues a new request with that child''s node_ref'
  - no engine selection or branch on file type beyond Handler choice
  source_ranges:
  - start: 31
    end: 34
  - start: 56
    end: 70
- concept_id: C-008
  name: Slice
  definition: 'Caller-supplied selector that designates a contiguous subset of the
    focus node''s ordered child set using Python-style zero-based half-open indexing.

    '
  properties:
  - 'syntax: start:stop with start and stop optional, negative allowed'
  - 'semantics: zero-based, half-open'
  - applies to the focus node's child set, whatever its NodeKind
  - local to this command; does not change semantics of other commands
  source_ranges:
  - start: 49
    end: 54
  - start: 80
    end: 84
- concept_id: C-009
  name: StableIdentifier
  definition: 'Identifier of a node inside a tree-structured file. Reused from the
    project''s existing tree infrastructure; not invented by this command.

    '
  properties:
  - 'Python source: stable_id UUID from cst_load_file outline_nodes'
  - 'JSON source: node_id from list_json_blocks, or JSON pointer'
  - 'YAML source: reused from project YAML tree infra when present, otherwise JSON-pointer-style
    path'
  - 'lines and JSONL roots: child addressed by zero-based index, no separate identifier
    scheme'
  - identifier scheme is per-handler; format is opaque to the dispatcher
  source_ranges:
  - start: 124
    end: 145
- concept_id: C-010
  name: NodeReference
  definition: 'Optional caller-supplied parameter that focuses the preview on a specific
    Node identified by a StableIdentifier.

    '
  properties:
  - optional in the request
  - default focus is the file root
  - value is a StableIdentifier in the handler's native format
  source_ranges:
  - start: 147
    end: 149
- concept_id: C-011
  name: TreeSession
  definition: 'In-memory parsed tree of a file identified by a tree_id, owned either
    by the caller (via cst_load_file or json_load_file) or transiently by this command.

    '
  properties:
  - identified by tree_id (UUID)
  - owned either externally or internally
  - command never closes a session it did not create
  - command never invalidates a session it did not create
  source_ranges:
  - start: 151
    end: 166
- concept_id: C-012
  name: ResponseEnvelope
  definition: 'Uniform top-level shape of every successful preview response. One shape
    for all NodeKind values.

    '
  properties:
  - 'reports focus Node: node_kind, node_ref, type, name, attributes'
  - reports whether focus was sliceable and the slice that was applied
  - reports total size of focus child set
  - reports the children in the slice with their ChildPreviewRule output
  - each reported child carries its own node_ref
  - when relevant, reports tree_id for reuse
  source_ranges:
  - start: 168
    end: 184
- concept_id: C-013
  name: PreviewBudget
  definition: 'Caps that bound the size of one response, independent of slice.

    '
  properties:
  - 'preview_lines: cap when slice is omitted'
  - 'value_preview_len: cap on a single scalar value or name shown inline'
  - overflow to file is delegated to the read-only batch mechanism
  source_ranges:
  - start: 186
    end: 198
- concept_id: C-014
  name: ErrorClassification
  definition: 'Distinction between input errors, file-structure errors, and handler-internal
    errors, each with a deterministic error code class.

    '
  properties:
  - 'input errors: unknown extension, malformed slice, unknown node_ref, slice on
    non-sliceable focus, conflicting parameters'
  - 'file-structure errors: parse failure with parser name and line range'
  - 'handler-internal errors: code names the handler'
  - no silent fallback to a different file type
  source_ranges:
  - start: 200
    end: 213
- concept_id: C-015
  name: ReadOnlyBatchIntegration
  definition: 'Inclusion of the command name in the read-only batch whitelist so the
    command is invocable inside read_only_batch.

    '
  properties:
  - 'whitelist file: code_analysis/commands/read_only_batch_whitelist.py'
  - 'whitelist constant: READ_ONLY_BATCH_WHITELIST (frozenset of strings)'
  - inclusion is a separate step performed only after command tests are green
  source_ranges:
  - start: 20
    end: 21
  - start: 228
    end: 238
- concept_id: C-016
  name: PythonHandler
  definition: 'Handler for .py, .pyi, .pyw files. Produces a tree_node root (Module)
    and tree_node children for FunctionDef/ClassDef. Identifier source is cst_load_file.

    '
  properties:
  - 'supported extensions: .py, .pyi, .pyw'
  - 'root NodeKind: tree_node (Module)'
  - interior nodes are tree_node, sequence, or scalar depending on CST
  - 'identifier source: cst_load_file outline_nodes stable_id'
  source_ranges:
  - start: 130
    end: 134
- concept_id: C-017
  name: TextHandler
  definition: 'Handler for .md, .txt, .rst, .adoc files. Produces a lines root.

    '
  properties:
  - 'supported extensions: .md, .txt, .rst, .adoc'
  - 'root NodeKind: lines'
  - children are scalar lines
  - node_ref values are zero-based line indices
  source_ranges:
  - start: 141
    end: 144
- concept_id: C-018
  name: JsonHandler
  definition: 'Handler for .json files. Root NodeKind depends on the document type:
    mapping for objects, sequence for arrays, scalar for bare scalars.

    '
  properties:
  - 'supported extensions: .json'
  - 'root NodeKind: mapping, sequence, or scalar (depending on document root)'
  - 'identifier source: list_json_blocks (node_id or JSON pointer)'
  source_ranges:
  - start: 136
    end: 139
- concept_id: C-019
  name: JsonLinesHandler
  definition: 'Handler for .jsonl, .ndjson files. Root is a lines node whose children
    are scalar text lines; the caller can drill into a specific line by passing its
    index, and that follow-up request opens the JSON on that line as its own root.

    '
  properties:
  - 'supported extensions: .jsonl, .ndjson'
  - 'root NodeKind: lines'
  - slice on root selects line indices
  - drilling into a line parses that line as JSON
  source_ranges:
  - start: 137
    end: 137
  - start: 141
    end: 144
- concept_id: C-020
  name: YamlHandler
  definition: 'Handler for .yaml, .yml files. Root NodeKind depends on the document:
    mapping for YAML mappings, sequence for YAML sequences, scalar for bare scalars;
    for multi-document files the root is a sequence of document roots.

    '
  properties:
  - 'supported extensions: .yaml, .yml'
  - 'root NodeKind: mapping, sequence, or scalar'
  - 'multi-document file: root is a sequence of document roots'
  - 'identifier source: reused from project YAML infra when present, else JSON-pointer-style
    path'
  source_ranges:
  - start: 138
    end: 139
- concept_id: C-021
  name: ScopeBoundary
  definition: 'Explicit set of behaviours that the command does NOT perform, used
    as negative invariants during review.

    '
  properties:
  - no writes to files, db, or external tree sessions
  - no raw file bytes in response
  - no globs in file_path; exactly one file per call
  - XML and HTML are out of scope
  source_ranges:
  - start: 215
    end: 226
