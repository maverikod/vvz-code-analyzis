  New _apply_text body (replace the raise NotImplementedError inside the method):
  ```python
  from code_analysis.commands.universal_file_replace_command import _sort_text_replacements_bottom_up
  sorted_ops = _sort_text_replacements_bottom_up(operations)
  buffer = session.draft_path.read_text().splitlines(keepends=True)
  for op in sorted_ops:
      start = op.get("start_line", 1) - 1
      end = op.get("end_line", start + 1)
      content = op.get("content", "")
      op_type = op.get("type", "replace")
      if op_type == "delete":
          del buffer[start:end]
      elif op_type == "insert":
          buffer.insert(start, content if content.endswith("\n") else content + "\n")
      else:
          buffer[start:end] = [content if content.endswith("\n") else content + "\n"]
  session.draft_path.write_text("".join(buffer))
  return {"success": True, "line_count": len(buffer)}
  ```

