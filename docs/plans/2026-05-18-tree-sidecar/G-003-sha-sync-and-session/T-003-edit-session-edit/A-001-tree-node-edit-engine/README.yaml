  Public function (exact signature):

    def apply_tree_temp_mutations(
        session: EditSession,
        operations: List[Dict[str, Any]],
    ) -> SuccessResult | ErrorResult:

  Behaviour:

    1. If session.format_group != FORMAT_TREE_TEMP: return ErrorResult INVALID_SESSION message.

    2. If session.tree_temp_roots is None: **legacy path** — require session.tree_id non-empty; run the same logic as the pre-refactor edit_command._apply_tree_temp inner function (json/yaml modify_tree loops, draft_path rewrites, BackupManager backup of draft). Copy behaviour verbatim from repository version at plan authoring time so tests pass until open migrates to tree_temp_roots.

    3. If session.tree_temp_roots is not None:
         a) Build an index mapping stable_id -> (parent, index_in_parent) for all nodes reachable from roots (parent is None for root-level nodes; index_in_parent is index in parent's children or root list index).
         b) Before mutating, snapshot roots_deep = deepcopy(session.tree_temp_roots).
         c) Try BackupManager backup of session.draft_path if it exists (same as legacy path try/except pattern); on backup failure return ErrorResult code WRITE_FAILED.
         d) For each operation in order: interpret using the same keys as `_normalized_json_modify_operation` in edit_command (type/action, json_pointer/value/content). Map json_pointer / node_ref to stable_id targeting: operations use stable_id string on key `target_stable_id` or reuse `target_node_id` when value looks like UUID v4; if only json_pointer is provided, resolve by walking TreeNode children by keys / indices. On unknown target return ErrorResult INVALID_OPERATION and restore session.tree_temp_roots from snapshot roots_deep, rewrite draft from snapshot, return (do not set dirty).
         e) Mutations:
            - replace: update scalar value or replace node payload preserving stable_id (same object identity allowed).
            - delete: remove node from parent's children.
            - insert: allocate new TreeNode with fresh uuid4 stable_id; attach under parent per position fields mirroring legacy insert semantics.
         f) On full success: serialize session.tree_temp_roots to draft text using handler_id json vs yaml (same dumps as legacy _apply_tree_temp), write draft_path, set session.dirty = True, return SuccessResult data {success: True, updated: True}.
         g) On any error after partial apply: restore session.tree_temp_roots = roots_deep, rewrite draft from deepcopy serialization, do not set dirty.

  TreeNode field access must use attributes defined in G-001 (stable_id, type, key, value, children, comment fields).

  Forbidden: touching session.abs_path source file, Any type, print/logging, bare except.

