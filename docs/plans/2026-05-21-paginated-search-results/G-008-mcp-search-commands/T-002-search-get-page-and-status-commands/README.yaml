step_id: T-002
parent_global_step: G-008
name: search_get_page and search_get_status commands
description: "Implement search_get_page and search_get_status MCP commands. search_get_page
  accepts job_id and page number; reads the page file from the job directory via HTTPResultAccess
  and returns its content (results, next, done). Does not proxy HTTP — reads the file
  directly and returns the payload inline in the MCP response. search_get_status accepts
  job_id; reads the job manifest and returns current status, phase, progress counters,
  and heartbeat age. Both commands register schemas and error codes (JOB_NOT_FOUND,
  PAGE_NOT_READY, JOB_DEAD).\n"
