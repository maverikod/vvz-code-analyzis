step_id: T-001
parent_global_step: G-004
name: EditOperation Six-Operation Contract
description: 'Define the EditOperation entity (C-015) as the uniform set of six tree-edit
  operations addressed at the API boundary by short_id integer only ({n003}), with
  NodeIdMap (C-025) resolving short_id to internal TreeNodeUuid when the in-session
  tree is valid. Define each of the six operations and its invariants. insert: places
  a new block relative to a target short_id and assigns a fresh short_id per {a007}
  (next_free allocation; never reuses retired ids). delete: removes the block identified
  by short_id together with its subtree, preserving format validity; retired short_ids
  are never reused ({a007}). replace: substitutes content while preserving the short_id.
  move: relocates a block atomically, preserving its short_id. edit-attributes: changes
  node metadata without changing content or position. edit-content: changes leaf-block
  text only; rejects non-leaf targets with an input error. Establish that every valid-tree
  target is identified by short_id integer, never by line number or byte offset. Establish
  that the six operations are available for all five formats without format-specific
  variations at the operation level. Tree-validity edit gate ({h008}, {h009}): while
  VALID, only short_id operations via the six edit operations with marker hide/unhide
  and tree write; while INVALID, only plain-text string or line-range edits to in-session
  source with short_id addressing, marker hide/unhide, and tree writes forbidden;
  re-validation rebuilds the tree and resumes short_id mode when source parses again.'
