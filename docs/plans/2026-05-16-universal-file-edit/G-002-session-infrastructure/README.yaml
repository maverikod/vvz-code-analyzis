step_id: G-002
name: Session infrastructure and format groups
description: 'Define the FormatGroup resolution and DraftFile path model (C-002, C-003),
  the WriteLockfile path helpers (C-004), and the EditSession entity with its module-level
  registry (C-001). This infrastructure is the foundation consumed by all four commands:
  OpenCommand creates sessions, EditCommand and WriteCommand consume them, CloseCommand
  releases them.'
