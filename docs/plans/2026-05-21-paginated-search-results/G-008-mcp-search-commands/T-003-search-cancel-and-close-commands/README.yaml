step_id: T-003
parent_global_step: G-008
name: search_cancel and search_close commands
description: "Implement search_cancel and search_close MCP commands. search_cancel
  accepts job_id; signals the background worker to stop generation, writes final done=true
  page with cancellation marker, and transitions job status to cancelled. search_close
  accepts job_id; marks the job closed and eligible for immediate TTL cleanup (does
  not wait for TTL expiry). Both commands are idempotent: calling on an already-cancelled
  or closed job returns success without error. Register schemas and error codes (JOB_NOT_FOUND).\n"
