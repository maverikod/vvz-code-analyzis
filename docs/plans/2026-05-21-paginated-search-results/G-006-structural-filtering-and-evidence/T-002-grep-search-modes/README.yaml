step_id: T-002
parent_global_step: G-006
name: Grep search operating modes
description: "Create and modify the GrepSearchMode entity only: explicit operating
  modes for filesystem grep with two mutually defined behaviors.\nClassic line mode:
  returns line-oriented text matches for direct standalone inspection. Opt-in only;
  not the default. Classic results must not be treated as project cross-search structural
  evidence unless separately converted under StructuralEvidence (C-018) rules.\nStructural
  preview-compatible mode (default): validates or creates the file tree using TreeRepresentation
  rules as defined in G-005 (C-015)—including checksum-based validity and recreation
  when missing or invalid—without redefining TreeRepresentation. Maps text pattern
  matches to tree nodes or blocks and returns PreviewReference data as defined in
  G-005 (C-017)—file path, stable node identifier or selector, draft session identifier
  when applicable—without redefining PreviewReference fields or stability rules.\n\
  Structural mode must use the same structure model, node identifiers, and selector
  semantics as XPathLikeFilter (C-016) alignment; consume the shared-tree-model requirement
  under XPathLikeFilter (C-016) rather than inventing a parallel model.\nStructural
  mode may produce candidate match sets intended for downstream StructuralEvidence
  classification. It must not define StructuralEvidence validity, rejection of line-only
  matches, timeout partial invalidation, or preview-backing policy (those belong entirely
  to StructuralEvidence (C-018)).\nDynamic scanning policy for grep remains bounded:
  default scans only known supported formats; broad arbitrary-file scanning is opt-in
  and excludes logs, virtual environments, build directories, and binary-like files
  unless policy explicitly allows.\n"
concepts:
- C-019
inputs:
- name: grep_pattern
  type: text_pattern
  description: Pattern or expression applied during grep execution.
- name: mode_selection
  type: GrepSearchMode
  description: "Explicit classic or structural selection; structural is default when
    omitted per C-019.\n"
- name: target_files
  type: file_set
  description: "Files or scopes to scan; subject to supported-format default and opt-in
    broad-scan policy.\n"
- name: tree_representation_services
  type: G-005_TreeRepresentation_contract
  description: "Consumed per G-005: validate, recreate, and supply trees (C-015) without
    redefining entity properties.\n"
- name: preview_reference_shape
  type: G-005_PreviewReference_contract
  description: "Consumed per G-005: required fields and stability rules (C-017) for
    structural mode outputs.\n"
outputs:
- name: selected_mode
  type: GrepSearchMode
  description: Resolved mode actually applied (classic or structural).
- name: classic_line_matches
  type: line_match_list
  description: "Line-oriented hits when classic mode is selected; not structural evidence
    by default.\n"
- name: structural_node_matches
  type: preview_backed_match_list
  description: "Tree nodes or blocks with PreviewReference payloads when structural
    mode is selected.\n"
- name: structural_evidence_candidates
  type: unvalidated_match_bundle
  description: "Candidate results from structural mode for downstream StructuralEvidence
    evaluation under StructuralEvidence (C-018); no validity or rejection policy attached
    here.\n"
atomic_steps:
