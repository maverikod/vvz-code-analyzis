  \     if session is None or node not found)\n  Plus private module-level functions:\n\
  \    _cst_statements_to_nodes, _classify_cst_node, _cst_node_to_node\n\nChange to\
  \ make:\n  Replace the body of resolve_node_ref with a robust implementation\n \
  \ that handles the case where the project API for stable_id lookup\n  differs. The\
  \ new body:\n\n    if session is None:\n        # No active session: attempt a linear\
  \ scan by opening the file\n        # This is a best-effort fallback; if file_path\
  \ is not available\n        # on self, return UNKNOWN_NODE_REF immediately.\n  \
  \      fp = getattr(self, '_last_file_path', None)\n        if fp is None:\n   \
  \         return input_error(\n                INPUT_ERROR_UNKNOWN_NODE_REF,\n \
  \               'No active CST session and no cached file_path to scan.',\n    \
  \            details={'node_ref': node_ref},\n            )\n        open_result\
  \ = self.open_root(fp, None)\n        if isinstance(open_result, PreviewError):\n\
  \            return open_result\n        # Fall through to scan the newly-opened\
  \ session\n        session = getattr(self, '_last_session', None)\n        if session\
  \ is None:\n            return input_error(\n                INPUT_ERROR_UNKNOWN_NODE_REF,\n\
  \                'Could not open CST session for stable_id scan.',\n           \
  \     details={'node_ref': node_ref},\n            )\n\n    try:\n        from code_analysis.core.cst_tree.tree_metadata\
  \ import (\n            get_node_by_stable_id,\n        )\n        cst_node = get_node_by_stable_id(session,\
