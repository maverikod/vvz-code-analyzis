prompt: "Create `code_analysis/search_session/session_cleaner.py`.\n\n## MRS excerpt\n\
  \nC-011 BackgroundSessionCleaner: periodic maintenance process that applies\nDeadSessionDetection
  (C-010) and removes SearchSessionDirectory (C-002)\ntrees for sessions that are
  expired, closed, completed beyond TTL, failed\nbeyond TTL, cancelled beyond TTL,
  timed out, or dead.\nProperties:\n- Must NOT delete a session whose process identity
  and heartbeat indicate\n  it is live and running.\n- Applies DeadSessionDetection
  to identify dead or orphaned sessions.\n- Eligibility states for removal: expired,
  closed, completed, failed,\n  cancelled, timed_out, dead.\n- Running sessions are
  safe to remove only if DeadSessionDetection\n  classifies them as DEAD or TIMED_OUT.\n\
  \n## Implementation requirements\n\n1. Import `dataclasses`, `datetime`, `pathlib`,
  `shutil`, `typing`.\n\n2. Define `REMOVABLE_TERMINAL_STATES: frozenset[str]` containing:\n\
  \   \"expired\", \"closed\", \"completed\", \"failed\", \"cancelled\", \"timed_out\"\
  ,\n   \"dead\".\n\n3. Define `@dataclasses.dataclass` class `SessionRecord`:\n \
  \  - Fields: `session_dir: pathlib.Path`, `status: str`,\n     `last_access_at:
  datetime.datetime`,\n     `heartbeat_at: datetime.datetime`,\n     `main_pid: int`,
  `process_start_time: float`.\n\n4. Define `@dataclasses.dataclass` class `CleanupReport`:\n\
  \   - Fields: `removed: list[pathlib.Path]`, `skipped: list[pathlib.Path]`,\n  \
  \   `errors: list[tuple[pathlib.Path, str]]`.\n\n5. Define function:\n   ```python\n\
  \   def should_remove(\n       record: SessionRecord,\n       policy,\n       classifier,\n\
  \       now: datetime.datetime,\n   ) -> bool:\n   ```\n   - `policy` has method
  `is_expired(last_access_at, now) -> bool`.\n   - `classifier` has function `classify_session(stored,
  current, heartbeat_at, now)\n     -> DeadSessionOutcome`-compatible callable.\n\
  \   - If `record.status` in `REMOVABLE_TERMINAL_STATES` and\n     `policy.is_expired(record.last_access_at,
  now)`: return True.\n   - If `record.status == \"running\"`:\n     from `classifier`:
  if outcome is DEAD or TIMED_OUT: return True.\n   - Else: return False.\n\n6. Define
  function:\n   ```python\n   def run_cleanup(\n       records: list[SessionRecord],\n\
  \       policy,\n       classifier,\n       now: typing.Optional[datetime.datetime]
  = None,\n   ) -> CleanupReport:\n   ```\n   - Uses `now = now or datetime.datetime.now(datetime.timezone.utc)`.\n\
  \   - For each record: if `should_remove(...)`, attempt `shutil.rmtree(\n     record.session_dir,
  ignore_errors=False)`, append to `removed`;\n     on `OSError` append `(session_dir,
  str(e))` to `errors`.\n   - Else append to `skipped`.\n   - Returns `CleanupReport(removed,
  skipped, errors)`.\n\n## Constraints\n- Standard library only.\n- All public names
  have one-line docstrings.\n- File under 90 lines.\n"
