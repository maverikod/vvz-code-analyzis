  ## Module docstring (exact)

  """
  Uniform EditOperation dispatch layer (C-015).

  Resolves FormatHandler via HandlerRegistry, enforces tree-validity edit gate,
  validates integer short_id arguments, dispatches to handler op_* methods.
  External addressing is short_id int only ({n003}).

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """

  ## Imports (exact)

  - from __future__ import annotations
  - from dataclasses import dataclass, field
  - from enum import Enum
  - from pathlib import Path
  - from typing import Any, Dict, Optional
  - from code_analysis.tree.contracts import NodeId, validate_short_id
  - from code_analysis.tree.format_handler import FormatHandler
  - from code_analysis.tree.handler_registry import HandlerRegistry

  ## Constants

  - VALID_POSITIONS = ("before", "after", "first_child", "last_child")

  ## Classes and functions

  ### EditOperationKind(str, Enum)
  INSERT, DELETE, REPLACE, MOVE, EDIT_ATTRIBUTES, EDIT_CONTENT

  ### EditOperationError(ValueError)
  Input errors: invalid gate, unknown kind, missing args, invalid position, invalid short_id int.

  ### @dataclass EditOperation
  Fields:
    kind: EditOperationKind
    short_id: Optional[NodeId] = None          # primary target (not insert)
    anchor_short_id: Optional[NodeId] = None     # insert/move anchor
    position: Optional[str] = None
    new_content: Optional[str] = None
    attributes: Dict[str, Any] = field(default_factory=dict)
    next_free: Optional[int] = None              # required for insert

  ### _require(value, name, kind) -> Any
  Raise EditOperationError if None.

  ### _check_position(position, kind) -> str
  Require membership in VALID_POSITIONS.

  ### _normalize_short_id(value: int, name: str) -> NodeId
  Algorithm:
  1. Call validate_short_id(value) from contracts.
  2. On ValueError wrap as EditOperationError(f"{name} must be positive int short_id, got {value!r}").

  ### apply_edit_operation(*, registry, source_path, marked_text, operation, tree_is_valid, next_free=None) -> tuple[str, int]
  Returns (new_marked_text, updated_next_free).

  Algorithm:
  1. If not tree_is_valid: raise EditOperationError("tree is invalid (text mode); short_id edit operations forbidden until re-validation").
  2. handler = registry.resolve(source_path).
  3. If hasattr(handler, "set_tree_validity"): handler.set_tree_validity(True).
  4. kind = operation.kind
  5. INSERT:
     a. anchor = _normalize_short_id(_require(operation.anchor_short_id, "anchor_short_id", kind), "anchor_short_id")
     b. nf = _require(operation.next_free if operation.next_free is not None else next_free, "next_free", kind)
     c. if nf < 1: raise EditOperationError("next_free must be >= 1")
     d. pos = _check_position(operation.position, kind)
     e. content = _require(operation.new_content, "new_content", kind)
     f. result = handler.op_insert(marked_text, anchor, pos, content, nf)
     g. return result, nf + 1
  6. DELETE: normalize short_id; return handler.op_delete(...), next_free unchanged (pass through operation.next_free or next_free arg or 1)
  7. REPLACE: normalize short_id + new_content
  8. MOVE: normalize short_id + anchor_short_id + position
  9. EDIT_ATTRIBUTES: normalize short_id; attributes default {}
  10. EDIT_CONTENT: normalize short_id + new_content
  11. Unknown kind → EditOperationError

  For steps 6-10 when next_free not supplied for return tuple: use `next_free if next_free is not None else (operation.next_free or 1)`.

  ## Edge cases

  - short_id 0 → EditOperationError via validate_short_id
  - bool passed as short_id → EditOperationError (validate_short_id rejects bool)
  - insert without next_free → EditOperationError
  - tree_is_valid False → always EditOperationError before handler call

  ## Forbidden

  - NO UUID parameters or return values at this layer
  - NO line number / byte offset parameters
  - NO NodeIdMap import or resolve calls
  - NO non-standard cross-TS ordering fields, G-007, {l*}/{m*}
  - NO plain-text edit implementation (EditSession path)

