step_id: G-004
name: universal_file_edit command
description: 'The edit command applies a batch of mutation operations to the draft
  file. The original file is never touched. For the sidecar group, the batch is first
  validated to forbid ancestor-descendant node pairs; violation rejects the whole
  batch atomically. Operations are then applied according to group rules: sidecar
  group applies sequentially and writes the draft after each operation; tree-temp
  group applies sequentially and writes the draft after each operation; text group
  sorts by line position descending and writes the draft once after all operations.'
