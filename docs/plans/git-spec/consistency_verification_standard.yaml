  - global_step: G-006
    c5_concept_references_valid: {result: pass, finding_list: []}
    c6_source_ranges_relevant:
      result: pass
      finding_list: []
      note: >
        Union of owned concepts' source_labels (C-001,C-002,C-021,C-022,
        C-023,C-026,C-027,C-028,C-029) = {a1b2,c3d4,w9x0,y1z2,a3b4,j3k4,w3x4,
        d7e8,f9g0,h1i2} (10 labels, since C-026 cites both j3k4 and w3x4).
        G-006's own source_labels list has 9 items and omits w3x4. Reviewed:
        this is not a c6 violation. w3x4's text ("every git operation
