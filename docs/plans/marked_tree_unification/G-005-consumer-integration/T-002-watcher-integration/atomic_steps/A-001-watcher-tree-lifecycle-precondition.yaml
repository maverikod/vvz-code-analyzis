prompt: "Integrate the file watcher with TreeLifecycle (C-021 / C-010): before the watcher inserts or updates a database file row, ensure a valid tree through the TreeLifecycle path-based wrapper, and pass the checksum that wrapper already computed into the file-row write. This is an interface/integration change over working code: do NOT rewrite the queue, scanning, scheduling, normalization, or the database-write logic; only add the TreeLifecycle call at the existing seam and forward its checksum.\n\n## Parent documents\n- Global step: docs/plans/marked_tree_unification/G-005-consumer-integration/README.yaml\n- Tactical step: docs/plans/marked_tree_unification/G-005-consumer-integration/T-002-watcher-integration/README.yaml\n- Machine spec: docs/plans/marked_tree_unification/spec.yaml (C-021, C-010)\n\n## MRS excerpt\n\nC-021 Watcher: the file watcher that ensures a valid tree and persists the source checksum before inserting or updating a database file row.\n  - calls the TreeLifecycle path wrapper before a file-row insert or update\n  - persists the computed source checksum in the database alongside the file row\n  - the schema extension is applied idempotently and requires no explicit migration\n\nC-010 TreeLifecycle: the single owner and coordinator of tree validity and tree creation that every consumer routes through.\n  - single entry point: no ad-hoc per-call-site validation or creation exists outside it\n  - owns the validity decision and the build dispatch\n  - provides a path-based wrapper for consumers that work with file paths rather than content\n\n## a3/a8 waiver (pre-existing oversized file)\nTarget is pre-existing project file >400 lines. Region/sectioned embed with explicit anchor markers satisfies a8; full-file embed not required.\n\nDo not split this file.\n\n## Operation\n\nmodify_file: code_analysis/core/file_watcher_pkg/processor_queue.py\n\n## Background facts (no need to open other files)\n\n- The TreeLifecycle path-based wrapper is the function `validate_or_recreate_tree_file`, importable as:\n  `from code_analysis.core.tree_lifecycle.checksum import validate_or_recreate_tree_file`\n  Its signature is keyword-only:\n  `validate_or_recreate_tree_file(*, project_root: Path, file_path: str, force: bool = False) -> tuple[TreeRepresentationRef, TreeValidityState]`\n  It reads the source once, computes its checksum, reads the sidecar digest, and either reuses a valid tree or rebuilds it. It raises FileNotFoundError when the source file is absent; it may also raise ValueError or OSError on read/parse problems.\n- The returned `TreeRepresentationRef` is a dataclass whose fields are: `file_path: str`, `sidecar_path: Path`, `content_checksum: str`, `root_stable_id: Optional[str]`. The already-computed source checksum is `ref.content_checksum` (a SHA-256 hex string). Do NOT recompute it.\n- `file_path` for the wrapper must be the project-root-relative path, and `project_root` must be the resolved project root Path. Both are available in the function below (the normalized absolute path and the resolved `project_root`); derive the relative path from them.\n- The database-write helper `ensure_file_row_for_disk_path` already accepts a keyword-only `tree_checksum: Optional[str] = None` parameter and persists it on the row. Pass `ref.content_checksum` into that call. Do NOT modify `ensure_file_row_for_disk_path` here.\n\n## Current full content of the target method (verbatim)\n\nThe method `_queue_file_for_processing` of class `ProcessorQueueOps` in `code_analysis/core/file_watcher_pkg/processor_queue.py` currently reads:\n\n```python\n    def _queue_file_for_processing(\n        self,\n        file_path: str,\n        mtime: float,\n        project_id: str,\n        project_root: Optional[Path] = None,\n    ) -> bool:\n        \\\"\\\"\\\"Queue file for processing (add/update in DB, mark needs_chunking).\\\"\\\"\\\"\n        from ..path_normalization import normalize_file_path\n        from ..exceptions import ProjectIdMismatchError\n\n        try:\n            watch_dirs: List[str | Path] = list(self.watch_dirs_resolved)\n            path_for_norm = file_path\n            if project_root is not None:\n                path_for_norm = _watcher_path_input_to_absolute(file_path, project_root)\n            normalized = normalize_file_path(\n                path_for_norm,\n                watch_dirs=watch_dirs,\n                project_root=project_root,\n            )\n            abs_file_path = normalized.absolute_path\n\n            if normalized.project_id != project_id:\n                raise ProjectIdMismatchError(\n                    message=(\n                        f\"Project ID mismatch: file {abs_file_path} belongs to project \"\n                        f\"{normalized.project_id} but was provided with project_id {project_id}\"\n                    ),\n                    file_project_id=normalized.project_id,\n                    db_project_id=project_id,\n                )\n\n            if file_row_has_live_edit_lock(\n                self.database, project_id=project_id, path=str(abs_file_path)\n            ):\n                logger.debug(\n                    \"[QUEUE] skip queue (live edit lock): %s\",\n                    abs_file_path,\n                )\n                return True\n\n            if project_root is None:\n                project_root = normalized.project_root\n\n            if not project_root:\n                root_dir = self._get_project_root_dir(project_id, abs_file_path)\n                if root_dir:\n                    project_root = root_dir\n\n            if not project_root:\n                logger.warning(\n                    \"Could not determine project root for %s; chunking update only\",\n                    abs_file_path,\n                )\n                gf = getattr(self.database, \"get_file_by_path\", None)\n                if callable(gf):\n                    row = gf(abs_file_path, project_id, include_deleted=False)\n                    if row and row.get(\"id\"):\n                        self._db_execute(\n                            \"UPDATE files SET needs_chunking = 1 WHERE id = ?\",\n                            (row[\"id\"],),\n                        )\n                return True\n\n            logger.debug(\n                \"[QUEUE] File normalized: file=%s, project_root=%s, project_id=%s\",\n                abs_file_path,\n                project_root,\n                project_id,\n            )\n\n            try:\n                file_record = ensure_file_row_for_disk_path(\n                    self.database,\n                    project_id,\n                    abs_file_path,\n                    last_modified=mtime,\n                    mark_needs_chunking=True,\n                )\n                if not file_record or file_record.get(\"id\") is None:\n                    logger.error(\n                        \"[QUEUE] File not registered after add: %s\",\n                        abs_file_path,\n                    )\n                    return False\n                file_id = file_record.get(\"id\")\n                logger.debug(\n                    \"[QUEUE] File added/updated: %s | file_id=%s | project_id=%s\",\n                    abs_file_path,\n                    file_id,\n                    project_id,\n                )\n                logger.debug(\n                    \"[QUEUE] File verified: file_id=%s, path=%s\",\n                    file_id,\n                    file_record.get(\"path\"),\n                )\n                logger.debug(\"[QUEUE] File marked for vectorization: %s\", abs_file_path)\n            except Exception as e:\n                logger.error(\n                    \"[QUEUE] Failed to add/update file: %s (%s)\",\n                    abs_file_path,\n                    e,\n                    exc_info=True,\n                )\n                return False\n\n            return True\n\n        except Exception as e:\n            logger.error(\n                f\"[QUEUE] \\u2717 Error queueing file {file_path}: {e}\",\n                exc_info=True,\n            )\n            return False\n```\n\n## Required change\n\n1. Add the import of the TreeLifecycle wrapper. At the top of the method body, next to the other local imports already present (`from ..path_normalization import normalize_file_path` and `from ..exceptions import ProjectIdMismatchError`), add:\n```python\n        from code_analysis.core.tree_lifecycle.checksum import validate_or_recreate_tree_file\n```\n\n2. Just before the `try: file_record = ensure_file_row_for_disk_path(...)` block (i.e. after the `[QUEUE] File normalized` debug log and once `project_root` is known non-empty), ensure the tree via TreeLifecycle and capture the checksum. Compute the project-relative path from `abs_file_path` and the resolved `project_root`, then call the wrapper. On FileNotFoundError, ValueError, or OSError, log and return False (tree validity is a precondition for the write). Concretely insert:\n```python\n            try:\n                rel_for_tree = str(Path(abs_file_path).resolve().relative_to(Path(project_root).resolve()))\n            except ValueError:\n                rel_for_tree = str(abs_file_path)\n            try:\n                tree_ref, _tree_state = validate_or_recreate_tree_file(\n                    project_root=Path(project_root),\n                    file_path=rel_for_tree,\n                )\n            except (FileNotFoundError, ValueError, OSError) as e:\n                logger.error(\n                    \"[QUEUE] TreeLifecycle could not ensure a valid tree for %s: %s\",\n                    abs_file_path,\n                    e,\n                    exc_info=True,\n                )\n                return False\n```\n\n3. Forward the computed checksum into the database write by adding the `tree_checksum` keyword argument to the existing `ensure_file_row_for_disk_path` call. The call becomes:\n```python\n                file_record = ensure_file_row_for_disk_path(\n                    self.database,\n                    project_id,\n                    abs_file_path,\n                    last_modified=mtime,\n                    mark_needs_chunking=True,\n                    tree_checksum=tree_ref.content_checksum,\n                )\n```\n\n## Constraints\n- Modify ONLY `_queue_file_for_processing` in `processor_queue.py`. Do NOT modify TreeLifecycle, `ensure_file_row_for_disk_path`, or any other file.\n- Route all tree validity/creation\
  \ through `validate_or_recreate_tree_file`; do NOT add any independent tree-validity check and do NOT recompute the checksum (reuse `tree_ref.content_checksum`).\n- Keep the queue, normalization, project-id-mismatch handling, live-edit-lock skip, the `project_root`-missing fallback branch (chunking-only update), scheduling, and the existing logging unchanged. The TreeLifecycle call belongs on the main path where `project_root` is known and a full file-row write happens, not in the `project_root`-missing fallback branch.\n- `Path` is already imported at module level (`from pathlib import Path`); do not re-import it.\n- All docstrings and comments in English (ARTIFACT_LOCALE=en, CR-010).\n"
verification:
  type: pytest
  target: tests
  expected: Existing watcher tests stay green. On the main queue path (project_root known), _queue_file_for_processing calls validate_or_recreate_tree_file(project_root=..., file_path=...) before the ensure_file_row_for_disk_path write, making tree validity a precondition; on FileNotFoundError, ValueError, or OSError it logs and returns False. The checksum computed by the wrapper (tree_ref.content_checksum) is forwarded as the tree_checksum keyword argument to ensure_file_row_for_disk_path. No independent tree-validity check remains in the watcher, the checksum is not recomputed, and the queue/normalization/fallback/logging behaviour is otherwise unchanged. TreeLifecycle and ensure_file_row_for_disk_path themselves are not modified.
