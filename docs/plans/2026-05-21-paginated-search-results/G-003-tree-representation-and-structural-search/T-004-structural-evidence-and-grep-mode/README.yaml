step_id: T-004
parent_global_step: G-003
name: Structural Evidence and Grep Search Mode
description: "Creates the StructuralEvidence (C-018) validity rules: evidence is valid
  only when it is backed by a validated TreeRepresentation (C-015) and a preview-compatible
  result node carrying a PreviewReference (C-017). Classic line grep output is not
  structural evidence unless it has been converted to validated preview-compatible
  nodes. A timed-out dynamic or structural phase must not contribute partial or invalid
  structural evidence to a merged result. Creates the GrepSearchMode (C-019) entity
  with two explicit modes. Structural mode is the default: it validates or creates
  a TreeRepresentation, maps grep matches to tree nodes or blocks, and returns PreviewReference
  data as StructuralEvidence. Classic line grep mode is opt-in: it returns line-oriented
  text matches and must not be used as structural evidence inside project cross-search
  unless its results are converted to validated preview-compatible nodes.\n"
concepts:
- C-018
- C-019
inputs:
- name: grep_result
  type: list of raw line matches
  description: Raw grep output before mode-specific processing.
- name: grep_mode
  type: one of [structural, classic_line]
  description: The explicit grep operating mode selected for this search.
- name: tree_representation
  type: TreeRepresentation (C-015) or null
  description: Validated tree for the file, required for structural mode; null 
    is not permitted in structural mode.
outputs:
- name: structural_evidence
  type: StructuralEvidence (C-018) or null
  description: Validated structural evidence with PreviewReference per matched 
    node when mode is structural and the tree is valid; null when the phase 
    timed out or when mode is classic_line.
- name: line_matches
  type: list of line-oriented text matches or null
  description: Raw line match results when mode is classic_line; null when mode 
    is structural.
atomic_steps:
- A-001
status: draft
