prompt: "## Task\n\nModify an existing file by adding one function to it.\n\nTarget\
  \ file: code_analysis/commands/universal_file_preview/python_visualizer.py\nOperation:\
  \ modify_file\n\n## Current file content\n\nThe file exists with exactly the following\
  \ content. Do not modify anything\nalready present. Append render_node after the\
  \ last line of this content.\n\n---\n\"\"\"\nPython node renderer for universal_file_preview\
  \ (C-022).\n\nConverts CSTTree nodes to structured human-readable text for AI consumption.\n\
  \nAuthor: Vasiliy Zdanovskiy\nemail: vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__\
  \ import annotations\n\nimport pathlib\nfrom typing import Any\n\nfrom .budget import\
  \ PreviewBudget\n\n\ndef _fmt_range(meta: Any) -> str:\n    \"\"\"Format a line\
  \ range string from node metadata.\n\n    Args:\n        meta: NodeMetadata with\
  \ start_line and end_line attributes.\n\n    Returns:\n        String 'L{start}-{end}',\
  \ 'L{start}', or '' when start_line is None.\n    \"\"\"\n    start = meta.start_line\n\
  \    if start is None:\n        return \"\"\n    end = meta.end_line\n    if end\
  \ is not None and end != start:\n        return f\"L{start}-{end}\"\n    return\
  \ f\"L{start}\"\n\n\ndef render_module(tree: Any, budget: PreviewBudget) -> str:\n\
  \    \"\"\"Render a structured text overview of a Python module (C-022).\n\n   \
  \ When the file has fewer lines than budget.full_text_max_lines and that\n    threshold\
  \ is positive, returns the raw file source instead of the\n    structured overview\
  \ (C-023 full-text fallback).\n\n    Args:\n        tree: CSTTree loaded for the\
  \ file.\n        budget: PreviewBudget with full_text_max_lines cap.\n\n    Returns:\n\
  \        Structured text string suitable for AI consumption.\n    \"\"\"\n    file_line_count\
  \ = max(\n        (meta.end_line for meta in tree.metadata_map.values() if meta.end_line),\n\
  \        default=0,\n    )\n    if budget.full_text_max_lines > 0 and file_line_count\
  \ < budget.full_text_max_lines:\n        file_path = getattr(tree, \"file_path\"\
  , None)\n        if file_path:\n            try:\n                return pathlib.Path(file_path).read_text(encoding=\"\
  utf-8\")\n            except Exception:\n                pass\n\n    top_nodes =\
  \ sorted(\n        (meta for meta in tree.metadata_map.values() if meta.depth ==\
  \ 1),\n        key=lambda m: m.start_line or 0,\n    )\n\n    entries: list[str]\
  \ = []\n    for meta in top_nodes:\n        kind = meta.kind or \"\"\n        stable_id\
  \ = meta.stable_id\n        rng = _fmt_range(meta)\n\n        if kind == \"import\"\
  \ or (\n            not kind and meta.type in (\"Import\", \"ImportFrom\", \"ImportStar\"\
  )\n        ):\n            entries.append(f\"[{stable_id}] {rng}  {meta.signature\
  \ or meta.type}\")\n        elif kind == \"smallstmt\":\n            entries.append(f\"\
  [{stable_id}] {rng}  {meta.signature or meta.type}\")\n        elif kind == \"function\"\
  :\n            line1 = f\"[{stable_id}] {rng}  {meta.signature or 'def ' + (meta.name\
  \ or '?') + ':'}\"\n            doc = (meta.docstring or \"\").strip()\n       \
  \     if doc:\n                entries.append(line1 + \"\\n    \" + doc.splitlines()[0])\n\
  \            else:\n                entries.append(line1)\n        elif kind ==\
  \ \"class\":\n            line1 = f\"[{stable_id}] {rng}  class {meta.name or '?'}:\"\
  \n            lines = [line1]\n            doc = (meta.docstring or \"\").strip()\n\
  \            if doc:\n                lines.append(\"    \" + doc.splitlines()[0])\n\
  \            node_id = next(\n                (nid for nid, m in tree.metadata_map.items()\
  \ if m.stable_id == stable_id),\n                None,\n            )\n        \
  \    if node_id:\n                methods = sorted(\n                    (\n   \
  \                     m for m in tree.metadata_map.values()\n                  \
  \      if m.parent_id == node_id and m.kind in (\"function\", \"method\")\n    \
  \                ),\n                    key=lambda m: m.start_line or 0,\n    \
  \            )\n                for meth in methods:\n                    sig =\
  \ meth.signature or (\"def \" + (meth.name or \"?\"))\n                    lines.append(\n\
  \                        \"    [{meth_id}] {rng}  {sig}\".format(\n            \
  \                meth_id=meth.stable_id,\n                            rng=_fmt_range(meth),\n\
  \                            sig=sig,\n                        )\n             \
  \       )\n            entries.append(\"\\n\".join(lines))\n\n    root_meta = tree.metadata_map.get(tree.root_node_id)\n\
  \    module_docstring = (root_meta.docstring or \"\").strip() if root_meta else\
  \ \"\"\n    parts: list[str] = []\n    if module_docstring:\n        parts.append(module_docstring)\n\
  \    parts.extend(entries)\n    return \"\\n\\n\".join(parts)\n---\n\n## What to\
  \ add\n\nAppend the following public function after the last line of the file above.\n\
  Do not modify any existing code.\n\n### render_node(tree: Any, stable_id: str) ->\
  \ str\n\nSignature: def render_node(tree: Any, stable_id: str) -> str\n\nDocstring:\n\
  \    Render a single CST node identified by its stable_id (C-022).\n\n    Args:\n\
  \        tree: CSTTree loaded for the file.\n        stable_id: Stable UUID of the\
  \ target node from cst_load_file (C-009).\n\n    Returns:\n        Structured text\
  \ for the node, or empty string if stable_id not found.\n\nLogic:\n\nStep 1 - Locate\
  \ node metadata:\n  meta = next(\n      (m for m in tree.metadata_map.values() if\
  \ m.stable_id == stable_id),\n      None\n  )\n  if meta is None:\n      return\
  \ ''\n  node_id = next(\n      (nid for nid, m in tree.metadata_map.items() if m.stable_id\
  \ == stable_id),\n      None\n  )\n\nStep 2 - Render by kind/type. Use _fmt_range\
  \ (already defined above in the file).\n  Build a list[str] called lines, then return\
  \ '\\n'.join(lines).\n\n  Case A - kind in ('function','method') or meta.type in\
  \ ('FunctionDef','AsyncFunctionDef'):\n    lines = []\n    sig = meta.signature\
  \ or ('def ' + (meta.name or '?') + ':')\n    lines.append(f'[{stable_id}] {_fmt_range(meta)}\
  \  {sig}')\n    doc = (meta.docstring or '').strip()\n    if doc:\n        lines.append('\
  \    ' + doc.splitlines()[0])\n    if node_id and meta.depth is not None:\n    \
  \    body = sorted(\n            (m for m in tree.metadata_map.values()\n      \
  \       if m.parent_id == node_id and m.depth == meta.depth + 1),\n            key=lambda\
  \ m: m.start_line or 0\n        )\n        _COMPOUND = frozenset(('FunctionDef','AsyncFunctionDef','ClassDef',\n\
  \                                'If','For','While','Try','With','Match'))\n   \
  \     for child in body:\n            child_sig = child.signature or child.type\n\
  \            if child.kind in ('function','method','class') or child.type in _COMPOUND:\n\
  \                lines.append(f'    [{child.stable_id}] {_fmt_range(child)}  {child_sig}\
  \  ...')\n            else:\n                lines.append(f'    [{child.stable_id}]\
  \ {_fmt_range(child)}  {child_sig}')\n    return '\\n'.join(lines)\n\n  Case B -\
  \ kind == 'class' or meta.type == 'ClassDef':\n    lines = []\n    lines.append(f'[{stable_id}]\
  \ {_fmt_range(meta)}  class {meta.name or \"?\"}:')\n    doc = (meta.docstring or\
  \ '').strip()\n    if doc:\n        lines.append('    ' + doc.splitlines()[0])\n\
  \    if node_id and meta.depth is not None:\n        methods = sorted(\n       \
  \     (m for m in tree.metadata_map.values()\n             if m.parent_id == node_id\
  \ and m.kind in ('function','method')),\n            key=lambda m: m.start_line\
  \ or 0\n        )\n        for meth in methods:\n            sig = meth.signature\
  \ or ('def ' + (meth.name or '?'))\n            lines.append(f'    [{meth.stable_id}]\
  \ {_fmt_range(meth)}  {sig}')\n            meth_doc = (meth.docstring or '').strip()\n\
  \            if meth_doc:\n                lines.append('        ' + meth_doc.splitlines()[0])\n\
  \    return '\\n'.join(lines)\n\n  Case C - meta.type in ('If','For','While','Try','With','Match'):\n\
  \    lines = []\n    lines.append(f'[{stable_id}] {_fmt_range(meta)}  {meta.signature\
  \ or meta.type}')\n    if node_id and meta.depth is not None:\n        body = sorted(\n\
  \            (m for m in tree.metadata_map.values()\n             if m.parent_id\
  \ == node_id and m.depth == meta.depth + 1),\n            key=lambda m: m.start_line\
  \ or 0\n        )\n        _COMPOUND = frozenset(('FunctionDef','AsyncFunctionDef','ClassDef',\n\
  \                                'If','For','While','Try','With','Match'))\n   \
  \     for child in body:\n            child_sig = child.signature or child.type\n\
  \            if child.kind in ('function','method','class') or child.type in _COMPOUND:\n\
  \                lines.append(f'    [{child.stable_id}] {_fmt_range(child)}  {child_sig}\
  \  ...')\n            else:\n                lines.append(f'    [{child.stable_id}]\
  \ {_fmt_range(child)}  {child_sig}')\n    return '\\n'.join(lines)\n\n  Case D -\
  \ anything else:\n    return f'[{stable_id}] {_fmt_range(meta)}  {meta.signature\
  \ or meta.type or meta.name or \"\"}'\n\n## CSTTree interface\n\ntree.metadata_map:\
  \ dict[str, NodeMetadata]\nNodeMetadata attributes:\n  stable_id: str\n  start_line:\
  \ int | None\n  end_line: int | None\n  type: str\n  kind: str | None  ('import','class','function','method','smallstmt')\n\
  \  name: str | None\n  parent_id: str | None\n  depth: int | None\n  signature:\
  \ str | None\n  docstring: str | None  (may be None)\n\n## Required imports\n\n\
  No new imports needed. Use only what is already imported:\nfrom __future__ import\
  \ annotations\nfrom typing import Any\n(pathlib and PreviewBudget are already imported\
  \ but not needed for render_node)\n\n## Constraints\n\nFunction must have a complete\
  \ docstring with Args and Returns.\nAll parameters must carry type annotations.\n\
  Do not import libcst directly.\nDo not change any existing code.\nAfter this addition\
  \ the file must not exceed 350 lines.\n"
