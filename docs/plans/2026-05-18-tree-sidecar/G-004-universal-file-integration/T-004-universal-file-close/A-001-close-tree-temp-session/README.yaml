  ## Goal
  For `FORMAT_TREE_TEMP` with sidecar-backed `EditSession`, closing must not write source or sidecar when no
  successful commit occurred after mutations (session.dirty True). Discard in-memory tree state and registry slot.
  When session is clean (dirty False), still release session; draft file deletion follows existing tree-temp draft
  rules but must not wipe persisted `.trees` sidecar. Do not run SHASyncPolicy here.

  ## Implementation notes
  - In `_close_tree_temp_or_text`, branch when session uses new fields: if `session.tree_temp_roots` non-empty or a flag
    `session.uses_sidecar_tree` (add in session.py if needed — only if T-004 requires another field and T-001 did
    not add it; prefer checking tree_temp_roots non-empty vs legacy `tree_id` json path).
  - Remove tree from any registries (legacy json/yaml remove_tree) when tree_id set.
  - delete_lockfile remains in execute() after group close.

  ## close_status payload
  Include keys: success, abandoned_uncommitted (bool True when dirty and no commit this session), clean_close bool.

