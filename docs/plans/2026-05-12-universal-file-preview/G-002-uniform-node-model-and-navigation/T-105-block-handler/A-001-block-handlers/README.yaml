  \ child count.\"\nBody: return {\n        'type': (node.type_label or '')[:vpl],\n\
  \        'name': node.name[:vpl] if node.name else None,\n        'attributes':\
  \ node.attributes,\n        'child_count': len(node.children),\n      }\n"
