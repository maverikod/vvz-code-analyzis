step_id: G-005
name: universal_file_write command
description: 'Implement the two-phase universal_file_write MCP command. First call:
  generate code from draft, compute diff via diff_support, write lockfile with os.getpid(),
  return diff. Second call (lockfile present, PID matches, lockfile mtime newer than
  draft): create BackupPair atomically, generate code to temp, on failure restore_file
  from backup, on success rename temp to original, delete lockfile, git commit if
  enabled. PID mismatch treated as first call.'
