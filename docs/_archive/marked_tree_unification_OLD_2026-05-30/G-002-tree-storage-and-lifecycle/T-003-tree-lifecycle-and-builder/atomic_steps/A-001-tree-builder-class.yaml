  ## Class skeleton

  ```python
  class TreeBuilder:
      """TreeBuilder (C-011): canonical unified-pipeline writer of TreeFiles."""

      @staticmethod
      def build(
          *,
          content: str,
          source_abs: Path,
          file_path: str,
          content_checksum: str,
          registry: Optional[HandlerRegistry] = None,
      ) -> TreeRepresentationRef:
          """Build and write a TreeFile from unmarked source content.

          Algorithm:
          1. Resolve registry = registry or default_registry().
          2. handler = registry.resolve(source_abs).
          3. marked_text = handler.mark(content).
          4. sidecar_path = handler.sidecar_path(source_abs).
          5. Atomic write: write marked_text to temp file in sidecar_path.parent,
             then os.replace to sidecar_path (create parent dirs if missing).
          6. Return TreeRepresentationRef(
                 file_path=file_path,
                 sidecar_path=sidecar_path,
                 content_checksum=content_checksum,
                 root_stable_id=_first_root_node_id(handler, source_abs, content),
             ) where root_stable_id is the node_id of the first TreeNode from
             handler.parse_content if any, else None.

          Args:
              content: Raw unmarked SourceFile text.
              source_abs: Absolute path to SourceFile (used for handler resolution).
              file_path: Project-relative path string for the reference.
              content_checksum: SHA-256 hex digest of content (from compute_content_checksum).
              registry: Optional HandlerRegistry; defaults to default_registry().

          Returns:
              TreeRepresentationRef pointing to the newly written sibling TreeFile.

          Raises:
              HandlerNotFoundError: no handler registered for source extension.
              OSError: atomic write failure.
              Any exception from handler.mark (format-specific parse/marker errors).
          """
          ...
  ```

  ## Helper: _first_root_node_id (private module function)

  ```python
  def _first_root_node_id(handler, source_abs: Path, content: str) -> str | None:
      nodes = handler.parse_content(source_abs, content)
      return nodes[0].node_id if nodes else None
  ```

  ## Concrete example

  Input:
    - content = 'print("hi")\n'
    - source_abs = Path('/proj/src/foo.py')
    - file_path = 'src/foo.py'
    - content_checksum = 'abc123...' (SHA-256 hex)

  Steps:
    1. default_registry().resolve → PythonHandler
    2. PythonHandler.mark → marked text with `# ___id___:<uuid>` on statement line
    3. sidecar_path → `/proj/src/foo.py.tree`
    4. Atomic write marked text to foo.py.tree

  Output TreeRepresentationRef:
    - file_path = 'src/foo.py'
    - sidecar_path = Path('/proj/src/foo.py.tree')
    - content_checksum = 'abc123...'
    - root_stable_id = first stable_id UUID from parse_content

  ## Error handling

