      return ["git", "commit", "-m", commit_message]


  FORBIDDEN_ON_COMMIT_ON_WRITE: frozenset = frozenset({"push"})


  def assert_never_pushes(argv: List[str]) -> None:
      """
      Assert that a commit-on-write argv never performs a remote push.

      Commit-never-pushes invariant: a commit produced on write never pushes
      to a remote; propagation of commits to a remote remains a separate
      manual operation requested independently of the write. This guard
      raises when any element of argv matches a forbidden remote-propagating
      token, so callers can verify a commit argv before executing it.

      Args:
          argv: The argv list to check, e.g. the list built by
              build_commit_argv.

      Returns:
          None when no element of argv appears in
          FORBIDDEN_ON_COMMIT_ON_WRITE.

      Raises:
          ValueError: If any element of argv appears in
              FORBIDDEN_ON_COMMIT_ON_WRITE.
      """
      for token in argv:
          if token in FORBIDDEN_ON_COMMIT_ON_WRITE:
              raise ValueError(
                  "commit-on-write argv must never push: forbidden token "
                  f"'{token}' found in argv"
              )
  ```

