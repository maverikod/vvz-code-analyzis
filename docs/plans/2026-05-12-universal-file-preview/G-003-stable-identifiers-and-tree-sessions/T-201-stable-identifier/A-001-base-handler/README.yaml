prompt: "Create a new Python file.\n\nTarget file (create_file — file does not exist):\n\
  \  code_analysis/commands/universal_file_preview/base_handler.py\n\nFile-level docstring\
  \ (required):\n  \"\"\"\n  FileHandler ABC for universal_file_preview.\n\n  Defines\
  \ the abstract interface (C-003) that every file handler must\n  implement. Each\
  \ handler opens one family of files and produces the\n  uniform Node representation.\
  \ StableIdentifier (C-009) format is\n  opaque at this level; each handler interprets\
  \ it natively.\n\n  Author: Vasiliy Zdanovskiy\n  email: vasilyvz@gmail.com\n  \"\
  \"\"\n\nImports:\n  from __future__ import annotations\n  import abc\n  from typing\
  \ import Any\n  from .errors import PreviewError\n  from .models import Node\n\n\
  Abstract class: FileHandler(abc.ABC)\nDocstring:\n  \"\"\"\n  Abstract base for\
  \ file handlers (C-003).\n\n  Each concrete handler opens one family of files (by\
  \ extension) and\n  produces the uniform in-memory Node representation. Navigation\
  \ logic\n  is not implemented here; it lives in NavigationProcedure (C-006).\n\n\
  \  Attributes:\n      supported_extensions: Frozenset of lowercase extensions this\n\
  \                            handler accepts (e.g. frozenset({'.py'})).\n  \"\"\"\
  \n\nAbstract property: supported_extensions(self) -> frozenset[str]\n  Decorator:\
  \ @property, @abc.abstractmethod\n  Docstring: \"Frozenset of lowercase file extensions\
  \ this handler supports.\"\n\nAbstract method: open_root(\n    self,\n    file_path:\
  \ str,\n    session: Any | None,\n  ) -> Node | PreviewError\n  Decorator: @abc.abstractmethod\n\
  \  Return type: Node | PreviewError\n  Docstring:\n    \"\"\"\n    Open the file\
  \ and return the root Node.\n\n    On success returns the root Node (NodeKind depends\
  \ on handler).\n    On parse failure returns a file_structure_error PreviewError.\n\
  \n    Args:\n        file_path: Project-relative path to the file.\n        session:\
  \ An existing in-memory tree session (TreeSession C-011),\n                 or None\
  \ when no session is provided by the caller.\n\n    Returns:\n        Root Node\
  \ or PreviewError.\n    \"\"\"\n\nAbstract method: resolve_node_ref(\n    self,\n\
  \    node_ref: str,\n    session: Any | None,\n  ) -> Node | PreviewError\n  Decorator:\
  \ @abc.abstractmethod\n  Return type: Node | PreviewError\n  Docstring:\n    \"\"\
  \"\n    Resolve a StableIdentifier (C-009) to the specific Node it addresses.\n\n\
  \    The identifier format is native to this handler and opaque to the\n    dispatcher.\
  \ On failure returns an UNKNOWN_NODE_REF PreviewError.\n\n    Args:\n        node_ref:\
  \ StableIdentifier string in this handler's native format.\n        session: In-memory\
  \ tree session, or None.\n\n    Returns:\n        Resolved Node or PreviewError.\n\
  \    \"\"\"\n"
