prompt: "Create `code_analysis/source_selection/freshness_validator.py`.\n\n## MRS
  excerpt\n\nC-014 FreshnessValidation: validation step that decides whether an indexed\n\
  file representation still matches current file content.\nProperties:\n- Compares
  indexed checksum or modification metadata against current file.\n- If checksums
  match: file is fresh, eligible for IndexedFileSet.\n- If checksums diverge or modification
  time shows post-indexing change:\n  file is stale, routed to DynamicFileSet.\n-
  File absent from database entirely: routed to DynamicFileSet without\n  checksum
  comparison.\n\n## Implementation requirements\n\n1. Import `enum`, `dataclasses`,
  `typing`.\n\n2. Define `FreshnessVerdict(str, enum.Enum)` with members:\n   FRESH
  = \"fresh\", STALE = \"stale\", ABSENT = \"absent\".\n\n3. Define `@dataclasses.dataclass(frozen=True)`
  class `FileRecord`:\n   - Field `file_path: str`.\n   - Field `indexed_checksum:
  typing.Optional[str]` — None if absent.\n\n4. Define function:\n   ```python\n \
  \  def validate_freshness(\n       file_path: str,\n       indexed_checksum: typing.Optional[str],\n\
  \       current_checksum: str,\n   ) -> FreshnessVerdict:\n   ```\n   - If `indexed_checksum
  is None`: return `FreshnessVerdict.ABSENT`.\n   - If `indexed_checksum == current_checksum`:
  return `FreshnessVerdict.FRESH`.\n   - Otherwise: return `FreshnessVerdict.STALE`.\n\
  \n5. Define function:\n   ```python\n   def validate_batch(\n       records: list[FileRecord],\n\
  \       current_checksums: dict[str, str],\n   ) -> dict[str, FreshnessVerdict]:\n\
  \   ```\n   - For each `record` in `records`: call `validate_freshness` with\n \
  \    `current_checksums.get(record.file_path)` as current_checksum if\n     indexed_checksum
  is not None, else treat as ABSENT.\n   - Returns a dict mapping `file_path` to `FreshnessVerdict`.\n\
  \n## Constraints\n- Standard library only.\n- All public names have one-line docstrings.\n\
  - File under 70 lines.\n"
