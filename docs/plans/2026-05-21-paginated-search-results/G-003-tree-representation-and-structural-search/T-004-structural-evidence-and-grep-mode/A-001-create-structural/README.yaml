prompt: "Create the file code_analysis/search_session/structural.py.\n\nMRS excerpt:\n\
  C-018 StructuralEvidence: Search evidence that is valid only when backed by a validated
  TreeRepresentation and a preview-compatible result node. Properties: required when
  grep participates in project cross-search as structural evidence; line-only grep
  is not structural evidence unless converted into validated preview-compatible nodes;
  timed-out dynamic or structural phases must not contribute invalid partial structural
  evidence.\nC-019 GrepSearchMode: Explicit operating mode of fs_grep, either classic
  line grep or preview-compatible structural grep. Properties: classic line grep returns
  line-oriented text matches and is opt-in; structural mode validates or creates a
  file tree, maps matches to nodes or blocks, and returns PreviewReference data; structural
  mode is the default; classic line grep must not count as project cross-search structural
  evidence unless converted.\n\nImplementation requirements.\nImports: dataclasses,
  enum, typing. Also import: from code_analysis.search_session.preview_ref import
  PreviewReference.\n\n1. Define class GrepMode(str, enum.Enum) with members STRUCTURAL
  = structural and CLASSIC_LINE = classic_line.\n\n2. Define dataclass StructuralEvidence
  with fields: node_match_count (int), preview_references (list of PreviewReference
  objects), is_valid (bool, True when backed by validated tree and preview-compatible
  refs), source (str, file path the evidence comes from).\n\n3. Define function make_structural_evidence(source:
  str, preview_refs: list of PreviewReference) returning StructuralEvidence. Returns
  StructuralEvidence(node_match_count=len(preview_refs), preview_references=preview_refs,
  is_valid=True, source=source). Docstring must state that callers must only call
  this function when the tree is validated and preview_refs are stable.\n\n4. Define
  function make_invalid_evidence(source: str) returning StructuralEvidence. Returns
  StructuralEvidence(node_match_count=0, preview_references=[], is_valid=False, source=source).
  Docstring must state that this is used when a timed-out or failed phase must not
  contribute partial evidence.\n\n5. Define function is_structural_evidence_valid(evidence:
  StructuralEvidence) returning bool. Returns evidence.is_valid and evidence.node_match_count
  >= 0.\n\nConstraints: no third-party imports; all public names must have docstrings;
  invalid evidence must have is_valid=False; make_invalid_evidence must never raise.\n"
verification:
  type: import
  target: code_analysis/search_session/structural.py
  expected: Module imports without error. GrepMode.STRUCTURAL and 
    GrepMode.CLASSIC_LINE exist. StructuralEvidence, make_structural_evidence, 
    make_invalid_evidence, and is_structural_evidence_valid are all present.
