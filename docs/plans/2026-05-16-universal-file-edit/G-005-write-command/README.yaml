step_id: G-005
name: Write command
description: Implement WriteCommand with a two-phase protocol. The first call
  generates code from draft, computes diff, writes the WriteLockfile, and
  returns the diff without touching the original. The second call, when the
  lockfile PID matches, creates a BackupPair atomically, renames temp to
  original, deletes the lockfile, and optionally commits via git. A PID
  mismatch is treated as a first call. Write failure restores the original
  from the backup.
