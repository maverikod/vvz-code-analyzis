step_id: T-002
parent_global_step: G-004
name: Backward Compatible Command Contract and Optional Pagination Parameters
description: "Creates the BackwardCompatibleCommandContract (C-023) for each ExistingSearchCommand
  by establishing that the current non-paginated behavior remains the default for
  callers that omit the new optional fields. Existing callers do not need to change
  their requests. Creates the OptionalPaginationParameters (C-024) schema: the set
  of optional request and response fields that enable session-backed paginated behavior.
  These fields include paginated flag, page_size, cursor, search_id, and include_search_id.
  None of these fields are required for non-paginated callers. All new fields must
  be documented in command schemas. Bridge commands that add paginated behavior must
  be documented when used.\n"
concepts:
- C-023
- C-024
inputs:
- name: existing_command_schema
  type: command parameter schema
  description: Current parameter schema of one ExistingSearchCommand, to which 
    OptionalPaginationParameters are added without changing required fields.
outputs:
- name: extended_command_schema
  type: BackwardCompatibleCommandContract (C-023) with 
    OptionalPaginationParameters (C-024)
  description: Updated command schema that preserves all existing required and 
    optional fields and adds the new pagination fields as optional.
atomic_steps:
- A-001
status: draft
