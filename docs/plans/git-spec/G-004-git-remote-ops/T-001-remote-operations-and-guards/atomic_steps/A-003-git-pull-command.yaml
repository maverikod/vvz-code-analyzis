  def _abort_pull_best_effort(
      rebase: bool,
      cwd: Path,
      env: Optional[Dict[str, str]],
  ) -> None:
      """Best-effort abort of an in-progress merge or rebase after a failed pull.

      Restores a clean working tree per C-015 (``on_unclean_tree_state:
      clean``). Any failure of the abort command itself is swallowed: the
      abort is a safety net, not a guaranteed-successful operation, and
      must never raise or mask the original pull failure being reported to
      the caller.

      Args:
          rebase: Whether the pull that failed used ``--rebase`` (True) or
              ``--ff-only`` (False), selecting which abort subcommand to
              run.
          cwd: Working directory (the resolved project root).
          env: Environment mapping to use for the subprocess, or None to
              inherit the current process environment unchanged.

      Returns:
          None.
      """
      abort_args = ["git", "rebase", "--abort"] if rebase else ["git", "merge", "--abort"]
      try:
          run_git_subprocess(abort_args, cwd=cwd, env=env, timeout_seconds=30.0)
      except Exception:
          pass
  ```

  Class definition, exactly:
  ```python
  class GitPullCommand(BaseMCPCommand):
      """MCP command integrating a remote branch into the current branch (C-014, C-015).

      Defaults to a fast-forward-only merge. When ``rebase`` is requested,
      uses ``git pull --rebase`` instead, never combined with
      ``--ff-only``. A pull that cannot complete cleanly aborts back to a
      clean working tree and reports ``GIT_CONFLICT``.
      """

      name = "git_pull"

      version = "1.0.0"

      descr = "Integrate a remote branch into the current branch (fast-forward-only by default, or rebase)."

      category = "git"

      author = "Vasiliy Zdanovskiy"

      email = "vasilyvz@gmail.com"

      use_queue = True

      @staticmethod
      def get_name() -> str:
          """Return the MCP command name.

          Returns:
              MCP command name string.
          """
          return "git_pull"

      @classmethod
      def get_schema(cls) -> Dict[str, Any]:
          """Return the JSON schema for command parameters.

          Returns:
              JSON schema dict describing project_id, remote, ref, and rebase.
          """
          return {
              "type": "object",
              "properties": {
                  "project_id": {"type": "string"},
                  "remote": {"type": "string"},
                  "ref": {"type": "string"},
                  "rebase": {"type": "boolean"},
              },
              "required": ["project_id"],
              "additionalProperties": False,
          }

      @classmethod
      def metadata(cls: Type["GitPullCommand"]) -> Dict[str, Any]:
          """Return extended AI/docs metadata for git_pull.

          Returns:
              Metadata dict with description, parameters, and examples.
          """
          return {
              "name": "git_pull",
              "description": (
                  "Integrate a remote branch into the current branch. "
                  "Fast-forward-only by default; pass rebase=true to "
                  "rebase instead (never combined with fast-forward-only)."
              ),
              "parameters": {
                  "project_id": {"type": "string", "required": True},
                  "remote": {"type": "string", "required": False},
                  "ref": {"type": "string", "required": False},
                  "rebase": {"type": "boolean", "required": False},
              },
              "examples": [{"command": {"project_id": "<uuid>", "remote": "origin", "ref": "main"}}],
          }

      async def execute(  # type: ignore[override]
          self,
          project_id: str,
          remote: str = "origin",
          ref: Optional[str] = None,
          rebase: bool = False,
          **kwargs: Any,
      ) -> SuccessResult | ErrorResult:
          """Execute the git_pull command.

          Args:
              project_id: Project UUID whose repository root is resolved
                  via ``BaseMCPCommand._resolve_project_root``.
              remote: Name of the configured git remote to pull from.
                  Defaults to ``"origin"``.
              ref: Optional branch or ref name to pull; when omitted, git's
                  configured upstream for the current branch applies.
              rebase: When True, use ``git pull --rebase`` instead of the
                  default ``git pull --ff-only``. Never combined with
                  ``--ff-only``.
              **kwargs: Unused; accepted for adapter compatibility.

          Returns:
              SuccessResult with the pull outcome, or ErrorResult naming a
              distinct outcome code (GIT_NOT_AVAILABLE, GIT_NOT_A_REPO,
              GIT_REMOTE_NOT_CONFIGURED, GIT_AUTH_FAILED, GIT_CONFLICT, or
              GIT_REMOTE_TIMEOUT).
          """
          _ = kwargs
          root = self._resolve_project_root(project_id)
          if not is_git_available():
              return git_remote_error_result(
                  GIT_NOT_AVAILABLE, "git executable is not available", {}
              )
          if not is_git_repository(root):
              return git_remote_error_result(
                  GIT_NOT_A_REPO,
                  f"{root} is not a git repository",
                  {"root": str(root)},
              )
          config_data = self._get_raw_config()
          git_config = load_git_remote_config(config_data)
          if not git_config["remote_enabled"]:
              return git_remote_error_result(
                  GIT_REMOTE_NOT_CONFIGURED,
                  "Remote git operations are not enabled in configuration",
                  {},
              )
          env, auth_error = build_full_subprocess_env(git_config)
          if auth_error is not None:
              return git_remote_error_result(
                  GIT_AUTH_FAILED,
                  str(
                      auth_error.get(
                          "message", "SSH authentication is not configured correctly"
                      )
                  ),
                  {},
              )
          if rebase:
              args = ["git", "pull", "--rebase", remote] + ([ref] if ref else [])
          else:
              args = ["git", "pull", "--ff-only", remote] + ([ref] if ref else [])
          returncode, stdout, stderr, timed_out = run_git_subprocess(
              args,
              cwd=root,
              env=env,
              timeout_seconds=git_config["remote_timeout_seconds"],
          )
          if timed_out:
              _abort_pull_best_effort(rebase, root, env)
              return git_remote_error_result(
                  GIT_REMOTE_TIMEOUT,
                  f"git pull exceeded timeout of {git_config['remote_timeout_seconds']} seconds",
                  {"remote": remote, "ref": ref, "rebase": rebase},
              )
          if returncode != 0:
              auth_code = classify_ssh_auth_stderr(stderr)
              if auth_code == GIT_AUTH_FAILED:
                  return git_remote_error_result(
                      GIT_AUTH_FAILED,
                      "SSH authentication failed during git pull",
                      {"remote": remote, "ref": ref},
                  )
              _abort_pull_best_effort(rebase, root, env)
              return git_remote_error_result(
                  GIT_CONFLICT,
                  f"git pull could not complete cleanly (exit code {returncode}); working tree restored to a clean state",
                  {"remote": remote, "ref": ref, "rebase": rebase, "stderr": stderr.strip()},
              )
          payload: Dict[str, Any] = {
              "success": True,
              "remote": remote,
              "ref": ref,
              "rebase": rebase,
              "outcome": "OK",
              "output": stdout.strip(),
          }
          return SuccessResult(data=cast(Dict[str, Any], payload))
  ```

