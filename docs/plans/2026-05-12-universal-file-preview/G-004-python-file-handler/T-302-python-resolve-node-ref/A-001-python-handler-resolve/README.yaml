prompt: "Modify an existing Python file.\n\nTarget file (modify_file):\n  code_analysis/commands/universal_file_preview/handlers/python_handler.py\n\
  \nCurrent content of the file (python_handler.py) after T-301 has been fully applied:\n\
  \n  \"\"\"\n  PythonFileHandler -- FileHandler for .py, .pyi, .pyw files (C-016).\n\
