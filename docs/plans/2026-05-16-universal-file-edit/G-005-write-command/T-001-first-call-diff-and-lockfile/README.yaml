  PID does not match os.getpid(), this is a first call. Generate code from
  the DraftFile (C-003): for sidecar call save_tree_to_file to temp then read
  temp; for tree-temp serialise in-memory tree to temp; for text read <file>.draft.
  Compute diff(original, generated_code) via diff_support from
  ExistingInfrastructure (C-012). Write <file>.write with current PID.
  Return diff. The original file is not modified.
