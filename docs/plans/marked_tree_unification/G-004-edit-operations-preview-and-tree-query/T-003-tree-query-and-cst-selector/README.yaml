step_id: T-003
parent_global_step: G-004
name: TreeQuery and CstQuerySelector
description: 'Define the TreeQuery entity (C-018) as structural search over the marked
  tree of a file, operating on tree structure rather than full-text or database, and
  returning short_id integers of matching nodes directly usable in preview navigation
  and edit operations ({j001}, {n003}). NodeIdMap (C-025) supplies short_id↔internal
  identity resolution inside the server; API results expose short_id integers only.
  Define two query modes. Simple mode: filters nodes by type label, name, qualified
  name, or line range (Python only). XPath mode: uses a CstQuerySelector (C-019) string
  with double-slash recursive descendant traversal, at-attribute access in filter predicates,
  numeric operators (ge, le, gt, lt) on start_line, end_line, and children_count,
  and a not pseudo-class for negation. Establish the require_one modifier: demands
  a unique match or returns NoMatch or NonUniqueMatch with candidates. Establish include_code:
  returns the source text of the matched node (Python only). Establish that in-session
  query runs against the in-memory draft tree; out-of-session query runs against the
  validated on-disk tree via TreeLifecycle.'
