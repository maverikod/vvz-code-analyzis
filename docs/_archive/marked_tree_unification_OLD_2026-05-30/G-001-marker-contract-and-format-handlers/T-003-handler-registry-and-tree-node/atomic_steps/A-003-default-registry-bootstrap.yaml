  \   registry.register(\".txt\", text_handler)\n    registry.register(\".rst\", text_handler)\n\
  \    registry.register(\".md\", MarkdownHandler())\n    yaml_handler = YamlHandler()\n\
  \    registry.register(\".yaml\", yaml_handler)\n    registry.register(\".yml\",
  yaml_handler)\n    registry.register(\".json\", JsonHandler())\n    registry.register(\"\
  .py\", PythonHandler())\n    return registry\n```\n\nAdd lazy import inside default_registry
  (as shown) to avoid circular imports\nat module load time.\n\n## Constraints\n- Modify
