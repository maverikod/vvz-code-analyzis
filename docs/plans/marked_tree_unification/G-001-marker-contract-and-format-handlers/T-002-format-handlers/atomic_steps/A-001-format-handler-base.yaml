  ## Class: ShortIdAllocator
  Purpose: per-call monotonic integer short_id issuance starting at 1 (C-002 / {a007}).

  ```python
  class ShortIdAllocator:
      def __init__(self, start: int = 1) -> None:
          if start < 1:
              raise ValueError("ShortIdAllocator start must be >= 1")
          self._next = start

      def allocate(self) -> int:
          """Return current short_id and increment internal counter by 1."""
          sid = self._next
          self._next += 1
          return sid

      @property
      def next_free(self) -> int:
          """Lowest short_id not yet issued (for MAP next_free metadata)."""
          return self._next
  ```

  ## Protocol: NodeIdMapResolver (C-025 integration surface)

  Handlers accept an optional map instance for server-internal UUID resolution.
  Do NOT import `code_analysis.core.tree_lifecycle.node_id_map` at module level
  (concrete map module may not exist yet at import time). `NodeIdMapResolver` aligns
  with the NodeIdMap.resolve contract (C-025):

  NodeIdMap.resolve contract (inlined):
  - Class `NodeIdMap` method signature:
    ```python
    def resolve(self, *, short_id: Optional[int] = None, uuid: Optional[str] = None) -> ResolveResult:
        """Bidirectional short_id↔UUID lookup within one loaded map; exactly one argument must be provided."""
    ```
  - `ResolveResult` has fields `short_id: int` and `uuid: str` (UUID4 lowercase with hyphens).
  - File-scoped: lookup is within one tree file's MAP; unrecognised short_id or uuid → input error (C-002).
  - Reverse direction: uuid→short_id uses the same method with `uuid=` kwarg.

  ```python
  @runtime_checkable
  class NodeIdMapResolveResult(Protocol):
      short_id: int
      uuid: str

  @runtime_checkable
  class NodeIdMapResolver(Protocol):
      def resolve(
          self,
          *,
          short_id: Optional[int] = None,
          uuid: Optional[str] = None,
      ) -> NodeIdMapResolveResult:
          """Bidirectional short_id↔UUID lookup within one loaded map; exactly one argument must be provided."""
  ```

  FormatHandler helpers call `self._id_map.resolve(short_id=...)` or
  `self._id_map.resolve(uuid=...)` when an id_map is provided — no dual-method facade.

  ## Class: FormatHandler(ABC)

  ```python
  class FormatHandler(ABC):
      def __init__(self, id_map: Optional[NodeIdMapResolver] = None) -> None:
          self._id_map = id_map
  ```

  ### Abstract methods (exact signatures)
  - `parse_content(self, file_path: Path, content: str) -> List[TreeNode]`
  - `mark(self, content: str) -> str`
  - `unmark(self, marked_text: str) -> str`
  - `sidecar_path(self, source_abs: Path) -> Path`

  Docstrings: state unmarked input for parse_content; byte-exact unmark output; sibling `.tree` path.

  ### Concrete method: node_id_for
  ```python
  def node_id_for(self, raw: str) -> NodeId:
      """Parse decimal integer short_id from raw marker token."""
      try:
          sid = int(raw.strip())
      except ValueError as exc:
          raise ValueError(f"short_id must be int, got {raw!r}") from exc
      if sid < 1:
          raise UnknownNodeIdError(sid)
      return sid
  ```

  Error handling for `node_id_for`:
  - Non-integer raw token → `ValueError` (same pattern as `validate_short_id` in contracts).
  - Parsed integer `< 1` → `UnknownNodeIdError(sid)` with `sid: NodeId` (int).
    UnknownNodeIdError contract (defined in `code_analysis/tree/contracts.py`, C-002):
    - Base class: `ValueError`
    - Signature: `__init__(self, short_id: NodeId) -> None`
    - Docstring: "Raised when a short_id is not recognised in the current tree file (C-002)."
    - Instance attribute: `self.short_id: NodeId`
    - Algorithm __init__: call `super().__init__(f"Unknown short_id: {short_id!r}")`; set `self.short_id = short_id`
    - Message shape: `"Unknown short_id: {short_id!r}"` (e.g. `"Unknown short_id: 0"`)
    - Argument MUST be `NodeId` (int), never `str`

  Edge cases for `node_id_for`:
  - `"abc"` → ValueError, NOT UnknownNodeIdError (no int parsed yet).
  - `"0"` → UnknownNodeIdError(0) with message `Unknown short_id: 0`.
  - `"  42  "` → returns NodeId 42.

  ### Concrete method: resolve_uuid_for_short_id (server-internal)
  Signature: `def resolve_uuid_for_short_id(self, short_id: NodeId) -> UUID`

  Algorithm:
  1. If self._id_map is None: raise RuntimeError("NodeIdMap required for UUID resolution")
  2. Import inside method: `from code_analysis.core.tree_lifecycle.node_id_map import UnknownShortIdError`
  3. try: `result = self._id_map.resolve(short_id=short_id)`
  4. except UnknownShortIdError as exc: raise UnknownNodeIdError(exc.short_id) from exc
  5. Return `UUID(result.uuid)`

  ### Concrete method: resolve_short_id_for_uuid (server-internal)
  Signature: `def resolve_short_id_for_uuid(self, node_uuid: UUID) -> NodeId`

  Algorithm:
  1. If self._id_map is None: raise RuntimeError("NodeIdMap required for UUID resolution")
  2. `result = self._id_map.resolve(uuid=str(node_uuid))`
  3. Propagate `UnknownTreeNodeUuidError` from the map instance unchanged (import inside method if needed)
  4. Return `result.short_id`

  ### Concrete method: verify_byte_round_trip
  ```python
  def verify_byte_round_trip(self, source: str) -> bool:
      """Return True when unmark(mark(source)) equals source byte-for-byte."""
      return self.unmark(self.mark(source)) == source
  ```

  ### Concrete method: verify_checksum_round_trip
  ```python
  def verify_checksum_round_trip(self, source: str) -> bool:
      marked = self.mark(source)
      restored = self.unmark(marked)
      return compute_content_checksum(restored) == compute_content_checksum(source)
  ```

