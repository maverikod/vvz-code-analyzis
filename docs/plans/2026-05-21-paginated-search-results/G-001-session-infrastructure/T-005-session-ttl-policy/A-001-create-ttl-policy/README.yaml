prompt: "Create the file `code_analysis/search_session/ttl_policy.py`.\n\n## MRS excerpt\n\
  \nC-007 SessionTTLPolicy: Configuration policy controlling how long inactive\nSearchSessionDirectory
  data remains after last access.\nProperties:\n  - Has a default code constant.\n\
  \  - Is emitted by the configuration generator.\n  - Is validated by the configuration
  validator.\n  - Rejects missing, invalid, non-integer, zero, negative, and out-of-range\n\
  \    values according to policy.\n\n## Implementation requirements\n\nImports: `typing`.\n\
  \n1. Define module-level constant:\n   `DEFAULT_SESSION_TTL_SECONDS: int = 1800`\n\
  \   (docstring: \"Default session directory TTL in seconds (30 minutes).\")\n\n\
  2. Define module-level constant:\n   `MIN_SESSION_TTL_SECONDS: int = 60`\n   `MAX_SESSION_TTL_SECONDS:
  int = 86400`\n\n3. Define `def validate_session_ttl(value: typing.Any) -> int`:\n\
  \   - Raises `TypeError` if `value` is None or not an `int` instance.\n   - Raises
  `ValueError` if `value <= 0`.\n   - Raises `ValueError` if `value < MIN_SESSION_TTL_SECONDS`.\n\
  \   - Raises `ValueError` if `value > MAX_SESSION_TTL_SECONDS`.\n   - Returns `value`
  as int when all checks pass.\n\n4. Define `def emit_ttl_config_key() -> str`:\n\
  \   - Returns the string `\"search_session_ttl_seconds\"` (the configuration key\n\
  \     name used by the configuration generator).\n\n## Constraints\n- No third-party
  imports.\n- All public names must have docstrings.\n"
