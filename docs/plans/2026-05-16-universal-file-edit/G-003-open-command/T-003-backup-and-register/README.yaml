step_id: T-003
parent_global_step: G-003
name: Create initial backup and register session
description: 'If the file has no backup history, create an initial BackupPair (C-011).
  Use the existing `BackupManager` from `core/backup_manager.py`: call `BackupManager.list_versions(file_path)`
  — if the returned list is empty, call `BackupManager.create_backup(file_path, command=''initial'')`.
  BackupManager already exists and handles all backup storage; no new backup code
  is needed.

  Then register a new EditSession (C-001) using `create_session` from the session
  module created in G-002/T-002. Pass the FormatDescriptor (format_group, handler_id,
  draft_path), abs_path, and tree_id from T-002.

  Return the session_id UUID and the available_operations list from the FormatDescriptor.'
concepts:
- C-001
- C-005
- C-011
- C-012
inputs:
- name: file_path
  type: project-relative path string
  description: Path to the original file.
- name: abs_path
  type: Path
  description: Absolute path to the original file.
- name: format_descriptor
  type: FormatDescriptor
  description: Resolved descriptor from G-002/T-001.
- name: tree_id
  type: str | None
  description: In-memory tree UUID from T-002 (tree-temp group only).
outputs:
- name: session_id
  type: UUID string
  description: Identifier for the new editing session.
- name: available_operations
  type: list of operation descriptor dicts
  description: Operations available for the format group, each with type, address
    fields, and content rules.
atomic_steps: []
status: draft
