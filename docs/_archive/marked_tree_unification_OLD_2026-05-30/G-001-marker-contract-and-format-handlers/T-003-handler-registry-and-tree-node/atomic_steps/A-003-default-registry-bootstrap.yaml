  \n## MRS excerpt\n\nC-008 HandlerRegistry:\n  - keyed by file extension (leading
  dot)\n  - owns the set of registered FormatHandlers\n  - sole resolution path; no
  caller may bypass it\n  - must be populated with all five handlers for supported
  extensions\n\nC-007 FormatHandler extensions:\n  - text: .txt, .rst\n  - markdown:
  .md\n  - yaml: .yaml, .yml\n  - json: .json\n  - python: .py\n\n## Current file
  content (after T-003 A-002)\n\n```python\nfrom __future__ import annotations\n\n\
  from pathlib import Path\nfrom typing import Dict\n\nfrom code_analysis.tree.format_handler
  import FormatHandler\n\n\nclass HandlerNotFoundError(KeyError):\n    \"\"\"Raised
  when no FormatHandler is registered for a file extension.\"\"\"\n\n    def __init__(self,
  extension: str) -> None:\n        super().__init__(\n            f\"No FormatHandler
  registered for extension {extension!r}\"\n        )\n        self.extension = extension\n\
  \n\nclass HandlerRegistry:\n    \"\"\"Central registry resolving a file to its FormatHandler
  by extension (C-008).\"\"\"\n\n    def __init__(self) -> None:\n        self._handlers:
  Dict[str, FormatHandler] = {}\n\n    def register(self, extension: str, handler:
  FormatHandler) -> None:\n        if not extension.startswith(\".\"):\n         \
  \   raise ValueError(\n                f\"Extension must start with a dot; got {extension!r}\"\
  \n            )\n        self._handlers[extension] = handler\n\n    def resolve(self,
  file_path: Path) -> FormatHandler:\n        ext = file_path.suffix\n        if ext
  not in self._handlers:\n            raise HandlerNotFoundError(ext)\n        return
  self._handlers[ext]\n\n    def extensions(self) -> list[str]:\n        return sorted(self._handlers.keys())\n\
  \n    def __contains__(self, extension: str) -> bool:\n        return extension in
  self._handlers\n```\n\n## Required change\n\nAppend after the HandlerRegistry class
  (keep all existing code unchanged):\n\n```python\n\ndef default_registry() -> HandlerRegistry:\n\
  \    \"\"\"Return a HandlerRegistry with all five format handlers registered (C-008).\n\
