step_id: T-002
parent_global_step: G-002
name: File Set Construction
description: "Creates the IndexedFileSet (C-012) and DynamicFileSet (C-013) by partitioning
  the full set of project files before search execution begins. Enumerates all files
  present on disk for the project scope. For each file present in the database, applies
  FreshnessValidation (C-014) using the stored checksum and the current disk checksum.
  Files that are fresh go into IndexedFileSet; files that are stale, absent from the
  database, draft-only, or whose index is unavailable go into DynamicFileSet. Files
  in IndexedFileSet must not be rescanned directly by dynamic grep when their indexed
  state is current.\n"
concepts:
- C-012
- C-013
inputs:
- name: disk_file_list
  type: list of project-relative paths
  description: All files present on disk within the project scope, enumerated 
    before the search starts.
- name: database_file_records
  type: list of {file_path, stored_checksum} records
  description: All file records currently in the database index for this 
    project.
- name: freshness_results
  type: map of file_path to one of [fresh, stale, absent]
  description: FreshnessValidation result for each file in disk_file_list.
outputs:
- name: indexed_file_set
  type: IndexedFileSet (C-012)
  description: Set of files confirmed fresh in the database index, eligible for 
    indexed search without direct disk rescan.
- name: dynamic_file_set
  type: DynamicFileSet (C-013)
  description: Set of files that must be processed directly from disk because 
    they are stale, absent, draft-only, or otherwise unavailable in the index.
atomic_steps:
- A-001
status: draft
