step_id: G-002
name: Session and draft model
description: Define the in-memory EditSession record and the on-disk DraftFile
  and WriteLockfile artefacts. EditSession is created by OpenCommand, consumed
  by EditCommand, WriteCommand, and CloseCommand, and keyed by a session_id UUID.
  The format_group field of EditSession determines the DraftFile variant and
  the WriteLockfile lifecycle.
