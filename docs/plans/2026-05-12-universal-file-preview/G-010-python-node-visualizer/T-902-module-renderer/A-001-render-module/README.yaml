prompt: "## Task\n\nCreate a new file. The file does not exist.\n\nTarget file: code_analysis/commands/universal_file_preview/python_visualizer.py\n\
  Operation: create_file\n\n## Purpose\n\nThis module implements PythonNodeRenderer\
  \ (concept C-022). It converts a\nCSTTree node into structured human-readable text\
  \ for AI model consumption.\nThis step adds only render_module. The companion render_node\
  \ is added next.\n\n## CSTTree interface (duck-typed, do not import the class)\n\
  \ntree.metadata_map: dict[str, NodeMetadata]  — maps node_id to metadata.\ntree.root_node_id:\
  \ str  — node_id of the Module root.\ntree.file_path: str | None  — absolute path\
  \ to the source file (may be missing).\n\nNodeMetadata attributes:\n  stable_id:\
  \ str\n  start_line: int | None\n  end_line: int | None\n  type: str  (e.g. 'FunctionDef',\
  \ 'ClassDef', 'ImportFrom', 'Import')\n  kind: str | None  ('import', 'class', 'function',\
  \ 'method', 'smallstmt')\n  name: str | None\n  parent_id: str | None\n  depth:\
  \ int | None  (root=0, top-level children=1, class members=2)\n  signature: str\
  \ | None  (one-line signature string)\n  docstring: str | None  (extracted docstring\
  \ text)\n\n## PreviewBudget\n\nLocated at: code_analysis/commands/universal_file_preview/budget.py\n\
  Import as: from .budget import PreviewBudget\n\n@dataclass\nclass PreviewBudget:\n\
  \    preview_lines: int\n    value_preview_len: int\n    full_text_max_lines: int\
  \ = 200\n\n## Function to implement\n\n### render_module(tree: Any, budget: PreviewBudget)\
  \ -> str\n\nDocstring: Render a structured text overview of a Python module (C-022).\n\
  Args: tree: CSTTree loaded for the file. budget: PreviewBudget with caps.\nReturns:\
  \ Structured text string.\n\nLogic:\n\nStep 1 — Full-text fallback (C-023):\n  file_line_count\
  \ = max(\n      (meta.end_line for meta in tree.metadata_map.values() if meta.end_line),\n\
  \      default=0\n  )\n  if budget.full_text_max_lines > 0 and file_line_count <\
  \ budget.full_text_max_lines:\n      file_path = getattr(tree, 'file_path', None)\n\
  \      if file_path:\n          try:\n              return pathlib.Path(file_path).read_text(encoding='utf-8')\n\
  \          except Exception:\n              pass  # fall through to structured rendering\n\
  \nStep 2 — Collect depth-1 nodes:\n  top_nodes = sorted(\n      (meta for meta in\
  \ tree.metadata_map.values() if meta.depth == 1),\n      key=lambda m: m.start_line\
  \ or 0\n  )\n\nStep 3 — Build output lines:\n  Helper _fmt_range(meta) -> str:\n\
  \    Returns 'L{start}-{end}' if start != end and end is not None, else 'L{start}'.\n\
  \    If start_line is None return ''.\n\n  For each meta in top_nodes, build one\
  \ entry (str) by kind:\n    - kind == 'import' or kind is None and type in ('Import','ImportFrom','ImportStar'):\n\
  \        '[{stable_id}] {_fmt_range(meta)}  {meta.signature or meta.type}'\n   \
  \ - kind == 'smallstmt':\n        '[{stable_id}] {_fmt_range(meta)}  {meta.signature\
  \ or meta.type}'\n    - kind == 'function':\n        line1 = '[{stable_id}] {_fmt_range(meta)}\
  \  {meta.signature or 'def ' + (meta.name or '?') + ':'}'\n        if meta.docstring:\n\
  \            first_doc_line = meta.docstring.strip().splitlines()[0] if meta.docstring.strip()\
  \ else ''\n            return line1 + '\\n    ' + first_doc_line\n        else:\n\
  \            return line1\n    - kind == 'class':\n        line1 = '[{stable_id}]\
  \ {_fmt_range(meta)}  class {meta.name or '?'}:'\n        lines = [line1]\n    \
  \    if meta.docstring:\n            first_doc_line = meta.docstring.strip().splitlines()[0]\n\
  \            lines.append('    ' + first_doc_line)\n        # Collect methods: depth==2\
  \ children with parent_id==meta's node_id\n        # Find node_id for this meta\
  \ by reverse lookup in metadata_map\n        node_id = next(\n            (nid for\
  \ nid, m in tree.metadata_map.items() if m.stable_id == meta.stable_id),\n     \
  \       None\n        )\n        if node_id:\n            methods = sorted(\n  \
  \              (m for m in tree.metadata_map.values()\n                 if m.parent_id\
  \ == node_id and m.kind in ('function', 'method')),\n                key=lambda\
  \ m: m.start_line or 0\n            )\n            for meth in methods:\n      \
  \          sig = meth.signature or ('def ' + (meth.name or '?'))\n             \
  \   lines.append('    [{meth_id}] {rng}  {sig}'.format(\n                    meth_id=meth.stable_id,\n\
  \                    rng=_fmt_range(meth),\n                    sig=sig\n      \
  \          ))\n        return '\\n'.join(lines)\n\nStep 4 — Assemble result:\n \
  \ root_meta = tree.metadata_map.get(tree.root_node_id)\n  module_docstring = root_meta.docstring\
  \ if root_meta else None\n  parts = []\n  if module_docstring:\n      parts.append(module_docstring.strip())\n\
  \  parts.extend(entries)  # each entry is one str from Step 3\n  return '\\n\\n'.join(parts)\n\
  \n## Required imports\n\nfrom __future__ import annotations\nimport pathlib\nfrom\
  \ typing import Any\nfrom .budget import PreviewBudget\n\n## Module-level docstring\
  \ (use exactly this)\n\n\"\"\"\nPython node renderer for universal_file_preview\
  \ (C-022).\n\nConverts CSTTree nodes to structured human-readable text for AI consumption.\n\
  Two public functions: render_module (module overview) and render_node\n(single-node\
  \ drill-down, to be added in the next step).\n\nAuthor: Vasiliy Zdanovskiy\nemail:\
  \ vasilyvz@gmail.com\n\"\"\"\n\n## Constraints\n\nAll functions must have complete\
  \ docstrings with Args and Returns.\nAll parameters must carry type annotations.\n\
  Do not import libcst directly.\nFile must not exceed 200 lines.\n"
