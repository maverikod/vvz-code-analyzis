    c005:
      before: "recreate_tree_from_content(*, kind, ...) dispatch by format kind."
      after: "TreeBuilder.build via HandlerRegistry.default_registry().resolve → FormatHandler.mark → sibling .tree; checksum in tree file AND returned reference; legacy recreate_tree_from_content parity oracle until G-000."
    d002:
      before: "Open protocol only; no content-supply rule."
      after: "FINAL-2 — content ONLY for non-existent or broken/corrupted file; ERROR if valid file exists; write-then-build-tree-checksum-git when accepted."
    d003:
      before: "In-session source copy not touched by tree edits; tree write + git commit only."
      after: "Hide markers before mutation, restore after; per-mutation write tree, unmark-export to session TEMP, record SHA-256 both, mandatory git commit (one mutation = one commit)."
