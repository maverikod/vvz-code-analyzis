inputs:
- name: MarkerContract specification
  type: MRS concept definition (C-001)
  description: The three-operation contract (mark, parse, unmark) defined in MRS
    as C-001 that each FormatHandler must implement.
- name: NodeId specification
  type: MRS concept definition (C-002)
  description: Per-file integer short_id handle defined in MRS as C-002; embedded
    in TREE section markers only.
- name: NodeIdMap specification
  type: MRS concept definition (C-025)
  description: short_id↔UUID4 map operations that handlers use for identity resolution;
    handlers never embed UUID4 in markers.
- name: AddressableBlock specification
  type: MRS concept definition (C-005)
  description: Per-format minimal addressable unit defined in MRS as C-005;
    constrains marker placement to block boundaries only.
outputs:
- name: FormatHandler entity definition
  type: domain entity definition
  description: "The per-format component contract with the four handler-contract operations
    (parse_content, mark, unmark, sidecar_path) and the constraint that it uses only
    its own format marker syntax with integer short_id tokens.\n"
- name: Five handler instance definitions
  type: domain entity definition
  description: Text, markdown, YAML, JSON, and Python handler instances with
    their format-native short_id marker syntax specified; Python hybrid scheme
    documented; no UUID markers in any format.
- name: Marker hide/unhide boundary constraint
  type: domain constraint definition
  description: Marker hide before mutation and restore after mutation are
    EditSession (C-012) responsibilities, not FormatHandler (C-007) scope.
    FormatHandler implements only parse_content, mark, unmark, and sidecar_path;
    in-session hide/unhide during editing is outside FormatHandler.
