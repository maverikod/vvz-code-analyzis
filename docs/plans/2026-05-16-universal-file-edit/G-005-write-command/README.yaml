step_id: G-005
name: universal_file_write command
description: The write command is a two-phase protocol controlled by the lockfile.
  On the first call the command generates code from the draft, computes a diff against
  the original file, writes the lockfile with the server process identifier, and returns
  the diff without modifying the original. On the second call, when the lockfile is
  present and the process identifier matches, the command creates a backup pair atomically,
  generates code to a temporary file, renames it to the original on success, deletes
  the lockfile, and issues a git commit when configured. A process identifier mismatch
  on the second call is treated as a first call. A write failure after backup creation
  restores the original from the backup.
