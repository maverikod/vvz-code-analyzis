  Implement class SearchCloseCommand(BaseMCPCommand):
  - name = "search_close"
  - get_schema() required: job_id (string)
  - execute():
      Resolve session directory; if missing return SESSION_NOT_FOUND.
      Update manifest status to closed via update_manifest_atomic mutator; record closed_at timestamp in service metadata.
      Delete RawFindingBuffer accumulation files under buffer_dir when safe (blocks and index remain until cleaner TTL).
      Return SuccessResult {success: true, closed: true, job_id}.
      Subsequent search_get_page with same job_id and block_position returns ErrorResult code CLOSED_SESSION
      (primary; SESSION_NOT_FOUND only when directory already removed by cleaner).
  - metadata() documenting that block_position continuation is invalid after close
    (tests_required cursor_invalid_after_close maps to CLOSED_SESSION error in G-008/T-006/A-006).

  Constraints:
  - Under 200 lines.
  - Author header.

