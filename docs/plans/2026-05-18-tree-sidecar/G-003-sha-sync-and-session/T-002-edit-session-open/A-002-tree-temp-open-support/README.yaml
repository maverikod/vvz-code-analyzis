  --- Types ---

  class SidecarWriteIntent(str, Enum):
      NONE = "none"
      CREATE = "create"
      REPLACE = "replace"

  @dataclass(frozen=True)
  class TreeTempOpenAcquisition:
      roots: List[TreeNode]
      source_sha256: str
      sidecar_path: Path
      sidecar_write_intent: SidecarWriteIntent

  --- Function ---

  def acquire_tree_temp_for_open(
      *,
      project_root: Path,
      source_abs: Path,
      handler_id: str,
      raw_source_bytes: bytes,
  ) -> TreeTempOpenAcquisition:
      """Compute SHA, run SHASyncPolicy, return roots + staging intent for session open.

      Steps (exact):
        1. current_sha = hashlib.sha256(raw_source_bytes).hexdigest().
        2. source_rel = source_abs.resolve().relative_to(project_root.resolve()); sidecar_path =
           resolve_trees_sidecar_path(project_root.resolve(), source_rel).
        3. loaded = _read_trees_sidecar_optional(sidecar_path)  # implement using read_bytes + parse_sidecar_json_bytes
        4. sidecar_exists = loaded is not None
        5. sidecar_sha = loaded[0] if loaded else None
        6. decision = resolve_sha_sync_policy(
               sidecar_exists=sidecar_exists,
               sidecar_source_sha256=sidecar_sha,
               current_source_sha256=current_sha,
               active_session_holds_file=active_session_uses_abs_path(source_abs),
           )
        7. Branch on decision.branch (ShaSyncBranch):
           - NO_SIDECAR: roots = parse_source_bytes_to_roots(handler_id, raw_source_bytes);
             intent = CREATE.
           - SHA_MATCH: assert loaded is not None; roots = deepcopy(loaded[1]); intent = NONE.
           - SHA_MISMATCH_NO_SESSION: roots = parse_source_bytes_to_roots(handler_id, raw_source_bytes); intent = REPLACE.
           - SHA_MISMATCH_ACTIVE_SESSION: assert loaded is not None; roots = deepcopy(loaded[1]); intent = NONE.

  Return TreeTempOpenAcquisition(roots=roots, source_sha256=current_sha, sidecar_path=sidecar_path, sidecar_write_intent=intent).

  Errors: raise ValueError with clear message if SHA_MATCH or SHA_MISMATCH_ACTIVE_SESSION but loaded is None; raise if parser returns empty roots where source bytes are non-empty document (optional: allow empty list only for empty source file).

