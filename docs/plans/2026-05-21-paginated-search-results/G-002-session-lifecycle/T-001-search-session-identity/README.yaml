step_id: T-001
parent_global_step: G-002
name: SearchSession identity and ownership
description: "Create the SearchSession domain entity as the logical execution context
  for one search request. Assign a unique search_id immediately when a client or model
  starts a search request. Define SearchSession as the durable owner of its session
  directory, manifest-backed metadata, exposed status, and lifecycle state. Specify
  the lifecycle states running, completed, failed, cancelled, timed_out, dead, expired,
  and closed as the terminal and non-terminal states tracked for each session.\n"
concepts:
- C-001
inputs:
- name: search_request_context
  type: SearchRequestContext
  description: Initiation context supplied when a client or model starts a 
    search request.
outputs:
- name: search_session
  type: SearchSession
  description: Newly created session with a unique search_id and initial running
    lifecycle state.
atomic_steps:
- A-001
status: draft
