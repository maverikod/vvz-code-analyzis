  ## MRS excerpt (only the concept relevant to this file)

  concept_id: C-024
  name: ImplicitTriggerRemoval
  definition: The breaking migration that removes the prior message-only commit
    trigger so a message without intent is now rejected.
  properties:
    removed: message_only_implies_commit
    after_change: message_without_intent_rejected
    breaking: true
    old_caller: fails_loudly
  source_labels: ['{c5d6}']
  source_spec text (label {c5d6}): "Introducing the explicit commit-intent flag
  removes a prior implicit behaviour in which supplying a commit message alone
  triggered a commit. After the change, a message without the flag is rejected
  rather than silently committing, so any existing caller that relied on the
  implicit behaviour fails loudly and must adopt the explicit flag."

  Relevance to this file: this file's `execute` method gains a new boolean
  parameter `commit_on_write` (the explicit per-write commit-intent flag
  referenced by C-024). Immediately after payload validation and before any
  database access, backup, or write side effect, `execute` calls a pre-write
  guard function `reject_message_without_intent(commit_on_write, commit_message)`
  imported from `code_analysis/core/commit_intent_migration.py`. That function's
  full contract (restated here in full, so no other file needs to be read):

  ```python
  def reject_message_without_intent(
      commit_on_write: bool, commit_message: Optional[str]
  ) -> Optional[Dict[str, Any]]:
  ```

  - `commit_on_write: bool` — True means the explicit commit-intent flag is
    set; False means it is unset or absent.
  - `commit_message: Optional[str]` — the caller-supplied commit message, or
    None when no message was supplied.
  - Returns `None` when no rejection applies (the write may proceed).
  - Returns a rejection payload dict when the legacy implicit-trigger
    condition is detected (i.e. `commit_on_write` is False and
    `commit_message` is a non-empty, non-whitespace-only string). The payload
    dict always has exactly these three keys: `"code"` (str),
    `"message"` (str), `"details"` (dict with keys `"breaking_migration"` and
    `"removed_behaviour"`).

  When `reject_message_without_intent` returns a non-None payload, `execute`
  must immediately return
  `ErrorResult(message=rejection["message"], code=rejection["code"], details=rejection["details"])`
  without writing any file content, without opening the database, and without
  producing any commit.

