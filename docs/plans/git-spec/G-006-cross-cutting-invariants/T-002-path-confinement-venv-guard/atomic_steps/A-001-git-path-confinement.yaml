prompt: |
  Create the new Python file at the exact path
  code_analysis/core/project_git/path_confinement.py (operation: create_file).
  Do not modify, create, or read any other file. Do not assume any pre-existing
  content in this file — the parent package code_analysis/core/project_git/
  already exists or is created as part of this operation (its __init__.py is
  authored by a separate tactical step, with no ordering guarantee relative
