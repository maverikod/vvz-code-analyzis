  ## Exception class

  ```
  class HandlerNotFoundError(KeyError):
      """Raised when no FormatHandler is registered for a file extension."""

      def __init__(self, extension: str) -> None:
          ...
          self.extension: str
  ```

  ### Method: HandlerNotFoundError.__init__(self, extension: str) -> None

  Algorithm:
  1. Call `super().__init__(f"No FormatHandler registered for extension {extension!r}")`.
  2. Set `self.extension = extension`.

  ## Class HandlerRegistry

  Docstring:
  ```
  """Central registry resolving a file to its FormatHandler by extension (C-008).

  Sole resolution path from a source file path to its FormatHandler.
  No caller may bypass the registry to select a handler directly.
  """
  ```

  ### Method: __init__(self) -> None

  Docstring: `"""Initialise with an empty handler map."""`

  Algorithm:
  1. Set `self._handlers: Dict[str, FormatHandler] = {}`.

  Instance attribute:
  - `_handlers: Dict[str, FormatHandler]` — private map extension → handler.

  ### Method: register(self, extension: str, handler: FormatHandler) -> None

  Docstring:
  ```
  """Register a FormatHandler for a file extension.

  Args:
      extension: File extension including the leading dot (e.g. ".py").
      handler: The FormatHandler instance to register.

  Raises:
      ValueError: If extension does not start with a dot.
  """
  ```

  Algorithm:
  1. If `not extension.startswith(".")`: raise `ValueError(f"Extension must start with a dot; got {extension!r}")`.
  2. Store `self._handlers[extension] = handler`.

  Edge cases:
  - `extension=""` → ValueError.
  - `extension="py"` (no dot) → ValueError.
  - Re-registering same extension overwrites previous handler (allowed).

  ### Method: resolve(self, file_path: Path) -> FormatHandler

  Docstring:
  ```
  """Return the FormatHandler registered for the file's extension.

  Args:
      file_path: Path whose suffix selects the handler.

  Returns:
      The registered FormatHandler for this extension.

  Raises:
      HandlerNotFoundError: If no handler is registered for file_path.suffix.
  """
  ```

  Algorithm:
  1. Set `ext = file_path.suffix`.
  2. If `ext not in self._handlers`: raise `HandlerNotFoundError(ext)`.
  3. Return `self._handlers[ext]`.

  Edge cases:
  - `Path("file")` with empty suffix → HandlerNotFoundError("").
  - `Path("a.PY")` uses suffix `.PY` (case-sensitive; no normalisation).

  ### Method: extensions(self) -> list[str]

  Docstring: `"""Return sorted list of registered file extensions."""`

  Algorithm:
  1. Return `sorted(self._handlers.keys())`.

  ### Method: __contains__(self, extension: str) -> bool

  Docstring: `"""Return True if a handler is registered for the extension."""`

  Algorithm:
  1. Return `extension in self._handlers`.

