step_id: T-003
parent_global_step: G-002
name: TreeLifecycle and TreeBuilder
description: 'Create and modify the TreeBuilder entity (C-011) and the TreeLifecycle
  entity (C-010) as complete API definitions. TreeBuilder is the single place that
  writes TreeFiles on the canonical unified path: it resolves FormatHandler via
  HandlerRegistry, calls FormatHandler.mark for the TREE section, writes the
  three-section sibling TreeFile in order CHECKSUMS then MAP then TREE — MAP populated
  via NodeIdMap (C-025) build with short_id↔TreeNodeUuid (C-024) entries and next_free;
  CHECKSUMS records content_checksum; TREE holds natively marked content with short_id
  markers only. On rebuild from an existing tree file, TreeBuilder copies next_free
  from the prior MAP section per {a007} before issuing new short_ids. TreeBuilder does
  NOT call recreate_tree_from_content or TreeFormatKind (legacy parity oracle only,
  untouched). TreeLifecycle is the single owner and coordinator of tree validity and
  tree creation; every consumer routes through it. TreeLifecycle owns ChecksumSyncPolicy
  (C-006), TreeBuilder (C-011), and the pure checksum helpers compute_content_checksum
  and is_tree_valid. On rebuild and validity paths that refresh an existing tree,
  TreeLifecycle invokes NodeIdMap validate_and_repair (C-025) to reconcile markers,
  map entries, and next_free while preserving UUID4 for unchanged content identity
  per {a007} and {n002}. TreeLifecycle exposes path-based and content-based entry
  points whose validity and creation routing dispatch to TreeBuilder.build; downstream
  integration modules invoke these APIs but do not redefine the entities.'
