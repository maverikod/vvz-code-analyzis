  type: domain entity definition (C-002, {n003})
  description: TreeQuery returns short_id integers; callers use them as node_ref and
    edit targets without internal UUID at the API boundary.
- name: NodeIdMap entity definition
  type: domain entity definition (C-025)
  description: Internal resolution layer for query execution over loaded tree files.
- name: TreeLifecycle entity definition
  type: domain entity definition (C-010)
  description: Used by out-of-session query to ensure a valid tree before structural
    search begins.
outputs:
- name: TreeQuery entity definition
  type: domain entity definition
  description: Structural search returning short_id integers; simple and XPath modes;
    require_one and include_code modifiers; in-session draft versus out-of-session
    validated tree via TreeLifecycle.
- name: CstQuerySelector entity definition
  type: domain entity definition
  description: XPath-compatible selector string with double-slash recursion, at-attribute
    predicates, numeric operators on line and child counts, and not pseudo-class negation.
