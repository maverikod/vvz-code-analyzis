step_id: T-002
parent_global_step: G-001
name: Existing command behavior baseline
description: "Create the ExistingCommandBehaviorBaseline domain specification bound
  to ExistingSearchCommand. Consume existing_vs_new_classification as the authoritative
  scoped membership list and anti_duplication_map as reuse constraints, without re-inventorying
  or re-surveying command behaviors. Capture the stable default-behavior specification
  that existing callers rely on today: non-paginated direct execution remains the
  default; pagination is never implicit. State preserved validation rules, input and
  output schemas, queue semantics, timeout semantics, direct payload delivery, structural
  result shapes, and preview-reference compatibility as baseline properties per source_spec
  migration obligations. State that existing commands must not be replaced by an incompatible
  greenfield subsystem. Do not produce a second behavior catalog, ledger, or anti-duplication
  map.\n"
concepts:
- C-021
inputs:
- name: existing_vs_new_classification
  type: classification_ledger
  description: "Complete ledger enumerating every behavioral surface in parent global
    step inventory scope (full-text search, semantic search, direct grep and text
    search, structural grep, project cross-search, XPath-like tree search, plus preview,
    queue, and status command categories) (command category, behavioral surface name,
    existing versus new label); surfaces labeled existing are ExistingSearchCommand
    members that receive baseline specification entries.\n"
- name: anti_duplication_map
  type: reuse_map
  description: "Reuse map constraining baseline scope to behaviors that must remain
    authoritative and must not be reimplemented by pagination work.\n"
outputs:
- name: existing_command_behavior_baseline
  type: baseline_specification
  description: "ExistingCommandBehaviorBaseline defining default non-paginated behavior
    and preserved dimensions for each scoped ExistingSearchCommand member.\n"
- name: default_behavior_invariants
  type: invariant_set
  description: "Explicit caller-dependent invariants including non-session direct
    responses, unchanged default invocation semantics, and preserved validation, schema,
    queue, timeout, payload, structural-result, and preview-reference behavior.\n"
atomic_steps:
- A-001
status: draft
