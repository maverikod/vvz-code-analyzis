step_id: G-001
name: Search session lifecycle and directory
description: "Establishes the search session as the logical execution context for
  one search request and the on-disk session directory that holds all of its artefacts.
  A session is created before search execution begins; its directory stores the manifest,
  the directory index, result blocks, and service metadata. The session records the
  owning server process identity and a last-access timestamp used by later expiration
  logic. This step defines the existence, ownership, and basic state of a session
  and its directory; it does not define how result blocks are produced, how the index
  is paged over HTTP, or how expiration and cleanup run.\n"
