prompt: "Create `code_analysis/structural_search/grep_search_modes.py`.\n\n## MRS
  excerpt\n\nC-019 GrepSearchMode: two mutually defined operating modes for filesystem
  grep.\nProperties:\n- Classic line mode (opt-in): returns line-oriented text matches
  for direct\n  standalone inspection. Classic results are NOT structural evidence
  for\n  project cross-search unless separately converted to validated\n  preview-compatible
  nodes under StructuralEvidence rules.\n- Structural preview-compatible mode (default):
  validates or creates the\n  file tree using TreeRepresentation rules (checksum-based
  validity,\n  recreation when missing or invalid); maps text pattern matches to tree\n\
  \  nodes or blocks; returns PreviewReference data (file path, stable node\n  id,
  optional draft session id). Must use the same structure model,\n  node identifiers,
  and selector semantics as XPathLikeFilter.\n- Default dynamic scan covers only known
  supported formats; broad scanning\n  is opt-in and excludes logs, venvs, build dirs,
  binary-like files.\n- Structural mode may produce candidate match sets for downstream\n\
  \  StructuralEvidence classification but must NOT define validity or\n  rejection
  policy (that belongs to StructuralEvidence).\n\n## Implementation requirements\n\
  \n1. Import `dataclasses`, `enum`, `typing`.\n\n2. Define `GrepMode(str, enum.Enum)`
  with members:\n   STRUCTURAL = \"structural\",\n   CLASSIC = \"classic\".\n\n3.
  Define `@dataclasses.dataclass(frozen=True)` class `ClassicLineMatch`:\n   - Fields:
  `file_path: str`, `line_number: int`, `line_text: str`.\n\n4. Define `@dataclasses.dataclass(frozen=True)`
  class `StructuralNodeMatch`:\n   - Fields: `file_path: str`, `node_id: str`, `kind:
  str`,\n     `text: typing.Optional[str]`,\n     `draft_session_id: typing.Optional[str]
  = None`.\n\n5. Define `@dataclasses.dataclass` class `GrepSearchResult`:\n   - Field
  `mode: GrepMode`.\n   - Field `classic_matches: list[ClassicLineMatch]` — populated
  only\n     when mode is CLASSIC.\n   - Field `structural_matches: list[StructuralNodeMatch]`
  — populated\n     only when mode is STRUCTURAL.\n   - Field `evidence_candidates:
  list[StructuralNodeMatch]` — structural\n     matches forwarded for StructuralEvidence
  classification; no validity\n     policy attached here.\n\n6. Define function:\n\
  \   ```python\n   def resolve_mode(requested: typing.Optional[GrepMode]) -> GrepMode:\n\
  \   ```\n   Returns `requested` if not None, else `GrepMode.STRUCTURAL`.\n\n## Constraints\n\
  - Standard library only.\n- All public names have one-line docstrings.\n- File under
  80 lines.\n"
