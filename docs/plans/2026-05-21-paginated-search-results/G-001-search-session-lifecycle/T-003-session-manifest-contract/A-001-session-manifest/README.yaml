  with:\n       search_id=search_id,\n       created_at=now,\n       last_access_at=now,\n\
  \       heartbeat_at=None,\n       status=SearchSessionState.running.value,\n  \
  \     phase=INITIAL_MANIFEST_PHASE,\n       request=dict(request),\n       metrics=dict(DEFAULT_METRICS),\n\
  \       process=process,\n       block_ready_count=0\n     - Calls write_manifest_atomic(layout,
