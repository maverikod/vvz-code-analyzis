step_id: T-003
parent_global_step: G-001
name: Page File and Atomic Publication
description: "Creates the SearchPageFile (C-004) schema as the immutable result page
  record written inside the SearchSessionDirectory. Defines the AtomicPagePublication
  (C-026) protocol: the search worker writes page content to a temporary file, then
  renames it atomically to the final page filename. Clients and HTTP readers consume
  only finalized immutable page files and never observe partially written content.
  Once published, a page file is never rewritten. Each page file contains a bounded
  list of normalized search result records.\n"
concepts:
- C-004
- C-026
inputs:
- name: result_records
  type: list of normalized search result records
  description: Bounded list of result records to write into one page file.
- name: page_index
  type: integer
  description: Zero-based index of this page within the session, used to derive 
    the page filename.
- name: session_directory
  type: SearchSessionDirectory (C-002)
  description: Directory into which the page file is written.
outputs:
- name: page_file
  type: SearchPageFile (C-004)
  description: Finalized immutable page file visible to HTTP readers, containing
    the bounded list of result records.
atomic_steps:
- A-001
status: draft
