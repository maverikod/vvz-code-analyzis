meta:
  plan: git-spec
  artifact: execution_map
  purpose: >
    Execution map for implementing the plan by GS/TS/AS branches. The map is
    operational: pick one branch_id, execute only that atomic step's scope,
    verify it, then move to the next unblocked branch.
  source_artifacts:
    - docs/plans/git-spec/spec.yaml
    - docs/plans/git-spec/gs_concept_matrix.yaml
    - docs/plans/git-spec/t_concept_matrix.yaml
    - docs/plans/git-spec/object_matrix.yaml
  excludes:
    - docs/plans/git-spec/_archive/G-001-commit-on-write

execution_rules:
  branch_id_format: "G-###/T-###/A-###"
  work_branch_format: "git-spec/G-###-T-###-A-###"
  scope_rule: "A branch may implement only the object and behaviour owned by its AS file."
  gs_dependency_rule: "G-002, G-003, G-004, and G-005 consume G-006 foundations."
  hook_wiring_rule: >
    Execute G-006/T-004/A-005 only after the command classes it wires exist;
    keep it as the integration closure for the selected implemented command set.
  status_rule: "ready_for_review branches are executable; draft branches require promotion or explicit approval before implementation."
  archive_rule: "Archived G-001 branches are out of scope."

