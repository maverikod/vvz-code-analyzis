  source_labels:
    "{a1b2}": "The system adds three independent capability blocks to the
      server: a project-scoped git command block operating on a registered
      project's working tree, a GitHub command block operating on the GitHub
      HTTP API, and a commit-on-write behaviour attached to the existing
      project file write path. The three blocks are separable: each can be
      configured, enabled, and fail independently of the others."
    "{c3d4}": "The git command block operates only on the filesystem working
      tree of a registered project via subprocess git. The GitHub command
      block operates only on the GitHub remote HTTP API. Neither block
      touches the server's internal command-to-driver-to-database chain."

