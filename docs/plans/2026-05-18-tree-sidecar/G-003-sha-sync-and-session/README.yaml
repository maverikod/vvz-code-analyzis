step_id: G-003
name: SHA sync policy and session lifecycle
status: done
description: 'Implement SHASyncPolicy and integrate into EditSession lifecycle. Four
  cases on open: (1) no sidecar - build from source, write sidecar; (2) SHA matches
  - load sidecar as-is; (3) SHA mismatch, no active session - source has priority,
  rebuild sidecar; (4) SHA mismatch, active session - sidecar has priority, do not
  rebuild. EditSession holds in-memory TreeNode tree, dirty flag, format_group tree-temp.
  On edit: tree mutated, surviving UUIDs preserved, new nodes get new UUIDs. On write:
  SourceSerializer produces source bytes, source file written, Sidecar updated with
  new SHA-256. On close without write: in-memory changes discarded, on-disk Sidecar
  unchanged.'
