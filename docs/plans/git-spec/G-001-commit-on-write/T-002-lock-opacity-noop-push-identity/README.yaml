step_id: T-002
parent_global_step: G-001
name: Lock opacity, no-op on unchanged, no-push, and commit identity
description: 'Establish the behavioural rules surrounding a commit produced on write
  once the commit-intent contract is satisfied. The server never interprets why a
  file is locked: the decision to commit derives solely from the write-call parameters,
  and the commit decision and the unlock decision are independent of each other so
  neither implies the other. When commit-intent is set with a valid message but the
  written content is identical to the previous content, the write succeeds and produces
  no commit; this no-op is reported as a successful write that committed nothing because
  nothing changed, and it is not an error. A commit produced by a write never pushes
  to a remote; propagation to a remote remains a separate manual operation. The identity
  recorded as the author of a commit-on-write commit is taken from the project''s
  git configuration, not from the writer or the lock holder.

  '
concepts:
- C-003
- C-006
- C-007
- C-008
inputs:
- name: write_call_parameters
  type: structure
  description: The parameters of the write call that alone determine the commit decision,
    independent of lock state.
- name: content_change_state
  type: boolean
  description: Whether the written content differs from the previous content, deciding
    whether a commit is produced.
- name: project_git_config_identity
  type: identity
  description: The author identity drawn from the project git configuration for any
    commit-on-write commit.
outputs:
- name: no_op_write_result
  type: outcome
  description: A successful-write outcome that produced no commit because content
    was unchanged, reported as non-error.
- name: commit_on_write_result
  type: outcome
  description: A successful write that produced a local commit authored from project
    git config and never pushed.
atomic_steps: []
status: draft
