step_id: G-002
name: File Set Classification and Freshness Validation
description: "Defines the partitioning of project files into two disjoint sets before
  any search execution begins. IndexedFileSet contains files whose indexed state is
  confirmed fresh for current disk content via FreshnessValidation. DynamicFileSet
  contains files that are missing from the index, stale, changed since indexing, draft-only,
  or otherwise unavailable in the index and must be processed directly from disk.
  FreshnessValidation uses checksums and modification metadata to move stale indexed
  files into the dynamic set. Files in the IndexedFileSet must not be rescanned directly
  by dynamic grep when current.\n"
