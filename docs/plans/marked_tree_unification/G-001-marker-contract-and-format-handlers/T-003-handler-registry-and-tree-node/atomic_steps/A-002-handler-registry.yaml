  ## Purpose

  Define `HandlerRegistry` (C-008) — the central registry that resolves a
  SourceFile to its FormatHandler (C-007) by file extension. HandlerRegistry is
  the **sole resolution path**; no caller may bypass it to select a handler
  directly.

  ## Prerequisite (execution wave, not a code dependency)

  `code_analysis/tree/format_handler.py` must exist with the FormatHandler ABC
  (see inlined base class contract below). This step does not import TreeNode.

  ## Inlined FormatHandler ABC contract (C-007)

  The registry imports `FormatHandler` from `code_analysis.tree.format_handler`.
  That module must define at minimum:

  ```python
  class FormatHandler(ABC):
      def __init__(self, id_map: Optional[NodeIdMapResolver] = None) -> None:
          self._id_map = id_map

      @abstractmethod
      def parse_content(self, file_path: Path, content: str) -> List[TreeNode]: ...

      @abstractmethod
      def mark(self, content: str) -> str: ...

      @abstractmethod
      def unmark(self, marked_text: str) -> str: ...

      @abstractmethod
      def sidecar_path(self, source_abs: Path) -> Path: ...
  ```

  Semantics: `parse_content` takes unmarked SourceFile body; `mark` and `unmark`
  operate on TREE-section marked text; `sidecar_path` returns the sibling
  `<source>.tree` path next to the source file.

  ## MRS excerpt

  C-008 HandlerRegistry:
    - keyed by file extension (leading dot, e.g. ".py")
    - owns the set of registered FormatHandlers
    - sole resolution path from file path to FormatHandler

  C-007 FormatHandler:
    - one handler per format: text (.txt, .rst), markdown (.md), yaml (.yaml, .yml),
      json (.json), python (.py)

  C-003 TreeFile:
    - file extension determines which handler to use

  C-002 NodeId:
    - unrecognised identifiers yield input error (HandlerNotFoundError for unknown ext)

