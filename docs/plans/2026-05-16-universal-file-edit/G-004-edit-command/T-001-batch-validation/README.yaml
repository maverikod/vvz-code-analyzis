step_id: T-001
parent_global_step: G-004
name: Validate edit batch for sidecar group
description: 'Realise BatchValidation (C-008) for sidecar format group sessions. This
  validation does not exist yet and must be created in a new helper `code_analysis/commands/universal_file_edit/batch_validator.py`.
  The function `validate_sidecar_batch(operations, tree) -> None | error` receives
  the list of EditOperations (C-007) and the in-memory CSTTree. For each operation
  it resolves the node by parent_node_id in the tree. It then checks all pairs: if
  any two operations address nodes where one is an ancestor of the other (walking
  the tree parent chain), the batch is rejected atomically by returning NESTED_BATCH_FORBIDDEN
  from ErrorCodes (C-014). If no violation is found, returns None (success). For tree-temp
  and text group sessions this function is not called.'
concepts:
- C-007
- C-008
- C-014
inputs:
- name: operations
  type: list of EditOperation dicts
  description: Batch submitted by caller for a sidecar group session.
- name: tree
  type: CSTTree (in-memory)
  description: Loaded CST tree for the file being edited.
outputs:
- name: validation_error
  type: ErrorCodes entry | None
  description: NESTED_BATCH_FORBIDDEN when a violation is found (batch not applied).
    None when batch is valid.
atomic_steps: []
status: draft
