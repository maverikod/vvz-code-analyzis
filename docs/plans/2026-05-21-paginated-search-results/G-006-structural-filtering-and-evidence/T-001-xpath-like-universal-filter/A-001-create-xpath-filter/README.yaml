prompt: "Create `code_analysis/structural_search/xpath_like_filter.py`.\n\n## MRS
  excerpt\n\nC-016 XPathLikeFilter: universal structural filter that evaluates XPath-like\n\
  queries over validated TreeRepresentation data from multiple sources.\nProperties:\n\
  - Operates on validated TreeRepresentation (C-015), not on ad-hoc text.\n- Same
  filter code and selector semantics apply to all sources: database-\n  backed structures,
  indexer in-memory structures, dynamically built trees,\n  draft-session content.
  The tree source may differ; the model must not.\n- For every matching node, emits
  a PreviewReference (C-017).\n- Structural grep and XPath-like search share the same
  tree model.\n- Unstable node identifiers must not be exposed as preview-compatible.\n\
  - Timed-out phases must not contribute partial invalid structural evidence.\n\n\
  ## Implementation requirements\n\n1. Import `dataclasses`, `typing`, `re`.\n\n2.
  Define `@dataclasses.dataclass(frozen=True)` class `FilterResult`:\n   - Field `node_id:
  str` — stable node identifier.\n   - Field `kind: str` — node kind label.\n   -
  Field `text: typing.Optional[str]` — leaf text if any.\n   - Field `file_path: str`
  — project-relative file path.\n   - Field `draft_session_id: typing.Optional[str]
  = None`.\n\n3. Define class `XPathLikeFilter`:\n   - Constructor: `__init__(self)`
  — no fields required.\n   - Method `filter(\n         self,\n         tree,\n  \
  \       query: str,\n         file_path: str,\n         draft_session_id: typing.Optional[str]
  = None,\n     ) -> list[FilterResult]`:\n     - `tree` is a `TreeRepresentation`-compatible
  object with\n       `root_nodes: tuple` of `TreeNode`-compatible objects\n     \
  \  (`node_id: str`, `kind: str`, `text: Optional[str]`,\n       `children: tuple`).\n\
  \     - Interprets `query` as a simple node-kind selector:\n       `\"//kind\"`
  matches all nodes of that kind at any depth.\n       `\"kind\"` matches only root-level
  nodes of that kind.\n       Empty or `\"*\"` matches all nodes at all depths.\n\
  \     - Walks the tree recursively collecting matching `TreeNode`\n       objects.\n\
  \     - For each match, appends `FilterResult(node_id=node.node_id,\n       kind=node.kind,
  text=node.text, file_path=file_path,\n       draft_session_id=draft_session_id)`.\n\
  \     - Returns the collected list.\n\n4. Define private helper:\n   `def _walk(node,
  depth_any: bool, kind_filter: typing.Optional[str]) -> list`\n   that recursively
  walks the `node` tree and collects matching nodes.\n\n## Constraints\n- Standard
  library only.\n- All public names have one-line docstrings.\n- File under 90 lines.\n"
