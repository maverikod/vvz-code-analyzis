prompt: |
  Create the file `code_analysis/search_session/session_entity.py`.

  ## MRS excerpt

  C-001 SearchSession: Logical execution context for one search request.
  Properties:
  - Assigned a unique search_id immediately when the search request starts.
  - Durable owner of its session directory, manifest-backed metadata, exposed
    status, and lifecycle state.
  - Lifecycle states: running (non-terminal), completed, failed, cancelled,
    timed_out, dead, expired, closed (terminal).

  ## Implementation requirements

  1. Import `dataclasses`, `enum`, `datetime`, `uuid`.

  2. Define `SearchSessionLifecycleState(str, enum.Enum)` with members:
     RUNNING = "running", COMPLETED = "completed", FAILED = "failed",
     CANCELLED = "cancelled", TIMED_OUT = "timed_out", DEAD = "dead",
     EXPIRED = "expired", CLOSED = "closed".

  3. Define module-level constant:
     `TERMINAL_STATES: frozenset[SearchSessionLifecycleState]` containing
     COMPLETED, FAILED, CANCELLED, TIMED_OUT, DEAD, EXPIRED, CLOSED.

  4. Define `@dataclasses.dataclass` class `SearchSession`:
     - Field `search_id: str` — unique UUID string assigned at creation.
     - Field `status: SearchSessionLifecycleState` — defaults to RUNNING.
     - Field `created_at: datetime.datetime` — UTC creation timestamp.
     - Property `is_terminal(self) -> bool` returns
       `self.status in TERMINAL_STATES`.

  5. Define factory function:
     ```python
     def new_search_session() -> SearchSession:
     ```
     - Generates `search_id = str(uuid.uuid4())`.
     - Returns `SearchSession(
         search_id=search_id,
         status=SearchSessionLifecycleState.RUNNING,
         created_at=datetime.datetime.now(datetime.timezone.utc),
       )`.

  ## Constraints
  - No imports outside the Python standard library.
  - All public names must have one-line docstrings.
  - File must stay under 60 lines.
