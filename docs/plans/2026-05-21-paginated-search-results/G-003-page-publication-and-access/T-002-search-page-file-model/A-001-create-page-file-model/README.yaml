prompt: "Create `code_analysis/search_session/page_file_model.py`.\n\n## MRS excerpt\n\
  \nC-004 SearchPageFile: immutable result page record written inside\nSearchSessionDirectory.\n\
  Properties:\n- Contains a bounded list of normalized search result records.\n- Written
  atomically (write to temp file, then rename to final page filename).\n- Once published,
  never rewritten.\n- Clients and HTTP readers consume only finalized immutable page
  files.\n\n## Implementation requirements\n\n1. Import `dataclasses`, `typing`, `datetime`.\n\
  \n2. Define `@dataclasses.dataclass(frozen=True)` class `SearchResultRecord`:\n\
  \   - Fields: `file_path: str`, `match_text: str`,\n     `preview_node_id: typing.Optional[str]
  = None`,\n     `line_number: typing.Optional[int] = None`.\n\n3. Define `@dataclasses.dataclass(frozen=True)`
  class `SearchPageFile`:\n   - Fields: `page_index: int`, `session_id: str`,\n  \
  \   `records: tuple[SearchResultRecord, ...]`,\n     `published_at: str`  — ISO
  8601 UTC timestamp string.\n   - Method `record_count(self) -> int`: returns `len(self.records)`.\n\
  \   - Class method `create(\n         cls,\n         page_index: int,\n        \
  \ session_id: str,\n         records: list[SearchResultRecord],\n     ) -> \"SearchPageFile\"\
  `:\n     - Sets `published_at = datetime.datetime.now(\n         datetime.timezone.utc).isoformat()`.\n\
  \     - Returns `cls(page_index=page_index, session_id=session_id,\n         records=tuple(records),
  published_at=published_at)`.\n\n## Constraints\n- Standard library only.\n- All
  public names have one-line docstrings.\n- File under 55 lines.\n"
