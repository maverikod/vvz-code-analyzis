prompt: "Create the file\n`code_analysis/commands/universal_file_edit/session_git_status_command.py`.\nOperation: create_file (the file does not exist yet).\n\n## Parent documents\n- Machine spec: `docs/plans/marked_tree_unification/spec.yaml` (C-012, C-013, C-014)\n- Global step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/README.yaml`\n- Tactical step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/T-003-session-git-api/README.yaml`\n\nDefine the `session_git_status` MCP command: one of the five SessionGitApi\n(C-014) commands. It reports whether the active EditSession's SessionRepo\n(C-013) has uncommitted changes relative to HEAD. Under the\none-commit-per-edit invariant this is always clean; the command exists as a\nconsistency check.\n\n## extends-vs-creates resolution\n\nNo session_git_* command exists in the codebase.\nTherefore: create_file.\n\n## MRS excerpt\n\nC-014 SessionGitApi: session-scoped MCP commands exposing the SessionRepo.\n  - every command requires an active session identifier and refuses to run\n    without a valid session context\n  - status command returns uncommitted changes versus the most recent\n    commit\n\nC-013 SessionRepo: dulwich git repository inside the session directory.\nProvides status_is_clean() -> bool (True when both tracked files match\nHEAD; False if any differ or there is no HEAD commit yet).\n\nC-012 EditSession: resolved by session_id via the active-session registry.\n\n## HRS binding paragraphs\n\n{e001}: Every command requires a session_id parameter. A command called\nwithout an active session returns an error; it does not attempt to access\nthe file system without a valid session context.\n\n{e005}: session_git_status(session_id) returns uncommitted changes relative\nto HEAD. Under the invariant that every tree modification immediately\nproduces a commit, this should always be empty; the command exists as a\nconsistency check.\n\n## Dependencies (verified on disk / in plan)\n\n  from mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult\n  from code_analysis.commands.base_mcp_command import BaseMCPCommand\n  from code_analysis.commands.universal_file_edit.errors import (\n      SESSION_NOT_FOUND,\n      error_result_from_make_error,\n      make_error,\n  )\n  from code_analysis.core.edit_session.edit_session import get_active_session\n\nVerified signatures:\n  - get_active_session(session_id: str) -> EditSession; raises KeyError when\n    no active session exists under session_id.\n  - EditSession.session_repo: SessionRepo\n  - SessionRepo.status_is_clean() -> bool\n  - make_error(code: str, message: str, details=None) -> dict\n  - error_result_from_make_error(err: dict) -> ErrorResult\n  - SESSION_NOT_FOUND is the string error code constant for an absent\n    session.\n\nThe command skeleton mirrors the sibling close_command.py contract (class\nattributes name/version/descr/category/author/email/use_queue=False;\n@staticmethod get_name; @classmethod get_schema; @classmethod metadata;\nasync execute returning SuccessResult | ErrorResult).\n\n## Required file content\n\nWrite exactly this file:\n\n```python\n# Author: Vasiliy Zdanovskiy -- vasilyvz@gmail.com\n\n\"\"\"session_git_status MCP command (C-014): uncommitted-changes check.\n\nReports whether the active EditSession's SessionRepo (C-013) has\nuncommitted changes relative to HEAD (HRS {e005}). Under the\none-commit-per-edit invariant the repository is always clean; this command\nis a consistency check. Requires a valid session_id; refuses without an\nactive session (HRS {e001}).\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom typing import Any, Dict, Type, cast\n\nfrom mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult\n\nfrom code_analysis.commands.base_mcp_command import BaseMCPCommand\nfrom code_analysis.commands.universal_file_edit.errors import (\n    SESSION_NOT_FOUND,\n    error_result_from_make_error,\n    make_error,\n)\nfrom code_analysis.core.edit_session.edit_session import get_active_session\n\nclass SessionGitStatusCommand(BaseMCPCommand):\n    \"\"\"MCP command reporting SessionRepo cleanliness (C-014, {e005}).\"\"\"\n\n    name = \"session_git_status\"\n\n    version = \"1.0.0\"\n\n    descr = \"Report whether an edit session's git repository is clean.\"\n\n    category = \"file_management\"\n\n    author = \"Vasiliy Zdanovskiy\"\n\n    email = \"vasilyvz@gmail.com\"\n\n    use_queue = False\n\n    @staticmethod\n    def get_name() -> str:\n        \"\"\"Return the MCP command name.\n\n        Returns:\n            MCP command name string.\n        \"\"\"\n        return \"session_git_status\"\n\n    @classmethod\n    def get_schema(cls) -> Dict[str, Any]:\n        \"\"\"Return the JSON schema for command parameters.\n\n        Returns:\n            JSON schema dict describing project_id and session_id.\n        \"\"\"\n        return {\n            \"type\": \"object\",\n            \"properties\": {\n                \"project_id\": {\"type\": \"string\"},\n                \"session_id\": {\"type\": \"string\"},\n            },\n            \"required\": [\"project_id\", \"session_id\"],\n            \"additionalProperties\": False,\n        }\n\n    @classmethod\n    def metadata(cls: Type[\"SessionGitStatusCommand\"]) -> Dict[str, Any]:\n        \"\"\"Return extended AI/docs metadata for session_git_status.\n\n        Returns:\n            Metadata dict with description, parameters, and examples.\n        \"\"\"\n        return {\n            \"name\": \"session_git_status\",\n            \"description\": (\n                \"Report whether the SessionRepo of an active edit session \"\n                \"has uncommitted changes relative to HEAD. Requires \"\n                \"session_id. Normally always clean.\"\n            ),\n            \"parameters\": {\n                \"project_id\": {\"type\": \"string\", \"required\": True},\n                \"session_id\": {\"type\": \"string\", \"required\": True},\n            },\n            \"examples\": [\n                {\"command\": {\"project_id\": \"<uuid>\", \"session_id\": \"<uuid>\"}}\n            ],\n        }\n\n    async def execute(  # type: ignore[override]\n        self,\n        project_id: str,\n        session_id: str,\n        **kwargs: Any,\n    ) -> SuccessResult | ErrorResult:\n        \"\"\"Execute the session_git_status command.\n\n        Args:\n            project_id: Required by schema; the session registry is\n                authoritative for the repository location.\n            session_id: Active session identifier (C-012).\n            **kwargs: Unused; accepted for adapter compatibility.\n\n        Returns:\n            SuccessResult with a clean flag, or ErrorResult when no active\n            session exists.\n        \"\"\"\n        _ = project_id  # registry is authoritative; project_id is schema-required\n        _ = kwargs\n        try:\n            session = get_active_session(session_id)\n        except KeyError:\n            return error_result_from_make_error(\n                make_error(SESSION_NOT_FOUND, f\"No active session: {session_id}\")\n            )\n        clean = session.session_repo.status_is_clean()\n        payload: Dict[str, Any] = {\"success\": True, \"clean\": clean}\n        return SuccessResult(data=cast(Dict[str, Any], payload))\n```\n\n## Constraints\n- Create only this command file. Do NOT create or modify any other file\n  (one-file rule); in particular do NOT modify the command registry, the\n  edit_session module, or session_repo.py.\n- Subclass BaseMCPCommand and follow the exact skeleton above.\n- The schema requires both project_id and session_id with\n  additionalProperties False.\n- Resolve the session via get_active_session(session_id); on KeyError return\n  error_result_from_make_error(make_error(SESSION_NOT_FOUND, ...)) -- never\n  touch the file system without a valid session (HRS {e001}).\n- Compute cleanliness via session.session_repo.status_is_clean(); return it\n  under the key \"clean\".\n- Import only the names listed in the file above.\n- File header `# Author: Vasiliy Zdanovskiy -- vasilyvz@gmail.com` (CR-012).\n- All docstrings and comments in English (ARTIFACT_LOCALE=en, CR-010).\n- Estimated line count: ~125 lines (within CR-008 soft limit ~350).\n"
