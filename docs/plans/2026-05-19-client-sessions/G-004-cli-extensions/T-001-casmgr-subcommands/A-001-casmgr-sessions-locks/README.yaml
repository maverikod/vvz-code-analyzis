  \   if ns.cmd == \"sessions\":\n       return _cmd_sessions(config_path)\n   if
  ns.cmd == \"locks\":\n       return _cmd_locks(config_path)\n\nDo not modify any
  other part of the file. Do not reformat existing code.\nOptional is already imported
  at the top of the file (from typing import Optional, Union); do not re-import it."
