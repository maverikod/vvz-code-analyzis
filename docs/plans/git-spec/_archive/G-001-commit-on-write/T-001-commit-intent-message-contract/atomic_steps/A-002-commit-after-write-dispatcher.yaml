  Full exact function text that replaces the old `commit_after_write`
  (reproduce verbatim, including blank lines inside the docstring):

  ```python
  def commit_after_write(
      root_dir: Path,
      paths: List[Path],
      command_name: str,
      commit_on_write: bool = False,
      commit_message: Optional[str] = None,
      config_data: Optional[Mapping[str, Any]] = None,
  ) -> Tuple[bool, Optional[str]]:
      """
      After a write, create a git commit if the caller set explicit commit-intent.

      The commit-intent flag (commit_on_write) is the only path to a commit on
      write: when False, this function never commits and returns (True, None)
      immediately. When True, the caller-supplied commit_message is validated via
      validate_commit_intent_message before anything is committed; an invalid
      message rejects the call without committing. When the message is valid, it
      is forwarded verbatim to create_git_commit (single path) or
      create_git_commit_paths (multiple paths) with no server-generated default
      message and no modification of the caller's text.

      Args:
          root_dir: Project root (git repo root).
          paths: One or more file/dir paths that were written.
          command_name: Command name that invoked the write; recorded for caller
              logging/diagnostics only and no longer used to build a default
              commit message.
          commit_on_write: Explicit per-write commit-intent flag. Defaults to
              False. When False, the write never produces a commit. When True,
              the write produces a commit after the content is persisted and
              only if a valid commit_message is supplied.
          commit_message: Caller-supplied commit message. Required and validated
              (non-empty after stripping whitespace) when commit_on_write is
              True. Ignored when commit_on_write is False.
          config_data: Config dict retained for caller compatibility. No longer
              read to decide whether a commit occurs; the commit_on_write flag is
              the sole decision input.

      Returns:
          Tuple of (success, error_message). (True, None) when commit_on_write is
          False (no commit requested). (False, error_message) when commit_on_write
          is True and commit_message fails validation, or when the underlying git
          commit operation fails. (True, None) when the commit operation succeeds,
          including when it finds no changes to commit.
      """
      if not commit_on_write:
          return (True, None)
      validation_error = validate_commit_intent_message(commit_on_write, commit_message)
      if validation_error is not None:
          return (False, validation_error)
      if len(paths) == 1:
          return create_git_commit(root_dir, paths[0], commit_message)
      return create_git_commit_paths(root_dir, paths, commit_message)
  ```

