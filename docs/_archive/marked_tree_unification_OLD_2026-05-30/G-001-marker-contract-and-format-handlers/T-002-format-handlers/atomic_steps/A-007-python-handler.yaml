  ## Module docstring must state

  - Hybrid marker contract per HRS {b005}
  - Markers written to `.py.tree` only; SourceFile `.py` never modified by tree system
  - cst_tree used as builder oracle; unified path does not use `.cst/` JSON sidecar
  - G1-13 deferral **resolved** in marked_tree_unification (owner_plan = this plan)

  ## Concrete examples

  **parse_content input:** `content = "def foo():\\n    pass\\n"`, `file_path = Path("x.py")`
  **output:** List with one TreeNode, kind ~"function", node_id = stable UUID,
  attributes start_line/end_line set.

  **mark input:** same unmarked content
  **output:** marked string with `___id___` in function metadata OR trailing comment.

  **unmark(mark(marked)) == original** byte-for-byte.

  ## Error handling

  - SyntaxError on invalid Python: propagate from LibCST/cst_tree
  - Empty content: return [] from parse_content; mark returns "" or "\\n" per cst_tree

  ## Forbidden approaches

  - Do NOT raise NotImplementedError on parse_content, mark, or unmark
  - Do NOT use DEFERRAL_OWNER_PLAN = None or G1-13 stub pattern
  - Do NOT call persist_sidecar=True or write `.cst/` JSON sidecars
  - Do NOT modify SourceFile on disk in mark/unmark (pure string transforms)
  - Do NOT delete or refactor legacy cst_tree / recreate_tree_from_content
  - Do NOT import tracked_deferrals as required dependency

