  failed\"\n    cancelled = \"cancelled\"\n    timed_out = \"timed_out\"\n    dead
  = \"dead\"\n    expired = \"expired\"\n    closed = \"closed\"\n```\n\nRequired
  imports:\n```python\nfrom __future__ import annotations\n\nimport fcntl\nimport
  json\nimport os\nimport time\nfrom dataclasses import asdict, dataclass\nfrom pathlib
