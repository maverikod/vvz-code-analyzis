  NOT add C-001 (MarkerContract) to concepts or import unmark.\n- SessionRepo (C-013)
  is marked with placeholder comments `[SessionRepo: T-002]`\n  only; no dulwich code.\n\
  - `write_commit` Stage B atomicity: backup-before-second-replace mechanism\n  ensures
  HRS {d004} invariant (either both or neither). The backup file\n  (.bak) is removed
