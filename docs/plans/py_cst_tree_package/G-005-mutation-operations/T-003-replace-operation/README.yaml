step_id: T-003
parent_global_step: G-005
name: ReplaceOperation
description: Define the ReplaceOperation entity (C-013). Replace substitutes a 
  target node addressed by StableId (C-003) with a new node or subtree in the 
  Tree (C-004). New nodes receive fresh StableIds; every other node keeps its 
  StableId unchanged. After the replace, the IdIndex (C-005), AttributeIndex 
  (C-006), and ParentRelation (C-007) are updated and consistent.
concepts:
- C-013
- C-004
- C-003
- C-005
- C-006
- C-007
inputs:
- name: target Tree
  type: C-004 instance
  description: The Tree in which the substitution occurs.
- name: target address
  type: StableId
  description: The StableId of the node to substitute; obtained by querying the 
    Tree through the QueryInterface (C-008) before calling this operation.
- name: replacement subtree
  type: IdentifiedNode subtree
  description: The new node or subtree; its nodes receive fresh StableIds.
outputs:
- name: Tree after replace
  type: C-004 instance
  description: Tree after replace; new nodes have fresh StableIds; all others 
    retain theirs; indexes consistent.
atomic_steps: []
status: draft
