step_id: T-003
parent_global_step: G-007
name: Background session directory cleanup
description: "Create the BackgroundSessionCleaner maintenance entity that periodically
  inspects SearchSessionDirectory trees and removes session data when cleanup policy
  allows. Remove directories for sessions that are expired by inactivity expiration
  criteria, closed, or in terminal states including completed, failed, cancelled,
  and timed out once TTL policy permits cleanup. Apply DeadSessionDetection to identify
  dead or orphaned running sessions before removal. Must not delete a live running
  session whose ServerProcessIdentity matches the current owner and whose SessionHeartbeat
  is within the hard timeout.\n"
concepts:
- C-002
- C-010
- C-011
inputs:
- name: SearchSessionDirectory inventory
  type: session directory record set
  description: "Existing per-session directory trees containing manifest metadata,
    page records, and service metadata eligible for maintenance review.\n"
- name: inactivity expiration criteria
  type: expiration rule set
  description: "TTL-based expiration rules binding LastAccessTimestamp to SessionTTLPolicy
    from session TTL configuration work.\n"
- name: DeadSessionDetection rule set
  type: detection rule set
  description: "Dead, timed out, and orphaned classification rules derived from ServerProcessIdentity
    and SessionHeartbeat evaluation.\n"
- name: session status and terminal state values
  type: session state record
  description: "Current session status values including running, completed, failed,
    cancelled, timed out, dead, expired, and closed.\n"
- name: periodic maintenance schedule
  type: scheduling policy
  description: "Recurring maintenance interval that triggers background inspection
    independently of client result access.\n"
outputs:
- name: BackgroundSessionCleaner maintenance process
  type: background process specification
  description: "Periodic inspection process that evaluates session directories and
    executes removal when policy permits.\n"
- name: session directory removal eligibility rules
  type: cleanup rule set
  description: "Rules determining when a SearchSessionDirectory may be deleted, covering
    expired, closed, terminal-state beyond TTL, and dead or orphaned sessions.\n"
- name: live running session protection rules
  type: safety rule set
  description: "Prohibition against deleting a running session with valid owner ServerProcessIdentity
    and fresh SessionHeartbeat inside the hard timeout.\n"
- name: orphan running session cleanup behavior
  type: cleanup behavior
  description: "Removal behavior for running sessions reclassified as dead or orphaned
    through DeadSessionDetection during maintenance.\n"
atomic_steps:
- A-001
status: draft
