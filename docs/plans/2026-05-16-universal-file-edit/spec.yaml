meta:
  plan_name: universal_file_edit
  source_spec: source_spec.md
  status: draft
concepts:
- concept_id: C-001
  name: EditSession
  definition: In-memory record that tracks one active editing session for one file.
    Identified by a session_id UUID. Owns the draft file path and the in-memory tree
    reference.
  properties:
  - identified by session_id (UUID)
  - stores file_path, draft_path, format, tree_id
  - stored in a module-level registry in the server process
  - not persisted across server restarts
  source_ranges:
  - start: 97
    end: 113
- concept_id: C-002
  name: DraftFile
  definition: On-disk working copy of the file being edited. Never renamed to the
    original until universal_file_write commits successfully.
  properties:
  - path is <file>.draft
  - for tree formats contains the serialised tree
  - for text formats is a byte-for-byte copy of the original
  - created by universal_file_open, deleted by universal_file_close
  source_ranges:
  - start: 35
    end: 48
- concept_id: C-003
  name: WriteLockfile
  definition: On-disk lockfile that records the server PID of the process that initiated
    a write preview. Its presence signals that a diff has been shown and the next
    universal_file_write call should commit.
  properties:
  - path is <file>.write
  - contains the server process PID as text
  - created on first universal_file_write call
  - deleted on successful commit or on universal_file_open
  - PID mismatch means stale lock from a dead process
  source_ranges:
  - start: 49
    end: 56
- concept_id: C-004
  name: OpenCommand
  definition: MCP command that starts an editing session. Cleans up stale artefacts,
    creates the draft file, creates an initial backup when the file has no history,
    and returns the session_id.
  properties:
  - deletes stale <file>.write and <file>.draft on entry
  - creates <file>.draft by parsing the original file
  - creates initial backup if file has no backup history
  - returns session_id and list of available operations for the format
  source_ranges:
  - start: 58
    end: 79
- concept_id: C-005
  name: EditCommand
  definition: MCP command that applies a validated batch of mutation operations to
    <file>.draft. The original file is never touched.
  properties:
  - accepts insert, delete, replace operations
  - validates the full batch before applying any operation
  - rejects batches containing ancestor-descendant node pairs for tree formats
  - applies operations bottom-up to avoid address shift errors
  - modifies <file>.draft on disk after successful validation
  source_ranges:
  - start: 81
    end: 131
- concept_id: C-006
  name: EditOperation
  definition: Single mutation instruction inside an edit batch. One of insert, delete,
    or replace. Address space depends on the file format.
  properties:
  - type is one of insert, delete, replace
  - tree format address is (parent_node_id, position_among_siblings)
  - text format address is (start_line, end_line) 1-based inclusive
  - content field required for insert and replace; absent for delete
  source_ranges:
  - start: 93
    end: 107
- concept_id: C-007
  name: BatchValidation
  definition: Pre-application check of all operations in one edit batch. Ensures no
    ancestor-descendant conflicts and enforces bottom-up ordering.
  properties:
  - runs before any operation is applied
  - rejects batch atomically on any violation
  - for tree formats forbids ancestor-descendant pairs in same batch
  - text sort order is start_line descending
  - tree sort order is node depth descending
  - error code NESTED_BATCH_FORBIDDEN on violation
  source_ranges:
  - start: 108
    end: 124
- concept_id: C-008
  name: WriteCommand
  definition: Two-phase MCP command. First call shows a diff and creates the lockfile.
    Second call (lockfile present, PID matches) commits the draft to the original
    file with backup.
  properties:
  - first call generates code, computes diff, writes lockfile, returns diff
  - second call does backup then rename draft to original then delete lockfile then
    git commit
  - PID mismatch on second call is treated as first call (stale lock)
  - write failure after backup restores original from backup
  source_ranges:
  - start: 133
    end: 181
- concept_id: C-009
  name: CloseCommand
  definition: MCP command that ends an editing session. Compares checksums of the
    draft and the original. Rebuilds the draft from the original if they differ.
  properties:
  - if draft absent returns clean success
  - if checksums match deletes draft and lockfile and releases session
  - if checksums differ rebuilds draft from original without backup and releases session
  - returns draft_rebuilt flag when rebuild occurred
  source_ranges:
  - start: 183
    end: 207
- concept_id: C-010
  name: BackupPair
  definition: Atomic backup of the original file and its draft created together as
    one history entry. Count of backup pairs equals count of successful write commits.
  properties:
  - created only on successful universal_file_write commit
  - contains both <file> and <file>.draft at commit time
  - one entry in backup history per commit
  - initial backup created by universal_file_open when file has no history
  source_ranges:
  - start: 68
    end: 72
  - start: 153
    end: 163
- concept_id: C-011
  name: HandlerReuse
  definition: The four new commands reuse the handler infrastructure of universal_file_preview
    without creating a new package.
  properties:
  - imports HandlerDispatcher from universal_file_preview/dispatcher.py
  - imports FileHandler ABC from universal_file_preview/base_handler.py
  - imports resolve_session from universal_file_preview/session.py
  - imports Node and NodeKind from universal_file_preview/models.py
  - imports concrete handlers from universal_file_preview/handlers/
  source_ranges:
  - start: 209
    end: 222
- concept_id: C-012
  name: RegistrationCleanup
  definition: Removal of the legacy editing command zoo from hooks.py registration.
    Code is not deleted; only registration is removed.
  properties:
  - removes universal_file_save, universal_file_replace, universal_file_read, universal_file_delete
  - removes all cst_* and json_* tree commands
  - removes write_project_text_lines, replace_file_lines, compose_cst_module, query_cst,
    list_cst_blocks, read_project_text_file
  - get_file_lines remains registered as fallback for broken files
  - universal_file_preview remains registered unchanged
  source_ranges:
  - start: 14
    end: 32
