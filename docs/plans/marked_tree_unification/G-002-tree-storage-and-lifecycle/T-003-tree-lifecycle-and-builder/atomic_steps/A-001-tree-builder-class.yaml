  ## Private helpers

  ```python
  def _discovered_nodes_from_tree_nodes(nodes: List[TreeNode]) -> List[DiscoveredNode]:
      """Map parse_content nodes to NodeIdMap inputs."""

  def _first_root_stable_id(nodes: List[TreeNode]) -> str | None:
      """Return str(first.short_id) or None when empty."""

  def _load_prior_map(sidecar_path: Path) -> MapSection | None:
      """If sidecar exists and parses, return MAP; else None."""
  ```

  ### Algorithm: `_discovered_nodes_from_tree_nodes(nodes)`
  1. Initialize `out: List[DiscoveredNode] = []`.
  2. For each `node` in `nodes`:
     a. `fp = compute_content_fingerprint(node.content)`.
     b. Append `DiscoveredNode(content_fingerprint=fp, kind=node.kind, marker_short_id=node.short_id, attributes=dict(node.attributes))`.
  3. Return `out`.

  ### Algorithm: `_first_root_stable_id(nodes)`
  1. If not nodes: return None.
  2. Return `str(nodes[0].short_id)`.

  ### Algorithm: `_load_prior_map(sidecar_path)`
  1. If not `sidecar_path.is_file()`: return None.
  2. Read text UTF-8.
  3. Try `parse_tree_file(text).map`; on any exception return None.

  ## Class TreeBuilder

  ```python
  class TreeBuilder:
      """TreeBuilder (C-011): unified HandlerRegistry writer."""

      @staticmethod
      def build(
          *,
          content: str,
          source_abs: Path,
          file_path: str,
          content_checksum: str,
          registry: Optional[HandlerRegistry] = None,
      ) -> TreeRepresentationRef:
          ...
  ```

  ### Algorithm: `TreeBuilder.build`
  1. `reg = registry if registry is not None else default_registry()`.
  2. `handler = reg.resolve(source_abs)`.
  3. `marked_text = handler.mark(content)`  # TREE body only (markers are short_id ints).
  4. `nodes = handler.parse_content(source_abs, content)`.
  5. `discovered = _discovered_nodes_from_tree_nodes(nodes)`.
  6. If `discovered` is empty: raise `ValueError("TreeBuilder.build requires at least one addressable node")`.
  7. `sidecar_path = handler.sidecar_path(source_abs)`.
  8. `prior_map = _load_prior_map(sidecar_path)`.
  9. `checksums: ChecksumsSection = {"source_sha256": content_checksum}`.
  10. `sections, node_map = NodeIdMap.build(tree_marked_text=marked_text, discovered_nodes=discovered, source_sha256=content_checksum, prior_map=prior_map)`.
  11. If `prior_map is not None`:
      a. `sections = node_map.validate_and_repair(tree_marked_text=marked_text, discovered_nodes=discovered, checksums=checksums)`.
  12. `file_text = serialize_tree_file(sections)`.
  13. `sidecar_path.parent.mkdir(parents=True, exist_ok=True)`.
  14. Atomic write: `tmp = sidecar_path.with_suffix(sidecar_path.suffix + ".tmp")`; write `file_text` UTF-8 to tmp; `os.replace(tmp, sidecar_path)`.
  15. Return `TreeRepresentationRef(file_path=file_path, sidecar_path=sidecar_path, content_checksum=content_checksum, root_stable_id=_first_root_stable_id(nodes))`.

  ### Docstring for build (include)
  Documents Args: content, source_abs, file_path, content_checksum, registry.
  Returns TreeRepresentationRef with checksum in ref and CHECKSUMS on disk.
  Raises: HandlerNotFoundError, ValueError (empty nodes), OSError, NodeIdMapError, handler errors.

  ### Error handling
  - Propagate all exceptions; do not catch-and-swallow.

  ### Edge cases
  - First build (`prior_map is None`): next_free starts at 1 per NodeIdMap.build.
  - Rebuild (`prior_map` loaded): next_free copied from prior; UUID preserved by fingerprint.
  - Empty content with no nodes → ValueError at step 6.
  - Existing sidecar corrupt → _load_prior_map returns None (treat as first build).

  ### Concrete example
  - content `"hello\n"`, text handler, checksum 64-hex sha256.
  - Output file contains `---CHECKSUMS---`, `source_sha256:`, `---MAP---`, `next_free:`, `---TREE---`, marked lines `1:hello`.

