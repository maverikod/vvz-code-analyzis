step_id: G-008
name: YAML file handler
description: >
  YamlFileHandler is the FileHandler family for .yaml and .yml files. It opens a YAML
  file and produces a root Node whose NodeKind depends on the document root: mapping for
  YAML mappings, sequence for YAML sequences, scalar for bare scalars. Parsing is
  single-document only (yaml.safe_load); an empty or whitespace-only stream yields an
  empty mapping root. Stable identifiers: when `code_analysis.core.yaml_tree` and
  optional `list_yaml_blocks` exist, opaque ids align with RFC 6901 pointers on the
  loaded document; otherwise the handler resolves `node_ref` using JSON Pointer-style
  paths derived from the loaded YAML only.
