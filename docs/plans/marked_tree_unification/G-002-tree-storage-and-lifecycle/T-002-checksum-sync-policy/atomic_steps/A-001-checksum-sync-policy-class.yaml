  ## Why modify_file, not create_file

  The file `code_analysis/core/tree_lifecycle/checksum.py` already contains
  `compute_content_checksum` and `is_tree_valid` (both required by HRS {c004}),
  plus builder and lifecycle wrappers (tree-lifecycle-and-builder scope in this
