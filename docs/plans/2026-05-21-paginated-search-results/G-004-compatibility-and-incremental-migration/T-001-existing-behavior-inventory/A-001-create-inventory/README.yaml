prompt: "Create the file code_analysis/search_session/behavior_inventory.py.\n\nMRS
  excerpt:\nC-021 ExistingSearchCommand: A currently working search, preview, queue,
  or status command whose existing public behavior must remain valid during the migration.
  Properties: represents already implemented behavior not new behavior; keeps current
  non-paginated behavior as the default for existing callers; must not be replaced
  by an incompatible greenfield subsystem; may be extended through optional parameters
  or compatible bridge commands.\nC-025 ExistingBehaviorInventory: Inventory that
  separates behavior already present in the codebase from behavior introduced by this
  plan. Properties: identifies which search behaviors already exist; identifies which
  paging/session behaviors are new; prevents the implementation plan from duplicating
  existing search logic; helps global steps target migration work instead of greenfield
  replacement.\n\nImplementation requirements.\nImports: dataclasses, typing.\n\n\
  1. Define dataclass ExistingCommandEntry with fields: command_name (str), has_queue_support
  (bool), has_timeout_support (bool), returns_structured_results (bool), default_is_paginated
  (bool, must be False for all existing commands).\n\n2. Define module-level constant
  EXISTING_COMMANDS of type List[ExistingCommandEntry] containing one entry for each
  of the four existing commands: fulltext_search (has_queue_support=True, has_timeout_support=True,
  returns_structured_results=True, default_is_paginated=False), semantic_search (has_queue_support=False,
  has_timeout_support=True, returns_structured_results=True, default_is_paginated=False),
  fs_grep (has_queue_support=True, has_timeout_support=True, returns_structured_results=True,
  default_is_paginated=False), project_cross_search (has_queue_support=True, has_timeout_support=True,
  returns_structured_results=True, default_is_paginated=False).\n\n3. Define function
  is_existing_command(command_name: str) returning bool. Returns True if command_name
  matches any entry in EXISTING_COMMANDS.\n\n4. Define function get_existing_entry(command_name:
  str) returning Optional[ExistingCommandEntry]. Returns the matching entry or None.\n\
  \nConstraints: no third-party imports; all public names must have docstrings; default_is_paginated
  must be False for all EXISTING_COMMANDS entries; this module must not import from
  or modify any existing command implementation.\n"
verification:
