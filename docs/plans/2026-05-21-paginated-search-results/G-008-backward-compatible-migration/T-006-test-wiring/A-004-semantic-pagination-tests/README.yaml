  G-008 contract: read items from SearchResultBlock via job_id + block_position.

  Plan README semantic_search_changes.behavior: Results must be JSON-safe scalars.

  IMPORTS:
    from __future__ import annotations
    import json
    import uuid
    from datetime import datetime
    from decimal import Decimal
    from unittest.mock import patch
    import pytest
    from code_analysis.commands.search_start_command import SearchStartCommand
    from code_analysis.commands.search_get_page_command import SearchGetPageCommand
    from mcp_proxy_adapter.commands.result import SuccessResult

  Helper _json_safe(value) recursively checks: None, bool, int, float, str, list, dict with str keys only;
  rejects datetime, Decimal, bytes, set, custom objects.

  Mock semantic hits including edge scalars: score float, distance float, chunk_uuid str, name str,
  and ensure no numpy/array objects leak from backend mock.

  TEST test_semantic_pagination_json_safe:
  1. SearchStartCommand.run search_type=semantic, paginated=true, page_size=3.
  2. SearchGetPageCommand.run job_id from handoff, block_position=1.
  3. For each item in items and nested preview/diagnostics/evidence dicts if present,
     assert _json_safe(item) and json.dumps(item) succeeds.
  4. When index lists block_position=2, fetch and repeat JSON-safe check.

  Optionally assert forbidden types absent: no datetime instances in item tree.

  File under 200 lines.

