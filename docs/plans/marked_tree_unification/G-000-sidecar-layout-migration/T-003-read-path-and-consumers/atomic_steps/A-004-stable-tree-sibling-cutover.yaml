prompt: "Operation: modify_file\nTarget: code_analysis/core/structure_extraction/stable_tree.py\n\n## Goal\nCut the Python sidecar path resolution over to the sibling convention (C-003).\nsidecar_path_for_py (which produced <parent>/.cst/<stem>.tree) is no longer
