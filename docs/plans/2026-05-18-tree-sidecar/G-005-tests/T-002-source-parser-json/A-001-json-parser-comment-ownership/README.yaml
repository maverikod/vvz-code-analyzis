  EXECUTOR: coder_auto. CREATE tests/test_tree_temp_source_parser_json.py (≤400 lines).

  MODULE DOCSTRING:
    """Unit tests for JSON SourceParser tolerant grammar and CommentOwnershipRule (tree-temp plan).

    Author: Vasiliy Zdanovskiy
    email: vasilyvz@gmail.com
    """

  IMPORT LIST (verbatim, after from __future__ import annotations):

    import pytest

    from code_analysis.core.tree_temp.json_frontend import parse_json_source_to_roots
    from code_analysis.core.tree_temp.tree_node import TreeNode, kind_as_str

  PRODUCTION SYMBOL CONTRACT (must exist after G-002):
    def parse_json_source_to_roots(source_text: str) -> list[TreeNode]:
      Parse tolerant JSON text with comments into ordered root TreeNode forest per Sidecar semantic (object root returns single OBJECT node wrapping members; array root returns flattened element nodes ordered).

    def kind_as_str(node: TreeNode) -> str:
      Return textual discriminator lowercase matching C-001 (object|array|string|number|boolean|null).

    If identifiers differ STOP — planner must reconcile.

  INTERNAL TEST HELPERS (define in this module only):
    def _find_member(root_list: list[TreeNode], key: str) -> TreeNode:
      Preconditions: caller supplies roots from parse_json_source_to_roots. Locate first descendant child with matching key assuming standard structure (tests structure inputs so search is shallow one-level lookup from single OBJECT root). Raise AssertionError when missing.


  REQUIRED PYTEST FUNCTIONS AND EXACT ASSERTIONS:

  test_top_level_above_comment_maps_to_before_on_first_root_object
    Source literal EXACT THREE lines UTF-8:
      Line1: '// file head'
      Line2: '{'
      Line3: '}'
    Parsed roots len==1. Let r=roots[0]. Assert kind_as_str(r)=="object". Assert r.comment_before is not None and "// file head" in r.comment_before. Children empty permissible.

  test_inline_comment_maps_to_scalar_member
    Source one line ASCII: '{"a": 1}// tail'
    Let m=_find_member(roots,'a'); assert float(m.value)==1.0 or int(m.value)==1 (either accepted) AND m.comment_inline is not None AND "tail" in m.comment_inline.

  test_above_line_comment_before_next_member
    Source EXACT:\n '{"x":true,\n// between\n"y":false}\n'
    Member y node must have comment_before containing "between".

  test_array_root_order_three_elements
    Source: '[ {"k":9}, false , null ]' (collapse spaces exactly as typed but trimming outer spaces allowed if parser trims leading trailing whitespace uniformly — use minimal '[{"k":9},false,null]' ).
    Roots len MUST==3 verifying array-root flatten rule. kind_as_str order: object,boolean,null. object child keyed k numeric 9.

  test_object_member_order_not_sorted
    Source: '{"z":0,"y":1,"x":2}'
    Children key order extraction list must equal ['z','y','x'] iterating children list order field key.

  test_scalar_types_number_bool_null_string
    Source: '{"n":42,"t":false,"u":null,"s":"hi"}' — assert numeric==42, boolean false, null value None in Python binding, string==hi via TreeNode.value.

  test_block_comment_before_key_maps_inline_on_member_same_line
    Source EXACT string (single-line): '{/*solo*/ "b": 2}'
    Parsed member TreeNode keyed b MUST have comment_inline not None containing substring `solo`. comment_before must evaluate to falsy after strip (either None or whitespace-only string permitted before strip but final stripped length must be zero).

  test_truncated_document_raises_value_error
    Source '{' triggers ValueError subclass (type ValueError adequate) raised from parse invocation.

  FORBIDDEN:
    Reading parent README files at runtime. Using MCP. Importing unrelated modules. Parsing JSON with trailing structural tokens beyond tolerant grammar without expecting exception.


