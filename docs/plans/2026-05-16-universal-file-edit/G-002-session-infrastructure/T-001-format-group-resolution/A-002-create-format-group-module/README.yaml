    Specifically: code_analysis.core.file_handlers.registry.resolve_handler(file_path, operation)
    returns handler_id (one of: text, json, yaml, python).
    RegistryError with code UNSUPPORTED_FILE_EXTENSION is raised for unknown extensions.
  C-014 ErrorCodes: UNKNOWN_FORMAT when file extension is not supported.

