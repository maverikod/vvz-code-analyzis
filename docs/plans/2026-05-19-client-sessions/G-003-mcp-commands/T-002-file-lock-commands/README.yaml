  name: session_open_file command
  type: MCP command
- description: session_close_file MCP command registered in the command 
    registry.
  name: session_close_file command
  type: MCP command
- description: session_list_file_locks MCP command registered in the command 
    registry.
  name: session_list_file_locks command
  type: MCP command
