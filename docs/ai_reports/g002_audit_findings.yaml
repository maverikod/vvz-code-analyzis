proposed_hrs_edits:
  - paragraph_label: '{c005}'
    current_text: >
      A dedicated tree-creation module (`core/tree_lifecycle/builder.py` or equivalent)
      exposes `recreate_tree_from_content(*, kind, content, source_path, tree_path,
      content_checksum)`. It dispatches to the appropriate per-format handler based
      on `kind`, writes the resulting tree file to `tree_path` as a sibling of the
      source file, and records `content_checksum` in the tree file so that subsequent
      validity checks can compare it against the current source checksum. This module
      is the single place that writes tree files; no other module writes tree files
      directly.
    proposed_text: >
      A dedicated tree-creation module (`core/tree_lifecycle/builder.py` or equivalent)
      exposes `TreeBuilder.build(*, content, source_abs, file_path, content_checksum)`.
      It resolves the appropriate FormatHandler via `HandlerRegistry.default_registry().resolve(source_abs)`,
      produces natively-marked tree content via `FormatHandler.mark(content)`, writes
      the tree file to `FormatHandler.sidecar_path(source_abs)` as a sibling of the
      source file, and records `content_checksum` in the returned tree reference so
      that subsequent validity checks can compare it against the current source checksum.
      This module is the single place that writes tree files on the canonical unified
      path; no other module writes tree files directly. The legacy
      `recreate_tree_from_content(*, kind, ...)` dispatch remains in the codebase
      as an untouched parity oracle until G-000 cutover.
    why: >
      Locked decision A1 — canonical G-002 build uses HandlerRegistry/FormatHandler,
      not TreeFormatKind. MRS C-011 and G-002 T-003 AS already encode this; HRS must
      cascade to restore cycle_1 full green.

