step_id: G-006
name: universal_file_close command
description: The close command ends the editing session. Behaviour is determined by
  the format group. For the sidecar group the command verifies the checksum of the
  sidecar against the source file; a mismatch causes the sidecar to be rebuilt from
  the source without creating a backup; the sidecar is never deleted. For the tree-temp
  group the command compares checksums of the draft and the original; a match deletes
  the draft; a mismatch rebuilds the draft from the original without backup; the in-memory
  tree is freed in both cases. For the text group the draft is deleted unconditionally.
  In all cases the lockfile is deleted if present and the session is released. When
  a rebuild occurs the response carries a flag indicating this.
