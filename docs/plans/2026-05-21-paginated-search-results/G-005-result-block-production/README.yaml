step_id: G-005
name: Result block production and buffering
description: "Defines how raw findings are turned into immutable result blocks through
  a buffered producer/assembler protocol. The main search thread writes each finding
  into a raw finding buffer and continues; a parallel assembler drains the buffer
  under a lock and forms blocks of whole results bounded by the maximum block size,
  never splitting a single result. Blocks are published atomically so readers never
  observe partial content, and tree-query findings feed the same block production.
  This step defines finding buffering and block assembly only; it does not define
  the directory index, HTTP access, file-set classification, or session expiration.\n"
