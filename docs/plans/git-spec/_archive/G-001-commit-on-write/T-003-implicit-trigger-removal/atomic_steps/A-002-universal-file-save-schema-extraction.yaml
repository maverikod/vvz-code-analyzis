    external call either function makes.
  - Do not implement, reference, or stub any pre-write commit-intent rejection
    logic (that lives in a separate module entirely out of scope for this
    file) — this file only builds the schema dict and validates the content
    payload.
  - Do not implement any wiring, call site, registration, or import of this
    module into any other file — this file stands alone.
  - Two blank lines separate the two module-level functions (standard Python
    style), matching the blank-line convention already used elsewhere in this
    repository between top-level definitions.
  - All docstrings and comments are in English.
  - Keep total file length well under 400 lines (expected size: roughly
    120-135 lines including docstrings and the schema dict).
