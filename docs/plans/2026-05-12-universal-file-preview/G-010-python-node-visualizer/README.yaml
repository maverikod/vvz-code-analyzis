name: Python node visualizer
description: >
  Add PythonNodeRenderer (C-022) to PythonFileHandler (C-016). Four rendering
  modes: module-level overview, class structure, function/method body first-level,
  and full-text fallback for small files via FullTextThreshold (C-023).
  Wires full_text_max_lines into UniversalFilePreviewCommand (C-001).
  Adds optional text field to Block (C-005).
  BlockHandler update is deferred to G-011.
