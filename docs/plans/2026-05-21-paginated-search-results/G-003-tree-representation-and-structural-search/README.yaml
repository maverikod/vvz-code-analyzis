step_id: G-003
name: Tree Representation and Structural Search
description: "Defines TreeRepresentation as the stable structural model for all supported
  file formats including JSON, YAML, Python CST, Markdown, and text as paragraphs.
  Specifies that every supported file must have a tree sidecar validated by checksum
  before structural processing; if absent or invalid, the tree must be recreated.
  Defines XPathLikeFilter as the universal structural filter that operates on validated
  TreeRepresentation from any source: database-backed structures, indexer in-memory
  structures, dynamic trees for unindexed files, and draft-session content. The same
  filter code and selector semantics must apply to all sources. Defines PreviewReference
  as the canonical result reference for structural results, sufficient to call universal_file_preview.
  Defines StructuralEvidence as evidence that is valid only when backed by validated
  TreeRepresentation and a preview-compatible node or block; timed-out phases must
  not contribute partial invalid structural evidence. Defines GrepSearchMode with
  structural grep as the default and classic line grep as opt-in; classic line grep
  must not count as cross-search structural evidence unless converted to validated
  preview-compatible nodes.\n"
