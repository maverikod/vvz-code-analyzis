step_id: T-001
parent_global_step: G-005
name: Generate diff and write lockfile (first call)
description: "Realise the first phase of WriteCommand (C-009). Conditions: the WriteLockfile\
  \ (C-004) at <file>.write either does not exist, or exists but its PID does not\
  \ match `os.getpid()`.\nSteps: 1. Generate source code from the DraftFile (C-003):\n\
  \   - Sidecar group: call the existing `save_tree_to_file` from\n     `core/cst_tree/tree_saver.py`\
  \ to a temp file; read the temp file.\n   - Tree-temp group: serialise the in-memory\
  \ tree using json.dumps\n     or yaml.dump to a temp file.\n   - Text group: read\
  \ <file>.draft directly as the generated code.\n2. Compute diff between <file> (original)\
  \ and generated code using\n   the existing diff infrastructure from\n   `core/file_handlers/diff_support.py`.\n\
  3. Write `os.getpid()` as text to <file>.write (overwriting if PID\n   mismatch\
  \ case).\n4. Return the diff string. The original file is not modified."
concepts:
- C-003
- C-004
- C-009
- C-012
inputs:
- name: session
  type: EditSession
  description: Active session identifying file, draft, and format group.
outputs:
- name: diff
  type: unified diff string
  description: Diff between original file and code generated from draft.
- name: lockfile_written
  type: boolean
  description: True when <file>.write has been written with current PID.
atomic_steps: []
status: draft
