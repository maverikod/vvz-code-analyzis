  """
  YAML FormatHandler (C-007).
  
  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """
  
  from __future__ import annotations
  
  from pathlib import Path
  from typing import Any, List
  
  import yaml
  
  from code_analysis.tree.format_handler import FormatHandler, ShortIdAllocator
  from code_analysis.tree.tree_node import TreeNode
  
  _ID_KEY = "___id___"
  _VAL_KEY = "v"
  
  
  def _wrap_scalar(item: Any, allocator: ShortIdAllocator, path: str) -> Any:
      if isinstance(item, (dict, list)):
          return _inject_ids(item, allocator, path)
      return {_ID_KEY: allocator.allocate(), _VAL_KEY: item}
  
  
  def _inject_ids(obj: Any, allocator: ShortIdAllocator, path: str = "") -> Any:
      if isinstance(obj, dict):
          injected = {_ID_KEY: allocator.allocate()}
          for k, v in obj.items():
              child_path = f"{path}.{k}" if path else k
              injected[k] = _inject_ids(v, allocator, child_path)
          return injected
      if isinstance(obj, list):
          return [
              _wrap_scalar(item, allocator, f"{path}[{i}]")
              for i, item in enumerate(obj)
          ]
      return {_ID_KEY: allocator.allocate(), _VAL_KEY: obj}
  
  
  def _strip_ids(obj: Any) -> Any:
      if isinstance(obj, dict):
          if _ID_KEY in obj and _VAL_KEY in obj and len(obj) == 2:
              val = obj[_VAL_KEY]
              if isinstance(val, (dict, list)):
                  return _strip_ids(val)
              return val
          return {k: _strip_ids(v) for k, v in obj.items() if k != _ID_KEY}
      if isinstance(obj, list):
          return [_strip_ids(i) for i in obj]
      return obj
  
  
  def _collect_nodes(obj: Any, path: str, nodes: List[TreeNode], allocator: ShortIdAllocator) -> None:
      if isinstance(obj, dict):
          sid = allocator.allocate()
          kind = "mapping"
          nodes.append(
              TreeNode(
                  short_id=sid,
                  kind=kind,
                  content=yaml.dump(obj, default_flow_style=False, sort_keys=False, allow_unicode=True),
                  attributes={"key_path": path},
              )
          )
          for k, v in obj.items():
              if k == _ID_KEY:
                  continue
              child_path = f"{path}.{k}" if path else k
              if isinstance(v, (dict, list)):
                  _collect_nodes(v, child_path, nodes, allocator)
      elif isinstance(obj, list):
          for i, item in enumerate(obj):
              _collect_nodes(item, f"{path}[{i}]", nodes, allocator)
      else:
          sid = allocator.allocate()
          nodes.append(
              TreeNode(
                  short_id=sid,
                  kind="scalar",
                  content=str(obj),
                  attributes={"key_path": path},
              )
          )
  
  
  class YamlHandler(FormatHandler):
      def parse_content(self, file_path: Path, content: str) -> List[TreeNode]:
          obj = yaml.safe_load(content)
          nodes: List[TreeNode] = []
          if obj is None:
              return nodes
          _collect_nodes(obj, "", nodes, ShortIdAllocator(1))
          return nodes
  
      def mark(self, content: str) -> str:
          obj = yaml.safe_load(content)
          marked = _inject_ids(obj, ShortIdAllocator(1))
          return yaml.dump(
              marked,
              default_flow_style=False,
              sort_keys=False,
              allow_unicode=True,
          )
  
      def unmark(self, marked_text: str) -> str:
          obj = yaml.safe_load(marked_text)
          clean = _strip_ids(obj)
          return yaml.dump(
              clean,
              default_flow_style=False,
              sort_keys=False,
              allow_unicode=True,
          )
  
      def sidecar_path(self, source_abs: Path) -> Path:
          return source_abs.parent / (source_abs.name + ".tree")
  ```

  ## Tree-validity gate (handler-local, does NOT change FormatHandler ABC)

  Instance state:
    _tree_is_valid: bool = True

  Methods:
    set_tree_validity(self, is_valid: bool) -> None
    _enforce_short_id_edit_gate(self) -> None:
      if not self._tree_is_valid: raise YamlEditGateError("tree is invalid (text mode); short_id edit operations forbidden until re-validation")

  class YamlEditGateError(ValueError): ...

  Each op_* first line: self._enforce_short_id_edit_gate()

  Dispatch layer calls set_tree_validity before op_*.

  ## op_* implementation

  Match FormatHandler signatures (short_id: NodeId, anchor_short_id, next_free on insert).

  1. Parse marked_text via yaml.safe_load after mentally unwrapping — operate on wrapped tree with integer ___id___ keys.
  2. Locate nodes by short_id int equality on ___id___ values; missing → UnknownNodeIdError.
  3. op_insert: assign next_free as new ___id___ on inserted mapping/scalar wrapper per YAML format rules ({b003}).
  4. op_delete: remove wrapper preserving YAML structure.
  5. op_replace/move/edit_attributes/edit_content: preserve short_id on replace/move; edit-content on scalar leaves only.

  Re-validation ({h009}) is EditSession responsibility — handler does NOT rebuild tree.

  ## Forbidden

  - NO UUID in ___id___ values
  - NO plain-text edit mode inside handler
  - NO non-standard cross-TS ordering fields, G-007, {l*}/{m*}

