  ## Goal
  Replace the modification-time skip guard in `update_file_data` with delegation to
  `try_skip_reindex_by_checksum` (C-022 / C-006). Remove mtime-based skip criteria.
  Keep `last_modified` updates for the analyze/reindex path (DB bookkeeping only).

  Prerequisite: `code_analysis/core/database/files/update_checksum_guard.py` exists
  with `try_skip_reindex_by_checksum` and `_is_fk_or_integrity_error`.

  ## MRS excerpt

  C-022 Indexer:
    - replaces the mtime-based skip guard with a checksum-based guard
    - equal checksum skips reindex, differing checksum triggers reindex
    - reindexing is content-driven, not mtime-driven

  C-006 ChecksumSyncPolicy:
    - SHA-256 checksum of source content is the synchronization trigger

