name: Unregister legacy editing commands
description: Remove the registration entries for all legacy editing commands listed
  in RegistrationCleanup (C-013) from the command registration module. The following
  registrations are removed: universal_file_save, universal_file_replace,
  universal_file_read, universal_file_delete, cst_load_file, cst_find_node,
  cst_get_node_info, cst_get_node_by_range, cst_modify_tree, cst_save_tree,
  json_load_file, json_find_node, json_modify_tree, json_save_tree,
  write_project_text_lines, replace_file_lines, compose_cst_module, query_cst,
  list_cst_blocks, read_project_text_file. Code files are not deleted.
  The registrations for universal_file_preview and get_file_lines remain unchanged.
