              },
              "commit_message": {
                  "type": "string",
                  "description": "Optional git commit message for handlers that support it.",
              },
              "commit_on_write": {
                  "type": "boolean",
                  "default": False,
                  "description": (
                      "Explicit commit-intent flag. Supplying commit_message without "
