step_id: T-001
parent_global_step: G-002
name: Define FormatGroup resolution and draft/lockfile path helpers
description: 'Create a new module `code_analysis/commands/universal_file_edit/format_group.py`
  that wraps the existing handler registry to produce a FormatGroup (C-002) descriptor
  and lockfile path helpers (C-004).

  The existing `core/file_handlers/registry.py` provides `resolve_handler(ext) ->
  handler_id` and `HANDLER_IDS` (text/json/yaml/python).

  The new module defines:

  (1) `FormatDescriptor` dataclass with fields: format_group (str: ''sidecar''|''tree-temp''|''text''),
  handler_id (str), draft_path (Path), lockfile_path (Path), available_operations
  (list[str]).

  (2) `resolve_format_group(abs_path) -> FormatDescriptor` - calls `resolve_handler(ext)`,
  maps handler_id to group (python -> sidecar, json/yaml -> tree-temp, text -> text),
  computes draft_path and lockfile_path, returns FormatDescriptor. Raises UNKNOWN_FORMAT
  (C-014) on unsupported extension.

  (3) `draft_path_for(abs_path, format_group) -> Path` - returns `<file>.cst_sidecar`
  for sidecar, `<file>.draft` for tree-temp and text.

  (4) `lockfile_path_for(abs_path) -> Path` - returns `<file>.write`.

  (5) `read_lockfile_pid(abs_path) -> int | None` - reads integer PID from lockfile;
  returns None if file absent.

  (6) `write_lockfile_pid(abs_path, pid: int) -> None` - writes PID as text to lockfile
  (atomic: write to temp, rename).

  (7) `delete_lockfile(abs_path) -> None` - deletes lockfile if present; silent if
  absent.

  Functions (3)-(4) are pure (no I/O). Functions (5)-(7) have I/O side effects on
  the lockfile only.'
concepts:
- C-002
- C-003
- C-004
- C-012
- C-014
inputs:
- name: abs_path
  type: Path
  description: Absolute path to the original file being opened for editing.
outputs:
- name: format_descriptor
  type: FormatDescriptor dataclass
  description: Contains format_group ('sidecar'|'tree-temp'|'text'), handler_id, draft_path
    (Path), lockfile_path (Path), available_operations (list[str]).
- name: unknown_format_error
  type: ErrorCodes entry
  description: UNKNOWN_FORMAT raised when file extension is not supported.
