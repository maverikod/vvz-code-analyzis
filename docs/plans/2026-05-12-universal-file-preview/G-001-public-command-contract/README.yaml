step_id: G-001
name: Public command contract
description: 'The PreviewCommand exposes one MCP command name with a fixed input schema,
  a uniform ResponseEnvelope that is structurally identical for every NodeKind and
  every Selector form, a deterministic ErrorClassification that surfaces three distinct
  error classes (input, file-structure, file-handler-internal), and an explicit ScopeBoundary
  of negative invariants. This step fixes WHAT the command is to callers; it does
  not yet describe internal dispatch, navigation, or file handlers.

  '
