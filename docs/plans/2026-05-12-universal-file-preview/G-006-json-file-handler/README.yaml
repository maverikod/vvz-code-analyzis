step_id: G-006
name: JSON file handler
description: 'JsonFileHandler is the FileHandler family for .json files. It opens
  a JSON file and produces a root Node whose NodeKind depends on the document: mapping
  for JSON objects, sequence for JSON arrays, scalar for bare scalars. Interior nodes
  follow the JSON shape recursively. The handler resolves node_ref values either as
  node_id strings produced by the project''s list_json_blocks infrastructure or as
  JSON pointer strings ("/foo/bar"); the two spellings are interchangeable because
  the same project infrastructure produces them.

  '
