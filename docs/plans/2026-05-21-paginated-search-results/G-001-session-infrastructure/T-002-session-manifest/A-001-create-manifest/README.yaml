prompt: "Create the file code_analysis/search_session/manifest.py.\n\nMRS excerpt:\n\
  C-003 SearchSessionManifest: Machine-readable state file inside a\nSearchSessionDirectory
  describing request context, process identity,\nheartbeat, metrics, page readiness,
  warnings, and errors. Properties:\nstores created_at, last_access_at, heartbeat_at,
  status, and phase;\nstores request parameters and metrics inferred from the search
  context;\nstores page readiness information for HTTP readers;\nstores ServerProcessIdentity
  for dead-session detection;\nmust be updated safely while the search worker, HTTP
  readers, and\ncleaner may operate concurrently.\n\nC-008 ServerProcessIdentity:
  Identity of the main server process.\nProperties: includes main_pid (int); includes
  process_start_time (float,\nepoch seconds) to detect PID reuse; may include host
  (str) and\ninstance_id (str) when available.\n\nC-009 SessionHeartbeat: Periodic
  liveness timestamp. Properties: stored\nas heartbeat_at in SearchSessionManifest;
  older-than-hard-timeout heartbeat\nmarks session timed_out or orphaned.\n\nImports
  (each on its own line):\n  import dataclasses\n  import datetime\n  import json\n\
  \  import os\n  import pathlib\n  import typing\n\n1. Define dataclass ServerProcessIdentity
  with fields:\n   main_pid: int\n   process_start_time: float\n   host: typing.Optional[str]
  = None\n   instance_id: typing.Optional[str] = None\n\n2. Define dataclass SessionManifest
  with fields (exact Python syntax):\n   search_id: str\n   status: str\n   phase:
  str\n   created_at: str\n   last_access_at: str\n   heartbeat_at: str\n   request_params:
  dict\n   process_identity: ServerProcessIdentity\n   produced_results: int = 0\n\
  \   written_pages: int = 0\n   scanned_files: int = 0\n   warning_count: int = 0\n\
  \   error_count: int = 0\n   page_readiness: typing.Dict[int, bool] = dataclasses.field(default_factory=dict)\n\
  \   (note: page_readiness uses dataclasses.field because mutable defaults are\n\
  \   forbidden in dataclasses; write it exactly as:\n   page_readiness: typing.Dict[int,
  bool] = dataclasses.field(default_factory=dict))\n\n3. Define module-private function
  _now_iso() -> str:\n   Returns datetime.datetime.now(datetime.timezone.utc).isoformat()\n\
  \n4. Define function write_manifest(\n     directory: pathlib.Path,\n     manifest:
  SessionManifest,\n   ) -> None:\n   Serialises manifest to JSON via dataclasses.asdict(manifest).\n\
  \   Writes to temp file directory / \".manifest.tmp\" using open in write mode.\n\
  \   Calls os.fsync(f.fileno()) inside the with-block before closing.\n   Renames
  temp file to directory / \"manifest.json\" via os.replace().\n   This guarantees
  atomic publication: readers never see a partial manifest.\n\n5. Define function
  read_manifest(\n     directory: pathlib.Path,\n   ) -> SessionManifest:\n   Reads
  directory / \"manifest.json\" as JSON.\n   Reconstructs ServerProcessIdentity from
  data[\"process_identity\"] sub-dict\n   via ServerProcessIdentity(**data[\"process_identity\"\
  ]).\n   Returns SessionManifest(**{**data, \"process_identity\": identity}).\n \
  \  Raises FileNotFoundError if manifest does not exist.\n\n6. Define function touch_last_access(\n\
  \     directory: pathlib.Path,\n   ) -> None:\n   Reads existing manifest via read_manifest(directory).\n\
  \   Updates manifest.last_access_at to _now_iso().\n   Writes back atomically via
  write_manifest(directory, manifest).\n\n7. Define function touch_heartbeat(\n  \
  \   directory: pathlib.Path,\n   ) -> None:\n   Reads existing manifest via read_manifest(directory).\n\
  \   Updates manifest.heartbeat_at to _now_iso().\n   Writes back atomically via
  write_manifest(directory, manifest).\n\nConstraints:\n- All public names must have
  docstrings.\n- No third-party imports.\n- Atomic write uses temp-file + os.replace;
  no direct overwrite of manifest.json.\n"
