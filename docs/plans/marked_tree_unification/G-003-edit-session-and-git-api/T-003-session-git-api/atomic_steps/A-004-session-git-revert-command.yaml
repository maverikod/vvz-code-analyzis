prompt: "Create the file\n`code_analysis/commands/universal_file_edit/session_git_revert_command.py`.\nOperation: create_file (the file does not exist yet).\n\n## Parent documents\n- Machine spec: `docs/plans/marked_tree_unification/spec.yaml` (C-012, C-013, C-014)\n- Global step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/README.yaml`\n- Tactical step: `docs/plans/marked_tree_unification/G-003-edit-session-and-git-api/T-003-session-git-api/README.yaml`\n\nDefine the `session_git_revert` MCP command: one of the five SessionGitApi\n(C-014) commands. It rolls the tree of the active EditSession's SessionRepo\n(C-013) back to a prior revision by creating a NEW revert commit. History\nis preserved; no commit is deleted.\n\n## extends-vs-creates resolution\n\nNo session_git_* command exists in the codebase.\nTherefore: create_file.\n\n## MRS excerpt\n\nC-014 SessionGitApi: session-scoped MCP commands exposing the SessionRepo.\n  - every command requires an active session identifier and refuses to run\n    without a valid session context\n  - revert command rolls the tree back to a revision by creating a new\n    revert commit\n\nC-013 SessionRepo: dulwich git repository inside the session directory.\nProvides revert(*, rev: str) -> str: overwrites the working tree file with\nits content at rev and creates a new revert commit, returning the new\ncommit hex sha. History is preserved; no commit is deleted.\n\nC-012 EditSession: resolved by session_id via the active-session registry.\n\n## HRS binding paragraphs\n\n{e001}: Every command requires a session_id parameter. A command called\nwithout an active session returns an error; it does not attempt to access\nthe file system without a valid session context.\n\n{e006}: session_git_revert(session_id, rev) rolls the session tree back to\nthe state at rev by creating a new revert commit. The git history is\npreserved; no commit is deleted. Because one tree modification equals one\ncommit, revert rolls back by individual node edits.\n\n## Dependencies (verified on disk / in plan)\n\n  from mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult\n  from code_analysis.commands.base_mcp_command import BaseMCPCommand\n  from code_analysis.commands.universal_file_edit.errors import (\n      SESSION_NOT_FOUND,\n      error_result_from_make_error,\n      make_error,\n  )\n  from code_analysis.core.edit_session.edit_session import get_active_session\n\nVerified signatures:\n  - get_active_session(session_id: str) -> EditSession; raises KeyError when\n    no active session exists under session_id.\n  - EditSession.session_repo: SessionRepo\n  - SessionRepo.revert(*, rev: str) -> str (returns the new revert commit\n    hex sha)\n  - make_error(code: str, message: str, details=None) -> dict\n  - error_result_from_make_error(err: dict) -> ErrorResult\n  - SESSION_NOT_FOUND is the string error code constant for an absent\n    session.\n\nThe command skeleton mirrors the sibling close_command.py contract (class\nattributes name/version/descr/category/author/email/use_queue=False;\n@staticmethod get_name; @classmethod get_schema; @classmethod metadata;\nasync execute returning SuccessResult | ErrorResult).\n\n## Required file content\n\nWrite exactly this file:\n\n```python\n# Author: Vasiliy Zdanovskiy -- vasilyvz@gmail.com\n\n\"\"\"session_git_revert MCP command (C-014): roll tree back by a new commit.\n\nRolls the tree of the active EditSession's SessionRepo (C-013) back to a\nprior revision by creating a NEW revert commit (HRS {e006}); history is\npreserved and no commit is deleted. Requires a valid session_id; refuses\nwithout an active session (HRS {e001}).\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom typing import Any, Dict, Type, cast\n\nfrom mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult\n\nfrom code_analysis.commands.base_mcp_command import BaseMCPCommand\nfrom code_analysis.commands.universal_file_edit.errors import (\n    SESSION_NOT_FOUND,\n    error_result_from_make_error,\n    make_error,\n)\nfrom code_analysis.core.edit_session.edit_session import get_active_session\n\nclass SessionGitRevertCommand(BaseMCPCommand):\n    \"\"\"MCP command reverting the SessionRepo tree by a new commit (C-014, {e006}).\"\"\"\n\n    name = \"session_git_revert\"\n\n    version = \"1.0.0\"\n\n    descr = \"Roll an edit session's tree back to a revision via a new revert commit.\"\n\n    category = \"file_management\"\n\n    author = \"Vasiliy Zdanovskiy\"\n\n    email = \"vasilyvz@gmail.com\"\n\n    use_queue = False\n\n    @staticmethod\n    def get_name() -> str:\n        \"\"\"Return the MCP command name.\n\n        Returns:\n            MCP command name string.\n        \"\"\"\n        return \"session_git_revert\"\n\n    @classmethod\n    def get_schema(cls) -> Dict[str, Any]:\n        \"\"\"Return the JSON schema for command parameters.\n\n        Returns:\n            JSON schema dict describing project_id, session_id, and rev.\n        \"\"\"\n        return {\n            \"type\": \"object\",\n            \"properties\": {\n                \"project_id\": {\"type\": \"string\"},\n                \"session_id\": {\"type\": \"string\"},\n                \"rev\": {\"type\": \"string\"},\n            },\n            \"required\": [\"project_id\", \"session_id\", \"rev\"],\n            \"additionalProperties\": False,\n        }\n\n    @classmethod\n    def metadata(cls: Type[\"SessionGitRevertCommand\"]) -> Dict[str, Any]:\n        \"\"\"Return extended AI/docs metadata for session_git_revert.\n\n        Returns:\n            Metadata dict with description, parameters, and examples.\n        \"\"\"\n        return {\n            \"name\": \"session_git_revert\",\n            \"description\": (\n                \"Roll the tree of an active edit session back to a prior \"\n                \"revision by creating a new revert commit; history is \"\n                \"preserved. Requires session_id and rev.\"\n            ),\n            \"parameters\": {\n                \"project_id\": {\"type\": \"string\", \"required\": True},\n                \"session_id\": {\"type\": \"string\", \"required\": True},\n                \"rev\": {\"type\": \"string\", \"required\": True},\n            },\n            \"examples\": [\n                {\n                    \"command\": {\n                        \"project_id\": \"<uuid>\",\n                        \"session_id\": \"<uuid>\",\n                        \"rev\": \"<commit-hash>\",\n                    }\n                }\n            ],\n        }\n\n    async def execute(  # type: ignore[override]\n        self,\n        project_id: str,\n        session_id: str,\n        rev: str,\n        **kwargs: Any,\n    ) -> SuccessResult | ErrorResult:\n        \"\"\"Execute the session_git_revert command.\n\n        Args:\n            project_id: Required by schema; the session registry is\n                authoritative for the repository location.\n            session_id: Active session identifier (C-012).\n            rev: Commit hex sha to roll the tree back to.\n            **kwargs: Unused; accepted for adapter compatibility.\n\n        Returns:\n            SuccessResult with the new revert commit hash, or ErrorResult\n            when no active session exists.\n        \"\"\"\n        _ = project_id  # registry is authoritative; project_id is schema-required\n        _ = kwargs\n        try:\n            session = get_active_session(session_id)\n        except KeyError:\n            return error_result_from_make_error(\n                make_error(SESSION_NOT_FOUND, f\"No active session: {session_id}\")\n            )\n        new_commit = session.session_repo.revert(rev=rev)\n        payload: Dict[str, Any] = {\n            \"success\": True,\n            \"reverted_to\": rev,\n            \"new_commit\": new_commit,\n        }\n        return SuccessResult(data=cast(Dict[str, Any], payload))\n```\n\n## Constraints\n- Create only this command file. Do NOT create or modify any other file\n  (one-file rule); in particular do NOT modify the command registry, the\n  edit_session module, or session_repo.py.\n- Subclass BaseMCPCommand and follow the exact skeleton above.\n- The schema requires project_id, session_id, and rev with\n  additionalProperties False.\n- Resolve the session via get_active_session(session_id); on KeyError return\n  error_result_from_make_error(make_error(SESSION_NOT_FOUND, ...)) -- never\n  touch the file system without a valid session (HRS {e001}).\n- Perform the revert via session.session_repo.revert(rev=rev), which creates\n  a new commit and returns its hex sha; never delete or reset history\n  (HRS {e006}).\n- Return the original rev under \"reverted_to\" and the new commit sha under\n  \"new_commit\".\n- Import only the names listed in the file above.\n- File header `# Author: Vasiliy Zdanovskiy -- vasilyvz@gmail.com` (CR-012).\n- All docstrings and comments in English (ARTIFACT_LOCALE=en, CR-010).\n- Estimated line count: ~140 lines (within CR-008 soft limit ~350).\n"
