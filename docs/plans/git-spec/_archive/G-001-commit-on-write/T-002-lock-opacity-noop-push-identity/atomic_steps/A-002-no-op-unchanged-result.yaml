  ```python
  """
  Commit-on-write policy rules.

  Authoritative policy layer for commit-on-write behaviour: the decision of
  whether a write produces a commit, the no-op-on-unchanged result shape, and
  the invariants governing the git commit argv used for a commit produced on
  write (never pushes, identity taken from project git configuration). The
  write path consumes this module rather than embedding these rules inline.

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """

  from typing import Any, Dict, Optional


  def decide_commit_on_write(
      commit_on_write: bool,
      commit_message: Optional[str],
      content_changed: bool,
  ) -> bool:
      """
      Decide whether a write produces a commit.

      Lock opacity rule: the server never interprets why a file is locked, and
      the commit decision for a write is derived solely from the parameters of
      the write call plus the write's content-change outcome -- never from
      lock state, lock reason, or any unlock flag. The commit decision and the
      unlock decision are independent of each other; neither implies the
      other, so this function intentionally takes no lock-related parameter.

      Args:
          commit_on_write: The write call's explicit commit-intent flag. True
              means the caller requested a commit for this write.
          commit_message: The write call's caller-supplied commit message.
              A commit is produced only when this is a non-empty string after
              stripping leading and trailing whitespace.
          content_changed: Whether the persisted content differs from the
              previous content of the target file.

      Returns:
          True when commit_on_write is True AND commit_message is a string
          that is non-empty after stripping whitespace AND content_changed is
          True. False in every other case.
      """
      if not commit_on_write:
          return False
      if not isinstance(commit_message, str):
          return False
      if not commit_message.strip():
          return False
      if not content_changed:
          return False
      return True


  REASON_NO_CHANGES = "no_changes"


  def build_commit_on_write_result(
      committed: bool,
      changed: bool,
      reason: Optional[str] = None,
  ) -> Dict[str, Any]:
      """
      Build the structured outcome payload for a commit-on-write write.

      Args:
          committed: Whether the write produced a commit.
          changed: Whether the persisted content differed from the previous
              content of the target file.
          reason: Optional short machine-readable reason code qualifying the
              outcome (e.g. REASON_NO_CHANGES). None when no qualifying
              reason applies.

      Returns:
          A dict with exactly the keys "committed", "changed", and "reason",
          set respectively to the committed, changed, and reason arguments.
      """
      return {"committed": committed, "changed": changed, "reason": reason}


  def no_op_unchanged_result() -> Dict[str, Any]:
      """
      Build the result for a commit-intent write whose content is unchanged.

      No-op-on-unchanged rule: when commit-intent is set with a valid message
      but the written content is identical to the previous content, the write
      succeeds and produces no commit. This outcome is a SUCCESS payload, not
      an error -- it is reported as a successful write that committed nothing
      because nothing changed.

      Returns:
          A dict {"committed": False, "changed": False, "reason": "no_changes"}.
      """
      return {"committed": False, "changed": False, "reason": REASON_NO_CHANGES}
  ```

