step_id: A-001
parent_tactical_step: T-003
name: Protected-branch gate scope policy for local merge and cherry-pick
target_file: code_analysis/core/git_ops/protected_gate_policy.py
operation: create_file
priority: 1
depends_on: []
concepts:
- C-012
object_id: local_merge_cherry_pick_gate_exemption
source_labels:
- '{c9d0}'
prompt: |
  Create a new Python source file at the exact project-relative path
  `code_analysis/core/git_ops/protected_gate_policy.py`. This is a brand-new
  file (operation: create_file); do not assume any pre-existing content in
  it. Do not read, create, or modify any other file.

  Write exactly the following, in this order, and nothing else:

  1. A module-level docstring, as the very first statement in the file,
  whose text states in substance: "Local merge and cherry-pick operations
  act on the working tree and history of the resolved project repository.
  They are never gated by the protected-branch restriction. Their only
  route to a remote is a separate, separately-restricted push operation.
  This module fixes WHICH git operations the protected-branch restriction
  governs; it does not itself implement the push guard - the push guard
  enforcement mechanism lives in a different module, not created here."

  2. No import statements. This file must have zero imports.

  3. A module-level constant, exactly:
     PROTECTED_BRANCH_GATE_APPLIES_TO: frozenset[str] = frozenset({"push"})
     Preceded by a comment (using `#`, one or more lines) explaining: this
     is the set of git operation names governed by the protected-branch
     restriction; currently it contains only "push", because push is the
     only remote-publication route the restriction governs.

  4. A second module-level constant, exactly:
     LOCAL_OPERATIONS_EXEMPT_FROM_PROTECTED_GATE: frozenset[str] = frozenset({"merge", "cherry_pick"})
     Preceded by a comment explaining: these are the local operation names
     explicitly exempt from the protected-branch restriction, because they
     act only on the local working tree and history and never themselves
     reach a remote.

  5. A function with exactly this signature:
     def is_protected_branch_gate_applicable(operation: str) -> bool:
     Parameter `operation` is typed `str` and holds a git operation name.
     Return type is `bool`. The function body is exactly this one statement
     (no other statements, no branching):
         return operation in PROTECTED_BRANCH_GATE_APPLIES_TO
     The function must have a docstring (its first statement) stating: this
     returns True only for operations the protected-branch restriction
     governs (currently only "push"); it returns False for every other
     operation name, including "merge" and "cherry_pick" (and any name not
     present in PROTECTED_BRANCH_GATE_APPLIES_TO); local merge and
     cherry-pick are never gated by this restriction because their only
     route to a remote is a separate, separately-restricted push operation;
     the push guard enforcement itself is implemented elsewhere, not in
     this module.

  MACHINE-SPEC EXCERPT this file realizes (concept C-012, quoted verbatim
  from docs/plans/git-spec/spec.yaml):
    concept_id: C-012
    name: LocalOpsNotProtectedGated
    definition: The rule that local merge and cherry-pick are not
      protected-branch gated, their only remote route being push.
    properties:
      applies_to: [merge, cherry_pick]
      protected_branch_gate: false
      only_remote_route: push
    source_labels: ['{c9d0}']

  SOURCE-SPEC EXCERPT this file realizes (label {c9d0}, quoted verbatim
  from docs/plans/git-spec/source_spec.md): "Merge and
  individual-commit-application operations are local and are not subject
  to the protected-branch restriction. Their only route to a remote is a
  separate, separately-restricted push operation."

  CONSTRAINTS (all mandatory):
  - The file contains only: the module docstring, the two frozenset
    constants each with their preceding explanatory comment, and the one
    function with its docstring. Nothing else - no classes, no additional
    functions, no additional constants, no imports, no
    `if __name__ == "__main__"` block.
  - Do not implement the push guard, the merge operation, or the
    cherry-pick operation themselves; those are implemented in other
    modules not created here.
  - All identifiers, values, and behavior must match exactly what is
    specified above - no renaming, no reordering of the two constants, no
    alternate return values.
  - All text (docstrings, comments) must be in English.
  - Total file length must be far under 400 lines (expected under 40
    lines).
verification:
  type: import
  target: code_analysis.core.git_ops.protected_gate_policy
  expected: >
    Importing the module succeeds with no errors. PROTECTED_BRANCH_GATE_APPLIES_TO
    is the frozenset containing exactly "push". LOCAL_OPERATIONS_EXEMPT_FROM_PROTECTED_GATE
    is the frozenset containing exactly "merge" and "cherry_pick". Calling
    is_protected_branch_gate_applicable("push") returns True. Calling it
    with "merge", "cherry_pick", or any other string returns False.
status: frozen
