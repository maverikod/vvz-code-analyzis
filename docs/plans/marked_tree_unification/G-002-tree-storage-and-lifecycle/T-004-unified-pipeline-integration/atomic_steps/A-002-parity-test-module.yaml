  ## Helper `_roundtrip_unified(tmp_path, name, content) -> str`
  1. Write source to `tmp_path / name`.
  2. `source_abs = tmp_path / name`; `checksum = compute_content_checksum(content)`.
  3. `ref = TreeBuilder.build(content=content, source_abs=source_abs, file_path=name, content_checksum=checksum)`.
  4. `handler = default_registry().resolve(source_abs)`.
  5. `text = ref.sidecar_path.read_text(encoding="utf-8")`.
  6. Return `handler.unmark(text)` — use parse_tree_file to extract TREE section first:
     `tree_body = parse_tree_file(text).tree`; return `handler.unmark(tree_body)`.

  ## Helper `_assert_three_section_layout(path: Path) -> None`
  1. `text = path.read_text(encoding="utf-8")`.
  2. Assert `SECTION_CHECKSUMS_START`, `SECTION_MAP_START`, `SECTION_TREE_START` in text.
  3. `sections = parse_tree_file(text)`.
  4. Assert `sections.checksums["source_sha256"]` is 64-char lowercase hex.
  5. Assert `sections.map.next_free >= 1`.
  6. Assert all `entry.short_id >= 1` and UUID4 format in MAP only.
  7. TREE section must NOT match UUID regex: `re.search(r"[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}", sections.tree)` is None.

  ## Tests (exact names)
  - `test_unified_three_section_layout` — parametrize `sample.txt`, `sample.md`, `sample.yaml`, `sample.json`: build, `_assert_three_section_layout(ref.sidecar_path)`.
  - `test_text_formats_unified_unmark_roundtrip` — parametrize txt/md/yaml/json; assert roundtrip == content.
  - `test_python_unified_unmark_roundtrip` — sample.py roundtrip.
  - `test_text_formats_legacy_oracle_unmark_roundtrip` — legacy recreate_tree_from_content + handler.unmark on legacy path output (may xfail if legacy layout differs).
  - `test_python_node_id_set_parity_documented` — docstring lists covered vs unverified Python node types; assert unified roundtrip on sample.py.

  Python parity docstring text:
  Covered: FunctionDef, AsyncFunctionDef, ClassDef, SimpleStatementLine, Expr, AnnAssign, Assign, AugAssign, Decorator.
  Unverified: Import, If, For, While, Try, With.

