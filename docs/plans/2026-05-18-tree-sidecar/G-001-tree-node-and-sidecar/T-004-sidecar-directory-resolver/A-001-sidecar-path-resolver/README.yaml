  ## Operation
  create_file — create `code_analysis/core/tree_temp/sidecar_paths.py`.

  ## MRS excerpt (C-002 storage binding)
  Sidecar directory is `.trees/` at the project root. Sidecar path mirrors the source path relative to project root with suffix `.tree` appended to the full relative path string (example: source `dir/file.yaml` maps under `.trees/` to `dir/file.yaml.tree`).

  ## Module header
  One-line summary docstring: Resolve `.trees/` mirrored storage paths for tree-temp Sidecars (C-002).
  Second paragraph: Bind one source file identity under the project to exactly one Sidecar file path.
  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com

  ## Imports (exact)
  - from __future__ import annotations
  - from pathlib import Path, PurePosixPath

  ## Constant
  TREES_DIRECTORY_NAME = ".trees"  (type str, exact value dot-trees)

  ## Exception
  class SidecarPathError(ValueError):
      """Raised when a project-relative source path cannot map to a Sidecar path."""

  ## Function: resolve_trees_sidecar_path(project_root: Path, source_relative_to_project: Path) -> Path
  Docstring: Return absolute Path to the Sidecar file for `source_relative_to_project` under `project_root/.trees/` using mirrored relative naming with `.tree` suffix.

  Algorithm:
  1. If `source_relative_to_project.is_absolute()` is True: raise SidecarPathError("source path must be relative to project root").
  2. Build `pure = PurePosixPath(*source_relative_to_project.parts)` so separators normalize to POSIX style.
  3. If `pure == PurePosixPath(".")` or `str(pure) == ""`: raise SidecarPathError("source path must not be empty").
  4. For each segment in `pure.parts`: if segment == "..": raise SidecarPathError("source path must not contain parent directory segments"); if segment in {".", ""}: raise SidecarPathError("source path must not contain '.' or empty segments").
  5. Let `rel_posix = pure.as_posix()`.
  6. Let `sidecar_rel_name = f"{rel_posix}.tree"`.
  7. Return `(project_root / TREES_DIRECTORY_NAME / sidecar_rel_name).resolve()` using pathlib concatenation with `/`.

  ## Error handling
  Only SidecarPathError for rule violations above; no other exception types introduced.

  ## Return value
  Absolute filesystem Path pointing at `.trees/<relative_source>.tree` resolved under `project_root`.

  ## Forbidden
  - Do not perform disk existence checks (no Path.exists).
  - Do not reference `.cst/`.
  - Do not import TreeNode or Sidecar JSON helpers.

  ## Size
  Target under 95 lines.
