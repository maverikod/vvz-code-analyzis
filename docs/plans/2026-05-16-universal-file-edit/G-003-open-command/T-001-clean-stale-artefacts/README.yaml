step_id: T-001
parent_global_step: G-003
name: Clean stale artefacts on open
description: At the start of OpenCommand (C-005) execution, remove stale artefacts
  from any previous session for the same file. Delete <file>.write (WriteLockfile
  C-004) if it exists. Delete <file>.draft if it exists. For the sidecar format group
  (Python files), do NOT delete <file>.cst_sidecar — it persists between sessions
  to preserve stable identifiers. The draft_path comes from the FormatDescriptor produced
  by format_group.resolve_format_group (created in G-002/T-001). Use standard pathlib
  Path.unlink(missing_ok=True) for deletion.
concepts:
- C-003
- C-004
- C-005
inputs:
- name: abs_path
  type: Path
  description: Absolute path to the original file.
- name: format_descriptor
  type: FormatDescriptor
  description: Contains draft_path and format_group.
outputs:
- name: clean_state
  type: boolean
  description: True when stale artefacts have been removed.
atomic_steps: []
status: draft
