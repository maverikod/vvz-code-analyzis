step_id: G-006
name: Close command
description: Implement CloseCommand that ends the session with format-group-specific
  cleanup. For sidecar: verify sidecar checksum; rebuild sidecar from source
  on mismatch; sidecar not deleted. For tree-temp: compare sha256 of draft vs
  original; delete draft on match; rebuild draft on mismatch; free in-memory
  tree. For text: delete draft unconditionally. In all cases delete the
  WriteLockfile if present and release the EditSession.
