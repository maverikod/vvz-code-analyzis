      before: "Close deletes session dir; no explicit blind-delete wording."
      after: "Close deletes session dir without validation, checksum, or consistency checks; tree survives only if written out via write command."
    e003:
      before: "Source mode diff vs in-session source rewritten only by write command."
      after: "Source mode compares rev_a against most recent per-mutation unmark-exported in-session source; live project file not input."
    i003:
      before: "Session preview on in-session tree draft in session directory only."
      after: "EditSession in-memory CST / .draft artefacts for unsaved edits before write."
    i005:
      before: "Preview budget (max lines / max value length) independent of selector."
      after: "FINAL-1 per-format full_text_max_lines (source lines, default 200, 0 disables); JSON pretty-print before line count; max_chars paginates envelope only."
    i006:
      before: "Standard CST drilldown with nested ClassDef/FunctionDef exposure."
      after: "IndentedBlock transparent; compound header ellipsis; stable ids in sidecar metadata."
    i007:
      before: "(new label)"
      after: "Node-id prefix at start of each physical line in annotated/full-text modes; blank padding for alignment."
    i008:
      before: "(new label)"
      after: "Strip legacy Python identity comments before render; preview ids from sidecar metadata prefixes."
    k001:
      before: "Block executed last after Blocks 1–10 built and verified."
      after: "G-000 final cutover after G-001..G-005 verified, before G-007 identity remap integration."
    m002:
      before: "Integration performed last after every other block built and verified."
      after: "G-007 strictly final — after G-000 cutover AND G-006 universal node id complete."
