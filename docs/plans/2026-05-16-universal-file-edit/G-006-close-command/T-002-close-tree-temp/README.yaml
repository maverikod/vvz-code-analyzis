step_id: T-002
parent_global_step: G-006
name: Close tree-temp group session
description: Implement CloseCommand (C-010) for tree-temp group sessions.
  Compute sha256 of <file>.draft and sha256 of the original <file>.
  If they match: delete <file>.draft; delete <file>.write if present.
  If they do not match: rebuild <file>.draft by calling load_file_to_tree
  then serialising to <file>.draft via ExistingInfrastructure (C-012);
  no backup; delete <file>.write; set draft_rebuilt=True.
  In both cases call remove_tree(tree_id) to free the in-memory tree, then
  call release_session(session_id) to remove the EditSession (C-001).
concepts:
- C-010
- C-001
- C-012
inputs:
- name: session
  type: EditSession
  description: Active tree-temp group session to close.
outputs:
- name: draft_rebuilt
  type: bool
  description: True when draft was rebuilt from original; False when in sync.
atomic_steps: []
status: draft