  \   MANIFEST_CONCURRENCY_POLICY = ManifestConcurrencyPolicy(\n       single_writer_under_update_lock=True,\n\
  \       atomic_create_via_tmp_replace=True,\n       readers_may_read_without_lock=True,\n\
  \   )\n   ```\n   This singleton realizes the manifest concurrency rules output
  of the parent tactical step.\n\n4. @dataclass ServerProcessIdentity:\n     main_pid:
  int\n     process_start_time: float\n     host: Optional[str] = None\n     instance_id:
  Optional[str] = None\n\n5. @dataclass SearchSessionManifest:\n     search_id: str\n\
  \     created_at: float\n     last_access_at: float\n     heartbeat_at: Optional[float]\n\
  \     status: str  (must equal SearchSessionState.<member>.value)\n     phase: str\n\
  \     request: dict[str, Any]\n     metrics: dict[str, int]\n     process: ServerProcessIdentity\n\
  \     block_ready_count: int = 0\n\n6. Metric key constants (exact names, no aliases):\n\
  \     METRIC_PRODUCED_RESULTS = \"produced_results\"\n     METRIC_WRITTEN_BLOCKS
  = \"written_blocks\"\n     METRIC_SCANNED_FILES = \"scanned_files\"\n     METRIC_WARNINGS
  = \"warnings\"\n     METRIC_ERRORS = \"errors\"\n     DEFAULT_METRICS: dict[str,
  int] with all five keys initialized to 0.\n   Warnings and errors are tracked via
  METRIC_WARNINGS / METRIC_ERRORS counters (not separate list fields).\n\n7. def capture_server_process_identity()
  -> ServerProcessIdentity:\n     Uses os.getpid() and time.time() for process_start_time.\n\
  \     process_start_time is wall-clock epoch seconds (time.time()), not time.monotonic().\n\
  \     Docstring must state wall-clock explicitly.\n\n8. def create_initial_manifest(\n\
  \       *,\n       layout: SearchSessionDirectoryLayout,\n       search_id: str,\n\
  \       request: dict[str, Any],\n       process: Optional[ServerProcessIdentity]
