  ## MRS excerpt (C-001 TreeNode)
  - stable_id: UUID v4 string; assigned once; never reassigned in domain usage (caller responsibility).
  - type: exactly one of object | array | string | number | boolean | null.
  - key: optional string; when present, denotes an object member key; array elements and document-root nodes use key None.
  - value: present only on scalar nodes string | number | boolean | null; for type null the Python value is None.
  - children: ordered list of TreeNode on object and array nodes only; must be None on scalar nodes.
  - comment_before: optional string; comment lines above this node.
  - comment_inline: optional string; trailing comment on same line as this node.

  ## Module header
  Module docstring must state: TreeNode entity for tree-temp Sidecar (JSON/YAML); implements persistence-facing shape for C-001.
  Author line: Vasiliy Zdanovskiy
