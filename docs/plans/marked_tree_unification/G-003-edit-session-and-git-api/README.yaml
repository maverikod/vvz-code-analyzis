step_id: G-003
name: Edit Session and Session Git API
description: 'Defines the EditSession as a bounded editing context represented by
  a session directory placed next to the SourceFile. Establishes the lifecycle:
  open (session directory creation, SourceFile copy, TreeFile validation or rebuild
  via TreeLifecycle, SessionRepo initialisation with initial commit), edit (when
  tree-validity state is valid per {h008}: hide markers into format-native comments
  before each mutation, apply mutation on denuded representation, restore markers to
  canonical positions after; when invalid: plain-text mutations on in-session source
  with no hide/unhide or tree write), per-mutation post-steps (when valid per {d003}:
  write tree, export stripped source via unmark to session TEMP artefacts, record
  SHA-256 checksums for tree and exported source, git commit both artefacts; when
  invalid (DEGRADED per {d003}, {h008}): write updated in-session source only, record
  its SHA-256 checksum, git commit source artefact only — one modification equals one
  commit in either mode), re-validation (per {h009}): when plain-text edit makes source
  parseable again, NodeIdMap build rebuilds the tree restoring short_id markers while
  preserving TreeNodeUuid and next_free from the existing MAP, state returns valid,
  full per-mutation invariant resumes, write (two-stage API: stage 1 preview per {d004}
  diffs in-session artefacts against live external source and sibling tree without
  modifying external files, no-op when no diffs; stage 2 confirm per {n7k2} atomically
  copies both artefacts to external co-located positions only upon explicit
  confirmation), and close (session directory deleted without
  validation, checksum, or consistency checks; only the co-located TreeFile survives
  if previously written out; session git history is ephemeral). Content-supply rule
  on open ({d002} FINAL-2): caller-supplied content accepted ONLY when target file
  is non-existent or source/tree is broken; ERROR if valid file exists; when accepted,
  write content to session code file first then standard open protocol. Defines the
  SessionGitApi as the set of session-scoped MCP commands that expose the SessionRepo
  for history inspection and revert: log (commit history), diff (tree-level or
  source-level comparison), show (tree content at a revision), status (uncommitted
  changes), and revert (roll back to a prior revision by new commit). Declares a
  git-access library as a required project dependency.'
