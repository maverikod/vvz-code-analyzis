step_id: G-005
name: Consumer Integration
description: 'Integrates TreeLifecycle into the three existing consumers. GrepConsumer
  (C-020) routes all tree-validity checks through TreeLifecycle; on checksum mismatch
  it rebuilds the TreeFile before binding a disk-scan match to a short_id via
  TreeLifecycle; a rebuild failure yields an ineligible Finding rather than a structural
  error. GrepConsumer owns {g001} only. Watcher calls the TreeLifecycle path wrapper
  before inserting or updating a file record, and persists the computed source checksum
  in the database alongside the file row via an idempotent schema extension that
  requires no migration. Indexer replaces its modification-time-based skip guard with
  a checksum-based guard: if the current source checksum matches the stored value the
  file is not reindexed; if they differ, reindexing proceeds. SearchSessionFinding
  (C-026) does not carry source file mtime; ranking uses relevance score with a
  deterministic result_id tie-break ({g004}).'
