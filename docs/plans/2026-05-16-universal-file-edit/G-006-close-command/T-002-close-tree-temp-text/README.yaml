step_id: T-002
parent_global_step: G-006
name: Close tree-temp and text group sessions
description: Realise CloseCommand (C-010) for tree-temp and text format groups. For
  the tree-temp group, compare the sha256 checksum of the DraftFile (C-003) against
  the sha256 of the original file. When checksums match, delete the draft. When checksums
  do not match, rebuild the draft by re-parsing the original and serialising the result;
  no backup is created. In both cases free the in-memory tree and release the EditSession
  (C-001). For the text group, delete the draft unconditionally. In all cases delete
  the WriteLockfile (C-004) if present and release the session. Return draft_rebuilt
  flag when a rebuild occurred.
concepts:
- C-001
- C-002
- C-003
- C-004
- C-010
- C-012
inputs:
- name: session
  type: EditSession
  description: Active tree-temp or text group session to close.
outputs:
- name: close_result
  type: response with draft_rebuilt flag
  description: Success response; draft_rebuilt is true when draft was rebuilt from
    source.
atomic_steps: []
status: draft
