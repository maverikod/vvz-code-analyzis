  Implement class BlockAssembler:

  1. Module docstring (Author: Vasiliy Zdanovskiy, email: vasilyvz@gmail.com).

  2. __init__(
        self,
        layout: SearchSessionDirectoryLayout,
        buffer: RawFindingBuffer,
        max_block_size_bytes: int,
        *,
        append_index_entry: Callable[[int, str], None],
        update_manifest_metrics: Callable[[dict], None],
        finalize_index: Callable[[], None],
     ) -> None
     Docstring: store layout, buffer, size limit, and injected callbacks.

  3. def run_once(self, *, search_completed: bool) -> int
     Docstring and algorithm ({g9xv}):
     - Return 0 when buffer_dir missing or try_acquire_lock() is False.
     - try/finally always release_lock().
     - Loop: while volume >= max_block_size_bytes OR search_completed:
       * break when volume == 0 (if search_completed call _finalize_if_empty then break).
       * load findings JSON from list_findings() paths in order.
       * position = _next_block_position() scanning layout.blocks_dir for block_(\d+).json.
       * block = assemble_block(findings, max_block_size_bytes=..., position=position).
       * break inner loop when block.results empty.
       * atomic_write_bytes(blocks_dir / f"block_{position}.json", serialize_block(block)).
       * append_index_entry(position, COMPLETENESS_RUNNING).
       * update_manifest_metrics({"produced_results": n, "written_blocks": 1, "block_size_bytes": block.serialized_size_bytes}).
       * remove_findings(assembled paths for block.results count).
       * increment blocks_published.
       * when search_completed and total_bytes()==0: _finalize_if_empty(); break.
       * when not search_completed and total_bytes() < max: break.
     - Return blocks_published count.

  4. def run_until_idle(self, *, search_completed: bool) -> int
     Docstring: repeat run_once until it returns 0; stop early when search_completed and buffer_dir gone.

  5. def _finalize_if_empty(self) -> None
     Docstring: when total_bytes()==0 call finalize_index() then buffer.delete_buffer().

  6. def _next_block_position(self) -> int
     Docstring: highest existing block number in blocks_dir plus one (minimum 1).

  7. @staticmethod def _load_finding(path: Path) -> dict
     Docstring: json.load; raise ValueError when not a JSON object.

