prompt: "Create `code_analysis/compat/existing_behavior_inventory.py`.\n\n## MRS excerpt\n\
  \nC-021 ExistingSearchCommand: existing working search command whose non-paginated\n\
  behavior must remain the default.\nC-022 IncrementalCompatibilityLayer: the layer
  that adds paginated session-backed\nbehavior around ExistingSearchCommand without
  duplicating working logic.\n\nThe ExistingBehaviorInventory separates already-implemented
  behavior from\nnew behavior introduced by this plan. Its purpose is to prevent duplication\n\
  of working search logic when the IncrementalCompatibilityLayer is introduced.\n\n\
  ## Implementation requirements\n\n1. Import `dataclasses`, `typing`.\n\n2. Define
  `@dataclasses.dataclass(frozen=True)` class `BehaviorEntry`:\n   - Fields: `name:
  str`, `description: str`, `is_implemented: bool`.\n\n3. Define `@dataclasses.dataclass`
  class `ExistingBehaviorInventory`:\n   - Field `entries: list[BehaviorEntry]`.\n\
  \   - Method `implemented(self) -> list[BehaviorEntry]`:\n     returns entries where
  `is_implemented` is True.\n   - Method `new_behavior(self) -> list[BehaviorEntry]`:\n\
  \     returns entries where `is_implemented` is False.\n   - Method `add(self, entry:
  BehaviorEntry) -> None`:\n     appends to `self.entries`.\n\n4. Define factory:\n\
  \   ```python\n   def make_empty_inventory() -> ExistingBehaviorInventory:\n   ```\n\
  \   Returns `ExistingBehaviorInventory(entries=[])`.\n\n## Constraints\n- Standard
  library only.\n- All public names have one-line docstrings.\n- File under 55 lines.\n"
