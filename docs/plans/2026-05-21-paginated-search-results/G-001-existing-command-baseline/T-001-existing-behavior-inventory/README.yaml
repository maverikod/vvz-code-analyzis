step_id: T-001
parent_global_step: G-001
name: Existing behavior inventory
description: "Create and populate the ExistingBehaviorInventory domain artifact. Record
  which behaviors already exist versus which this plan introduces, and produce an
  anti-duplication map so later work reuses working logic instead of greenfield replacement.
  Inventory scope spans all command categories required by the parent global step:
  search families named in source_spec purpose and scope (full-text search, semantic
  search, direct grep and text search, structural grep, project cross-search, and
  XPath-like tree search), plus preview, queue, and status command categories. For
  each inventoried behavior, record only enough identity to classify existing versus
  new and to key the anti-duplication map (command category, behavioral surface name,
  and migration relevance). Also classify plan-introduced paging and session-backed
  behaviors as new. Do not define default-behavior invariants, preservation matrices,
  or public contract rules; those belong to downstream baseline and contract steps.\n"
concepts:
- C-025
- C-021
inputs:
- name: working_command_observations
  type: observation_set
  description: "Recorded facts from reviewing current search, preview, queue, and
    status command implementations sufficient to label behaviors as existing or new
    without restating full default-behavior specifications.\n"
- name: plan_scope_statement
  type: scope_summary
  description: "Binding plan scope that unified paging must eventually cover full-text,
    semantic, grep, cross-search, and XPath-like search families while existing defaults
    remain authoritative.\n"
outputs:
- name: existing_behavior_inventory
  type: inventory_catalog
  description: "ExistingBehaviorInventory catalog keyed by command category and behavioral
    surface, covering search, preview, queue, and status families.\n"
- name: existing_vs_new_classification
  type: classification_ledger
  description: "Per inventoried behavior label of existing versus new capability,
    including new paging and session-backed behaviors introduced by this plan.\n"
- name: anti_duplication_map
  type: reuse_map
  description: "Map from existing behaviors to implementation areas that must not
    be duplicated when adding paginated or session-backed extensions.\n"
atomic_steps:
- A-001
status: draft
