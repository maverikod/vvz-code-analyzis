- concept_id: C-017
  name: PreviewSelector
  definition: The selector expression applied during preview that chooses a
    subset of the focus node blocks.
  properties:
  - a slice string start to end (zero-based, exclusive end) caps the block count
  - a list of short_ids cherry-picks specific blocks
  - per-format full_text_max_lines threshold controls inline versus drilldown
    rendering (Python, JSON, YAML, Markdown, plain text); default 200 source
    lines per format; setting zero disables full inline rendering (drilldown only)
  - inline full-text rendering (annotated mode with short_id line prefixes) is used
    when the node line span is strictly less than that format's
    full_text_max_lines; when span equals or exceeds the threshold, or threshold
    is zero, preview falls back to collapsed structural drilldown
  - thresholds are measured in source lines for every format, not bytes
  - for JSON, content is normalized to printable pretty-printed form BEFORE line
    counting and inline rendering so the line-based threshold is meaningful
  - max_chars paginates the serialized preview envelope only; it does not control
    the inline-versus-drilldown decision
  source_labels:
  - '{i005}'
- concept_id: C-018
  name: TreeQuery
  definition: Structural search over the marked tree of a file, in preview and
    edit-session modes, returning short_id integers of matching nodes.
  properties:
  - operates on tree structure, not full-text or database
  - returns short_id integers directly usable in navigation and edit operations
  - simple mode filters by node type, name, qualified name, line range (Python
    only)
  - unique-match enforcement demands exactly one result or returns a structured
    error with candidates
  - source-inclusion option returns the source text of the matched node (Python
    only)
  - in a session runs against the in-memory draft, outside against the validated
    on-disk tree
  source_labels:
  - '{j001}'
  - '{j002}'
  - '{j004}'
  - '{j005}'
  - '{j006}'
- concept_id: C-019
  name: CstQuerySelector
  definition: The XPath-compatible selector string used by the tree query in
    XPath mode.
  properties:
  - double-slash for recursive descendant traversal across any depth
  - at-attribute access in filter predicates such as name equals foo
  - numeric operators ge, le, gt, lt on start_line, end_line, children_count
  - not pseudo-class for negation of a nested selector
  - primary format-agnostic query mode
  source_labels:
  - '{j002}'
  - '{j003}'
- concept_id: C-020
  name: GrepConsumer
  definition: The grep subsystem that binds disk-scan matches to short_ids
    through the tree lifecycle.
  properties:
  - routes all tree-validity checks through TreeLifecycle
  - rebuilds the tree on checksum mismatch before binding a match
  - a rebuild failure yields an ineligible lower-relevance match, not a
    structural finding
  source_labels:
  - '{g001}'
- concept_id: C-021
  name: Watcher
  definition: The file watcher that ensures a valid tree and persists the source
    checksum before inserting or updating a database file row.
  properties:
  - calls the TreeLifecycle path wrapper before a file-row insert or update
  - persists the computed source checksum in the database alongside the file row
  - the schema extension is applied idempotently and requires no explicit
    migration
  source_labels:
  - '{g002}'
- concept_id: C-022
  name: Indexer
  definition: The indexer that decides reindexing by comparing the current
    source checksum against the stored tree checksum.
  properties:
  - skip guard compares current source checksum against stored tree_checksum
  - equal checksum skips reindex, differing checksum triggers reindex
  - reindexing is content-driven
  source_labels:
  - '{g003}'
- concept_id: C-023
  name: SidecarLayoutMigration
  definition: The sidecar layout cutover step (G-000) that redirects the remaining
    legacy tree-path call sites (not reached by consumer integration) onto the
    existing sibling_tree_path function and removes the three legacy layouts (.cst/
    subdirectory, .trees/ mirror directory, .tree_sidecar adjacent file). It does
    not create sibling_tree_path; that function already exists from the storage work.
    Runs after G-001 through G-005 are built and verified end to end, with G-006
    NodeIdMap identity in the tree-file MAP section; it is the final layout cutover
    with no subsequent step.
  properties:
  - final sidecar cutover after G-001..G-005 verification; no subsequent global step
  - 'replaces three independent legacy path resolvers (not delegates of one another)
    with sibling_tree_path: sidecar_path_for_py (.cst/) in cst_tree/tree_sidecar.py,
    the standalone resolve_trees_sidecar_path module (.trees/) in core/tree_temp/sidecar_paths.py
    which is removed whole, and the inline .tree_sidecar branch of the format-dispatch
    sidecar_path_for in tree_representation.py'
  - redirects write_sidecar_atomic to write at the sibling path
  - removes the legacy pending-sidecar mechanism entirely
    (pending_sidecar_path_for_py, resolve_sidecar_write_path,
    promote_pending_sidecar_to_final, _cleanup_empty_pending_dir, the _pending
    subdirectory, and the is_file branch in write_sidecar_atomic); it is
    deleted, not migrated, because the edit-session lifecycle removes the
    pre-session no-source state
  - redirects the reader functions in tree_representation.py to resolve the
    sibling path
  - 'redirects the direct legacy-path consumers onto sibling_tree_path: tree_builder,
    tree_saver, stable_tree, grep_block_resolver (.cst/), and tree_temp_write_commit,
    tree_temp_open_support (.trees/), so JSON and YAML tree files become siblings
    like every other format'
  - ensures TreeRepresentationRef carries the sibling path after
    validate_or_recreate_tree_file
  - replaces legacy path assertions in tests with sibling path assertions
  - 'hard cutover: no backward-compatibility shim'
  source_labels:
  - '{c001}'
  - '{k001}'
  - '{k002}'
  - '{k003}'
  - '{k004}'
- concept_id: C-024
  name: TreeNodeUuid
  definition: The canonical UUID4 identity of an addressable node, stored only in
    the MAP section of a tree file and kept stable across validate-and-repair when
    underlying content identity is unchanged.
  properties:
  - exactly one UUID4 per addressable node in the MAP section
  - UUID4 is never embedded in marked TREE content, never returned by
    preview/edit/query/grep MCP commands, and never accepted as an external node
    reference
  - assigned at node creation and preserved across validate-and-repair for nodes
    whose underlying content identity is unchanged
  - short_id in the TREE section resolves to TreeNodeUuid via the NodeIdMap block
  source_labels:
  - '{a001}'
  - '{a002}'
  - '{n001}'
- concept_id: C-025
  name: NodeIdMap
  definition: The dedicated module exposing exactly three operations on the
    short_id↔UUID4 map and next_free counter within one tree file context.
  properties:
  - operation build — scan TREE and MAP sections to generate or refresh the
    short_id↔UUID map and per-node UUID entries
  - operation validate_and_repair — detect inconsistencies between markers, map,
    UUID entries, and next_free, then fix them while preserving UUID4 for unchanged
    nodes per {a007}
  - operation resolve — bidirectional lookup short_id→UUID and UUID→short_id within
    one tree file context
  - no other public entry points perform map mutation
  - replaces the former universal-node-id generate/validate pair and centralizes map
    logic previously split across format handlers
  source_labels:
  - '{a007}'
  - '{n001}'
  - '{n002}'
  - '{n003}'
- concept_id: C-026
  name: SearchSessionFinding
  definition: A search-session result record (`Finding`) whose payload and
    ranking contract exclude file mtime.
  properties:
  - does not carry file mtime
  - ranking does not use mtime as a sort dimension
  - ordering uses relevance score with a deterministic result_id tie-break
  source_labels:
  - '{g004}'
