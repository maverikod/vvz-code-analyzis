prompt: "Add a new nullable column `tree_checksum` to the `files` table in the declarative schema definition (C-021, Action 2 schema-extension rule). This is an additive, declarative schema change over working code.\n\n## Parent documents\n- Global step: docs/plans/marked_tree_unification/G-005-consumer-integration/README.yaml\n- Tactical step: docs/plans/marked_tree_unification/G-005-consumer-integration/T-002-watcher-integration/README.yaml\n- Machine spec: docs/plans/marked_tree_unification/spec.yaml (C-021)\n\nIMPORTANT — project paradigm (universal driver -> DB-specific driver -> DBMS): the schema is declared abstractly here, with DBMS-agnostic column types (UUID, TEXT, REAL, BOOLEAN, INTEGER). DBMS-specific DDL (SQLite vs Postgres) is generated downstream by the schema comparator and the per-driver SQL layer. Therefore you MUST NOT write any `ALTER TABLE`, `CREATE TABLE`, or any raw SQL in this file or anywhere else. The change is exactly one declarative column entry. The schema comparator (SqliteWorkerSchemaSyncAdapter -> SchemaComparator.compare_schemas / generate_migration_sql) detects the missing column on startup and emits the idempotent column-addition itself; this satisfies the C-021 requirement that the extension is idempotent and needs no explicit migration script.\n\n## MRS excerpt\n\nC-021 Watcher: the file watcher that ensures a valid tree and persists the source checksum before inserting or updating a database file row.\n  - persists the computed source checksum in the database alongside the file row\n  - the schema extension is applied idempotently and requires no explicit migration\n\n## a3/a8 waiver (pre-existing oversized file)\nTarget is pre-existing project file >400 lines. Region/sectioned embed with explicit anchor markers satisfies a8; full-file embed not required.\n\nDo not split this file.\n\n## Operation\n\nmodify_file: code_analysis/core/database/schema_definition_tables_core.py\n\n## Current full content of the target file\n\nThe file defines one function, `get_tables_core() -> Dict[str, Any]`, returning a dict of table definitions. Each table maps to a dict with keys `columns`, `foreign_keys`, `unique_constraints`, `check_constraints`. Each column is a dict with keys `name`, `type`, `not_null`, and optionally `primary_key` and `default`. Column types in use are the abstract tokens: UUID, TEXT, REAL, BOOLEAN, INTEGER.\n\nThe `files` table entry is defined exactly as follows (verbatim):\n\n```python\n        \"files\": {\n            \"columns\": [\n                {\n                    \"name\": \"id\",\n                    \"type\": \"UUID\",\n                    \"not_null\": True,\n                    \"primary_key\": True,\n                },\n                {\"name\": \"project_id\", \"type\": \"UUID\", \"not_null\": True},\n                {\"name\": \"watch_dir_id\", \"type\": \"UUID\", \"not_null\": False},\n                {\"name\": \"path\", \"type\": \"TEXT\", \"not_null\": True},\n                {\"name\": \"relative_path\", \"type\": \"TEXT\", \"not_null\": False},\n                {\"name\": \"lines\", \"type\": \"INTEGER\", \"not_null\": False},\n                {\"name\": \"last_modified\", \"type\": \"REAL\", \"not_null\": False},\n                {\"name\": \"has_docstring\", \"type\": \"BOOLEAN\", \"not_null\": False},\n                {\n                    \"name\": \"deleted\",\n                    \"type\": \"BOOLEAN\",\n                    \"not_null\": False,\n                    \"default\": \"0\",\n                },\n                {\"name\": \"original_path\", \"type\": \"TEXT\", \"not_null\": False},\n                {\"name\": \"version_dir\", \"type\": \"TEXT\", \"not_null\": False},\n                {\n                    \"name\": \"needs_chunking\",\n                    \"type\": \"INTEGER\",\n                    \"not_null\": False,\n                    \"default\": \"0\",\n                },\n                {\n                    \"name\": \"editing_pid\",\n                    \"type\": \"INTEGER\",\n                    \"not_null\": False,\n                },\n                {\n                    \"name\": \"created_at\",\n                    \"type\": \"REAL\",\n                    \"not_null\": False,\n                    \"default\": \"julianday('now')\",\n                },\n                {\n                    \"name\": \"updated_at\",\n                    \"type\": \"REAL\",\n                    \"not_null\": False,\n                    \"default\": \"julianday('now')\",\n                },\n            ],\n            \"foreign_keys\": [\n                {\n                    \"columns\": [\"project_id\"],\n                    \"references_table\": \"projects\",\n                    \"references_columns\": [\"id\"],\n                    \"on_delete\": \"CASCADE\",\n                },\n                {\n                    \"columns\": [\"watch_dir_id\"],\n                    \"references_table\": \"watch_dirs\",\n                    \"references_columns\": [\"id\"],\n                    \"on_delete\": \"SET NULL\",\n                },\n            ],\n            \"unique_constraints\": [{\"columns\": [\"project_id\", \"path\"]}],\n            \"check_constraints\": [],\n        },\n```\n\n## Required change\n\nInsert exactly one new column entry into the `files` table `columns` list, immediately after the `has_docstring` entry and before the `deleted` entry. The new entry is:\n\n```python\n                {\"name\": \"tree_checksum\", \"type\": \"TEXT\", \"not_null\": False},\n```\n\nAfter the change, the relevant region reads:\n\n```python\n                {\"name\": \"has_docstring\", \"type\": \"BOOLEAN\", \"not_null\": False},\n                {\"name\": \"tree_checksum\", \"type\": \"TEXT\", \"not_null\": False},\n                {\n                    \"name\": \"deleted\",\n```\n\n## Constraints\n- Type is exactly \"TEXT\" (abstract token); the column stores a SHA-256 hex digest string of the source content.\n- `not_null` is False: existing rows receive NULL when the comparator adds the column; a NOT NULL column would break the idempotent addition on a populated table.\n- Do NOT add a `default`.\n- Touch ONLY the `files` table `columns` list. Do NOT modify any other table, the foreign_keys, unique_constraints, or check_constraints of `files`, or any other file.\n- Do NOT write any raw SQL, ALTER TABLE, or migration code anywhere.\n- All docstrings and comments in English (ARTIFACT_LOCALE=en, CR-010).\n"
