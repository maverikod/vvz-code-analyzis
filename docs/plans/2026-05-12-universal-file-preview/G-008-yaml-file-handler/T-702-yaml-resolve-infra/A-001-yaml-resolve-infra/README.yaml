  \ input_error, INPUT_ERROR_UNKNOWN_NODE_REF\n                return input_error(\n\
  \                    INPUT_ERROR_UNKNOWN_NODE_REF,\n                    f'YAML tree\
  \ infra could not resolve {node_ref!r}.',\n                    details={'node_ref':\
  \ node_ref},\n                )\n            # Convert infrastructure result to\
  \ Node\n            return _yaml_value_to_node(result, node_ref)\n        except\
  \ ImportError:\n            return None  # infrastructure absent — use fallback\n\
  \n  Replace the body of resolve_node_ref with:\n\n    infra_result = self._try_infra_resolve(node_ref,\
  \ session)\n    if infra_result is not None:\n        return infra_result  # infrastructure\
  \ handled it (Node or PreviewError)\n    # T-703 fallback: JSON-pointer-style path\n\
  \    doc = getattr(self, '_doc', None)\n    if doc is None:\n        return input_error(INPUT_ERROR_UNKNOWN_NODE_REF,\n\
