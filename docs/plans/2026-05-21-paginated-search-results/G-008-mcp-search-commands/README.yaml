step_id: G-008
name: MCP Search Job Commands
description: "Implement the MCP command surface for paginated search jobs. Exposes
  search_start, search_get_page, search_get_status, search_cancel, and search_close
  as registered MCP commands with full parameter schemas, metadata, error codes, and
  routing to the job infrastructure layer. search_start blocks until the first two
  page files are written, then returns job_id and page_url. All other commands operate
  on an existing job_id. Commands delegate to SearchJob infrastructure (G-001-si)
  and page publication layer (G-003) without duplicating their logic.\n"
