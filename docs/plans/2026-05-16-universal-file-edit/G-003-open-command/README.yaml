step_id: G-003
name: universal_file_open command
description: Implement the universal_file_open MCP command. On entry clean stale artefacts
  (<file>.write, <file>.draft; not cst_sidecar). Resolve format group. Create draft
  appropriate for the group (sidecar via write_sidecar_atomic; JSON/YAML draft via
  tree serialisation; text via file copy). Create initial BackupPair when file has
  no backup history. Register EditSession. Return session_id and available operations.
