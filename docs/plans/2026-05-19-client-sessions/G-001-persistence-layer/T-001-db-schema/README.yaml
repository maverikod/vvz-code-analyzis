description: "Create the database schema for four domain entities and register it
  in the migration pipeline.\n\nEntities created:\n- client_sessions schema: columns
  session_id (UUID4 PK), comment (TEXT NOT NULL DEFAULT ''), created_at (REAL), last_active_at
  (REAL); index on last_active_at.\n- session_file_locks schema: columns session_id
  (FK -> client_sessions CASCADE DELETE), project_id (FK -> projects CASCADE DELETE),
  file_id (FK -> files CASCADE DELETE), locked_at (REAL); PRIMARY KEY (session_id,
  project_id, file_id); index on session_id; index on (project_id, file_id).\n- roles
  schema: columns role_id (UUID4 PK), name (TEXT UNIQUE NOT NULL).\n- role_permissions
  schema: columns role_id (FK -> roles CASCADE DELETE), command_name (TEXT NOT NULL),
  server_uuid (UUID4 NOT NULL); PRIMARY KEY (role_id, command_name, server_uuid).\n\
  - session_roles schema: columns session_id (FK -> client_sessions CASCADE DELETE),
  role_id (FK -> roles CASCADE DELETE); PRIMARY KEY (session_id, role_id).\n\nActions:\n\
  - Define DDL constants for all five tables and their indexes.\n- Create an idempotent
  migration function ensure_client_session_tables(conn) that creates all tables and
  indexes using CREATE TABLE IF NOT EXISTS and CREATE INDEX IF NOT EXISTS, then commits.\n\
  - Register ensure_client_session_tables in the existing migration entry point run_all_ensure()
  so it is called automatically on every DB connection."
inputs:
