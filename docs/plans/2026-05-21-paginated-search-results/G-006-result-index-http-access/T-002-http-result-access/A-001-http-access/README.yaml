  - SESSION_NOT_FOUND = "SESSION_NOT_FOUND"
  - BLOCK_NOT_FOUND = "BLOCK_NOT_FOUND"

  Routing fork resolution: this module exposes handler callables only. Do not register HTTP
  routes here, do not modify main_server_presentation.py, and do not call register_search_job_routes.
  Route registration belongs exclusively in http_routes.register_search_job_routes.

  Implement handlers (framework-agnostic callables returning (status_code, payload dict)):

  ```python
  @dataclass(frozen=True)
  class HttpAccessContext:
      config_dir: Path


  def resolve_session_layout(ctx: HttpAccessContext, job_id: str) -> SearchSessionDirectoryLayout:
      root = resolve_search_sessions_root(ctx.config_dir) / job_id
      return SearchSessionDirectoryLayout(
          root=root,
          manifest_path=root / "manifest.json",
          index_path=root / "index.json",
          service_metadata_path=root / "service_metadata.json",
          blocks_dir=root / "blocks",
          buffer_dir=root / "buffer",
      )


  def handle_get_index(ctx: HttpAccessContext, job_id: str) -> tuple[int, dict[str, Any]]:
      layout = resolve_session_layout(ctx, job_id)
      if not _session_exists(layout):
          return _not_found(SESSION_NOT_FOUND, f"Search session not found: {job_id}")
      if layout.index_path.is_file():
          index = read_index(layout.index_path)
          payload = {"blocks": list(index.blocks), "completeness": index.completeness}
      else:
          payload = {"blocks": [], "completeness": COMPLETENESS_RUNNING}
      _refresh_access(layout)
      return 200, payload


  def handle_get_block(ctx: HttpAccessContext, job_id: str, position: int) -> tuple[int, dict[str, Any]]:
      layout = resolve_session_layout(ctx, job_id)
      if not _session_exists(layout):
          return _not_found(SESSION_NOT_FOUND, f"Search session not found: {job_id}")
      index = read_index(layout.index_path) if layout.index_path.is_file() else None
      indexed_positions: set[int] = set()
      completeness = COMPLETENESS_RUNNING
      if index is not None:
          indexed_positions = {
              int(entry["position"]) for entry in index.blocks if "position" in entry
          }
          completeness = index.completeness
      block_path = layout.blocks_dir / f"block_{position}.json"
      if position not in indexed_positions:
          if completeness == COMPLETENESS_RUNNING:
              return _conflict(BLOCK_NOT_READY, f"Block {position} is not published yet for job {job_id}")
          return _not_found(BLOCK_NOT_FOUND, f"Block {position} not found for job {job_id}")
      if not block_path.is_file():
          if completeness == COMPLETENESS_RUNNING:
              return _conflict(BLOCK_NOT_READY, f"Block {position} is not published yet for job {job_id}")
          return _not_found(BLOCK_NOT_FOUND, f"Block {position} not found for job {job_id}")
      with open(block_path, "r", encoding="utf-8") as handle:
          payload = json.load(handle)
      _refresh_access(layout)
      return (200, payload) if isinstance(payload, dict) else (200, {"block": payload})


  def handle_get_status(ctx: HttpAccessContext, job_id: str) -> tuple[int, dict[str, Any]]:
      layout = resolve_session_layout(ctx, job_id)
      if not _session_exists(layout):
          return _not_found(SESSION_NOT_FOUND, f"Search session not found: {job_id}")
      if not layout.manifest_path.is_file():
          return _not_found(SESSION_NOT_FOUND, f"Search manifest not found: {job_id}")
      manifest = read_manifest(layout)
      snapshot = snapshot_from_manifest(manifest)
      _refresh_access(layout)
      return 200, {
          "search_id": manifest.search_id,
          "status": snapshot.status,
          "phase": snapshot.phase.value,
          "block_not_ready": snapshot.block_not_ready,
          "message": snapshot.message,
          "metrics": dict(manifest.metrics),
          "block_ready_count": manifest.block_ready_count,
      }
  ```

  Private helpers:
  - _session_exists(layout) -> bool  (layout.root.is_dir())
  - _refresh_access(layout) -> None  (refresh_last_access when service_metadata exists, else initialize_service_metadata; use time.time())
  - _not_found(code, message) -> tuple[int, dict]  (404 with {"error": {"code", "message"}})
  - _conflict(code, message) -> tuple[int, dict]  (409 with same error envelope)

  Under 280 lines. Author header.

