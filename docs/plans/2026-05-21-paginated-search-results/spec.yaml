meta:
  title: Paginated Search and Universal Tree Query Machine Specification
  spec_id: paginated-search-results
  version: '0.1'
  status: draft
  source_spec: docs/plans/2026-05-21-paginated-search-results/source_spec.md
concepts:
- concept_id: C-001
  definition: Logical execution context for one search request that owns result 
    blocks, the directory index, status, metrics, lifetime metadata, and cleanup
    state.
  name: SearchSession
  properties:
  - Created immediately when a model or client starts a search request.
  - Has a unique search_id used for HTTP access to the directory index, result 
    blocks, and status.
  - Owns a dedicated session directory for result blocks, the directory index, 
    and service metadata.
  - Tracks running, completed, failed, cancelled, timed_out, dead, expired, and 
    closed states.
  source_ranges:
  - end: 7
    start: 5
  - end: 27
    start: 21
  - end: 33
    start: 31
  - end: 75
    start: 73
  - end: 95
    start: 80
  - end: 107
    start: 97
- concept_id: C-002
  definition: Filesystem directory created for a SearchSession to store result 
    blocks, the directory index, manifest data, and service metadata.
  name: SearchSessionDirectory
  properties:
  - Created before search execution begins.
  - Contains immutable result blocks written by the search worker.
  - Contains the directory index listing blocks and completeness state.
  - Contains metadata that records last access time and session progress.
  - Is removed by background cleanup when the session expires or is dead.
  source_ranges:
  - end: 81
    start: 81
- concept_id: C-003
  definition: Machine-readable state file inside a SearchSessionDirectory 
    describing request context, process identity, heartbeat, metrics, block 
    readiness, warnings, and errors.
  name: SearchSessionManifest
  properties:
  - Stores created_at, last_access_at, heartbeat_at, status, and phase.
  - Stores request parameters and metrics inferred from the search context.
  - Stores block readiness information for HTTP readers.
  - Stores ServerProcessIdentity for dead-session detection.
  - Must be updated safely while the search worker, HTTP readers, and cleaner 
    may operate concurrently.
  source_ranges:
  - end: 83
    start: 83
  - end: 90
    start: 90
  - end: 93
    start: 93
- concept_id: C-004
  name: SearchResultBlock
  definition: Immutable result block written inside a SearchSessionDirectory. 
    Contains a bounded slice of the raw search output holding an integer number 
    of complete search results. Its serialized size must not exceed the 
    configured maximum block size in bytes, except when a single result is 
    itself larger than the limit, in which case the block contains that one 
    result and the limit is exceeded. A block is written once and never modified
    afterward; navigation between blocks is by position number via the directory
    index, not by an embedded link.
  properties:
  - Contains an integer number of complete, non-split search results.
  - Serialized size is bounded by the configured maximum block size in bytes.
  - When a single result exceeds the limit, the block holds that one result and 
    the size limit is exceeded, because result integrity takes precedence.
  - Is immutable after its initial write; no field is updated later.
  - Becomes visible to readers only after it is completely written via atomic 
    rename.
  - Is addressed by its position number through the directory index.
  source_ranges:
  - start: 21
    end: 27
  - start: 31
    end: 33
- concept_id: C-005
  definition: Simple HTTP retrieval mechanism for reading a search job's 
    directory index, individual result blocks by position number, and search 
    status. Does not require streaming transport.
  name: HTTPResultAccess
  properties:
  - Allows clients and models to request the directory index and ready result 
    blocks without streaming transport.
  - Retrieves any result block directly by its position number with the job_id.
  - Updates last_access_at on every successful index, block, or status access.
  - Returns a block-not-ready response when the search is running but the 
    requested block has not been published yet.
  source_ranges:
  - end: 27
    start: 23
  - end: 31
    start: 31
- concept_id: C-006
  definition: Timestamp recorded for a SearchSession and refreshed whenever a 
    client reads the directory index, a result block, or the search status for 
    that session.
  name: LastAccessTimestamp
  properties:
  - Drives TTL-based cleanup of session directories.
  - Must be refreshed by HTTPResultAccess.
  - Must not be confused with heartbeat_at, which indicates writer liveness.
  source_ranges:
  - end: 33
    start: 31
  - end: 88
    start: 88
- concept_id: C-007
  name: SessionTTLPolicy
  definition: 'Configuration policy covering two related search response settings:
    the TTL controlling how long inactive SearchSessionDirectory data remains after
    last access, and the maximum result block size in bytes that bounds a single SearchResultBlock.
    The maximum block size is distinct from the existing per-result preview size limit.'
  properties:
  - Defines a search response TTL and a maximum result block size in bytes.
  - Each setting has a default code constant.
  - Both settings are emitted by the configuration generator.
  - Both settings are checked by the configuration validator.
  - Rejects missing, invalid, non-integer, zero, negative, or out-of-range 
    values for each setting according to policy.
  - The maximum block size is separate from the per-result preview size limit.
  source_ranges:
  - start: 31
    end: 33
  - start: 33
    end: 33
- concept_id: C-008
  definition: Identity of the main server process that created or owns a 
    SearchSession, used to detect sessions whose owning process is gone or whose
    PID was reused.
  name: ServerProcessIdentity
  properties:
  - Includes main_pid.
  - Includes process_start_time to detect PID reuse.
  - May include host and instance_id when available.
  - A missing process or mismatched process_start_time makes the session dead or
    orphaned.
  source_ranges:
  - end: 90
    start: 90
- concept_id: C-009
  definition: Periodic liveness timestamp written by the search execution path 
    while a SearchSession is running.
  name: SessionHeartbeat
  properties:
  - Stored as heartbeat_at in SearchSessionManifest.
  - Distinguishes a live search with no ready blocks from a stuck or dead 
    worker.
  - Older-than-hard-timeout heartbeat marks a running session as timed_out or 
    orphaned.
  source_ranges:
  - end: 93
    start: 93
- concept_id: C-010
  definition: Rule set for deciding that a SearchSession is dead or orphaned 
    based on server process identity and heartbeat state.
  name: DeadSessionDetection
  properties:
  - Treats missing main_pid as dead.
  - Treats process_start_time mismatch as dead because PID reuse is possible.
  - Treats stale heartbeat beyond hard timeout as timed_out or orphaned.
  - May be applied by status reads and by the background cleaner.
  source_ranges:
  - end: 93
    start: 90
  - end: 95
    start: 95
- concept_id: C-011
  name: BackgroundSessionCleaner
  definition: Background maintenance process that removes expired, closed, or 
    dead SearchSessionDirectory trees according to TTL, status, process 
    identity, and heartbeat rules.
  properties:
  - Runs independently of client result access.
  - Deletes completed, failed, cancelled, timed_out, closed, expired, and dead 
    sessions after policy allows cleanup.
  - Must not delete live running sessions whose process identity and heartbeat 
    are valid.
  - Detects orphan running sessions through DeadSessionDetection.
  source_ranges:
  - start: 95
    end: 95
- concept_id: C-012
  name: IndexedFileSet
  definition: Set of files that can be searched through the database or index 
    because their indexed state is fresh for current disk content.
  properties:
  - Built from intersection of database-known files and disk files.
  - Requires checksum or modification metadata validation.
  - Excludes stale, changed, missing, draft-only, or unavailable-index files.
  - Must not be rescanned directly by dynamic grep when current.
  source_ranges:
  - start: 11
    end: 17
- concept_id: C-013
  name: DynamicFileSet
  definition: Set of files that must be processed directly from disk or draft 
    session because they are missing, stale, changed, unindexed, draft-only, or 
    unavailable in the index.
  properties:
  - Derived from disk files minus the fresh IndexedFileSet.
  - Processed dynamically through the same tree construction path as the indexer
    when structural processing is required.
  - Scans only supported formats by default.
  source_ranges:
  - start: 11
    end: 17
  - start: 55
    end: 55
  - start: 67
    end: 69
- concept_id: C-014
  name: FreshnessValidation
  definition: Validation step that decides whether an indexed file 
    representation still matches current file content.
  properties:
  - Uses checksums and/or modification metadata.
  - Moves stale indexed files into DynamicFileSet.
  - Follows the same principle as tree sidecar validation.
  source_ranges:
  - start: 15
    end: 17
  - start: 41
    end: 41
- concept_id: C-015
  name: TreeRepresentation
  definition: Stable structural representation for supported files, including 
    JSON, YAML, Python CST, Markdown, and text represented as paragraphs and 
    lines.
  properties:
  - Available for every supported file.
  - Maintains stable node identifiers comparable to Python CST sidecar 
    identifiers.
  - Is validated using checksum or equivalent freshness metadata before 
    structural processing.
  - Is recreated when missing or invalid.
  source_ranges:
  - start: 37
    end: 43
- concept_id: C-016
  name: XPathLikeFilter
  definition: Universal structural filter that evaluates XPath-like queries over
    validated TreeRepresentation data from multiple sources.
  properties:
  - Operates on validated tree representations, not ad-hoc text.
  - Works with database-backed structural data, indexer in-memory structures, 
    dynamic trees, and draft-session content.
  - Returns only matching tree nodes.
  - Shares structure model, node identifiers, and selector semantics with the 
    indexer.
  source_ranges:
  - start: 47
    end: 55
- concept_id: C-017
  name: PreviewReference
  definition: Reference embedded in a search result that is sufficient to 
    inspect the result through universal_file_preview.
  properties:
  - Includes file path and node identifier or selector.
  - Includes draft session identifier for draft-session results.
  - Must not expose unstable node identifiers.
  - Is the canonical result presentation mechanism for structural results.
  source_ranges:
  - start: 43
    end: 43
  - start: 59
    end: 63
- concept_id: C-018
  name: StructuralEvidence
  definition: Search evidence that is valid only when backed by a validated 
    TreeRepresentation and a preview-compatible result node or block.
  properties:
  - Required when grep participates in project cross-search as structural 
    evidence.
  - Line-only grep is not structural evidence unless converted into validated 
    preview-compatible nodes.
  - Timed-out dynamic or structural phases must not contribute invalid partial 
    structural evidence.
  source_ranges:
  - start: 63
    end: 63
  - start: 69
    end: 75
- concept_id: C-019
  name: GrepSearchMode
  definition: Explicit operating mode of fs_grep, either classic line grep or 
    preview-compatible structural grep.
  properties:
  - Classic line grep returns line-oriented text matches and is opt-in.
  - Structural mode validates or creates a file tree, maps matches to nodes or 
    blocks, and returns PreviewReference data.
  - Structural mode is the default.
  - Classic line grep must not count as project cross-search structural evidence
    unless converted.
  source_ranges:
  - start: 69
    end: 69
- concept_id: C-020
  definition: SearchSession state and phase model exposed to clients while 
    search generation proceeds or terminates.
  name: SearchStatus
  properties:
  - Exposes running, completed, failed, cancelled, timed_out, and dead states.
  - Exposes current phase such as indexed search, dynamic file discovery, tree 
    validation, tree reconstruction, XPath filtering, block writing, or 
    completion.
  - Distinguishes block-not-ready from whole-search failure.
  source_ranges:
  - end: 27
    start: 25
  - end: 75
    start: 73
- concept_id: C-021
  definition: A currently working search, preview, queue, or status command 
    whose existing public behavior must remain valid during the migration.
  name: ExistingSearchCommand
  properties:
  - Represents already implemented behavior, not new behavior.
  - Keeps current non-paginated behavior as the default for existing callers.
  - Must not be replaced by an incompatible greenfield subsystem.
  - May be extended through optional parameters or compatible bridge commands.
  source_ranges:
  - start: 97
    end: 107
- concept_id: C-022
  definition: Compatibility layer that adds paginated and session-backed 
    behavior around existing command implementations without breaking current 
    callers.
  name: IncrementalCompatibilityLayer
  properties:
  - Adds pagination as an opt-in behavior.
  - May route paginated execution through SearchSession.
  - Preserves existing validation, schemas, queue behavior, timeout behavior, 
    direct payloads, structural results, and preview references.
  - Must avoid duplicating working search logic.
  source_ranges:
  - start: 97
    end: 107
- concept_id: C-023
  definition: Public command contract that keeps current behavior stable while 
    allowing optional paginated extensions.
  name: BackwardCompatibleCommandContract
  properties:
  - Current behavior remains default.
  - New pagination fields are optional.
  - Existing callers do not need to change.
  - Bridge commands must be documented when used.
  source_ranges:
  - start: 97
    end: 107
- concept_id: C-024
  definition: Optional request or response fields that enable 
    paginated/session-backed behavior without changing default command behavior.
  name: OptionalPaginationParameters
  properties:
  - May include fields such as paginated, job_id, include_job_id, a block 
    position number, or a job result endpoint reference.
  - Must not be required for existing non-paginated callers.
  - Must be documented in command schemas and metadata when exposed.
  source_ranges:
  - end: 107
    start: 97
- concept_id: C-025
  definition: Inventory that separates behavior already present in the codebase 
    from behavior introduced by this plan.
  name: ExistingBehaviorInventory
  properties:
  - Identifies which search behaviors already exist.
  - Identifies which paging/session behaviors are new.
  - Prevents the implementation plan from duplicating existing search logic.
  - Helps global steps target migration work instead of greenfield replacement.
  source_ranges:
  - start: 97
    end: 107
- concept_id: C-026
  name: AtomicBlockPublication
  definition: Publication protocol that prevents clients and HTTP readers from 
    observing partially written content. Result blocks and the directory index 
    are each written to a temporary path and made visible only by atomic rename 
    after the content is complete.
  properties:
  - Writes block and index content through a temporary intermediate path.
  - Publishes a block or index update only after the content is complete.
  - Makes finalized immutable result blocks visible to HTTP readers.
  - Updates the directory index atomically so readers never see a partially 
    appended index.
  - Prevents readers from consuming partially written content.
  source_ranges:
  - end: 27
    start: 23
- concept_id: C-027
  definition: 'Client-facing directory index of a search job, read through the job
    result endpoint with the job_id. Lists every result block currently written for
    the job, in order by position number, and carries an explicit completeness marker
    distinguishing search still running from search finished. It is the single mutable
    artifact of the job: appended when a new block is published and otherwise stable.
    One read gives the client all available blocks and the current completeness state.'
  name: SearchResultIndex
  properties:
  - Lists all currently written result blocks in order by position number.
  - 'Carries a completeness marker with two states: search still running and search
    finished.'
  - Is the only mutable artifact of the job; result blocks themselves are 
    immutable.
  - Is appended atomically when a new block is published.
  - Reports a final, closed block set once the completeness marker is search 
    finished.
  - Is retrieved by job_id through the job result endpoint in a single read.
  source_ranges:
  - end: 27
    start: 23
