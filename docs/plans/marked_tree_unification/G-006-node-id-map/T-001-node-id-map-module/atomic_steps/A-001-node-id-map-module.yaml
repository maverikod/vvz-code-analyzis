  Machine spec: `docs/plans/marked_tree_unification/spec.yaml` (concepts C-025, C-024, C-002, C-003)

  This module implements NodeIdMap (C-025): the sole owner of short_id↔TreeNodeUuid
  (C-024) map mutation within one tree file context. It replaces the retired
  generate/validate pair; no other public entry points perform map mutation.

  ## Locked identity model (mandatory)

  - `short_id` = per-file monotonic INTEGER marker embedded in the TREE section only.
  - TreeNodeUuid (C-024) = UUID4 string stored ONLY in the MAP section; never in TREE.
  - Tree file layout (C-003): three ordered sections — CHECKSUMS → MAP → TREE.
  - External API uses `(file path, short_id)` only; UUID never crosses API boundary.
  - MAP holds `next_free` (lowest unissued short_id), per-node UUID4 entries, and
    short_id↔UUID associations.
  - Allocation ({a007}): new node gets `short_id = next_free` then `next_free += 1`;
    deleted short_ids are NEVER reused; on rebuild copy `next_free` from prior MAP;
    first-time creation starts `next_free = 1`.
  - `validate_and_repair` preserves UUID4 when `content_fingerprint` is unchanged.

  ## MRS excerpt

  C-025 NodeIdMap — exactly three public map-mutation operations:
    - build — scan TREE and MAP inputs to generate or refresh short_id↔UUID map
    - validate_and_repair — fix marker/map/UUID/next_free inconsistencies; preserve
      UUID4 for unchanged content identity per {a007}
    - resolve — bidirectional short_id↔UUID lookup within one loaded map

  C-024 TreeNodeUuid — canonical UUID4 per addressable node in MAP only; assigned at
  node creation; preserved across validate_and_repair when content identity unchanged;
  never embedded in TREE markers or external API ({n001}, {n003}).

  C-002 NodeId — integer short_id handle (file-scoped); unrecognised short_id is an
  input error ({n003}).

  C-003 TreeFile — CHECKSUMS first, MAP second, TREE third on disk.

  ## On-disk tree file wire format (define in this module)

  Sections are delimited by exact line markers (no trailing spaces):

  ```
  ---CHECKSUMS---
  source_sha256: <64-char lowercase hex>
  ---MAP---
  next_free: <positive int>
  entries:
    - short_id: <int>
      uuid: <uuid4 lowercase hex with hyphens>
      content_fingerprint: <64-char lowercase hex>
      kind: <str>
      attributes: {}   # optional mapping; default empty dict when absent
  ---TREE---
  <marked content bytes as UTF-8 text; integer short_id markers only>
  ```

  Constants (module level, exact values):
  - `SECTION_CHECKSUMS_START = "---CHECKSUMS---"`
  - `SECTION_MAP_START = "---MAP---"`
  - `SECTION_TREE_START = "---TREE---"`
  - `DEFAULT_NEXT_FREE = 1`

  MAP body between `SECTION_MAP_START` and `SECTION_TREE_START` is YAML parsed with
  `yaml.safe_load`. CHECKSUMS body between `SECTION_CHECKSUMS_START` and
  `SECTION_MAP_START` is YAML parsed with `yaml.safe_load`.

  ## File header (exact module docstring)

