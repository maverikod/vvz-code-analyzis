prompt: "Create the file `code_analysis/search_session/page_writer.py`.\n\n## MRS
  excerpt\n\nC-004 SearchPageFile: Immutable result page file written inside a\nSearchSessionDirectory
  and retrieved through ordinary HTTP access.\nProperties:\n  - Contains a bounded
  list of normalized search result records.\n  - Becomes visible to readers only after
  it is completely written.\n  - Must not be rewritten after publication.\n\nC-026
  AtomicPagePublication: Publication protocol that prevents clients\nand HTTP readers
  from observing partially written page content.\nProperties:\n  - Writes page content
  through a temporary or unpublished intermediate state.\n  - Publishes a page only
  after the page content is complete.\n  - Makes finalized immutable page files visible
  to HTTP readers.\n  - Prevents readers from consuming partially written page content.\n\
  \n## Implementation requirements\n\nImports: `dataclasses`, `json`, `os`, `pathlib`,
  `typing`.\n\n1. Define `@dataclasses.dataclass` class `SearchResultRecord`:\n  \
  \ - `result_id: str`\n   - `rank: float`\n   - `source: str`\n   - `file_path: str`\n\
  \   - `line_number: typing.Optional[int] = None`\n   - `node_ref: typing.Optional[str]
  = None`\n   - `preview: typing.Optional[dict] = None`\n   - `score: typing.Optional[float]
  = None`\n   - `text: typing.Optional[str] = None`\n\n2. Define `def write_page(\n\
  \       directory: pathlib.Path,\n       page_index: int,\n       records: typing.List[SearchResultRecord],\n\
  \   ) -> pathlib.Path`:\n   - Computes `page_filename = f\"page_{page_index:06d}.json\"\
  `.\n   - Computes `tmp_path = directory / f\".page_{page_index:06d}.tmp\"`.\n  \
  \ - Serialises `{\"page_index\": page_index, \"records\": [dataclasses.asdict(r)\n\
  \     for r in records]}` as JSON to `tmp_path` with `open(..., \"w\")`.\n   - Calls
  `os.fsync(f.fileno())` before closing the file.\n   - Renames `tmp_path` to `directory
  / page_filename` via `os.replace()`.\n   - Returns the final `pathlib.Path` of the
  published page file.\n\n3. Define `def page_path(\n       directory: pathlib.Path,\n\
  \       page_index: int,\n   ) -> pathlib.Path`:\n   - Returns `directory / f\"\
  page_{page_index:06d}.json\"` without touching disk.\n\n4. Define `def page_exists(\n\
  \       directory: pathlib.Path,\n       page_index: int,\n   ) -> bool`:\n   -
  Returns `page_path(directory, page_index).exists()`.\n\n## Constraints\n- All public
  names must have docstrings.\n- No third-party imports.\n- AtomicPagePublication:
  temp write + os.replace only. Never write directly\n  to the final page filename.\n"
verification:
  type: import
  target: code_analysis/search_session/page_writer.py
  expected: Module imports without error. `write_page`, `page_path`, 
    `page_exists`, and `SearchResultRecord` are all present.
