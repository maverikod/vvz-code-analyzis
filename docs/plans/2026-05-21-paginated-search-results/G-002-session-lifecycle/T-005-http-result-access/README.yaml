step_id: T-005
parent_global_step: G-002
name: HTTP result access lifecycle facet
description: "Define the HTTPResultAccess lifecycle facet as the HTTP retrieval contract
  for reading SearchSession status and manifest-backed metadata without streaming
  transport. Require every successful status or manifest-backed metadata HTTP read
  to refresh the session LastAccessTimestamp by updating last_access_at in the manifest,
  keeping last_access_at separate from heartbeat_at. Expose manifest-backed progress,
  status, and phase data to clients and models through ordinary HTTP reads.\n"
concepts:
- C-001
- C-003
- C-005
- C-006
- C-020
inputs:
- name: search_session
  type: SearchSession
  description: Session whose status and manifest-backed metadata are accessed 
    through HTTP.
- name: session_manifest
  type: SearchSessionManifest
  description: Manifest record read and updated during HTTP access.
- name: search_status_model
  type: SearchStatus
  description: Status and phase vocabulary exposed through HTTP status reads.
outputs:
- name: http_result_access
  type: HTTPResultAccess
  description: HTTPResultAccess lifecycle facet with last-access refresh and 
    status and manifest-backed metadata exposure.
atomic_steps:
- A-001
status: draft
