- C-015
description: "Define the whitelist edit that constitutes ReadOnlyBatchIntegration\
  \ (C-015). This edit adds the PreviewCommand (C-001) name to the READ_ONLY_BATCH_WHITELIST\
  \ constant so the command becomes callable inside read_only_batch invocations.\n\
  Whitelist location: - File: code_analysis/commands/read_only_batch_whitelist.py\
  \ - Constant: READ_ONLY_BATCH_WHITELIST (a frozenset of command name\n  strings).\n\
  \nEdit: Add the string 'universal_file_preview' to READ_ONLY_BATCH_WHITELIST. No\
  \ other changes to this file are made in this step.\nEffect: After this edit, read_only_batch\
  \ accepts 'universal_file_preview' as a valid command name in its invocations list.\
  \ The command runs with the same read-only guarantees as the other whitelisted commands.\n\
  Precondition: T-801 (stability verification) must have confirmed stability_confirmed\
  \ = True before this edit is applied.\n"
inputs:
- name: stability_confirmed
  type: boolean
  description: Must be True. Confirms that PreviewCommand and all file handlers are
    stable and tests are passing before the whitelist is modified.
outputs:
- name: updated_whitelist
  type: modified READ_ONLY_BATCH_WHITELIST constant
  description: The READ_ONLY_BATCH_WHITELIST frozenset with 'universal_file_preview'
    added. The constant is updated in code_analysis/commands/read_only_batch_whitelist.py.
