step_id: T-001
parent_global_step: G-003
name: Tree Representation Validation and Recreation
description: "Creates the TreeRepresentation (C-015) management logic that ensures
  every supported file has a valid structural tree before any structural processing.
  Supported formats are JSON, YAML, Python CST, Markdown, and text (text files are
  represented as paragraphs, each paragraph as lines). For each file, checks whether
  a tree sidecar or in-memory tree exists and whether its checksum matches the current
  file content. If the tree is absent or its checksum does not match, the tree is
  recreated using the same tree construction path as the indexer. Stable node identifiers
  in the tree must be comparable to those used by Python CST sidecars. This tree is
  the required precondition for XPathLikeFilter and StructuralEvidence operations
  on that file.\n"
concepts:
- C-015
inputs:
- name: file_path
  type: project-relative path
  description: Path of the file for which a TreeRepresentation is needed.
- name: file_content_checksum
  type: string
  description: Current checksum of the file on disk.
outputs:
- name: tree_representation
  type: TreeRepresentation (C-015)
  description: Valid tree with stable node identifiers for the file, either 
    loaded from an existing sidecar or freshly constructed.
atomic_steps:
- A-001
status: draft
