step_id: G-001
name: TreeNode model and Sidecar persistence
status: done
description: 'Define the TreeNode data model and the Sidecar persistence contract.
  A TreeNode carries a stable UUID, type discriminator, optional key (for object members),
  optional scalar value, ordered children list (for containers), and two optional
  comment strings (comment_before and comment_inline). A Sidecar is a JSON file in
  .trees/ storing the full TreeNode tree for one source file together with the SHA-256
  of the source at last sync. This step establishes the data contracts all subsequent
  steps depend on: the TreeNode schema, Sidecar read/write, and SidecarDirectory layout.'
